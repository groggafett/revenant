  function normaliseAbilityTriggerValue(value) {
    const raw = String(value ?? '').trim();
    if (!raw || raw === 'none') return '';
    const key = String(raw).trim().toLowerCase().replace(/\+/g,'plus').replace(/[^a-z0-9]+/g,'');
    const map = {
      action:'action', activated:'action', activatedability:'action', onaction:'action',
      onplay:'on_play', play:'on_play', ondeploy:'on_deploy', deploy:'on_deploy',
      onattack:'on_attack', attack:'on_attack', onattackroll:'on_attack_roll', attackroll:'on_attack_roll',
      ondefend:'on_defend', defend:'on_defend', ondeath:'on_death', death:'on_death',
      onturnstart:'on_turn_start', turnstart:'on_turn_start', onturnend:'on_turn_end', turnend:'on_turn_end',
      passive:'passive', none:''
    };
    return Object.prototype.hasOwnProperty.call(map, key) ? map[key] : raw;
  }

  function normaliseAbilityEffectValue(value) {
    const raw = String(value ?? '').trim();
    if (!raw) return '';
    const key = String(raw).trim().toLowerCase().replace(/\+/g,'plus').replace(/[^a-z0-9]+/g,'');
    const map = {
      none:'none', inspire:'command_unit', command:'command_unit', commandunit:'command_unit', giveaction:'command_unit', addaction:'add_action',
      jumplane:'jump_lane', jump:'jump_lane', movethenfight:'move_then_fight', movefight:'move_then_fight', charge:'move_then_fight', cavalrycharge:'move_then_fight', thunderingcharge:'move_then_fight', explodinghits:'exploding_hits', chainhits:'chain_hits',
      damage:'damage', heal:'heal', draw:'draw', addresource:'add_resource', addresources:'add_resource'
    };
    return Object.prototype.hasOwnProperty.call(map, key) ? map[key] : raw;
  }

  function getUnitAbility(unit) {
    if (!unit) return null;
    const storedAbility = unit.ability || CARDS.find(c => c.id === unit.id)?.ability || null;
    if (storedAbility) {
      const key = normaliseAbilityEffectValue(storedAbility.key || storedAbility.effect || '');
      return {
        ...storedAbility,
        key,
        apCost: Number.isFinite(Number(storedAbility.apCost ?? storedAbility.abilityCost)) ? Number(storedAbility.apCost ?? storedAbility.abilityCost) : 1,
        value: storedAbility.value ?? unit.value ?? unit.unitValue ?? 1,
        target: normaliseAbilityTarget(storedAbility.target || unit.abilityTarget || abilityTargetForEffect(key), unit)
      };
    }

    const triggerKey = normaliseAbilityTriggerValue(unit.trigger || unit.mechanic?.trigger || '');
    const effectKey = normaliseAbilityEffectValue(unit.effect || unit.unitEffect || unit.mechanic?.effect || '');
    const isActivatedTrigger = triggerKey === 'action';

    // Only player-triggered action abilities become action bar buttons.
    // Passive, on-play and attack-roll mechanics resolve automatically elsewhere.
    if (isActivatedTrigger && effectKey && effectKey !== 'none') {
      const runtimeAbility = makeRuntimeAbilityFromEffect(effectKey, unit);
      if (runtimeAbility) return runtimeAbility;
    }
    return null;
  }

  function actionCostPips(cost=1) {
    const n = Math.max(1, Math.min(4, Number(cost) || 1));
    return Array.from({ length:n }, () => '✦').join('');
  }

  function setActionButtonCost(id, cost=1) {
    const el = document.getElementById(id);
    if (el) el.textContent = actionCostPips(cost);
  }

  function getJumpLaneTargets(casterTileId) {
    const src = tileMap[casterTileId];
    if (!src) return [];
    const otherLane = src.lane === 'A' ? 'B' : 'A';
    return Object.keys(tileMap).filter(tid => {
      const t = tileMap[tid];
      return t && t.lane === otherLane && t.row === src.row && t.zone !== 'centre' && !state.board[tid];
    });
  }

  function abilityTargetDistanceTiles(casterTileId, range) {
    const max = Math.max(0, Number(range) || 0);
    if (!max) return [];
    const dist = new Map([[casterTileId,0]]);
    const queue = [casterTileId];
    while (queue.length) {
      const cur = queue.shift();
      const d = dist.get(cur);
      if (d >= max) continue;
      for (const nid of getNeighbors(cur, true)) {
        if (dist.has(nid)) continue;
        dist.set(nid, d + 1);
        queue.push(nid);
      }
    }
    dist.delete(casterTileId);
    return [...dist.keys()].filter(id => tileMap[id]?.zone !== 'centre');
  }

  function abilityTargetMatchesLocation(tid, casterTileId, target) {
    const location = target.location || 'same_lane';
    if (location === 'anywhere') return tileMap[tid]?.zone !== 'centre';
    if (location === 'self' || location === 'same_tile') return tid === casterTileId;
    if (location === 'same_lane' || location === 'lane') return unitLane(tid) === unitLane(casterTileId);
    if (location === 'adjacent') return getNeighbors(casterTileId, true).includes(tid);
    if (location === 'range') return abilityTargetDistanceTiles(casterTileId, target.range || 1).includes(tid);
    if (location === 'opposite_lane_same_row') return getJumpLaneTargets(casterTileId).includes(tid);
    return true;
  }

  function unitMatchesTargetFilters(unit, target, caster) {
    const targetState = target.state || 'any';
    const unitType = target.unitType || 'any';
    const faction = target.faction || 'any';
    const rawType = String(unit.type || '').trim();

    if (targetState === 'damaged' && !(Number(unit.hp) < Number(unit.maxHp ?? unit.hp))) return false;
    if (targetState === 'undamaged' && Number(unit.hp) < Number(unit.maxHp ?? unit.hp)) return false;
    if (targetState === 'activated' && !(unit.actionsLeft > 0)) return false;
    if (targetState === 'unactivated' && unit.actionsLeft !== null) return false;
    if (targetState === 'exhausted' && unit.actionsLeft !== 0) return false;
    if (targetState === 'ready' && !(unit.actionsLeft > 0)) return false;

    if (unitType === 'hero' && rawType !== 'Hero') return false;
    if (unitType === 'non_hero' && rawType === 'Hero') return false;
    if (unitType === 'common' && rawType !== 'Common') return false;
    if (unitType === 'uncommon' && rawType !== 'Uncommon') return false;

    const unitFaction = normaliseFactionValue(unit.faction || 'universal');
    const casterFaction = normaliseFactionValue(caster?.faction || 'universal');
    if (faction === 'same_faction' && unitFaction !== casterFaction) return false;
    if (faction === 'different_faction' && unitFaction === casterFaction) return false;
    if (faction && faction !== 'any' && faction !== 'same_faction' && faction !== 'different_faction' && unitFaction !== faction) return false;

    return true;
  }


  function isMoveThenFightAbility(ability) {
    return normaliseAbilityEffectValue(ability?.key || ability?.effect || '') === 'move_then_fight';
  }

  function chargeDamageBonus(ability) {
    return Math.max(0, Number(ability?.damageBonus ?? ability?.bonusAmount ?? ability?.value ?? 1) || 0);
  }

  function chargeActionCost(ability) {
    return Math.max(1, Number(ability?.apCost ?? ability?.abilityCost ?? 2) || 2);
  }

  function getChargeDestinations(casterTileId, targetTileId, ability) {
    const caster = state.board[casterTileId] || state.activeUnit?.card;
    const target = state.board[targetTileId];
    if (!caster || !target || target.owner === (caster.owner ?? state.activePlayer)) return [];
    const moveSteps = Math.max(0, Number(caster.move) || 0);
    if (moveSteps <= 0) return [];
    const weaponRange = caster.weapon?.range ?? 1;
    return getReachableTiles(casterTileId, moveSteps).filter(destId => {
      if (!tileMap[destId] || tileMap[destId].zone === 'centre') return false;
      if (state.board[destId]) return false;
      return getAttackTiles(destId, weaponRange).includes(targetTileId);
    });
  }

  function getChargeTargets(ability, casterTileId) {
    const caster = state.board[casterTileId] || state.activeUnit?.card;
    if (!caster) return [];
    const casterOwner = caster.owner ?? state.activePlayer;
    return Object.keys(state.board).filter(tid => {
      const unit = state.board[tid];
      return unit && unit.owner !== casterOwner && getChargeDestinations(casterTileId, tid, ability).length > 0;
    });
  }

  function clearChargeState() {
    state.chargeState = null;
    document.querySelectorAll('.charge-selected-target').forEach(t => t.classList.remove('charge-selected-target'));
  }

  function beginChargeDestinationSelection(targetTileId) {
    const casterTileId = state.activeUnit?.tileId;
    const caster = state.activeUnit?.card;
    const ability = getUnitAbility(caster);
    if (!casterTileId || !caster || !isMoveThenFightAbility(ability)) return false;
    const destinations = getChargeDestinations(casterTileId, targetTileId, ability);
    if (!destinations.length) return false;

    state.chargeState = {
      phase: 'destination',
      casterTileId,
      targetTileId,
      ability
    };

    document.querySelectorAll('.highlight-ability,.highlight-move,.highlight-target,.charge-selected-target').forEach(el => {
      el.classList.remove('highlight-ability','highlight-move','highlight-target','charge-selected-target');
    });

    const targetTile = document.querySelector(`[data-id="${targetTileId}"]`);
    targetTile?.classList.add('highlight-ability','charge-selected-target');
    targetTile?.querySelector('.unit-on-tile')?.classList.add('highlight-target');

    destinations.forEach(destId => {
      document.querySelector(`[data-id="${destId}"]`)?.classList.add('highlight-move');
    });

    updateActionBar();
    return true;
  }

  function pendingCombatContextFor(atk, targetTileId) {
    const ctx = state.pendingCombatContext;
    if (!ctx || !atk) return null;
    if (ctx.targetTileId && ctx.targetTileId !== targetTileId) return null;
    const uid = atk.uid || atk.id || atk.name;
    return ctx.attackerRef === uid ? ctx : null;
  }

  function clearPendingCombatContext(targetTileId=null) {
    if (!state.pendingCombatContext) return;
    if (targetTileId && state.pendingCombatContext.targetTileId && state.pendingCombatContext.targetTileId !== targetTileId) return;
    state.pendingCombatContext = null;
  }

  async function executeChargeTo(destinationTileId) {
    const charge = state.chargeState;
    const casterTileId = charge?.casterTileId;
    const targetTileId = charge?.targetTileId;
    const ability = charge?.ability || getUnitAbility(state.activeUnit?.card);
    const caster = state.activeUnit?.card;
    if (!casterTileId || !targetTileId || !destinationTileId || !caster || !isMoveThenFightAbility(ability)) return false;

    const validDestinations = getChargeDestinations(casterTileId, targetTileId, ability);
    if (!validDestinations.includes(destinationTileId)) return false;

    const cost = chargeActionCost(ability);
    if ((caster.actionsLeft ?? 0) < cost) return false;
    if (!state.board[casterTileId] || state.board[destinationTileId] || !state.board[targetTileId]) return false;

    state._moveExecuting = true;
    const targetTile = document.querySelector(`[data-id="${targetTileId}"]`);
    clearChargeState();
    clearHighlights();

    await animateUnitMove(casterTileId, destinationTileId, { style:'charge', duration:320 });

    delete state.board[casterTileId];
    state.board[destinationTileId] = caster;

    const sourceTile = document.querySelector(`[data-id="${casterTileId}"]`);
    const destTile = document.querySelector(`[data-id="${destinationTileId}"]`);
    sourceTile?.classList.remove('unit-active');
    sourceTile?.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e => e.remove());
    if (destTile) {
      renderUnit(destTile, caster);
      destTile.classList.add('unit-active');
    }

    state.activeUnit = { tileId: destinationTileId, card: caster };
    profileTileId = destinationTileId;
    state.selectedBoardTile = destinationTileId;
    syncBoardSelectionHighlight();

    // Normal combat spends one action when resolved; pre-spend the remainder of the ability cost now.
    const preSpend = Math.max(0, cost - 1);
    caster.actionsLeft = Math.max(1, (caster.actionsLeft ?? cost) - preSpend);

    state.pendingCombatContext = {
      source: 'move_then_fight',
      name: ability.name || 'Charge',
      attackerRef: caster.uid || caster.id || caster.name,
      targetTileId,
      damageBonus: chargeDamageBonus(ability)
    };

    renderHub();
    if (destTile) renderUnit(destTile, caster);
    state._moveExecuting = false;
    state.activeAction = null;
    state.activeAbility = null;

    openBattleOverlay(targetTileId);
    return true;
  }

  function getAbilityTargets(ability, casterTileId) {
    if (!ability || !casterTileId) return [];
    const caster = state.board[casterTileId] || state.activeUnit?.card;
    if (isMoveThenFightAbility(ability)) return getChargeTargets(ability, casterTileId);
    const target = normaliseAbilityTarget(ability.target || abilityTargetForEffect(ability.key), caster || {});
    const casterOwner = caster?.owner ?? state.activePlayer;

    if (target.location === 'self' || target.side === 'self') return [casterTileId];
    if (ability?.key === 'jump_lane' || target.location === 'opposite_lane_same_row') {
      return getJumpLaneTargets(casterTileId);
    }

    const wantsTile = target.type === 'tile' || target.side === 'empty' || target.state === 'empty' || target.state === 'occupied';
    if (wantsTile) {
      return Object.keys(tileMap).filter(tid => {
        if (tileMap[tid]?.zone === 'centre') return false;
        if (!abilityTargetMatchesLocation(tid, casterTileId, target)) return false;
        const occupant = state.board[tid];
        if ((target.side === 'empty' || target.state === 'empty') && occupant) return false;
        if (target.state === 'occupied' && !occupant) return false;
        if (occupant) {
          if (target.side === 'friendly' && occupant.owner !== casterOwner) return false;
          if (target.side === 'enemy' && occupant.owner === casterOwner) return false;
          if (!unitMatchesTargetFilters(occupant, target, caster)) return false;
        }
        return true;
      });
    }

    return Object.keys(state.board).filter(tid => {
      if (tid === casterTileId) return false;
      if (!abilityTargetMatchesLocation(tid, casterTileId, target)) return false;
      const unit = state.board[tid];
      if (target.side === 'friendly' && unit.owner !== casterOwner) return false;
      if (target.side === 'enemy' && unit.owner === casterOwner) return false;
      if (!unitMatchesTargetFilters(unit, target, caster)) return false;
      return true;
    });
  }

  function animateUnitMove(fromTileId, toTileId, options={}) {
    const duration = options.duration ?? 320;
    const fromTile = document.querySelector(`[data-id="${fromTileId}"]`);
    const toTile = document.querySelector(`[data-id="${toTileId}"]`);
    const unitEl = fromTile?.querySelector('.unit-on-tile');
    if (!fromTile || !toTile || !unitEl) return Promise.resolve();

    const fromRect = unitEl.getBoundingClientRect();
    const toRect = toTile.getBoundingClientRect();
    const clone = unitEl.cloneNode(true);
    clone.classList.add('unit-jump-clone');
    clone.style.left = `${fromRect.left}px`;
    clone.style.top = `${fromRect.top}px`;
    clone.style.width = `${fromRect.width}px`;
    clone.style.height = `${fromRect.height}px`;
    clone.style.setProperty('--jump-ms', `${duration}ms`);
    clone.style.transform = 'translate3d(0,0,0) scale(1)';
    document.body.appendChild(clone);

    unitEl.classList.add('unit-jump-hidden');
    fromTile.classList.add('jump-pulse');
    toTile.classList.add('jump-pulse');

    const dx = (toRect.left + toRect.width / 2) - (fromRect.left + fromRect.width / 2);
    const dy = (toRect.top + toRect.height / 2) - (fromRect.top + fromRect.height / 2);

    return new Promise(resolve => {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          clone.classList.add('jump-arrive');
          clone.style.transform = `translate3d(${dx}px, ${dy}px, 0) scale(1.08)`;
        });
      });
      setTimeout(() => {
        clone.remove();
        unitEl.classList.remove('unit-jump-hidden');
        fromTile.classList.remove('jump-pulse');
        toTile.classList.remove('jump-pulse');
        resolve();
      }, duration + 80);
    });
  }

// ── ABILITY REGISTRY ──
  function spendCasterAbilityAction(caster, ability) {
    const cost = Math.max(1, Number(ability?.apCost ?? ability?.abilityCost ?? 1) || 1);
    caster.actionsLeft = Math.max(0, (caster.actionsLeft ?? 1) - cost);
    const casterTile = document.querySelector(`[data-id="${state.activeUnit?.tileId}"]`);
    if (casterTile) renderUnit(casterTile, caster);
  }

  function abilityTargetIds(ability, selectedTileId) {
    const casterTileId = state.activeUnit?.tileId;
    if (ability?.target?.count === 'all' && casterTileId) return getAbilityTargets(ability, casterTileId);
    return selectedTileId ? [selectedTileId] : [];
  }

  const ABILITY_REGISTRY = {
    command_unit(caster, targetTileId, ability) {
      const target = state.board[targetTileId];
      if (!target) return { activateTarget:false };
      const granted = Math.max(1, Number(ability?.value ?? 1) || 1);
      target.actionsLeft = Math.max(granted, target.actionsLeft ?? granted);
      const tile = document.querySelector(`[data-id="${targetTileId}"]`);
      if (tile) renderUnit(tile, target);
      spendCasterAbilityAction(caster, ability);
      return { activateTarget:true };
    },
    add_action(caster, targetTileId, ability) {
      const value = Math.max(1, Number(ability?.value ?? 1) || 1);
      abilityTargetIds(ability, targetTileId).forEach(tid => {
        const target = state.board[tid];
        if (!target) return;
        target.actionsLeft = Math.max(value, target.actionsLeft ?? value);
        const tile = document.querySelector(`[data-id="${tid}"]`);
        if (tile) renderUnit(tile, target);
      });
      spendCasterAbilityAction(caster, ability);
      return { activateTarget:false };
    },
    async jump_lane(caster, targetTileId, ability) {
      const sourceTileId = state.activeUnit?.tileId;
      if (!sourceTileId || !targetTileId || state.board[targetTileId]) return false;
      if (!getJumpLaneTargets(sourceTileId).includes(targetTileId)) return false;
      const sourceTile = document.querySelector(`[data-id="${sourceTileId}"]`);
      const targetTile = document.querySelector(`[data-id="${targetTileId}"]`);
      await animateUnitMove(sourceTileId, targetTileId, { style:'jump', duration:320 });
      delete state.board[sourceTileId];
      state.board[targetTileId] = caster;
      spendCasterAbilityAction(caster, ability);
      if (sourceTile) sourceTile.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e => e.remove());
      if (targetTile) renderUnit(targetTile, caster);
      state.activeUnit = caster.actionsLeft > 0 ? { tileId: targetTileId, card: caster } : null;
      state.selectedBoardTile = caster.actionsLeft > 0 ? targetTileId : null;
      return true;
    },
    damage(caster, targetTileId, ability) {
      const value = Math.max(1, Number(ability?.value ?? 1) || 1);
      abilityTargetIds(ability, targetTileId).forEach(tid => {
        const target = state.board[tid];
        if (!target) return;
        target.hp = Math.max(0, Number(target.hp || 0) - value);
        showDamageFloat(tid, value);
        if (target.hp <= 0) setTimeout(()=>removeSlain(tid), 400);
        else document.querySelector(`[data-id="${tid}"]`) && renderUnit(document.querySelector(`[data-id="${tid}"]`), target);
      });
      spendCasterAbilityAction(caster, ability);
      return { activateTarget:false };
    },
    heal(caster, targetTileId, ability) {
      const value = Math.max(1, Number(ability?.value ?? 1) || 1);
      abilityTargetIds(ability, targetTileId).forEach(tid => {
        const target = state.board[tid];
        if (!target) return;
        target.hp = Math.min(Number(target.maxHp ?? target.hp ?? 0), Number(target.hp || 0) + value);
        const tile = document.querySelector(`[data-id="${tid}"]`);
        if (tile) renderUnit(tile, target);
      });
      spendCasterAbilityAction(caster, ability);
      return { activateTarget:false };
    },
    draw(caster, targetTileId, ability) {
      const count = Math.max(1, Number(ability?.value ?? 1) || 1);
      for (let i=0; i<count; i++) drawCard(state.activePlayer);
      spendCasterAbilityAction(caster, ability);
      renderHand();
      return { activateTarget:false };
    },
    add_resource(caster, targetTileId, ability) {
      const value = Math.max(1, Number(ability?.value ?? 1) || 1);
      state.players[state.activePlayer].resources += value;
      spendCasterAbilityAction(caster, ability);
      return { activateTarget:false };
    }
  };

  async function resolveAbility(targetTileId) {
    const caster = state.activeUnit?.card;
    const casterTileId = state.activeUnit?.tileId;
    const ability = getUnitAbility(caster);
    if (!ability) return;
    clearHighlights();
    state.activeAction = null;
    state.activeAbility = null;

    if (ability.key === 'jump_lane') {
      const moved = await ABILITY_REGISTRY.jump_lane(caster, targetTileId, ability);
      renderHub();
      syncBoardSelectionHighlight();
      if (!moved) return;
      if (state.activeUnit?.card) {
        openProfile(state.activeUnit.card, 'board', state.activeUnit.tileId);
      } else {
        closeProfile();
        endCurrentTurn();
        waitThenAdvance();
      }
      return;
    }

    const result = ABILITY_REGISTRY[ability.key]?.(caster, targetTileId, ability);
    renderHub();

    if (result?.activateTarget) {
      if (caster.actionsLeft > 0) state.pendingReturnUnit = { tileId: casterTileId, card: caster };
      const target = state.board[targetTileId];
      if (target) {
        state.activeUnit = { tileId: targetTileId, card: target };
        document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
        document.querySelector(`[data-id="${targetTileId}"]`)?.classList.add('unit-active');
        state.selectedBoardTile = targetTileId;
        syncBoardSelectionHighlight();
        openProfile(target, 'board', targetTileId);
        showActionBar(target);
        updateActionBar();
      }
      return;
    }

    const activeTile = state.activeUnit?.tileId || casterTileId;
    if (activeTile) {
      const tile = document.querySelector(`[data-id="${activeTile}"]`);
      if (tile && caster) renderUnit(tile, caster);
    }
    if (caster?.actionsLeft > 0) {
      state.activeUnit = { tileId: activeTile, card: caster };
      state.selectedBoardTile = activeTile;
      syncBoardSelectionHighlight();
      openProfile(caster, 'board', activeTile);
      refreshActionButtons();
    } else {
      closeProfile();
      clearHighlights();
      endCurrentTurn();
      waitThenAdvance();
    }
  }

    function resolveCombat(atk, def, laneKey=null) {
    const fx = getLaneEffect(laneKey);
    const eff = fx ? EFFECT_REGISTRY[fx.effect] : null;
    const hitThresh = parseInt(atk.weapon?.hit || '7', 10);
    const saveThresh = parseInt(def.save || '7', 10);
    let modSave = saveThresh + (Number(atk.weapon?.ap) || 0);
    if (eff?.modifySave) modSave = eff.modifySave(fx, modSave);
    const autoFail = modSave > 6;
    const attackCount = (Number(atk.weapon?.attacks) || 0) + (atk.bonusAttacks || 0);

    const readDiceTrigger = (unit) => {
      if (typeof window.revDiceTriggerFromUnit === 'function') {
        const existing = window.revDiceTriggerFromUnit(unit);
        if (existing) return existing;
      }
      const dt = unit?.diceTrigger || unit?.mechanic?.diceTrigger || null;
      if (!dt) return null;
      const trigger = dt.trigger || dt.rollTrigger || dt.type;
      const effect = dt.effect || dt.diceEffect;
      if (trigger !== 'on_attack_roll' && trigger !== 'onAttackRoll') return null;
      if (effect !== 'exploding_hits' && effect !== 'chain_hits') return null;
      return {
        trigger:'on_attack_roll',
        condition:'natural_gte',
        threshold: Math.max(1, Math.min(6, Number(dt.threshold) || 6)),
        effect,
        value: Math.max(1, Number(dt.value) || 1)
      };
    };

    const diceTrigger = readDiceTrigger(atk);
    const atkDice = [];
    const rollEvents = [];
    let hits = 0;
    let bonusHits = 0;
    let chainRolls = 0;
    const baseAttackCount = Math.max(0, attackCount);
    const queue = Array.from({ length: baseAttackCount }, () => 'base');
    const MAX_ATTACK_DICE = 60;

    while (queue.length && atkDice.length < MAX_ATTACK_DICE) {
      const source = queue.shift() || 'base';
      const d = Math.ceil(Math.random() * 6);
      atkDice.push(d);
      const isHit = d >= hitThresh;
      let bonusAdded = 0;
      let chainAdded = 0;
      if (isHit) hits += 1;

      // Dice triggers use natural dice values, before any later modifiers.
      // Exploding hits only apply from successful attack rolls.
      if (diceTrigger && isHit && d >= diceTrigger.threshold) {
        if (diceTrigger.effect === 'exploding_hits') {
          bonusAdded = Math.max(1, Number(diceTrigger.value) || 1);
          hits += bonusAdded;
          bonusHits += bonusAdded;
        } else if (diceTrigger.effect === 'chain_hits') {
          const toAdd = Math.max(1, Number(diceTrigger.value) || 1);
          for (let i = 0; i < toAdd && atkDice.length + queue.length < MAX_ATTACK_DICE; i++) {
            queue.push('chain');
            chainRolls += 1;
            chainAdded += 1;
          }
        }
      }
      rollEvents.push({ value:d, source, isHit, bonusAdded, chainAdded });
    }

    const saveDice = autoFail ? [] : Array.from({ length:hits }, () => Math.ceil(Math.random() * 6));
    const saved = autoFail ? 0 : saveDice.filter(d => d >= modSave).length;
    const combatCtx = typeof pendingCombatContextFor === 'function' ? pendingCombatContextFor(atk, state.pendingCombatContext?.targetTileId) : null;
    const damageBonus = Math.max(0, Number(combatCtx?.damageBonus) || 0);
    const damagePerHit = (Number(atk.weapon?.damage) || 0) + damageBonus;
    let totalDmg = (hits - saved) * damagePerHit;
    if (eff?.onRollSix) totalDmg += eff.onRollSix(fx, atkDice);
    return { atkDice, rollEvents, baseAttackCount, hits, saveDice, saved, autoFail, modSave, totalDmg, hitThresh, diceTrigger, bonusHits, chainRolls, damageBonus, damagePerHit };
  }

  function openBattleOverlay(targetTileId) {
    const atk = state.activeUnit.card;
    const def = state.board[targetTileId];
    if (!def) return;
    const combatCtx = pendingCombatContextFor(atk, targetTileId);
    const displayDamage = (Number(atk.weapon?.damage) || 0) + (Number(combatCtx?.damageBonus) || 0);

    function battleCardHtml(card, role, currentHp) {
      const ownerCol = card.owner === 1 ? 'p1' : card.owner === 2 ? 'p2' : '';
      const fallbackId = `battle-${role}-fallback`;
      const art = artStyle(card, true);
      const defenceHtml = role === 'defender'
        ? `<div class="battle-target-hp ${ownerCol}-stat">${escapeHtml(currentHp ?? card.hp ?? '')}</div>
           <div class="battle-target-save">${escapeHtml(card.save ?? '')}</div>`
        : '';
      return `<div class="battle-zoom-card ${role}">
        <div class="battle-card-role">${role === 'attacker' ? 'Attacker' : 'Defender'}</div>
        <div class="battle-card-art ${ownerCol}-unit" id="battle-${role}-art" style="${art}">
          ${defenceHtml}
          <div class="battle-card-fallback" id="${fallbackId}">${expectedArtLabel(card)}</div>
        </div>
        <div class="battle-card-name">${cardDisplayName(card)}</div>
        ${card.weapon?.name ? `<div class="battle-card-weapon">${escapeHtml(card.weapon.name)}</div>` : ''}
      </div>`;
    }

    function updateBattleFallback(card, role) {
      const nameEl = document.getElementById(`battle-${role}-fallback`);
      if (!nameEl) return;
      nameEl.textContent = expectedArtLabel(card);
      nameEl.classList.remove('hidden');
      if (!card?.artId) return;
      let pending = 3;
      let loaded = false;
      const done = () => { pending -= 1; if (pending <= 0 && !loaded) nameEl.classList.remove('hidden'); };
      artCandidates(card.artId).forEach(src => {
        const img = new Image();
        img.onload = () => { loaded = true; nameEl.classList.add('hidden'); };
        img.onerror = done;
        img.src = src;
      });
    }

    const ov = document.createElement('div');
    ov.className = 'battle-overlay';
    ov.innerHTML = `
      <div class="battle-shell" onclick="event.stopPropagation()">
        <div class="battle-header">
          <div class="battle-heading">Attack Declared</div>
          <div class="battle-close" id="battle-close">✕</div>
        </div>
        <div class="battle-duel">
          ${battleCardHtml(atk,'attacker',atk.hp)}
          <div class="battle-vs"><div class="battle-vs-icon">⚔</div><div class="battle-vs-arrow">→</div></div>
          ${battleCardHtml(def,'defender',def.hp)}
        </div>
        <div class="battle-attack-profile">
          ${battleAttackProfileHtml(combatCtx ? {...atk, weapon:{...atk.weapon, damage:displayDamage}} : atk)}
        </div>
        <div class="battle-cta" id="battle-cta"></div>
      </div>`;
    document.body.appendChild(ov);
    updateBattleFallback(atk, 'attacker');
    updateBattleFallback(def, 'defender');
    requestAnimationFrame(() => ov.classList.add('show'));

    ov.addEventListener('click', e => { if (e.target === ov) { clearPendingCombatContext(targetTileId); ov.remove(); } });
    ov.querySelector('#battle-close').addEventListener('click', () => { clearPendingCombatContext(targetTileId); ov.remove(); });

    const cta = document.getElementById('battle-cta');
    cta.innerHTML = `
      <div class="battle-sequence">
        <div class="battle-roll-panel attack-panel">
          <div class="battle-row-track">
            <div class="battle-roll-stat attack" id="battle-hit-box">
              <div class="battle-roll-stat-icon">🎯</div>
              <div class="battle-roll-stat-value" id="battle-hit-stat">${escapeHtml(atk.weapon?.hit ?? '')}</div>
            </div>
            <div class="battle-dice-wrap"><div class="battle-dice-row" id="battle-attack-row"></div></div>
            <div class="battle-roll-stat damage right" id="battle-dmg-box">
              <div class="battle-roll-stat-icon">💀</div>
              <div class="battle-roll-stat-value" id="battle-dmg-stat">${escapeHtml(displayDamage)}</div>
            </div>
          </div>
          <div class="battle-row-summary" id="battle-attack-summary"></div>
        </div>
        <div class="battle-ap-bridge pre-attack" id="battle-ap-bridge">
          <div class="battle-ap-chip" id="battle-ap-chip"><span class="battle-ap-chip-icon">🛡</span><span class="battle-ap-chip-value" id="battle-ap-value">${atk.weapon?.ap > 0 ? `-${escapeHtml(atk.weapon.ap)}` : '0'}</span></div>
        </div>
        <div class="battle-roll-panel defence-panel pre-attack" id="battle-defence-panel">
          <div class="battle-row-track">
            <div class="battle-roll-stat defence" id="battle-save-box">
              <div class="battle-roll-stat-icon">🛡</div>
              <div class="battle-roll-stat-value" id="battle-save-stat">${escapeHtml(def.save ?? '')}</div>
            </div>
            <div class="battle-dice-wrap"><div class="battle-dice-row" id="battle-defence-row"></div></div>
            <div class="battle-roll-stat hp right" id="battle-hp-box">
              <div class="battle-roll-stat-icon">♥</div>
              <div class="battle-roll-stat-value" id="battle-hp-stat">${escapeHtml(def.hp ?? '')}</div>
            </div>
          </div>
          <div class="battle-row-summary" id="battle-defence-summary"></div>
          <div class="battle-row-cta" id="battle-row-cta"></div>
        </div>
      </div>`;

    const wait = ms => new Promise(resolve => setTimeout(resolve, ms));
    const DIE_MS = 450;
    const PRE_ATTACK_PAUSE = 350;
    const POST_ATTACK_PAUSE = 1000;
    const DEFENCE_STAGE_PAUSE = 550;
    const AP_TRANSFER_PAUSE = 650;
    const attackRow = document.getElementById('battle-attack-row');
    const defenceRow = document.getElementById('battle-defence-row');
    const attackSummary = document.getElementById('battle-attack-summary');
    const hitStatEl = document.getElementById('battle-hit-stat');
    const dmgStatEl = document.getElementById('battle-dmg-stat');
    const defenceSummary = document.getElementById('battle-defence-summary');
    const saveStatEl = document.getElementById('battle-save-stat');
    const hpStatEl = document.getElementById('battle-hp-stat');
    const rowCta = document.getElementById('battle-row-cta');
    const defencePanel = document.getElementById('battle-defence-panel');
    const apBridge = document.getElementById('battle-ap-bridge');
    const apChip = document.getElementById('battle-ap-chip');
    const apValue = document.getElementById('battle-ap-value');
    const saveBox = document.getElementById('battle-save-box');
    const attackProfile = ov.querySelector('.battle-attack-profile');

    const makeDie = (value='', cls='') => {
      const die = document.createElement('span');
      die.className = `die ${cls}`.trim();
      die.textContent = value;
      return die;
    };
    const setupGhostRow = (row, count) => {
      if (!row) return;
      row.innerHTML = '';
      for (let i = 0; i < count; i++) row.appendChild(makeDie('', 'die-ghost die-reveal'));
    };
    const appendGhostDice = (row, count) => {
      if (!row) return;
      for (let i = 0; i < count; i++) row.appendChild(makeDie('', 'die-ghost die-reveal'));
    };
    const appendResolvedDie = async (row, value, cls='') => {
      if (!row) return null;
      const die = makeDie(value, `${cls} die-reveal`.trim());
      row.appendChild(die);
      await wait(Math.max(120, Math.round(DIE_MS * 0.55)));
      return die;
    };
    const fillPlaceholder = async (row, index, value, cls='') => {
      const die = row?.children?.[index];
      if (!die) return null;
      die.textContent = value;
      die.className = `die ${cls} die-reveal`.trim();
      await wait(DIE_MS);
      return die;
    };
    const setAttackSummary = (summary='', kind='') => {
      if (!attackSummary) return;
      attackSummary.textContent = summary;
      attackSummary.className = 'battle-row-summary' + (kind ? ` ${kind}` : '');
    };
    const setDefenceSummary = (summary='', kind='') => {
      if (!defenceSummary) return;
      defenceSummary.textContent = summary;
      defenceSummary.className = 'battle-row-summary' + (kind ? ` ${kind}` : '');
    };
    const setPreAttackDefenceRow = () => {
      defencePanel?.classList.add('pre-attack');
      apBridge?.classList.add('pre-attack');
      if (defenceRow) defenceRow.innerHTML = '';
      setDefenceSummary('');
      if (saveStatEl) saveStatEl.textContent = escapeHtml(def.save ?? '');
      if (hpStatEl) hpStatEl.textContent = escapeHtml(def.hp ?? '');
      saveBox?.classList.remove('applied');
      apChip?.classList.remove('transfer');
    };
    const activateDefenceRow = () => {
      defencePanel?.classList.remove('pre-attack');
      apBridge?.classList.remove('pre-attack');
    };
    const cancelOneAttackHit = () => {
      const hit = attackRow?.querySelector('.die-hit-active:not(.hit-cancelled)');
      if (hit) hit.classList.add('hit-cancelled');
    };
    const setRowButton = (html, onClick) => {
      if (!rowCta) return null;
      rowCta.innerHTML = html || '';
      const btn = rowCta.querySelector('button');
      if (btn && onClick) btn.addEventListener('click', onClick, { once:true });
      return btn;
    };
    const applyResolve = (result, hpAfter, slain) => {
      clearPendingCombatContext(targetTileId);
      ov.remove();
      clearHighlights();
      setUILock(true);
      def.hp = hpAfter;
      atk.actionsLeft--;
      if (result.totalDmg > 0) showDamageFloat(targetTileId, result.totalDmg);
      setTimeout(() => {
        if (slain) {
          removeSlain(targetTileId);
        } else {
          const tile = document.querySelector(`[data-id="${targetTileId}"]`);
          const tileHp = tile?.querySelector('.unit-hp span');
          if (tileHp) tileHp.textContent = def.hp;
        }
        const atkTile = document.querySelector(`[data-id="${state.activeUnit.tileId}"]`);
        if (atkTile) renderUnit(atkTile, atk);
        renderHub();
        setUILock(false);
        if (atk.actionsLeft > 0) { state.activeAction = null; selectAction('attack'); }
        else { closeProfile(); endCurrentTurn(); waitThenAdvance(); }
      }, 600);
    };

    setupGhostRow(attackRow, atk.weapon?.attacks ?? 0);
    if (hitStatEl) hitStatEl.textContent = escapeHtml(atk.weapon?.hit ?? '');
    if (dmgStatEl) dmgStatEl.textContent = escapeHtml(displayDamage);
    setAttackSummary('');
    setPreAttackDefenceRow();
    setRowButton('<button class="battle-attack-btn" id="battle-start-attack"><span class="battle-action-star">✦</span> Attack</button>', startAttackSequence);

    function startAttackSequence() {
      const result = resolveCombat(atk, def, unitLane(targetTileId));
      const hpBefore = def.hp;
      const hpAfter = Math.max(0, hpBefore - result.totalDmg);
      const slain = hpAfter <= 0;
      const { atkDice, rollEvents, baseAttackCount, hits, saveDice, saved, autoFail, modSave, hitThresh } = result;
      const failed = Math.max(0, hits - saved);
      const ap = atk.weapon?.ap ?? 0;
      if (attackProfile) attackProfile.classList.add('sequence-live');
      setRowButton('', null);
      setupGhostRow(attackRow, baseAttackCount ?? atkDice.length);
      setAttackSummary('');
      setPreAttackDefenceRow();

      (async () => {
        await wait(PRE_ATTACK_PAUSE);
        let attackSlotIndex = 0;
        const events = Array.isArray(rollEvents) && rollEvents.length
          ? rollEvents
          : atkDice.map((d, i) => ({ value:d, source:i < (baseAttackCount ?? atkDice.length) ? 'base' : 'chain', isHit:d >= hitThresh, bonusAdded:0, chainAdded:0 }));

        for (const ev of events) {
          const isHit = !!ev.isHit;
          const triggeredSpecial = (Number(ev.bonusAdded) || 0) > 0 || (Number(ev.chainAdded) || 0) > 0;
          while (attackRow && attackRow.children.length <= attackSlotIndex) appendGhostDice(attackRow, 1);
          const dieClass = isHit
            ? `die-hit die-hit-active${triggeredSpecial ? ' die-special-trigger' : ''}`
            : 'die-miss';
          await fillPlaceholder(attackRow, attackSlotIndex++, ev.value, dieClass);

          if (ev.bonusAdded > 0) {
            for (let i = 0; i < ev.bonusAdded; i++) {
              await appendResolvedDie(attackRow, '+', 'die-hit die-hit-active die-bonus-hit die-special-trigger');
            }
          }
          if (ev.chainAdded > 0) {
            appendGhostDice(attackRow, ev.chainAdded);
            await wait(120);
          }
        }
        const triggerNote = result.bonusHits > 0
          ? ` · Exploding Hits +${result.bonusHits}`
          : result.chainRolls > 0
            ? ` · Chain Dice +${result.chainRolls}`
            : '';
        setAttackSummary(`${hits} hit${hits !== 1 ? 's' : ''}${triggerNote}`, hits > 0 ? 'good' : 'bad');
        await wait(POST_ATTACK_PAUSE);

        if (hits <= 0) {
          activateDefenceRow();
          if (apValue) apValue.textContent = ap > 0 ? `-${ap}` : '0';
          setDefenceSummary('No hits to save', 'bad');
          setRowButton('<button class="battle-done-btn">Resolve ▶</button>', () => applyResolve(result, hpAfter, slain));
          return;
        }

        activateDefenceRow();
        if (apValue) apValue.textContent = ap > 0 ? `-${ap}` : '0';
        if (saveStatEl) saveStatEl.textContent = escapeHtml(def.save ?? '');
        if (hpStatEl) hpStatEl.textContent = escapeHtml(def.hp ?? '');
        setupGhostRow(defenceRow, hits);
        setDefenceSummary('');
        const defClass = def.owner === 1 ? 'p1-def' : 'p2-def';
        const startDefence = () => {
          setRowButton('', null);
          runDefencePhase();
        };
        const btn = setRowButton(`<button class="battle-defence-btn ${defClass}" id="battle-defence-btn"><span>Roll Defence</span></button>`, startDefence);
        requestAnimationFrame(() => btn?.classList.add('counting'));

        async function runDefencePhase() {
          if (ap > 0) {
            apChip?.classList.add('transfer');
            saveBox?.classList.add('applied');
            if (saveStatEl) saveStatEl.textContent = `-${ap}`;
            await wait(AP_TRANSFER_PAUSE);
            apChip?.classList.remove('transfer');
            saveBox?.classList.remove('applied');
          }
          if (saveStatEl) saveStatEl.textContent = autoFail ? '—' : `${modSave}+`;
          await wait(DEFENCE_STAGE_PAUSE);
          let defIndex = 0;
          for (const d of saveDice) {
            const didSave = !autoFail && d >= modSave;
            await fillPlaceholder(defenceRow, defIndex++, d, didSave ? 'die-saved' : 'die-failed');
            if (didSave) {
              cancelOneAttackHit();
              await wait(160);
            }
          }
          setDefenceSummary(`${saved} saved · ${failed} unsaved`, failed > 0 ? 'bad' : 'good');
          setRowButton('<button class="battle-done-btn">Resolve ▶</button>', () => applyResolve(result, hpAfter, slain));
        }
      })();
    }
  }

  function removeSlain(tileId) {
    const unit=state.board[tileId]; if(!unit) return;
    const fx = getLaneEffect(unitLane(tileId));
    if(fx) EFFECT_REGISTRY[fx.effect]?.onSlain?.(fx, tileId);
    state.players[unit.owner].graveyard.push({...unit});
    delete state.board[tileId];
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(tile){
      tile.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e=>e.remove());
      // Show skull marker — cleared in requisitionPhase
      const skull=document.createElement('div');
      skull.className='unit-skull';
      skull.textContent='☠';
      tile.appendChild(skull);
    }
    // TODO Step 10: Wretch 'Expendable' hook — if(unit.id==='c4') drawCard(unit.owner)
    renderHub();
  }

  function setHubBtn(btnState, label, sub, cost, showOpp) {
    const btn = document.getElementById('hub-btn');
    const lbl = document.getElementById('hub-btn-label');
    const subEl = document.getElementById('hub-btn-sub');
    const costWrap = document.getElementById('hub-btn-cost');
    const costVal = document.getElementById('hub-btn-cost-val');
    const oppEl = document.getElementById('hub-btn-opp');
    btn.className = 'hub-btn ' + btnState;
    btn.style.removeProperty('--draw-hold-ms');
    lbl.textContent = label || '';
    subEl.textContent = sub || '';
    if (cost != null) {
      costVal.textContent = `${cost}`;
      costWrap.style.display = 'flex';
    } else {
      costWrap.style.display = 'none';
    }
    if (oppEl) oppEl.style.display = showOpp ? '' : 'none';
  }

  function onHubBtn() {
    if (state._ctaAction === 'pre-deploy') {
      selectHandCard(profileCard);
      state.deployModeFromInspector = true;
      setBarState('pending', { label: 'Choose Tile', cost: profileCard?.cost ?? null, action: 'deploy' });
    }
    else if (state._ctaAction === 'deploy' && state.pendingTile && !state.deployModeFromInspector) executeDeployTo(state.pendingTile);
    else if (state._ctaAction === 'activate') activateUnit();
    else if (state._ctaAction === 'cast') {
      if (state._pendingPowerDrop) executeConfirmedPowerCard();
      else { state.selectedHandCard = profileCard; castPowerCard(profileCard); }
    }
    else if (state._ctaAction === 'draw') { /* draw now requires hold */ }
    else if (state._ctaAction === 'pass') { /* pass now requires hold */ }
  }

  function setBarState(state_name, opts={}) {
    const deck    = document.getElementById('inspector-deck');
    const diamond  = document.getElementById('hub-diamond-wrap');
    const actions  = document.getElementById('hub-actions');
    const btn      = document.getElementById('hub-btn');
    const hubRow   = document.getElementById('hub-row');
    const passBtn  = document.getElementById('hub-pass-btn');
    const badges   = document.getElementById('hub-stat-badges');

    // Reset
    const inspectorOpen = document.getElementById('inspector-card-view').classList.contains('active');
    deck.style.display    = 'none';
    diamond.style.display = 'none';
    actions.classList.remove('active');
    btn.style.display     = '';
    hubRow.classList.remove('activated');
    if (passBtn) passBtn.classList.remove('show');
    const deckCount = document.getElementById('hub-deck-count');
    if (deckCount) deckCount.classList.remove('show');

    if (state_name === 'default') {
      if (!inspectorOpen) deck.style.display = '';
      diamond.style.display = '';
      if (deckCount) deckCount.classList.add('show');
      if (passBtn) passBtn.classList.add('show');
      if (badges) badges.style.display = 'none';
      const drawAvailability = getDrawAvailability(state.activePlayer);
      setHubBtn(
        drawAvailability.can ? 'state-ready' : 'state-dim',
        drawAvailability.label,
        drawAvailability.can ? drawAvailability.sub : drawAvailability.sub,
        drawAvailability.label === 'Hand Full' ? null : drawAvailability.cost
      );
      btn.dataset.drawReason = drawAvailability.reason || '';
      state._ctaAction = 'draw';

    } else if (state_name === 'pending') {
      if (!inspectorOpen) deck.style.display = '';
      diamond.style.display = '';
      const isConfirmState = opts.confirm === true || (opts.action === 'deploy' && state.pendingTile && !state.deployModeFromInspector);
      setHubBtn(isConfirmState ? 'state-active' : 'state-pending', opts.label || 'Confirm', '', opts.cost ?? null);
      state._ctaAction = opts.action || null;

    } else if (state_name === 'dim') {
      diamond.style.display = '';
      setHubBtn('state-dim', opts.label || 'Deploy', '', opts.cost ?? null);
      state._ctaAction = null;

    } else if (state_name === 'activated') {
      deck.style.display    = 'none';
      btn.style.display     = 'none';
      diamond.style.display = 'none';
      actions.classList.add('active');
      hubRow.classList.add('activated');
    }
  }

  function showActionBar(unit) {
    // Show ability button only for player-triggered activated abilities.
    const ab = getUnitAbility(unit);
    const btnAbility = document.getElementById('act-btn-ability');
    if (btnAbility) btnAbility.style.display = ab ? 'flex' : 'none';
    setActionButtonCost('act-cost-move', 1);
    setActionButtonCost('act-cost-attack', 1);
    setActionButtonCost('act-cost-ability', ab?.apCost || 1);
    setBarState('activated');
  }

  function hideActionBar() {
    state._ctaAction = null;
    setBarState('default');
  }

  function updateActionBar() {
    const unit = state.activeUnit?.card;
    if (!unit) return;
    const actions = unit.actionsLeft ?? 0;
    const current = state.activeAction;
    const immobile = unit.move === -1;

    const btnMove    = document.getElementById('act-btn-move');
    const btnAttack  = document.getElementById('act-btn-attack');
    const btnAbility = document.getElementById('act-btn-ability');
    const btnEnd     = document.getElementById('act-btn-skip');
    const ab = getUnitAbility(unit);
    const engagedForBreakaway = !!getBreakawayContester(state.activeUnit?.tileId, unit);
    const moveLabel = btnMove?.querySelector('.act-label');
    const moveIcon = btnMove?.querySelector('.act-icon');
    if (moveLabel) moveLabel.textContent = engagedForBreakaway ? 'Break' : 'Move';
    if (moveIcon) moveIcon.textContent = engagedForBreakaway ? '!' : '➤';
    if (btnMove) btnMove.classList.toggle('act-breakaway', engagedForBreakaway);

    setActionButtonCost('act-cost-move', 1);
    setActionButtonCost('act-cost-attack', 1);
    setActionButtonCost('act-cost-ability', ab?.apCost || 1);
    if (btnAbility) btnAbility.style.display = ab ? 'flex' : 'none';

    // Move
    if (immobile || actions === 0) btnMove.className = 'act-btn act-unavailable';
    else if (current === 'move')    btnMove.className = 'act-btn act-selected';
    else                            btnMove.className = 'act-btn act-available';

    // Attack
    if (actions === 0)               btnAttack.className = 'act-btn act-unavailable';
    else if (current === 'attack')   btnAttack.className = 'act-btn act-selected';
    else                             btnAttack.className = 'act-btn act-available';

    // Ability is shown only for activated/player-triggered abilities.
    if (btnAbility && btnAbility.style.display !== 'none') {
      const canUse = ab && actions >= (ab.apCost || 1);
      if (!canUse)                    btnAbility.className = 'act-btn act-unavailable';
      else if (current === 'ability') btnAbility.className = 'act-btn act-selected';
      else                            btnAbility.className = 'act-btn act-available';
    }

    // End — always available when unit is active
    btnEnd.className = 'act-btn act-available';
  }

  function activateUnit() {
    const p=state.players[state.activePlayer];
    const unit=state.board[profileTileId];
    if(!unit || unit.owner !== state.activePlayer) return;
    if(p.resources<1||!profileTileId) return;
    p.resources-=1;
    setResPulse(false);
    unit.actionsLeft=2;
    state.activeUnit={tileId:profileTileId, card:unit};
    document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
    const tile = document.querySelector(`[data-id="${profileTileId}"]`);
    if(tile) { tile.classList.add('unit-active'); }
    state.selectedBoardTile = profileTileId;
    syncBoardSelectionHighlight();
    renderUnit(tile, unit);
    renderHub();
    showActionBar(unit);
    openProfile(unit,'board',profileTileId);
    selectAction('move');
    updateActionBar();
  }

  // ── SELECT ACTION (Move / Attack) ──
  function selectAction(action) {
    if (action === 'ability') {
      selectAbility();
      return;
    }
    clearHighlights();
    state.activeAbility = null;
    // Reset ability button if shown
    const btn = document.querySelector('.ability-btn.ability-active');
    if (btn) btn.className = 'ability-btn ability-idle';
    if(state.activeAction===action){ state.activeAction=null; refreshActionButtons(); updateActionBar(); return; }
    state.activeAction=action;
    refreshActionButtons();
    updateActionBar();
    const unit=state.activeUnit?.card;
    const tid=state.activeUnit?.tileId;
    if(!unit||!tid) return;
    if(action==='move'){
      highlightMoveTilesForActiveUnit();
    } else {
      const enemy=state.activePlayer===1?2:1;
      const lane = unitLane(tid);
      const fxRange = getLaneEffect(lane);
      const effRange = fxRange ? EFFECT_REGISTRY[fxRange.effect] : null;
      const range = effRange?.getRange ? effRange.getRange(fxRange, unit.weapon.range) : unit.weapon.range;
      getAttackTiles(tid, range).forEach(id=>{
        const el=document.querySelector(`[data-id="${id}"]`); if(!el) return;
        el.classList.add('highlight-attack');
        if(state.board[id]?.owner===enemy) el.querySelector('.unit-on-tile')?.classList.add('highlight-target');
      });
    }
  }

  function consumeAction() {
    const unit = state.activeUnit?.card; if(!unit) return;
    unit.actionsLeft--;
    const tile = document.querySelector(`[data-id="${profileTileId}"]`);
    if(tile) renderUnit(tile, unit);
    // refresh diamond pips in inspector
    const d1=document.getElementById('d-pip-1');
    const d2=document.getElementById('d-pip-2');
    if(d1) d1.style.opacity = unit.actionsLeft >= 2 ? '1' : '0.3';
    if(d2) d2.style.opacity = unit.actionsLeft >= 1 ? '1' : '0.3';
    refreshActionButtons();
    if(unit.actionsLeft <= 0) {
      if (restorePendingReturnUnit()) return;
      closeProfile();
      clearHighlights();
      endCurrentTurn();
      advanceTurn();
    }
  }

  function refreshActionButtons() {
    const activeCard = state.activeUnit?.card;
    const viewingActive = profileCard && activeCard && profileCard.uid === activeCard.uid;
    const mb=document.getElementById('btn-move');
    const ab=document.getElementById('btn-attack');
    const eb=document.getElementById('btn-end');

    if (!viewingActive || !activeCard || activeCard.actionsLeft === 0) {
      // Viewing non-active unit or exhausted — dim pills, no interaction
      mb.disabled=true; mb.className='prof-move-pill';
      ab.disabled=true; ab.className='prof-attack-pill';
      if(eb) eb.style.display='none';
      return;
    }

    const ex=activeCard.actionsLeft===0;
    const immobile=activeCard.move===-1;
    const targeting=state.activeAction;
    mb.disabled=ex||immobile;
    if(ex||immobile)           mb.className=`prof-move-pill${immobile?' immobile':''}`;
    else if(targeting==='move')mb.className='prof-move-pill active-move';
    else                       mb.className='prof-move-pill pill-idle';
    ab.disabled=ex;
    if(ex)                      ab.className='prof-attack-pill';
    else if(targeting==='attack')ab.className='prof-attack-pill active-attack';
    else                        ab.className='prof-attack-pill pill-idle';
    if(eb) eb.style.display=ex?'none':'inline-block';
  }

  // ── END TURN ──
  // ── PASS / TURN END ──
  function endUnit() {
    const unit=state.activeUnit?.card; if(!unit) return;
    const endingTileId = state.activeUnit?.tileId;
    unit.actionsLeft=0;
    clearHighlights();
    if (state.pendingReturnUnit && state.pendingReturnUnit.tileId !== endingTileId && restorePendingReturnUnit()) return;
    closeProfile();
    hideActionBar();
    endCurrentTurn();
    waitThenAdvance();
  }

  function endCurrentTurn() {
    deselectAll();
    closeProfile();
    hideActionBar();
    state.activeUnit=null; state.activeAction=null;
    clearHighlights();
    document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
  }

  function restorePendingReturnUnit() {
    const ret = state.pendingReturnUnit;
    if (!ret) return false;
    state.pendingReturnUnit = null;
    const retCard = state.board[ret.tileId] || ret.card;
    if (!retCard || !(retCard.actionsLeft > 0)) return false;
    state.activeUnit = { tileId: ret.tileId, card: retCard };
    state.activeAction = null;
    state.activeAbility = null;
    clearHighlights();
    document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
    const retTile = document.querySelector(`[data-id="${ret.tileId}"]`);
    if (retTile) {
      retTile.classList.add('unit-active');
      renderUnit(retTile, retCard);
    }
    state.selectedBoardTile = ret.tileId;
    syncBoardSelectionHighlight();
    renderHub();
    openProfile(retCard, 'board', ret.tileId);
    showActionBar(retCard);
    updateActionBar();
    setUILock(false);
    return true;
  }

  function setUILock(locked) {
    document.getElementById('ui-lock').style.display = locked ? 'block' : 'none';
  }

  let _advancePending = false;
  function waitThenAdvance() {
    if(_advancePending) return;
    // If a unit is pending return (e.g. commander after command_unit), go back to them
    if (restorePendingReturnUnit()) return;
    _advancePending = true;
    setUILock(true);
    setTimeout(() => document.getElementById('turn-wait').classList.add('show'), TURN_WAIT_ICON_MS);
    setTimeout(advanceTurn, TURN_ADVANCE_WAIT_MS);
  }

  function advanceTurn() {
    _advancePending = false;
    state.pendingReturnUnit = null;
    document.getElementById('turn-wait').classList.remove('show');
    const next = state.activePlayer === 1 ? 2 : 1;
    if(state.players[next].passed) {
      showTurnToast(state.activePlayer);
      renderHub(); return;
    }
    state.activePlayer = next;
    setPerspective(next);
    refreshAllUnitIndicators();
    renderHub();
    showTurnToast(next);
  }

  function passAction() {
    setUILock(true);
    state.players[state.activePlayer].passed = true;
    endCurrentTurn();
    const next = state.activePlayer === 1 ? 2 : 1;
    if(state.players[next].passed) { endRound(); return; }
    state.activePlayer = next;
    setPerspective(next);
    refreshAllUnitIndicators();
    renderHub();
    showTurnToast(next);
  }

  function endRound() {
    state.phase = 'scoring';
    setPerspective(1);
    document.getElementById('side-p1').className = 'player-side left inactive';
    document.getElementById('side-p2').className = 'player-side right inactive';
    document.getElementById('player-bar').className = 'player-bar';
    const topBar = document.querySelector('.top-bar');
    topBar.style.zIndex = '60';
    const ov = document.createElement('div');
    ov.className = 'round-end-overlay';
    ov.innerHTML = `
      <div class="round-end-title">End of Round ${state.round}</div>
      <div class="round-end-sub">Scoring</div>
      <button class="round-end-btn" id="score-begin-btn">Score ▶</button>`;
    document.body.appendChild(ov);
    requestAnimationFrame(()=>ov.classList.add('show'));
    document.getElementById('score-begin-btn').addEventListener('click', ()=>{
      ov.classList.add('dim');
      ov.innerHTML = '';
      // Round 1: reveal lane effects before scoring
      if (state.round === 1 && (state.laneEffects.A || state.laneEffects.B)) {
        revealLaneEffects(ov, () => {
          scoreRound(()=>{ finishRoundOverlay(ov, topBar); });
        });
      } else {
        scoreRound(()=>{ finishRoundOverlay(ov, topBar); });
      }
    });
  }

  function finishRoundOverlay(ov, topBar) {
    ov.style.pointerEvents = 'all';
    const btn = document.createElement('button');
    btn.className = 'round-end-btn';
    btn.textContent = 'Next Round ▶';
    ov.appendChild(btn);
    btn.addEventListener('click', ()=>{
      ov.remove();
      topBar.style.zIndex = '';
      state.round++;
      if(state.round > state.maxRounds){ showEndGame(); return; }
      requisitionPhase();
    });
  }

  function revealLaneEffects(ov, callback) {
    // Mark both revealed
    ['A','B'].forEach(l => { if(state.laneEffects[l]) state.laneEffects[l].revealed = true; });
    renderLaneEffects();

    const fxA = state.laneEffects.A;
    const fxB = state.laneEffects.B;
    const makeCard = (fx, preview) => fx ? `
      <div style="background:#0e1a12;border:1px solid #1a5030;border-radius:6px;padding:10px 12px;text-align:left;flex:1">
        <div style="font-size:var(--fs-xs);color:#40a878;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:2px">${formatCardName(fx.name)}</div>
        <div style="font-size:var(--fs-xs);color:#3a6848;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">${fx.trigger.replace(/_/g,' ')}</div>
        <div style="font-size:var(--fs-xs);color:#5a8868;line-height:1.5">${fx.description}</div>
        ${preview ? `<div style="margin-top:8px;padding-top:6px;border-top:1px solid #1a3020;font-size:var(--fs-xs);color:#7a8868;line-height:1.5;">${preview}</div>` : ''}
      </div>` : '';

    ov.innerHTML = `
      <div class="round-end-title" style="font-size:var(--fs-md)">Lane Effects Revealed</div>
      <div class="round-end-sub" style="margin-bottom:14px">The battlefield stirs…</div>
      <div style="display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:16px">
        <div style="flex:1">
          <div style="font-size:var(--fs-xs);color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane I</div>
          ${makeCard(fxA)}
        </div>
        <div style="flex:1">
          <div style="font-size:var(--fs-xs);color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane II</div>
          ${makeCard(fxB)}
        </div>
      </div>
      <button class="round-end-btn" id="reveal-score-btn">Score ▶</button>`;

    ov.style.pointerEvents = 'all';

    function applyAndContinue() {
      ov.style.pointerEvents = 'none';
      ov.innerHTML = '';
      ['A','B'].forEach(lane => {
        const fx = state.laneEffects[lane];
        if(fx?.revealed) EFFECT_REGISTRY[fx.effect]?.onReveal?.(fx, lane);
      });
      setTimeout(callback, 1200);
    }

    document.getElementById('reveal-score-btn').addEventListener('click', ()=>{
      const previews = {};
      ['A','B'].forEach(lane => {
        const fx = state.laneEffects[lane];
        if(!fx?.revealed) return;
        const reg = EFFECT_REGISTRY[fx.effect];
        if(reg?.getRevealPreview) previews[lane] = reg.getRevealPreview(fx, lane);
      });

      if(!Object.keys(previews).length) { applyAndContinue(); return; }

      ov.innerHTML = `
        <div class="round-end-title" style="font-size:var(--fs-md)">Lane Effects Revealed</div>
        <div class="round-end-sub" style="margin-bottom:14px">The battlefield stirs\u2026</div>
        <div style="display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:16px">
          <div style="flex:1">
            <div style="font-size:var(--fs-xs);color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane I</div>
            ${makeCard(fxA, previews['A'])}
          </div>
          <div style="flex:1">
            <div style="font-size:var(--fs-xs);color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane II</div>
            ${makeCard(fxB, previews['B'])}
          </div>
        </div>
        <button class="round-end-btn" id="reveal-apply-btn">Apply \u25b6</button>`;
      ov.style.pointerEvents = 'all';
      document.getElementById('reveal-apply-btn').addEventListener('click', applyAndContinue);
    });
  }

  function scoreRound(callback) {
    const scoring = Object.entries(state.board).filter(([tid])=>tileMap[tid]?.zone==='control-zone');
    if(!scoring.length){ setTimeout(callback, 400); return; }
    let i = 0;
    function next() {
      if(i >= scoring.length){ setTimeout(callback, 1000); return; }
      const [tileId, unit] = scoring[i++];
      const pts = unit.hp;
      state.players[unit.owner].score += pts;
      renderHub();
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(tile){
        const r = tile.getBoundingClientRect();
        const fl = document.createElement('div');
        fl.className = 'score-float';
        fl.textContent = `+${pts}`;
        fl.style.color = unit.owner===1 ? 'var(--p1)' : 'var(--p2)';
        fl.style.left = (r.left + r.width/2) + 'px';
        fl.style.top  = (r.top  + r.height/2) + 'px';
        document.body.appendChild(fl);
        setTimeout(()=>fl.remove(), 1100);
      }
      setTimeout(next, 900);
    }
    next();
  }

  function showScoringComplete(callback) { if(callback) callback(); }

  function showEndGame() {
    const p1=state.players[1], p2=state.players[2];
    const winnerName = p1.score>p2.score ? p1.name : p2.score>p1.score ? p2.name : null;
    const winText = winnerName ? `${winnerName} is victorious` : 'The battle ends in a draw';
    const col = winnerName===p1.name ? 'p1' : winnerName ? 'p2' : '';
    showOverlay('Battle Over', `${p1.name} ${p1.score} — ${p2.score} ${p2.name}`, winText, 0, ()=>resetGame(), true, col);
  }

  function skipToGame() {
    // Hide all overlays
    document.getElementById('start-overlay').classList.remove('show');
    document.getElementById('req-overlay').classList.remove('show');
    _beginCallback = null;
    // Draw 4 cards if not yet drawn (setup phase)
    [1,2].forEach(p=>{
      while(state.players[p].hand.length < 4) drawCard(p);
    });
    // Requisition: resources + 1 card + pick first player
    const gain = 5 + state.round;
    [1,2].forEach(p=>{
      state.players[p].resources += gain;
      state.players[p].passed = false;
      drawCard(p);
    });
    state.activePlayer = Math.random() < 0.5 ? 1 : 2;
    startBattlePhase();
  }
  function saveGame() {
    try {
      localStorage.setItem('grim_save', JSON.stringify(state));
      showToastMsg('Game Saved');
    } catch(e) { showToastMsg('Save Failed'); console.error(e); }
  }

  function showToastMsg(msg) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#2a2010;border:1px solid #c8a060;color:#c8a060;font-family:Spectral,serif;font-size:var(--fs-xs);letter-spacing:0.1em;padding:6px 14px;border-radius:4px;z-index:200;pointer-events:none;opacity:1;transition:opacity 0.4s';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(), 400); }, 1200);
  }

  function quickLoad() {
    if(!localStorage.getItem('grim_save')) { showToastMsg('No Save Found'); return; }
    document.getElementById('start-overlay').classList.remove('show');
    loadGame();
  }

  function loadGame() {
    try {
      const raw = localStorage.getItem('grim_save');
      if(!raw){ showToastMsg('No Save Found'); return; }
      const saved = JSON.parse(raw);
      state.round        = saved.round;
      state.maxRounds    = saved.maxRounds;
      state.activePlayer = saved.activePlayer;
      state.phase        = saved.phase || 'battle';
      state.players      = saved.players;
      state.board        = saved.board;
      state.selectedHandCard = null;
      state.pendingTile      = null;
      state.activeAction     = null;
      state.activeUnit = saved.activeUnit
        ? { tileId: saved.activeUnit.tileId, card: state.board[saved.activeUnit.tileId] }
        : null;
      buildBoard();
      buildTileMap();
      restoreBoard();
      clearHighlights();
      refreshAllUnitIndicators();
      setPerspective(state.activePlayer);
      document.getElementById('inspector').classList.add('open');
      renderHub();
      fitBoard();
      showToastMsg('Game Loaded');
    } catch(e) { showToastMsg('Load Failed'); console.error(e); }
  }

  function restoreBoard() {
    Object.entries(state.board).forEach(([tileId, unit])=>{
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      tile.classList.remove('highlight-deploy','confirm-tile');
      renderUnit(tile, unit);
      if(unit.actionsLeft !== null) tile.classList.add('unit-active');
    });
  }

  function resetGame() {
    if(!confirm('Reset game? This cannot be undone.')) return;
    localStorage.removeItem('grim_save');
    state.round=1; state.maxRounds=5; state.activePlayer=1; state.phase='setup';
    state.board={}; state.selectedHandCard=null; state.pendingTile=null;
    state.activeUnit=null; state.activeAction=null;
    state.players[1]={name:'Player I',  score:0, resources:3, deck:[], hand:[], graveyard:[], color:'p1', passed:false, drawnThisRound:false};
    state.players[2]={name:'Player II', score:0, resources:3, deck:[], hand:[], graveyard:[], color:'p2', passed:false, drawnThisRound:false};
    initGame();
  }

  // ── INSPECTOR TOGGLE ──
  function toggleInspector() {
    const insp=document.getElementById('inspector');
    insp.classList.toggle('open');
  }

  // ── PAN & ZOOM ──
  const outer=document.getElementById('board-outer');
  const inner=document.getElementById('board-inner');
  let scale=1,tx=0,ty=0,minScale=1;
  let lastDist=null,isPinching=false,startX,startY;
  let panLastX=0, panLastY=0, panLastT=0, panVX=0, panVY=0;
  let boardTransitionTimer=null;

  function clamp(v,lo,hi){return Math.min(hi,Math.max(lo,v));}

  function setBoardTransition(ms=280, curve='cubic-bezier(0.22,0.61,0.36,1)'){
    clearTimeout(boardTransitionTimer);
    inner.style.transition = `transform ${ms}ms ${curve}`;
    boardTransitionTimer = setTimeout(()=>{ inner.style.transition=''; boardTransitionTimer=null; }, ms + 40);
  }

  function clearBoardTransition(){
    if(boardTransitionTimer){ clearTimeout(boardTransitionTimer); boardTransitionTimer=null; }
    inner.style.transition='';
  }

  const ELASTIC = 40;
  function applyTransform(elastic=false){
    const ow=outer.clientWidth, oh=outer.clientHeight;
    const sw=inner.offsetWidth*scale, sh=inner.offsetHeight*scale;
    if(scale < minScale) scale = minScale;
    if(elastic) {
      tx = Math.max(ow-sw-ELASTIC, Math.min(ELASTIC, tx));
      ty = scale > minScale ? Math.max(oh-sh-ELASTIC, Math.min(ELASTIC, ty)) : 0;
    } else {
      tx = clamp(tx, ow-sw, 0);
      ty = scale > minScale ? clamp(ty, oh-sh, 0) : 0;
    }
    inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function snapToLane(lane) {
    const ow = outer.clientWidth;
    const iw = inner.offsetWidth * scale;
    // Lane A centre ~33% of board-inner width, Lane B ~67%
    const laneFrac = lane === 'A' ? 0.33 : 0.67;
    const laneX = inner.offsetWidth * laneFrac * scale;
    const targetTx = clamp(ow/2 - laneX, ow - iw, 0);
    if(Math.abs(targetTx - tx) < 10) return; // already close
    inner.style.transition = 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
    tx = targetTx;
    inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    setTimeout(()=>{ inner.style.transition=''; }, 350);
  }
  function getDeployClusters() {
    // Group highlight-deploy tiles by data-lane into clusters with bounding boxes
    const outerRect = outer.getBoundingClientRect();
    const groups = {};
    document.querySelectorAll('.tile.highlight-deploy').forEach(t => {
      const key = t.dataset.lane || 'default';
      if (!groups[key]) groups[key] = [];
      groups[key].push(t.getBoundingClientRect());
    });
    return Object.entries(groups).map(([lane, rects]) => ({
      lane,
      left:   Math.min(...rects.map(r => r.left)),
      right:  Math.max(...rects.map(r => r.right)),
      top:    Math.min(...rects.map(r => r.top)),
      bottom: Math.max(...rects.map(r => r.bottom)),
      cx: (Math.min(...rects.map(r=>r.left)) + Math.max(...rects.map(r=>r.right))) / 2 - outerRect.left,
      cy: (Math.min(...rects.map(r=>r.top))  + Math.max(...rects.map(r=>r.bottom))) / 2 - outerRect.top,
    }));
  }

  function zoomToCluster(cluster) {
    const targetScale = 1.25;
    const ow = outer.clientWidth;
    const oh = outer.clientHeight;
    const worldCx = (cluster.cx - tx) / scale;
    const worldCy = (cluster.cy - ty) / scale;
    const newTx = clamp(ow/2 - worldCx * targetScale, ow - inner.offsetWidth * targetScale, 0);
    const playerBar = document.getElementById('player-bar');
    const barH = playerBar ? playerBar.offsetHeight : 160;
    const newTy = clamp((oh - barH - 20) - worldCy * targetScale, oh - inner.offsetHeight * targetScale, 0);
    inner.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
    scale = targetScale; tx = newTx; ty = newTy;
    inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    setTimeout(() => { inner.style.transition = ''; }, 320);
  }

  function snapBack(useInertia=false){
    const ow=outer.clientWidth, oh=outer.clientHeight;
    const sw=inner.offsetWidth*scale, sh=inner.offsetHeight*scale;
    if(useInertia && scale > minScale){
      tx += panVX * 170;
      ty += panVY * 170;
    }
    const boundedX = clamp(tx, ow-sw, 0);
    const boundedY = scale > minScale ? clamp(ty, oh-sh, 0) : 0;
    if(Math.abs(boundedX - tx) > 0.5 || Math.abs(boundedY - ty) > 0.5 || useInertia){
      setBoardTransition(useInertia ? 360 : 280);
      tx=boundedX; ty=boundedY;
      inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
    }
  }

  function zoomToTile(tileId) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if (!tile) return;
    const outerRect = outer.getBoundingClientRect();
    const tileRect = tile.getBoundingClientRect();
    const targetScale = 1.6;
    // Tile centre in outer coordinates
    const tileCx = tileRect.left - outerRect.left + tileRect.width / 2;
    const tileCy = tileRect.top  - outerRect.top  + tileRect.height / 2;
    // New tx/ty so tile centre stays at same screen position after scale change
    const newTx = tileCx - (tileCx - tx) * (targetScale / scale);
    const newTy = tileCy - (tileCy - ty) * (targetScale / scale);
    inner.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
    scale = targetScale;
    tx = clamp(newTx, outer.clientWidth  - inner.offsetWidth  * scale, 0);
    ty = clamp(newTy, outer.clientHeight - inner.offsetHeight * scale, 0);
    inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    setTimeout(() => { inner.style.transition = ''; }, 260);
  }

  function resetBoardZoom() {
    inner.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
    fitBoard();
    setTimeout(() => { inner.style.transition = ''; }, 320);
  }

  function fitBoard(){
    minScale = 1;
    scale = 1;
    tx = -(inner.offsetWidth - outer.clientWidth) / 2;
    ty = 0;
    applyTransform();
    // Hide blueprint if board art loaded
    const bp = document.getElementById('board-blueprint');
    if(!bp) return;
    const probe = new Image();
    probe.onload = () => { bp.style.display = 'none'; };
    probe.onerror = () => {};
    probe.src = 'art/board.jpg';
    const probe2 = new Image();
    probe2.onload = () => { bp.style.display = 'none'; };
    probe2.onerror = () => {};
    probe2.src = 'art/board.png';
  }

  window.addEventListener('load',()=>requestAnimationFrame(()=>{
    fetch('cards.json', { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        const bundle = extractCardDataBundle(data);
        if (bundle) {
          if (bundle.cardRepo) localStorage.setItem('grim_card_repo', JSON.stringify(normaliseCardRepo(bundle.cardRepo)));
          if (bundle.deckP1)   localStorage.setItem('grim_deck_p1',   JSON.stringify(bundle.deckP1));
          if (bundle.deckP2)   localStorage.setItem('grim_deck_p2',   JSON.stringify(bundle.deckP2));
          if (bundle.laneDeck) localStorage.setItem('grim_lane_deck', JSON.stringify(bundle.laneDeck));
        }
      })
      .catch(()=>{})
      .finally(()=>{ initGame(); });
  }));

  function boardFrameFromTap(clientX, clientY) {
    const tiles = [...document.querySelectorAll('.tile[data-lane][data-row]')];
    if (!tiles.length) return null;
    const outerRect = outer.getBoundingClientRect();
    let best = null;
    let bestScore = Infinity;
    tiles.forEach(tile => {
      const r = tile.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const score = dx * dx + dy * dy;
      if (score < bestScore) { bestScore = score; best = tile; }
    });
    if (!best) return null;
    const lane = best.dataset.lane;
    const row = best.dataset.row;
    const rowTiles = tiles.filter(t => t.dataset.lane === lane && t.dataset.row === row);
    const rects = rowTiles.map(t => t.getBoundingClientRect());
    const left = Math.min(...rects.map(r => r.left));
    const right = Math.max(...rects.map(r => r.right));
    const top = Math.min(...rects.map(r => r.top));
    const bottom = Math.max(...rects.map(r => r.bottom));
    return {
      lane,
      row,
      cx: (left + right) / 2 - outerRect.left,
      cy: (top + bottom) / 2 - outerRect.top,
      width: right - left,
      height: bottom - top
    };
  }

  function zoomToBoardFrame(frame) {
    if (!frame) return false;
    const target = clamp(2.5, minScale, 3);
    const ow = outer.clientWidth;
    const oh = outer.clientHeight;
    const worldCx = (frame.cx - tx) / scale;
    const worldCy = (frame.cy - ty) / scale;
    scale = target;
    tx = clamp(ow / 2 - worldCx * scale, ow - inner.offsetWidth * scale, 0);
    ty = clamp(oh / 2 - worldCy * scale, oh - inner.offsetHeight * scale, 0);
    setBoardTransition(320);
    applyTransform();
    return true;
  }

  // ── DOUBLE TAP TO ZOOM ──
  let _lastTap=0, _lastTapX=0, _lastTapY=0;
  outer.addEventListener('touchend', e=>{
    if(isPinching || e.changedTouches.length!==1) return;
    const now=Date.now();
    const t=e.changedTouches[0];
    const dx=Math.abs(t.clientX-_lastTapX), dy=Math.abs(t.clientY-_lastTapY);
    if(now-_lastTap<300 && dx<30 && dy<30) {
      // Double tap detected
      e.preventDefault();
      const rect=outer.getBoundingClientRect();
      const tapX=t.clientX-rect.left, tapY=t.clientY-rect.top;
      if(scale>minScale*1.2) {
        // Zoom out to fit
        fitBoard();
      } else {
        // Zoom in to the tapped lane/row frame rather than the raw tap point.
        if (!zoomToBoardFrame(boardFrameFromTap(t.clientX, t.clientY))) {
          const target=clamp(2.5, minScale, 3);
          tx=tapX-tapX*(target/scale);
          ty=tapY-tapY*(target/scale);
          scale=target;
          setBoardTransition(300);
          applyTransform();
        }
      }
      _lastTap=0;
    } else {
      _lastTap=now; _lastTapX=t.clientX; _lastTapY=t.clientY;
    }
  },{passive:false});

  outer.addEventListener('touchstart',e=>{
    if(dragState) return;
    // Tap board background — close inspector strip if open
    const icv = document.getElementById('inspector-card-view');
    if (icv.classList.contains('active') && !state.activeUnit) {
      const underEl = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
      if (!underEl?.closest('#inspector-card-view') && !underEl?.closest('[data-id]')) {
        closeProfile();
        return;
      }
    }
    clearBoardTransition();
    panVX=0; panVY=0;
    if(e.touches.length===2){isPinching=true;lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
    else if(!isPinching){
      const d=boardFlipped?-1:1;
      const px=e.touches[0].clientX*d;
      const py=e.touches[0].clientY*d;
      startX=px-tx; startY=py-ty;
      panLastX=px; panLastY=py; panLastT=performance.now();
    }
  },{passive:true});

  outer.addEventListener('touchmove',e=>{
    if(dragState) return;
    e.preventDefault();
    if(e.touches.length===2){
      isPinching=true;
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const rect=outer.getBoundingClientRect();
      const mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left,y:(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top};
      if(lastDist){const ns=clamp(scale*dist/lastDist,minScale,3);tx=mid.x-(mid.x-tx)*ns/scale;ty=mid.y-(mid.y-ty)*ns/scale;scale=ns;}
      lastDist=dist;applyTransform();
    } else if(!isPinching){
      const d=boardFlipped?-1:1;
      const px=e.touches[0].clientX*d;
      const py=e.touches[0].clientY*d;
      const now=performance.now();
      const dt=Math.max(16, now-panLastT);
      panVX=(px-panLastX)/dt;
      panVY=(py-panLastY)/dt;
      panLastX=px; panLastY=py; panLastT=now;
      tx=px-startX; ty=py-startY;
      applyTransform(true);
    }
  },{passive:false});

  outer.addEventListener('touchend',e=>{
    if(e.touches.length<2)lastDist=null;
    if(e.touches.length===0){ isPinching=false; snapBack(true); }
  },{passive:true});
</script>

card && card.source !== 'prototype'
);

(function(){

}

function syncMergedRepo(){

const official =
readJSON('grim_repo_official', []);

readJSON('grim_repo_drafts', []);

...official,
...prototype
];
