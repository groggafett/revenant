}
.pass-btn:active {
border-color: #c8a060;
box-shadow: 0 0 12px rgba(217,121,24,0.4);
}
/* ── ROUND SCORING ── */
.score-float {
position: fixed; z-index: 80; pointer-events: none;
font-family: ‘Spectral’, Georgia, serif;
font-size: var(--fs-md); font-weight: 900;
text-shadow: 0 0 10px currentColor;
transform: translate(-50%, -50%);
animation: scorePop 1.1s ease forwards;
}
.dmg-float {
position: fixed; z-index: 80; pointer-events: none;
font-family: 'Spectral', Georgia, serif;
font-size: var(--fs-sm); font-weight: 900; color: var(--hp-negative);
text-shadow: 0 0 8px rgba(200,48,48,0.8);
transform: translate(-50%, -50%);
animation: scorePop 1.1s ease forwards;
}
@keyframes scorePop {
0%   { opacity:0; margin-top:0; }
20%  { opacity:1; }
80%  { opacity:1; margin-top:-28px; }
100% { opacity:0; margin-top:-36px; }
}
.scoring-overlay {
position: fixed; inset: 0; z-index: 55;
background: rgba(0,0,0,0); pointer-events: none;
transition: background 0.5s;
display: flex; align-items: center; justify-content: center;
}
.scoring-overlay.show { background: rgba(0,0,0,0.84); pointer-events: all; }
.scoring-complete-label {
font-family: ‘Spectral’, Georgia, serif;
font-size: var(--fs-xs); font-weight: 700;
letter-spacing: 0.3em; text-transform: uppercase;
color: #c8a060; opacity: 0; transition: opacity 0.4s 0.3s;
}
.scoring-overlay.show .scoring-complete-label { opacity: 1; }
.turn-wait {
position: fixed; top: 50%; left: 50%;
transform: translate(-50%, -50%);
font-size: var(--fs-lg); z-index: 90;
opacity: 0; pointer-events: none;
transition: opacity 0.2s;
}
.turn-wait.show { opacity: 1; }
#ui-lock {
  display: none; position: fixed; inset: 0; z-index: 35;
  background: rgba(0,0,0,0.45);
  transition: none;
}
.round-end-overlay {
position: fixed; inset: 0; z-index: 50;
background: rgba(0,0,0,0.88);
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 10px;
opacity: 0; transition: opacity 0.3s, background 0.5s;
pointer-events: none;
}
.round-end-overlay.show { opacity: 1; pointer-events: all; }
.round-end-overlay.dim  { background: rgba(0,0,0,0.42); pointer-events: none; }
.round-end-title { font-family: ‘Spectral’,serif; font-size: var(--fs-md); font-weight: 900; color: #c8a060; letter-spacing: 0.2em; text-transform: uppercase; text-shadow: 0 0 20px rgba(200,160,60,0.5); }
.round-end-sub   { font-family: ‘Spectral’,serif; font-size: var(--fs-xs); color: #7a6030; letter-spacing: 0.2em; text-transform: uppercase; }

</head>
<body>

<!-- TURN TOAST -->

</div>
<div class="turn-wait" id="turn-wait">⏳</div>

<!-- GAME START OVERLAY -->

  </div>
  <div class="splash-actions">

<!-- REQUISITION OVERLAY -->

      <div class="save-menu-item" onclick="loadGame();document.getElementById('save-menu').classList.remove('open');event.stopPropagation()">Load</div>

    </div>
  </div>
  <div class="player-side right inactive" id="side-p2">
    <div class="avatar p2">☠</div>
    <div class="score-num p2-col" id="score-p2">0</div>
    <div class="res-badge" id="res-badge-p2"><span>3</span></div>
  </div>
</div>

<!-- BOARD -->

<div class="board-outer" id="board-outer">
  <div id="board-flip">
  <div class="board-inner" id="board-inner">

      <!-- Background -->

      <!-- Side outskirts — outside lane area, narrow -->

      <rect x="91%" y="0" width="9%" height="100%" fill="#141210" stroke="#242220" stroke-width="1"/>

      <ellipse cx="0" cy="48%" rx="12%" ry="10.5%" fill="#1c1a16" stroke="#2a2820" stroke-width="1"/>

</div><!-- /board-outer -->
<div class="player-bar" id="player-bar">
  <!-- Inspector -->

    <div class="inspector-card-view" id="inspector-card-view" onclick="closeProfile()">

  </div>

        </div>

    </div>

          <span class="act-label">Move</span>

</div>

<script>
window.onerror = (msg, src, line, col, err) => {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#800;color:#fff;font-size:var(--fs-xs);padding:6px 8px;font-family:monospace;white-space:pre-wrap;';
  d.textContent = `ERR: ${msg}\nLine ${line}:${col}\n${err?.stack||''}`;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 8000);
};
window.addEventListener('unhandledrejection', e => {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#860;color:#fff;font-size:var(--fs-xs);padding:6px 8px;font-family:monospace;white-space:pre-wrap;';
  d.textContent = 'PROMISE: ' + (e.reason?.message||e.reason||'unknown') + '\n' + (e.reason?.stack||'');
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 8000);
});
  const CARDS = [
    { id:'cmoklh74g0', name:'City Militia', internalName:'city_militia', variant:'improvised', artId:'city_militia_improvised', type:'Common', faction:'order_of_iron', cost:1, hp:5, maxHp:5, move:1, save:'5+',
      weapon:{name:'improvised weapons', range:1, attacks:5, hit:'4+', ap:0, damage:1},
      special:'None: No special ability.' },
    { id:'cmoklh74h1', name:'City Militia', internalName:'city_militia', variant:'shields', artId:'city_militia_shields', type:'Common', faction:'order_of_iron', cost:2, hp:5, maxHp:5, move:1, save:'4+',
      weapon:{name:'hand weapons & shields', range:1, attacks:5, hit:'4+', ap:1, damage:1},
      special:'None: No special ability.' },
    { id:'cmoklh74h2', name:'cavalry', internalName:'cavalry', variant:'', artId:'cavalry', type:'Common', faction:'order_of_iron', cost:3, hp:6, maxHp:6, move:2, save:'4+',
      weapon:{name:'Spears & Shields', range:1, attacks:5, hit:'4+', ap:1, damage:1},
      special:'THUNDERING CHARGE (2AP): This unit must make a Move Action followed by an Attack Action. All Hits are resolved with +1 Lethality and +1 Damage' },
    { id:'cmoklh74h3', name:'sentinels', internalName:'sentinels', variant:'', artId:'sentinels', type:'Uncommon', faction:'order_of_iron', cost:4, hp:8, maxHp:8, move:1, save:'2+',
      weapon:{name:'Ironwall Shields', range:1, attacks:3, hit:'3+', ap:1, damage:2},
      special:'Wall of Iron (1AP): For the rest of this Battle Round this Unit reduces all damage taken by 1' },
    { id:'cmoklh74h4', name:'artillery', internalName:'artillery', variant:'', artId:'artillery', type:'Uncommon', faction:'order_of_iron', cost:3, hp:6, maxHp:6, move:-1, save:'3+',
      weapon:{name:'Siegebreaker Shells', range:'3-6', attacks:6, hit:'5+', ap:2, damage:3},
      special:'Targeted Destruction (2AP): This Unit makes an Attack Action that can target enemies anywhere on the battlefield' },
    { id:'cmoklh74h5', name:'iron knights', internalName:'iron_knights', variant:'', artId:'iron_knights', type:'Uncommon', faction:'order_of_iron', cost:5, hp:10, maxHp:10, move:2, save:'2+',
      weapon:{name:'crushing lance', range:1, attacks:3, hit:'3+', ap:2, damage:3},
      special:'unstoppable force (2AP)' },
    { id:'cmoklh74h6', name:'iron commander', internalName:'iron_commander', variant:'', artId:'iron_commander', type:'Hero', faction:'order_of_iron', cost:3, hp:4, maxHp:4, move:1, save:'2+',
      weapon:{name:'blade & shield', range:1, attacks:3, hit:'2+', ap:2, damage:1},
      special:'inspire (1AP) Pick a friendly non-hero unit in this lane. they get to make a free move or attack action',
      ability:{ key:'inspire', apCost:1, target:{ side:'friendly', location:'lane', state:'any', type:'non_hero' } } },
    { id:'power001', name:'Raging Inferno', internalName:'raging_inferno', variant:'', artId:'raging_inferno', type:'Power', faction:'order_of_iron', cost:3,
      hp:null, maxHp:null, move:null, save:null,
      weapon:{name:null, range:null, attacks:null, hit:null, ap:1, damage:2},
      effect:'damage_lane', value:null,
      special:'Raging Inferno: On deployment, choose a lane. Deal 1 automatic hit (AP 1, 2 damage) to every unit in that lane, friend and foe. Each unit saves normally. Discard after use.' },
    { id:'power002', name:'Reinforce', internalName:'reinforce', variant:'', artId:'reinforce', type:'Power', faction:'universal', cost:1,
      hp:null, maxHp:null, move:null, save:null,
      weapon:null, effect:'add_resources', value:2,
      special:'Reinforce: Immediately gain 2 resources. Discard after use.' },
  ];

  // ── CARD LOADING ──
  const DEFAULT_LANE_EFFECTS = [
    { id:'l1', name:'Acid Rain',      key:'acid_rain',      effect:'damage_all_round_start', trigger:'round_start', value:1,    description:'At the start of each round, deal 1 damage to every unit in this lane.' },
    { id:'l2', name:'Hallowed Ground',key:'hallowed_ground', effect:'save_modifier',          trigger:'passive',     value:1,    description:'All saves in this lane are improved by 1 (e.g. 4+ becomes 3+).' },
    { id:'l3', name:'Comet Strike',   key:'comet_strike',   effect:'bonus_dmg_on_six',        trigger:'on_roll_6',   value:2,    description:'Whenever any attack roll produces a natural 6, deal 2 bonus damage.' },
    { id:'l4', name:'Choking Fog',    key:'choking_fog',    effect:'range_cap',               trigger:'passive',     value:2,    description:'Ranged weapons in this lane have their range reduced to 2.' },
    { id:'l5', name:'Blood Frenzy',   key:'blood_frenzy',   effect:'attack_bonus_on_slain',   trigger:'on_slain',    value:1,    description:'When any unit is slain here, all other units in this lane gain +1 attack until end of round.' },
    { id:'l6', name:'Booby Trapped',  key:'booby_trapped',  effect:'booby_trapped',            trigger:'on_reveal',   value:null, description:'On reveal, roll a d6. All units in the control zone of this lane suffer that damage, ignoring armour.' },
  ];

  // ── EFFECT REGISTRY ──
  // Each entry maps an effect type to its hook functions.
  // Hooks receive (fx, ...context) where fx is the full lane effect object.
  // To add a new mechanic: add one entry here. No other code changes needed.
  const EFFECT_REGISTRY = {
    damage_all_round_start: {
      onRoundStart(fx, lane) {
        const tids = Object.keys(state.board).filter(tid => unitLane(tid) === lane);
        tids.forEach(tid => {
          const unit = state.board[tid];
          unit.hp = Math.max(0, unit.hp - fx.value);
          showDamageFloat(tid, fx.value);
          if (unit.hp <= 0) {
            setTimeout(()=>removeSlain(tid), 600);
          } else {
            const hpEl = document.querySelector(`[data-id="${tid}"] .unit-hp span`);
            setTimeout(()=>{ if(hpEl) hpEl.textContent=unit.hp; }, 600);
          }
        });
      }
    },
    save_modifier: {
      modifySave(fx, modSave) { return Math.max(2, modSave - fx.value); }
    },
    bonus_dmg_on_six: {
      onRollSix(fx, atkDice) { return atkDice.filter(d => d === 6).length * fx.value; }
    },
    range_cap: {
      getRange(fx, base) {
        if (typeof base === 'string' && base.includes('-')) {
          const [a,b] = base.split('-').map(Number);
          return `${a}-${Math.min(b, fx.value)}`;
        }
        return base === 0 ? fx.value : Math.min(base, fx.value);
      }
    },
    attack_bonus_on_slain: {
      onSlain(fx, slainTileId) {
        const lane = unitLane(slainTileId);
        Object.keys(state.board).filter(tid => unitLane(tid) === lane).forEach(tid => {
          state.board[tid].bonusAttacks = (state.board[tid].bonusAttacks || 0) + fx.value;
        });
      }
    },
    booby_trapped: {
      getRevealPreview(fx, lane) {
        const roll = Math.floor(Math.random() * 6) + 1;
        fx._roll = roll;
        const count = Object.keys(state.board).filter(tid =>
          unitLane(tid) === lane && tileMap[tid]?.zone === 'control-zone'
        ).length;
        const hits = count === 1 ? '1 unit' : count > 1 ? `${count} units` : 'no units';
        return `🎲 Rolled <strong style="color:#cc3030">${roll}</strong> — ${roll} damage to ${hits} in control zone`;
      },
      onReveal(fx, lane) {
        const roll = fx._roll ?? Math.floor(Math.random() * 6) + 1;
        const tids = Object.keys(state.board).filter(tid =>
          unitLane(tid) === lane && tileMap[tid]?.zone === 'control-zone'
        );
        tids.forEach(tid => {
          const unit = state.board[tid];
          unit.hp = Math.max(0, unit.hp - roll);
          showDamageFloat(tid, roll);
          if (unit.hp <= 0) {
            setTimeout(()=>removeSlain(tid), 600);
          } else {
            const hpEl = document.querySelector(`[data-id="${tid}"] .unit-hp span`);
            setTimeout(()=>{ if(hpEl) hpEl.textContent = unit.hp; }, 600);
          }
        });
      }
    },
  };

  function unitLane(tileId) { return tileId.split('-')[0]; }
  function getLaneEffect(lane) {
    const fx = state.laneEffects?.[lane];
    return (fx && fx.revealed && EFFECT_REGISTRY[fx.effect]) ? fx : null;
  }



  function cardSlug(value) {
    return String(value ?? '')
      .trim()
      .toLowerCase()
      .replace(/&/g, 'and')
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '');
  }

  function generatedCardIdentity(card) {
    const base = cardSlug(card?.internalName || card?.name || card?.id || 'card');
    const variant = cardSlug(card?.variant || '');
    return variant ? `${base}_${variant}` : base;
  }

  function normaliseImportedCard(card) {
    if (!card || typeof card !== 'object') return card;
    const identity = generatedCardIdentity(card);
    const weapon = card.weapon && typeof card.weapon === 'object' ? { ...card.weapon } : card.weapon;
    return {
      ...card,
      id: identity,
      artId: identity,
      internalName: card.internalName || card.name || identity,
      type: String(card.type || '').trim(),
      faction: card.faction || 'universal',
      maxHp: card.maxHp ?? card.hp,
      weapon
    };
  }

  function normaliseCardRepo(repo) {
    if (!Array.isArray(repo)) return repo;
    return repo.map(normaliseImportedCard).filter(Boolean);
  }

  function cardRefValue(ref) {
    if (ref && typeof ref === 'object') return ref.id || ref.name || ref.internalName || ref.cardId || ref.cardName || '';
    return ref;
  }

  function findCardInRepo(repo, ref) {
    const raw = cardRefValue(ref);
    const key = String(raw ?? '').trim().toLowerCase();
    const slug = cardSlug(raw);
    return repo.find(r =>
      String(r.id ?? '').trim().toLowerCase() === key ||
      String(r.name ?? '').trim().toLowerCase() === key ||
      String(r.internalName ?? '').trim().toLowerCase() === key ||
      cardSlug(r.id) === slug ||
      cardSlug(r.name) === slug ||
      cardSlug(r.internalName) === slug
    );
  }

  function extractCardDataBundle(data) {
    if (!data || typeof data !== 'object') return null;
    return {
      cardRepo: data.cardRepo || data.grim_card_repo || data.cards || data.repo || null,
      deckP1: data.deckP1 || data.grim_deck_p1 || data.player1Deck || data.p1Deck || null,
      deckP2: data.deckP2 || data.grim_deck_p2 || data.player2Deck || data.p2Deck || null,
      laneDeck: data.laneDeck || data.grim_lane_deck || data.laneEffects || null
    };
  }

  function loadFromStorage() {
    let repo = CARDS;
    let lists = { 1: null, 2: null };
    let laneDeck = DEFAULT_LANE_EFFECTS;
    try {
      const r = localStorage.getItem('grim_card_repo');
      if (r) {
        repo = normaliseCardRepo(JSON.parse(r));
        localStorage.setItem('grim_card_repo', JSON.stringify(repo));
      } else {
        repo = normaliseCardRepo(repo);
      }

      const d1 = localStorage.getItem('grim_deck_p1');
      if (d1) lists[1] = JSON.parse(d1);

      const d2 = localStorage.getItem('grim_deck_p2');
      if (d2) lists[2] = JSON.parse(d2);
      const ld = localStorage.getItem('grim_lane_deck');
      if (ld) laneDeck = JSON.parse(ld);
    } catch(e) { console.warn('Card data load failed', e); }
    return { repo, lists, laneDeck };
  }

  function makeDeck(repo=CARDS) {
    const cleanRepo = normaliseCardRepo(repo) || CARDS;
    const d = [...cleanRepo,...cleanRepo,...cleanRepo,cleanRepo[0]].map((c,i)=>({...normaliseImportedCard(c), uid:`u${i}`}));
    for (let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}
    return d;
  }

  function deckFromList(nameList, repo) {
    const cleanRepo = normaliseCardRepo(repo) || [];
    if(!Array.isArray(nameList) || !Array.isArray(cleanRepo)) return makeDeck(cleanRepo);
    const cards = nameList.map((ref,i)=>{
      const c = findCardInRepo(cleanRepo, ref);
      if(!c) console.warn(`Card not found in repo: "${cardRefValue(ref)}"`);
      return c ? {...normaliseImportedCard(c), uid:`u${i}`} : null;
    }).filter(Boolean);
    if(!cards.length){ console.warn('Deck list produced no cards — using default deck'); return makeDeck(cleanRepo); }
    for (let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
    return cards;
  }

  function cardLimit(type) {
    if (type === 'Hero')     return 1;
    if (type === 'Uncommon') return 3;
    if (type === 'Power')    return 2;
    return 16;
  }

  function deckFromMap(countMap, repo) {
    const cards = [];
    let uid = 0;
    Object.entries(countMap).forEach(([id, count]) => {
      const c = repo.find(r => r.id === id);
      if (!c) { console.warn(`Card id not found in repo: "${id}"`); return; }
      const clamped = Math.min(count, cardLimit(c.type));
      for (let i = 0; i < clamped; i++) cards.push({...c, type:(c.type||'').trim(), uid:`u${uid++}`});
    });
    if (!cards.length) { console.warn('deckFromMap: empty — using default'); return makeDeck(repo); }
    for (let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
    return cards;
  }

  function buildDeck(list, repo) {
    if (!list) return makeDeck(repo);
    if (Array.isArray(list)) return deckFromList(list, repo);
    return deckFromMap(list, repo);
  }

  const DEBUG = false;

    },

  function initGame() {
    setupDrawHold();
    setupPassHold();
    const {repo, lists, laneDeck} = loadFromStorage();
    [1,2].forEach(p=>{
      try {

  function drawLaneEffects(deck) {
    if (!deck || !deck.length) return;
    const shuffled = [...deck].sort(() => Math.random() - 0.5);
    state.laneEffects.A = { ...shuffled[0], revealed: false };
    state.laneEffects.B = { ...shuffled[Math.min(1, shuffled.length - 1)], revealed: false };
  }

  function renderLaneEffects() {
    ['A','B'].forEach(lane => {
      const badge = document.getElementById(`lane-badge-${lane}`);
      if (!badge) return;
      const fx = state.laneEffects[lane];
      if (!fx) { badge.style.display = 'none'; return; }
      badge.style.display = '';
      if (fx.revealed) {
        badge.textContent = formatCardName(fx.name);
        badge.classList.remove('hidden');
      } else {
        badge.textContent = '?';
        badge.classList.add('hidden');
      }
    });

  const SPLASH_ART_SOURCES = [
    'art/splash.jpeg', 'art/splash.jpg', 'art/splash.png',
    'art/splash.JPEG', 'art/splash.JPG', 'art/splash.PNG',
    'splash.jpeg', 'splash.jpg', 'splash.png',
    'splash.JPEG', 'splash.JPG', 'splash.PNG'
  ];

  function applySplashArtToOverlay(overlay, loadedClass='has-splash-art') {
    if (!overlay) return;
    let index = 0;
    function tryNext() {
      if (index >= SPLASH_ART_SOURCES.length) {
        overlay.classList.remove(loadedClass);
        overlay.style.backgroundImage = '';
        return;
      }
      const src = SPLASH_ART_SOURCES[index++];
      const img = new Image();
      img.onload = () => {
        overlay.style.backgroundImage = `url('${src}')`;
        overlay.classList.add(loadedClass);
      };
      img.onerror = tryNext;
      img.src = src;
    }
    tryNext();
  }

  function loadSplashArt() {
    applySplashArtToOverlay(document.getElementById('start-overlay'));
  }

  function beginGame() {
    document.getElementById('start-overlay').classList.remove('show');
    setTimeout(()=>{
      [1,2].forEach(p=>{ for(let i=0;i<4;i++) drawCard(p); });
      renderHub();
      showDevSetup();
    }, 300);
  }

  function formatCardName(name) {
    return String(name ?? '').trim().toUpperCase();
  }

  function expectedArtLabel(card) {
    const id = card?.artId || card?.id || card?.internalName || card?.name || '';
    return formatCardName(id);
  }

  function normalisedCardType(card) {
    return (card?.type || '').trim();
  }

  function cardInnerHTML(card, col) {
    const type = normalisedCardType(card);
    const name = expectedArtLabel(card);
    if (type === 'Power') {
      return `<div style="position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#1a1020;border:1.5px solid #8a40c0;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);z-index:1;">⚡</div>

        <div class="card-cost"><span>${card.cost}</span></div>`;
    }
    return `<div class="card-hp ${col}-hp"><span>${card.hp ?? ''}</span></div>
      <div class="card-name">${name}</div>
      <div class="card-cost"><span>${card.cost}</span></div>`;
  }

  function attachArtNameFallback(el, card, nameSelector='.card-name') {
    if (!el || !card?.artId) return;
    const tryHide = src => {
      const img = new Image();
      img.onload = () => { const n = el.querySelector(nameSelector); if (n) n.style.display = 'none'; };
      img.src = src;
    };
    artCandidates(card.artId).forEach(tryHide);
  }

  function updateInspectorCardNameFallback(card) {
    const nameEl = document.getElementById('prof-cv-name');
    if (!nameEl) return;
    nameEl.textContent = expectedArtLabel(card);
    nameEl.classList.remove('hidden');
    const token = `${card?.uid || card?.id || card?.name || ''}-${Date.now()}`;
    nameEl.dataset.artToken = token;
    if (!card?.artId) return;
    let pending = 3;
    let loaded = false;
    const done = () => {
      pending -= 1;
      if (pending <= 0 && !loaded && nameEl.dataset.artToken === token) {
        nameEl.classList.remove('hidden');
      }
    };
    artCandidates(card.artId).forEach(src => {
      const img = new Image();
      img.onload = () => {
        if (nameEl.dataset.artToken !== token) return;
        loaded = true;
        nameEl.classList.add('hidden');
      };
      img.onerror = done;
      img.src = src;
    });
  }

      ${showLabel ? `<div style="font-size:var(--fs-xs);color:${col};text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;">${label}</div>` : ``}

        <div style="position:absolute;width:50px;height:50px;background:var(--resources);border:2px solid var(--resources-hi);border-radius:4px;transform:rotate(45deg);box-shadow:0 0 14px rgba(217,121,24,0.5);"></div>
        <div style="position:relative;z-index:1;font-size:var(--fs-md);font-weight:900;color:var(--resources-text);line-height:1;text-shadow:0 1px 0 rgba(255,220,120,0.35);">+${gain}</div>

  function showDevSetup() {

    ov.id = 'dev-setup-overlay';

    document.body.appendChild(ov);

    function makeLaneCard(lane) {
      const fx = state.laneEffects[lane];
      const label = lane === 'A' ? 'I' : 'II';
      return `<div onclick="devCycleLane('${lane}')" style="position:relative;width:75px;aspect-ratio:5/7;flex-shrink:0;background:linear-gradient(160deg,#0e1a12,#07100a);border:1px solid #1a5030;border-radius:5px;padding:7px 5px;cursor:pointer;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:inset 0 1px 0 rgba(80,180,120,0.08),0 4px 12px rgba(0,0,0,0.45);">
        <div style="position:absolute;top:4px;left:5px;right:5px;font-size:9px;color:#3a6848;text-transform:uppercase;letter-spacing:0.12em;line-height:1;">Lane ${label}</div>
        <div style="font-size:var(--fs-xs);color:#40a878;font-weight:900;line-height:1.15;text-transform:uppercase;width:100%;">${fx ? formatCardName(fx.name) : '—'}</div>
        <div class="setup-refresh-badge lane-refresh">↻</div>
      </div>`;
    }

    function makeHandCard(player, idx, showRefresh=true) {
      const card = state.players[player].hand[idx];
      if (!card) return `<div class="card" style="width:75px;height:105px;border-style:dashed;opacity:0.35;flex-shrink:0;"></div>`;
      const col = player === 1 ? 'p1' : 'p2';
      const uid = `sc-${player}-${idx}-${Date.now()}`;
      const art = artStyle(card, true);
      setTimeout(()=>attachArtNameFallback(document.getElementById(uid), card), 0);
      return `<div id="${uid}" class="card ${col}-card" onclick="${showRefresh ? `devSwapCard(${player},${idx})` : ``}" style="width:75px;height:105px;flex-shrink:0;${art}">${cardInnerHTML(card, col)}${showRefresh ? `<div class="setup-refresh-badge">↻</div>` : ``}</div>`;

    function renderOverlay() {
      ov.innerHTML = `
        <div style="font-size:var(--fs-md);font-weight:900;color:#c8a060;letter-spacing:0.2em;text-transform:uppercase;text-shadow:0 0 20px rgba(217,121,24,0.4);">Battle Setup</div>

        <div style="font-size:var(--fs-xs);color:#5a4828;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;">Lane Effects</div>
        <div style="display:flex;gap:12px;width:100%;justify-content:center;align-items:center;">
          ${makeLaneCard('A')}
          ${makeLaneCard('B')}
        </div>

        <div style="font-size:var(--fs-xs);color:#4a78d8;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:4px;">Player I — Starting Hand</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;">${state.players[1].hand.map((_,i)=>makeHandCard(1,i,false)).join('')}</div>

        <div style="font-size:var(--fs-xs);color:#cc3030;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:4px;">Player II — Starting Hand</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;">${state.players[2].hand.map((_,i)=>makeHandCard(2,i)).join('')}</div>

        <button onclick="devSetupBegin()" style="margin-top:16px;font-family:Spectral,Georgia,serif;font-size:var(--fs-xs);font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#c8a060;background:linear-gradient(160deg,#2a2010,#1a1408);border:1px solid #c08020;border-radius:4px;padding:10px 28px;cursor:pointer;box-shadow:0 0 16px rgba(200,160,60,0.3);">Begin Battle ▶</button>
      `;
    }

    window.devCycleLane = function(lane) {
      const fx = state.laneEffects[lane];
      const idx = DEFAULT_LANE_EFFECTS.findIndex(e => e.effect === fx?.effect);
      const next = DEFAULT_LANE_EFFECTS[(idx + 1) % DEFAULT_LANE_EFFECTS.length];
      state.laneEffects[lane] = { ...next, revealed: false };
      renderLaneEffects();
      renderOverlay();
    };

    window.devSwapCard = function(player, cardIdx) {
      const p = state.players[player];
      if (!p.deck.length) return;
      const swapIdx = Math.floor(Math.random() * p.deck.length);
      const [newCard] = p.deck.splice(swapIdx, 1);
      const [oldCard] = p.hand.splice(cardIdx, 1, newCard);
      p.deck.push(oldCard);
      renderOverlay();
    };

    window.devSetupBegin = function() {
      const gain = 5 + 1; // Round 1
      // Pre-assign starting resources so screen can show them
      [1,2].forEach(p => { state.players[p].resources = gain; });
      renderHub();

      ov.innerHTML = `
        <div style="font-size:var(--fs-md);font-weight:900;color:#c8a060;letter-spacing:0.2em;text-transform:uppercase;text-shadow:0 0 20px rgba(217,121,24,0.4);">Battle Begins</div>

        <button onclick="devBattleBegin()" style="margin-top:16px;font-family:Spectral,Georgia,serif;font-size:var(--fs-xs);font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#c8a060;background:linear-gradient(160deg,#2a2010,#1a1408);border:1px solid #c08020;border-radius:4px;padding:10px 28px;cursor:pointer;box-shadow:0 0 16px rgba(200,160,60,0.3);">Begin ▶</button>
      `;
    };

    window.devBattleBegin = function() {
      ov.remove();
      // Resources already assigned — just start battle phase directly
      [1,2].forEach(p => {
        state.players[p].drawnThisRound = false;
        state.players[p].passed = false;
        drawCard(p);
      });
      const first = Math.random() < 0.5 ? 1 : 2;
      Object.keys(state.board).forEach(tid => { state.board[tid].actionsLeft = null; delete state.board[tid].bonusAttacks; });
      state.activePlayer = first;
      setPerspective(first);
      renderHub();
      startBattlePhase();
    };

    renderOverlay();

  // ── REQUISITION PHASE ──
  function requisitionPhase() {
    state.phase = 'requisition';
    // Clear death markers from previous round
    document.querySelectorAll('.unit-skull').forEach(e=>e.remove());
    const gain = 5 + state.round;
    [1,2].forEach(p=>{
      state.players[p].resources += gain;
      state.players[p].passed = false;
      state.players[p].drawnThisRound = false;
      drawCard(p);
    });
    // Roll for first player
    const first = Math.random() < 0.5 ? 1 : 2;
    Object.keys(state.board).forEach(tid=>{ state.board[tid].actionsLeft=null; delete state.board[tid].bonusAttacks; });
    state.activePlayer = first;
    setPerspective(first);
    renderHub();
    // Update gain number in icon
    const gainEl = document.getElementById('req-gain-num');
    if(gainEl) gainEl.textContent = `+${gain}`;
    const p = state.players[first];
    showOverlay(
      `Round ${state.round} of ${state.maxRounds}`,
      'Requisition Phase',
      `${p.name} goes first`,
      0,
      ()=>startBattlePhase(),
      true,
      p.color
    );
  }

  let _beginCallback = null;

  // tapToContinue=true → shows Begin button. false → auto-dismisses after duration ms
  function showOverlay(title, sub, who, duration, callback, tapToContinue=false, whoColor='') {
    const ov = document.getElementById('req-overlay');
    const beginBtn = document.getElementById('req-begin');
    document.querySelector('.top-bar').style.zIndex = '60';
    document.getElementById('req-title').textContent = title;
    document.getElementById('req-sub').textContent   = sub;
    const whoEl = document.getElementById('req-who');
    whoEl.textContent = who;
    whoEl.className = 'req-who' + (whoColor ? ` ${whoColor}` : '');
    _beginCallback = callback;
    if(tapToContinue) {
      beginBtn.style.display = 'block';
      ov.classList.remove('auto-dismiss');
      ov.classList.add('show');
    } else {
      beginBtn.style.display = 'none';
      ov.classList.add('auto-dismiss','show');
      setTimeout(()=>{
        ov.classList.remove('show');
        document.querySelector('.top-bar').style.zIndex = '';
        setTimeout(()=>{ if(callback) callback(); _beginCallback=null; }, 300);
      }, duration);
    }
  }

  function beginRound() {
    const ov = document.getElementById('req-overlay');
    document.getElementById('req-begin').style.display = 'none';
    document.querySelector('.top-bar').style.zIndex = '';
    ov.classList.remove('show');
    setTimeout(()=>{ if(_beginCallback) { _beginCallback(); _beginCallback=null; } }, 300);
  }

  const TURN_TOAST_MS = 700;
  const TURN_TOAST_FADE_MS = 150;
  const TURN_ADVANCE_WAIT_MS = 500;
  const TURN_WAIT_ICON_MS = 120;

  function showTurnToast(player, callback) {
    const p = state.players[player];
    const col = p.color;
    const toast = document.getElementById('turn-toast');
    const name  = document.getElementById('toast-name');
    toast.className = `turn-toast ${col}`;
    name.className  = `toast-name ${col}`;
    name.textContent = `${p.name}'s Turn`;
    setUILock(true);
    requestAnimationFrame(()=>{ toast.classList.add('show'); });
    setTimeout(()=>{
      toast.classList.remove('show');
      setTimeout(()=>{ setUILock(false); if(callback) callback(); }, TURN_TOAST_FADE_MS);
    }, TURN_TOAST_MS);
  }

  function startBattlePhase() {
    state.phase = 'battle';
    applyRoundStartEffects();
    flashResGain();
    setPerspective(state.activePlayer);
    refreshAllUnitIndicators();
    renderHub();
    showTurnToast(state.activePlayer);
  }

  function applyRoundStartEffects() {
    ['A','B'].forEach(lane => {
      const fx = getLaneEffect(lane);
      if (!fx) return;
      EFFECT_REGISTRY[fx.effect]?.onRoundStart?.(fx, lane);
    });
  }

  function refreshAllUnitIndicators() {
    Object.entries(state.board).forEach(([tileId, unit])=>{
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      renderUnit(tile, unit);
    });

  function flashResGain() {
    const diamond = document.getElementById('hub-res-diamond');
    const gain = 5 + state.round;
    const el = document.createElement('div');
    el.className = 'res-gain';
    el.textContent = `+${gain}`;
    diamond.appendChild(el);
    setTimeout(()=>el.remove(), 1400);
  }

  function drawCard(player) {
    const p=state.players[player];
    if(p.deck.length===0) return;
    const card = p.deck.shift();
    if(card) card.type = (card.type||'').trim();
    p.hand.unshift(card);
  }

  // ── BUILD BOARD ──
  function buildBoard() {
    ['A','B'].forEach(lane=>{
      const laneEl=document.getElementById(`lane-${lane}`);
      laneEl.innerHTML=''; // clear everything including label

      LANE_ROWS.forEach((rowDef, ri)=>{
        if(rowDef.zone==='control-centre') {
          const div=document.createElement('div');
          div.className='divider'; laneEl.appendChild(div);
        }
        const rowEl=document.createElement('div');
        rowEl.className='row';

        const zones = rowDef.zone==='control-centre'
          ? ['control-zone','centre','control-zone']
          : Array(rowDef.count).fill(rowDef.zone);

        zones.forEach((zone,ci)=>{
          const tile=document.createElement('div');
          const tileId=`${lane}-${ri}-${ci}`;
          tile.className=`tile ${zone}`;
          tile.dataset.id=tileId;
          tile.dataset.zone=zone;
          tile.dataset.lane=lane;
          tile.dataset.row=ri;
          tile.dataset.col=ci;
          tile.dataset.player=rowDef.player;
          if(zone!=='centre') tile.addEventListener('click', ()=>onTileTap(tileId));
          if(zone!=='centre') tile.addEventListener('touchstart', e=>onBoardTileTouchStart(e,tileId), {passive:true});
          if(zone==='centre') tile.addEventListener('click', ()=>{
            if(state.selectedHandCard?.type==='Power') executePowerCard(lane);
            else showLaneEffectOverlay(lane, tile);
          });
          const symMap={'deploy-p1':'↓','deploy-p2':'↓','control-zone':'♛','centre':'⚜'};
          if(symMap[zone]){const s=document.createElement('span');s.className='tile-symbol';s.textContent=symMap[zone];tile.appendChild(s);}
          if(zone==='centre'){
            const badge=document.createElement('span');
            badge.className='lane-effect-badge hidden';
            badge.id=`lane-badge-${lane}`;
            tile.appendChild(badge);
          }
          rowEl.appendChild(tile);
        });
        laneEl.appendChild(rowEl);
      });
    });
    renderLaneEffects();
  }

  // ── RENDER HUB ──
  function renderHub() {
    // Scores + round always update
    document.getElementById('score-p1').textContent=state.players[1].score;
    document.getElementById('score-p2').textContent=state.players[2].score;
    document.getElementById('res-badge-p1').querySelector('span').textContent=state.players[1].resources;
    document.getElementById('res-badge-p2').querySelector('span').textContent=state.players[2].resources;
    document.getElementById('turn-num').textContent=`${state.round}/${state.maxRounds}`;

    if(state.phase==='scoring') {
      document.getElementById('side-p1').className='player-side left active';
      document.getElementById('side-p2').className='player-side right active';
      document.getElementById('player-bar').className='player-bar';
      const inspector=document.getElementById('inspector');
      inspector.className=`inspector${inspector.classList.contains('open')?' open':''}`;
      return;
    }

    const p=state.players[state.activePlayer];
    const opp=state.players[state.activePlayer===1?2:1];
    const col=p.color;
    // hub-name replaced by hub-unit-info
    document.getElementById('hub-res').textContent=p.resources;
    document.getElementById('player-bar').className=`player-bar ${col}-active`;
    const inspector=document.getElementById('inspector');
    inspector.className=`inspector${inspector.classList.contains('open')?' open':''} ${col}-active`;
    // Deck pile
    document.getElementById('pile-deck-count').textContent=p.deck.length;
    document.getElementById('pile-graveyard-count').textContent=p.graveyard.length;
    const deckPile=document.getElementById('pile-deck');
    deckPile.classList.toggle('p2-deck', state.activePlayer===2);
    const canDraw=p.resources>=1&&p.deck.length>0&&!p.drawnThisRound;
    deckPile.classList.toggle('can-draw',canDraw);
    deckPile.classList.toggle('draw-exhausted',p.drawnThisRound);
    deckPile.onclick=null;
    // Pass widget — update pass button label if already passed
    const myPassed = state.players[state.activePlayer].passed;
    const oppPassed = opp.passed;
    const passBtn = document.getElementById('hub-pass-btn');
    if (passBtn) passBtn.innerHTML = myPassed
      ? `<span class="hub-pass-icon">☠</span><span class="hub-pass-copy"><span class="hub-pass-label">Passed ✓</span><span class="hub-pass-sub">—</span></span>`
      : `<span class="hub-pass-icon">☠</span><span class="hub-pass-copy"><span class="hub-pass-label">Pass</span><span class="hub-pass-sub">(Hold)</span></span>`;
    // Ensure default bar state is set correctly
    if (state._ctaAction === 'pass' || state._ctaAction === 'draw' || !state._ctaAction) {
      setBarState('default');
    }
    // Top bar sides
    document.getElementById('side-p1').className=`player-side left ${state.activePlayer===1?'active':'inactive'}`;
    document.getElementById('side-p2').className=`player-side right ${state.activePlayer===2?'active':'inactive'}`;
    renderHand();
  }

  const MAX_HAND = 7;
  function renderHand() {
    const p = state.players[state.activePlayer];
    const scroll = document.getElementById('hand-scroll');
    scroll.innerHTML = '';
    const count = p.hand.length;
    let cw, ch;
    if (count >= 7)      { cw = 50; ch = 70; }
    else if (count >= 6) { cw = 60; ch = 84; }
    else                 { cw = 70; ch = 98; }
    const existingLabel = document.getElementById('hand-full-label');
    if (existingLabel) existingLabel.remove();
    if (count >= 7) {
      const lbl = document.createElement('div');
      lbl.id = 'hand-full-label';
      lbl.textContent = 'Hand Full';
      lbl.style.cssText = 'font-size:10px;font-family:Spectral,Georgia,serif;color:#5a4828;letter-spacing:0.15em;text-transform:uppercase;text-align:center;padding:2px 0;flex-shrink:0;width:100%;';
      scroll.parentElement.insertBefore(lbl, scroll);
    }
    scroll.style.justifyContent = count >= 5 ? 'space-evenly' : 'center';
    scroll.style.alignItems = 'flex-end';
    scroll.style.gap = count >= 5 ? '0' : '4px';
    p.hand.forEach(card=>{
      const canAfford=p.resources>=card.cost;
      const isSelected=state.selectedHandCard?.uid===card.uid;
      const el=document.createElement('div');
      const col = p.color;
      el.className=`card ${col}-card${isSelected?' selected':''}${!canAfford?' unavailable':''}`;el.style.width=cw+'px';el.style.height=ch+'px';el.style.flexShrink='0';
      el.dataset.uid = card.uid;
      el.innerHTML = cardInnerHTML(card, col);
      const art = artStyle(card);
      if (art) {
        el.setAttribute('style', (el.getAttribute('style') || '') + art);
        attachArtNameFallback(el, card);
      }
      el.addEventListener('touchstart', e=>onHandCardTouchStart(e,card,el), {passive:false});
      el.addEventListener('click',()=>onHandCardTap(card));
      scroll.appendChild(el);
    });

    // Update inspector card visual if a hand card is selected
    if (state.selectedHandCard) {
      const p = state.players[state.activePlayer];
      const canAfford = p.resources >= state.selectedHandCard.cost;
      setResPulse(canAfford);
      const visual = document.getElementById('prof-card-visual');
      const label  = document.getElementById('prof-cv-label');
      const pips   = document.getElementById('prof-cv-pips');
      if (visual) visual.className = `prof-card-visual ${state.players[state.activePlayer].color}-unit cv-selected cv-pulse`;
      if (label)  { label.style.display=''; label.className='prof-cv-label lbl-deploy-active'; label.textContent='DEPLOY'; }
      if (pips)   pips.style.display='none';
    }
  }

  function updateResPreview(card){
    const p=state.players[state.activePlayer];
    const remaining=p.resources-card.cost;
    document.getElementById('hub-res').textContent=remaining;
    document.getElementById('hub-res-diamond').classList.toggle('depleted', remaining<0);
  }


  // ── DRAG FROM HAND ──
  const DRAG_THRESHOLD = 3;
  const INSPECT_MS = 300;
  let dragState = null;

  function cancelDragState() {
    if (!dragState) return;
    clearTimeout(dragState.inspectTimer);
    dragState.ghostEl?.remove();
    clearDragHover();
    if (dragState.sourceEl) dragState.sourceEl.style.transform = '';
    document.removeEventListener('touchmove', onHandDragMove);
    document.removeEventListener('touchend',  onHandDragEnd);
    dragState = null;
  }

  function onHandCardTouchStart(e, card, sourceEl) {
    if (e.touches.length > 1) return;
    e.preventDefault(); // seize touch — no scroll or pan from this point
    if(state.pendingTile) cancelPendingDeploy();
    cancelDragState();
    const t = e.touches[0];
    // Visual "ready" — slight scale on touch
    sourceEl.style.transform = 'scale(1.08)';
    try{navigator.vibrate?.(8);}catch(e){}
    dragState = {
      card, sourceEl,
      startX: t.clientX, startY: t.clientY,
      active: false, ghostEl: null, hoveredLane: null, hoverTile: null,
      inspectTimer: setTimeout(() => {
        // Long press — open modal overlay
        if (dragState && !dragState.active) {
          const c = dragState.card;
          try{navigator.vibrate?.(15);}catch(e){}
          cancelDragState();
          openProfile(c, 'hand', null, {strip: false});
        }
      }, INSPECT_MS)
    };
    document.addEventListener('touchmove', onHandDragMove, {passive: false});
    document.addEventListener('touchend',  onHandDragEnd,  {once: true});
  }

  function liftHandCard(x, y) {
    if (!dragState || dragState.active) return;
    clearTimeout(dragState.inspectTimer);
    dragState.sourceEl.style.transform = '';
    dragState.sourceEl.style.opacity = '0';
    dragState.sourceEl.style.pointerEvents = 'none';
    const ghost = dragState.sourceEl.cloneNode(true);
    ghost.style.transform = '';
    Object.assign(ghost.style, {
      position:'fixed', pointerEvents:'none', zIndex:'999',
      width:'68px', aspectRatio:'5/7',
      left: x - 34 + 'px', top: y - 90 + 'px',
      transform:'scale(1.15)', opacity:'0.92',
      transition:'transform 0.1s ease',
      borderRadius:'4px',
      boxShadow:'0 8px 24px rgba(0,0,0,0.7)'
    });
    document.body.appendChild(ghost);
    dragState.active = true;
    dragState.ghostEl = ghost;
    try{navigator.vibrate?.(20);}catch(e){}
    resetBoardZoom();
    // Clear previous selection state without renderHand (avoid DOM rebuild during touch)
    state.selectedHandCard = null;
    state.pendingTile = null;
    state.activeAction = null;
    clearHighlights();
    clearConfirm();
    // Now set new drag card and highlight deploy tiles
    state.selectedHandCard = dragState.card;
    const p = state.players[state.activePlayer];
    if (p.resources >= dragState.card.cost) highlightDeployTiles(true);
  }

  function clearDragHover() {
    document.querySelectorAll('.tile.drag-hover').forEach(t => t.classList.remove('drag-hover'));
  }

  function onHandDragMove(e) {
    if (!dragState) return;
    const t = e.touches[0];
    const dx = t.clientX - dragState.startX;
    const dy = t.clientY - dragState.startY;
    if (!dragState.active) {
      if (Math.hypot(dx, dy) > DRAG_THRESHOLD) {
        liftHandCard(t.clientX, t.clientY);
        if (dragState?.ghostEl) {
          dragState.ghostEl.style.left = t.clientX - 34 + 'px';
          dragState.ghostEl.style.top  = t.clientY - 90 + 'px';
        }
      }
      return;
    }
    e.preventDefault();
    dragState.ghostEl.style.left = t.clientX - 34 + 'px';
    dragState.ghostEl.style.top  = t.clientY - 90 + 'px';
    // Only update tile hover when it changes — prevents flicker
    const under = document.elementFromPoint(t.clientX, t.clientY);
    const tile = under?.closest('[data-id]');
    const newHoverTile = tile?.classList.contains('highlight-deploy') ? tile : null;
    if (newHoverTile !== dragState.hoverTile) {
      clearDragHover();
      dragState.hoverTile = newHoverTile;
      if (newHoverTile) newHoverTile.classList.add('drag-hover');
    }
    // Cluster detection with padding — prevents edge flicker
    const CLUSTER_PAD_Y = 40;
    const clusters = getDeployClusters();
    const fx = t.clientX, fy = t.clientY;
    // Match vertically within cluster row, then pick closest lane by x
    const inRow = clusters.filter(c => fy >= c.top - CLUSTER_PAD_Y && fy <= c.bottom + CLUSTER_PAD_Y);
    const hit = inRow.length ? inRow.reduce((a, b) =>
      Math.abs(fx - (a.left + a.right)/2) < Math.abs(fx - (b.left + b.right)/2) ? a : b
    ) : null;
    if (hit && hit.lane !== dragState.hoveredLane) {
      dragState.hoveredLane = hit.lane;
      zoomToCluster(hit);
    } else if (!hit && dragState.hoveredLane) {
      dragState.hoveredLane = null;
      resetBoardZoom();
    }
  }

  function onHandDragEnd(e) {
    document.removeEventListener('touchmove', onHandDragMove);
    if (!dragState) return;
    if (!dragState.active) {
      // Released without moving and before long-press — do nothing, return to normal
      cancelDragState();
      return;
    }
    clearTimeout(dragState.inspectTimer);
    const t = e.changedTouches[0];
    clearDragHover();
    resetBoardZoom();
    dragState.ghostEl.style.display = 'none';
    const under = document.elementFromPoint(t.clientX, t.clientY);
    const tile = under?.closest('[data-id]');
    const tileId = tile?.dataset.id;
    const validDrop = tileId && tile.classList.contains('highlight-deploy');
    if (validDrop) {
      dragState.ghostEl.remove();
      dragState = null;
      onTileTap(tileId);
    } else {
      const ghost = dragState.ghostEl;
      const src = dragState.card;
      dragState = null;
      const srcEl = document.querySelector(`.card[data-uid="${src.uid}"]`);
      if (srcEl) {
        const r = srcEl.getBoundingClientRect();
        ghost.style.transition = 'left 0.2s ease, top 0.2s ease, opacity 0.2s ease, transform 0.2s ease';
        ghost.style.left = r.left + 'px';
        ghost.style.top  = r.top  + 'px';
        ghost.style.transform = 'scale(1)';
        ghost.style.opacity = '0';
        // Restore source card as ghost arrives back
        setTimeout(() => {
          ghost.remove();
          if (srcEl) { srcEl.style.opacity = ''; srcEl.style.pointerEvents = ''; }
        }, 220);
      } else {
        ghost.remove();
      }
      deselectAll();
    }
  }

  // ── HAND CARD TAP ──
  function onHandCardTap(card) {
    // If tapping already-selected card, deselect
    if(state.selectedHandCard?.uid===card.uid){
      deselectAll();
      return;
    }
    selectHandCard(card);
    // Tap = strip inspector, long press = modal (handled in touch handler)
    openProfile(card, 'hand');
  }

  function selectHandCard(card) {
    deselectAll();
    state.selectedHandCard=card;
    const canAfford = state.players[state.activePlayer].resources >= card.cost;
    if(canAfford && (card.type||'').trim() === 'Power') {
      const reg = POWER_REGISTRY[card.effect];
      if(reg?.subtype === 'instant') {
        // Instant — no highlighting needed, cast fires from inspector
      } else {
        highlightCentreTiles(true);
      }
    } else if(canAfford) {
      highlightDeployTiles(true);
    }
    renderHand();
  }

  function deselectAll() {
    state.selectedHandCard=null;
    state.pendingTile=null;
    state.activeAction=null;
    highlightDeployTiles(false);
    highlightCentreTiles(false);
    clearHighlights();
    clearConfirm();
    const p=state.players[state.activePlayer];
    document.getElementById('hub-res').textContent=p.resources;
    document.getElementById('hub-res-diamond').classList.remove('depleted');
    renderHand();
  }

  function highlightDeployTiles(on) {
    const zone = `.tile.deploy-p${state.activePlayer}`;
    document.querySelectorAll(zone).forEach(t=>{
      const occupied = !!state.board[t.dataset.id];
      t.classList.toggle('highlight-deploy', on && !occupied);
    });
    // Also highlight owned structures as deploy points
    if(on) {
      Object.entries(state.structures).forEach(([tid, s]) => {
        if(s.owner === state.activePlayer && !state.board[tid]) {
          const t = document.querySelector(`[data-id="${tid}"]`);
          if(t) t.classList.add('highlight-deploy');
        }
      });
    }
  }

  function highlightCentreTiles(on) {
    document.querySelectorAll('.tile.centre').forEach(t=>{
      t.classList.toggle('highlight-deploy', on);
    });
  }

  // ── TILE TAP ──
  function showDamageFloat(tileId, amount) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if (!tile) return;
    const r = tile.getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'dmg-float';
    fl.textContent = `−${amount}`;
    fl.style.left = (r.left + r.width/2) + 'px';
    fl.style.top  = (r.top  + r.height/2) + 'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(), 1200);
  }

  function showDiceFloat(tileId, roll, saved) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    const r = tile.getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'dice-float';
    fl.textContent = `🎲${roll}`;
    fl.style.color = saved ? '#4a78d8' : '#cc3030';
    fl.style.left = (r.right + 5) + 'px';
    fl.style.top  = (r.top + r.height/2) + 'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(), 1000);
  }

  // ── POWER CARD REGISTRY ──
  const POWER_REGISTRY = {

    add_resources: {
      subtype: 'instant',
      execute(card) {
        const amt = card.value ?? 2;
        state.players[state.activePlayer].resources += amt;
        showToastMsg(`+${amt} Resources`);
      }
    },

    add_resources_random: {
      subtype: 'instant',
      execute(card) {
        const [lo, hi] = Array.isArray(card.value) ? card.value : [1, card.value ?? 3];
        const roll = lo + Math.floor(Math.random() * (hi - lo + 1));
        state.players[state.activePlayer].resources += roll;
        showToastMsg(`+${roll} Resources (rolled)`);
      }
    },

    damage_lane: {
      subtype: 'lane_target',
      execute(card, lane) {
        const ap  = card.weapon?.ap ?? 0;
        const dmg = card.weapon?.damage ?? 1;
        const targets = Object.entries(state.board)
          .filter(([tid]) => unitLane(tid) === lane)
          .sort(([a],[b]) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1]));
        let i = 0;
        function resolveNext() {
          if(i >= targets.length) { powerCardDone(); return; }
          const [tileId, unit] = targets[i++];
          const tile = document.querySelector(`[data-id="${tileId}"]`);
          if(!tile || !state.board[tileId]) { resolveNext(); return; }
          tile.classList.add('highlight-target');
          const saveVal = parseInt(unit.save) || 7;
          const modSave = Math.min(7, saveVal + ap);
          const roll = Math.floor(Math.random() * 6) + 1;
          const saved = roll >= modSave;
          showDiceFloat(tileId, roll, saved);
          setTimeout(()=>{
            tile.classList.remove('highlight-target');
            if(!saved && state.board[tileId]) {
              unit.hp = Math.max(0, unit.hp - dmg);
              showDamageFloat(tileId, dmg);
              if(unit.hp <= 0) setTimeout(()=>{ if(state.board[tileId]) removeSlain(tileId); }, 600);
              else { const hpEl=tile.querySelector('.unit-hp span'); setTimeout(()=>{ if(hpEl) hpEl.textContent=unit.hp; },600); }
            }
            setTimeout(resolveNext, 900);
          }, 1000);
        }
        resolveNext();
      }
    },

    modify_lane_score: {
      subtype: 'lane_target',
      execute(card, lane) {
        const mult = card.value ?? 0.5;
        state.laneEffects[lane] = state.laneEffects[lane] || {};
        state.laneEffects[lane].scoreMult = mult;
        showToastMsg(`Lane ${lane} scoring ×${mult}`);
        renderLaneEffects();
        powerCardDone();
      }
    },

    redeploy_unit: {
      subtype: 'unit_target',
      targetFilter: (tid) => state.board[tid]?.owner === state.activePlayer,
      execute(card, tileId) {
        const unit = state.board[tileId];
        if(!unit) { powerCardDone(); return; }
        delete state.board[tileId];
        const tile = document.querySelector(`[data-id="${tileId}"]`);
        if(tile) tile.innerHTML = '';
        state._redeployUnit = {...unit};
        highlightDeployTiles(true);
        showToastMsg('Choose a deployment tile');
        state._redeployPending = true;
      }
    },

    place_structure: {
      subtype: 'tile_target',
      targetFilter: (tid) => {
        const m = tileMap[tid];
        if(!m) return false;
        if(m.zone === 'centre') return false;
        if(m.zone === 'deploy-p2' && state.activePlayer === 1) return false;
        if(m.zone === 'deploy-p1' && state.activePlayer === 2) return false;
        return !state.board[tid] && !state.structures[tid];
      },
      execute(card, tileId) {
        state.structures[tileId] = { type:'tunnel', owner:state.activePlayer, card:{...card} };
        renderStructures();
        renderHub();
        powerCardDone();
      }
    },

  };

  function renderStructures() {
    // Clear existing structure markers
    document.querySelectorAll('.structure-marker').forEach(e => e.remove());
    Object.entries(state.structures).forEach(([tileId, s]) => {
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      const el = document.createElement('div');
      el.className = 'structure-marker';
      el.style.cssText = 'position:absolute;inset:0;z-index:1;border-radius:3px;opacity:0.7;pointer-events:none;';
      const col = s.owner === 1 ? 'rgba(74,120,216,0.3)' : 'rgba(204,48,48,0.3)';
      el.style.background = col;
      el.style.border = s.owner === 1 ? '1px dashed #4a78d8' : '1px dashed #cc3030';
      if(s.card?.artId) {
        const art = artStyle(s.card, true);
        if(art) el.setAttribute('style', el.getAttribute('style') + art);
      }
      tile.appendChild(el);
    });
  }

  // Shared cleanup after power card resolves
  function powerCardDone() {
    closeProfile();
    endCurrentTurn();
    waitThenAdvance();
  }

  // ── POWER CARD DISPATCHER ──
  function castPowerCard(card) {
    const p = state.players[state.activePlayer];
    if(!card || p.resources < card.cost) return;
    const reg = POWER_REGISTRY[card.effect];
    if(!reg) { console.warn('Unknown power effect:', card.effect); return; }

    // Spend cost, remove from hand
    p.resources -= card.cost;
    p.hand = p.hand.filter(c => c.uid !== card.uid);
    p.graveyard.push({...card});
    state.selectedHandCard = null;
    highlightCentreTiles(false);
    renderHub();

    if(reg.subtype === 'instant') {
      reg.execute(card);
      powerCardDone();
    } else if(reg.subtype === 'lane_target') {
      // Centre tiles already highlighted — wait for lane tap (handled in buildBoard click handler)
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      highlightCentreTiles(true);
      // Re-add card to hand temporarily so cost isn't double-spent if cancelled
      // Actually just store it — tap will call resolveLanePower
    } else if(reg.subtype === 'tile_target') {
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      // Highlight valid tiles
      document.querySelectorAll('.tile').forEach(t => {
        const tid = t.dataset.id;
        if(reg.targetFilter && reg.targetFilter(tid)) {
          t.classList.add('highlight-deploy');
        }
      });
    } else if(reg.subtype === 'unit_target') {
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      highlightPowerTargets(reg);
    }
  }

  function resolveLanePower(lane) {
    const card = state._pendingPowerCard;
    const reg  = state._pendingPowerReg;
    if(!card || !reg) return;
    state._pendingPowerCard = null;
    state._pendingPowerReg  = null;
    highlightCentreTiles(false);
    reg.execute(card, lane);
  }

  function highlightPowerTargets(reg) {
    Object.keys(state.board).forEach(tid => {
      const passes = !reg.targetFilter || reg.targetFilter(tid);
      if(passes) {
        const t = document.querySelector(`[data-id="${tid}"]`);
        if(t) t.classList.add('highlight-ability');
      }
    });
  }

  // Legacy wrapper — keep centre tile tap working
  function executePowerCard(lane) {
    if(state._pendingPowerCard) { resolveLanePower(lane); return; }
    // Fallback for old-style cards without effect field
    const card = state.selectedHandCard;
    if(!card || (card.type||'').trim() !== 'Power') return;
    castPowerCard(card);
  }

  function zoomSpecialHtml(card) {
    const raw = (card.special || '').trim();
    if (!raw || /^none[:\s]/i.test(raw)) {
      return `<div class="card-zoom-special"><span class="special-name">No Special Ability</span>: This unit relies on strength of arms and discipline alone.</div>`;
    }
    const cleaned = raw.replace(/\((\d+)AP\)/gi, '').trim();
    const idx = cleaned.indexOf(':');
    if (idx === -1) return `<div class="card-zoom-special"><span class="special-name">${escapeHtml(cleaned)}</span></div>`;
    const title = cleaned.slice(0, idx).trim();
    const desc = cleaned.slice(idx + 1).trim();
    return `<div class="card-zoom-special"><span class="special-name">${escapeHtml(title)}</span>: ${escapeHtml(desc)}</div>`;
  }

  function updateZoomCardNameFallback(card) {
    const nameEl = document.getElementById('czoom-fallback-name');
    if (!nameEl) return;
    nameEl.textContent = expectedArtLabel(card);
    nameEl.classList.remove('hidden');
    const token = `${card?.uid || card?.id || card?.name || ''}-${Date.now()}`;
    nameEl.dataset.artToken = token;
    if (!card?.artId) return;
    let pending = 3;
    let loaded = false;
    const done = () => {
      pending -= 1;
      if (pending <= 0 && !loaded && nameEl.dataset.artToken === token) nameEl.classList.remove('hidden');
    };
    artCandidates(card.artId).forEach(src => {
      const img = new Image();
      img.onload = () => {
        if (nameEl.dataset.artToken !== token) return;
        loaded = true;
        nameEl.classList.add('hidden');
      };
      img.onerror = done;
      img.src = src;
    });
  }

  function setupZoomTilt(artEl) {
    if (!artEl) return;
    const maxY = 8;
    const maxX = 5;

    const setTilt = (clientX, clientY) => {
      const r = artEl.getBoundingClientRect();
      if (!r.width || !r.height) return;
      const nx = Math.max(-1, Math.min(1, ((clientX - r.left) / r.width - 0.5) * 2));
      const ny = Math.max(-1, Math.min(1, ((clientY - r.top) / r.height - 0.5) * 2));
      const rotateY = nx * maxY;
      const rotateX = -ny * maxX;
      const shineX = 50 + nx * 28;
      const shineY = 38 + ny * 24;
      artEl.classList.add('tilting');
      artEl.style.setProperty('--shine-x', `${shineX}%`);
      artEl.style.setProperty('--shine-y', `${shineY}%`);
      artEl.style.transform = `perspective(720px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) scale(1.018)`;
    };

    const resetTilt = () => {
      artEl.classList.remove('tilting');
      artEl.style.transform = 'perspective(720px) rotateX(0deg) rotateY(0deg) scale(1)';
      artEl.style.setProperty('--shine-x', '50%');
      artEl.style.setProperty('--shine-y', '35%');
    };

    artEl.addEventListener('pointerdown', e => {
      if (e.target.closest('.card-zoom-close-btn')) return;
      artEl.setPointerCapture?.(e.pointerId);
      setTilt(e.clientX, e.clientY);
    });
    artEl.addEventListener('pointermove', e => {
      if (e.pointerType === 'mouse' || e.buttons) setTilt(e.clientX, e.clientY);
    });
    artEl.addEventListener('pointerup', resetTilt);
    artEl.addEventListener('pointercancel', resetTilt);
    artEl.addEventListener('pointerleave', e => { if (e.pointerType === 'mouse') resetTilt(); });
  }

  function openCardZoom(card) {
    const existing = document.getElementById('card-zoom-overlay');
    if (existing) existing.remove();
    const col = card.owner === 1 ? 'p1' : card.owner === 2 ? 'p2' : '';
    const isPower = normalisedCardType(card) === 'Power';
    const ov = document.createElement('div');
    ov.id = 'card-zoom-overlay';
    ov.className = 'card-zoom-overlay';
    ov.innerHTML = `
      <div class="card-zoom-shell" onclick="event.stopPropagation()">
        <div class="card-zoom-art ${col}-unit" id="czoom-art">
          <button class="card-zoom-close-btn" onclick="document.getElementById('card-zoom-overlay').remove()">×</button>
          <div class="card-zoom-cost"><span>${escapeHtml(card.cost ?? '')}</span></div>
          ${!isPower ? `<div class="card-zoom-stat-rail">
            <div class="card-zoom-stat hp">${escapeHtml(card.hp ?? '')}</div>
            <div class="card-zoom-stat move">${escapeHtml(card.move === -1 ? '—' : card.move ?? '')}</div>
            <div class="card-zoom-stat save">${escapeHtml(card.save ?? '')}</div>
          </div>` : ''}
          <div class="card-zoom-fallback-name" id="czoom-fallback-name">${expectedArtLabel(card)}</div>
          <div class="card-zoom-shine" id="czoom-shine"></div>
        </div>
        <div class="card-zoom-info">
          <div style="display:flex;align-items:center;justify-content:center;gap:4px;max-width:100%;">
            <span class="card-zoom-faction">${FACTION_ICONS[card.faction]||''}</span>
            <span class="card-zoom-name">${formatCardName(card.name)}</span>
          </div>
          ${card.weapon?.name ? `<div class="card-zoom-weapon">${escapeHtml(card.weapon.name)}</div>` : ''}
        </div>
        ${zoomAttackProfileHtml(card)}
        ${zoomSpecialHtml(card)}
        ${card.flavour ? `<div class="card-zoom-flavour">${escapeHtml(card.flavour)}</div>` : ''}
      </div>`;
    document.body.appendChild(ov);

    if (art) {
      const existingStyle = artEl.getAttribute('style') || '';
      artEl.setAttribute('style', `${existingStyle}${existingStyle && !existingStyle.trim().endsWith(';') ? ';' : ''}${art}`);
    }
    updateZoomCardNameFallback(card);
    setupZoomTilt(artEl);
    ov.addEventListener('click', e => { if(e.target===ov) ov.remove(); });
  }

  // ── BOARD TILE LONG PRESS ──
  let _tileTouchTimer = null;
  let _tileTouchMoved = false;

  function onBoardTileTouchStart(e, tileId) {
    if (e.touches.length > 1) return;
    if (!state.board[tileId]) return;
    const t = e.touches[0];
    const startX = t.clientX, startY = t.clientY;
    _tileTouchMoved = false;
    const el = document.querySelector(`[data-id="${tileId}"]`);
    if (el) { el.classList.remove('touch-pulse'); void el.offsetWidth; el.classList.add('touch-pulse'); }
    const onMove = e2 => {
      const t2 = e2.touches[0];
      if (Math.hypot(t2.clientX - startX, t2.clientY - startY) > 8) {
        _tileTouchMoved = true;
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
      }
    };
    const onEnd = () => {
      document.removeEventListener('touchmove', onMove);
    };
    document.addEventListener('touchmove', onMove, {passive:true});
    document.addEventListener('touchend', onEnd, {once:true});
  }

  function onTileTap(tileId) {
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) {
      // Tap on empty board space — cancel pending
      if(state.pendingTile) cancelPendingDeploy();
      else if(state._ctaAction==='activate') onHubCancel();
      return;
    }

    // Inspector deploy mode — Deploy button was pressed, tile tap now confirms placement immediately
    if (state.deployModeFromInspector && state._ctaAction === 'deploy' && state.selectedHandCard && tile.classList.contains('highlight-deploy')) {
      executeDeployTo(tileId);
      return;
    }

    // Tile-target power card — highlighted tile resolves the effect
    if(state._pendingPowerCard && state._pendingPowerReg?.subtype === 'tile_target') {
      if(tile.classList.contains('highlight-deploy')) {
        const card = state._pendingPowerCard;
        const reg  = state._pendingPowerReg;
        state._pendingPowerCard = null;
        state._pendingPowerReg  = null;
        document.querySelectorAll('.tile.highlight-deploy').forEach(t => t.classList.remove('highlight-deploy'));
        reg.execute(card, tileId);
      }
      return;
    }

    // Ability targeting mode — tapping a highlighted unit resolves the ability
    if (state.activeAction==='ability' && tile.classList.contains('highlight-ability')) {
      if (state.board[tileId]) { resolveAbility(tileId); return; }
    }

    // Attack mode — enemy highlighted tile triggers battle
    if(state.activeAction==='attack' && tile.classList.contains('highlight-attack')) {
      const enemy=state.activePlayer===1?2:1;
      if(state.board[tileId]?.owner===enemy) openBattleOverlay(tileId);
      return;
    }

    // Tapping a tile with a unit — select and show inspector + activate CTA
    if(state.board[tileId]){
      const unit = state.board[tileId];
      const lane = unitLane(tileId);
      if(lane) snapToLane(lane);
      const isOwn = unit.owner === state.activePlayer;
      const p = state.players[state.activePlayer];
      if (!isOwn) {
        // Enemy unit — straight to zoom modal
        openCardZoom(unit);
        return;
      }
      const canActivate = isOwn && unit.actionsLeft === null && p.resources >= 1 && !state.activeUnit;
      if (canActivate) {
        openProfile(unit, 'board', tileId);
        setBarState('pending', { label:'Activate', cost:1, action:'activate' });
      } else {
        openProfile(unit, 'board', tileId);
      }
      return;
    }

    // Move mode — tapping a valid highlighted tile
    if(state.activeAction==='move' && tile.classList.contains('highlight-move')) {
      if(pendingMoveTile===tileId){ clearMoveConfirm(); return; }
      clearMoveConfirm(); pendingMoveTile=tileId; showMoveConfirm(tileId);
      return;
    }

    // Tapping empty non-relevant tile while action is active — clear action
    if(state.activeAction){ state.activeAction=null; clearHighlights(); return; }

    // Deploy flow — blocked for Power cards
    if(!state.selectedHandCard && profileContext==='hand' && profileCard && tile.classList.contains('highlight-deploy') && (profileCard.type||'').trim() !== 'Power'){
      selectHandCard(profileCard);
    }
    if(state.selectedHandCard && (state.selectedHandCard.type||'').trim() !== 'Power' && tile.classList.contains('highlight-deploy')){
      if(state.pendingTile===tileId){ clearConfirm(); state.pendingTile=null; return; }
      clearConfirm(); state.pendingTile=tileId; showConfirm(tileId);
    }
  }

  // ── EXECUTE MOVE ──
  function executeMove(toTileId) {
    const fromTileId = state.activeUnit.tileId;
    const unit = state.activeUnit.card;

    // Update board state
    state.board[toTileId] = unit;
    delete state.board[fromTileId];

    // Update DOM
    const fromTile = document.querySelector(`[data-id="${fromTileId}"]`);
    fromTile.classList.remove('unit-active');
    fromTile.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e=>e.remove());
    const toTile = document.querySelector(`[data-id="${toTileId}"]`);
    renderUnit(toTile, unit);
    toTile.classList.add('unit-active');

    // Update activeUnit reference and tileId in profile
    state.activeUnit.tileId = toTileId;
    profileTileId = toTileId;
    unit.actionsLeft--;
    const updatedTile = document.querySelector(`[data-id="${toTileId}"]`);
    if(updatedTile) renderUnit(updatedTile, unit);
    clearHighlights();

    if(unit.actionsLeft > 0) {
      // Auto re-highlight from new position
      getReachableTiles(toTileId, unit.move).forEach(id=>{
        document.querySelector(`[data-id="${id}"]`)?.classList.add('highlight-move');
      });
      refreshActionButtons();
      renderHub();
    } else {
      closeProfile();
      endCurrentTurn();
      waitThenAdvance();
    }
  }

  function showConfirm(tileId) {
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    tile.classList.add('confirm-tile');
    // Keep hand visible during pending deploy (only if inspector not open)
    if (!document.getElementById('inspector-card-view').classList.contains('active')) {
      document.getElementById('inspector-deck').style.display = '';
    }
    // Show card preview on tile
    const card = state.selectedHandCard;
    if (card) {
      const col = state.players[state.activePlayer].color;
      const preview = document.createElement('div');
      preview.className = `unit-on-tile ${col}-unit pending-deploy-preview`;
      preview.style.cssText = 'opacity:0.7;';
      preview.innerHTML = `<div class="unit-name-on-tile" style="font-size:var(--fs-xs);line-height:1.2;text-align:center;padding:2px;">${formatCardName(card.name)}</div>`;
      tile.appendChild(preview);
    }
    const cost = card?.cost ?? 0;
    setBarState('pending', { label:'Deploy', cost, action:'deploy' });
  }

  function clearConfirm() {
    document.querySelectorAll('.confirm-tile').forEach(t=>t.classList.remove('confirm-tile'));
    document.querySelectorAll('.pending-deploy-preview').forEach(e=>e.remove());
    const btn=document.getElementById('confirm-btn');
    if(btn) btn.remove();
    if (!state.activeUnit) setBarState('default');
  }

  function cancelPendingDeploy() {
    const tileId = state.pendingTile;
    clearConfirm();
    state.pendingTile = null;
    state.deployModeFromInspector = false;
    // Restore card to hand
    deselectAll();
  }

  function executeDeployTo(tileId) {
    const card=state.selectedHandCard;
    const p=state.players[state.activePlayer];
    if(!card || p.resources<card.cost) return;

    // Spend resources, remove from hand, place on board
    p.resources-=card.cost;
    p.hand=p.hand.filter(c=>c.uid!==card.uid);
    state.board[tileId]={...card, owner:state.activePlayer, actionsLeft:null};

    const tile=document.querySelector(`[data-id="${tileId}"]`);
    tile.classList.remove('confirm-tile','highlight-deploy');
    renderUnit(tile, state.board[tileId]);

    state.deployModeFromInspector = false;
    closeProfile();
    deselectAll();
    renderHub();
    endCurrentTurn();
    waitThenAdvance();
  }

  let pendingMoveTile = null;

  function showMoveConfirm(tileId) {
    // Dim other move options
    document.querySelectorAll('.highlight-move').forEach(t=>{
      if(t.dataset.id!==tileId) t.classList.add('dim-move');
    });
    // Arrow icon on source unit tile
    const srcTile=document.querySelector(`[data-id="${state.activeUnit.tileId}"]`);
    if(srcTile){ const ic=document.createElement('div'); ic.className='move-src-icon'; ic.textContent='→'; srcTile.appendChild(ic); }
    // Confirm button on destination
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    tile.classList.add('confirm-tile');
    const btn=document.createElement('div');
    btn.className='confirm-btn'; btn.id='move-confirm-btn';
    btn.innerHTML='<span>→✓</span>';
    btn.addEventListener('click',e=>{ e.stopPropagation(); clearMoveConfirm(); executeMove(tileId); });
    tile.appendChild(btn);
  }
  function clearMoveConfirm() {
    document.querySelectorAll('.highlight-move.dim-move').forEach(t=>t.classList.remove('dim-move'));
    document.querySelectorAll('.move-src-icon').forEach(e=>e.remove());
    const btn=document.getElementById('move-confirm-btn');
    if(btn){ btn.closest('.confirm-tile')?.classList.remove('confirm-tile'); btn.remove(); }
    pendingMoveTile=null;
  }

  let profileContext = null;
  let profileCard    = null;
  let profileTileId  = null;

  const FACTION_ICONS = {
    order_of_iron:'⚙', order_of_flames:'♨', order_of_light:'☼',
    order_of_the_veil:'☽', order_of_beasts:'♈', order_of_artifice:'◆',
    order_of_shadows:'†', none:'✦', universal:'✦'
  };

  function onCardVisualTap() {
    if (!profileCard) return;

      activateUnit();
