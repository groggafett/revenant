    if(unit.actionsLeft <= 0) {
      closeProfile();
      clearHighlights();
      endCurrentTurn();
      advanceTurn();
    }
  }

  function refreshActionButtons() {
    const activeCard = state.activeUnit?.card;
    const viewingActive = profileCard && activeCard && profileCard.uid === activeCard.uid;
    const mb=document.getElementById('btn-move');
    const ab=document.getElementById('btn-attack');
    const eb=document.getElementById('btn-end');

    if (!viewingActive || !activeCard || activeCard.actionsLeft === 0) {
      // Viewing non-active unit or exhausted — dim pills, no interaction
      mb.disabled=true; mb.className='prof-move-pill';
      ab.disabled=true; ab.className='prof-attack-pill';
      if(eb) eb.style.display='none';
      return;
    }

    const ex=activeCard.actionsLeft===0;
    const immobile=activeCard.move===-1;
    const targeting=state.activeAction;
    mb.disabled=ex||immobile;
    if(ex||immobile)           mb.className=`prof-move-pill${immobile?' immobile':''}`;
    else if(targeting==='move')mb.className='prof-move-pill active-move';
    else                       mb.className='prof-move-pill pill-idle';
    ab.disabled=ex;
    if(ex)                      ab.className='prof-attack-pill';
    else if(targeting==='attack')ab.className='prof-attack-pill active-attack';
    else                        ab.className='prof-attack-pill pill-idle';
    if(eb) eb.style.display=ex?'none':'inline-block';
  }

  let boardFlipped = false;
  function setPerspective(player) {
    // Board no longer flips — symmetric board, UI colour signals whose turn it is
  }

  // ── END TURN ──
  // ── PASS / TURN END ──
  function endUnit() {
    const unit=state.activeUnit?.card; if(!unit) return;
    unit.actionsLeft=0;
    clearHighlights();
    closeProfile();
    hideActionBar();
    endCurrentTurn();
    waitThenAdvance();
  }

  function endCurrentTurn() {
    deselectAll();
    closeProfile();
    hideActionBar();
    state.activeUnit=null; state.activeAction=null;
    clearHighlights();
    document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
  }

  function setUILock(locked) {
    document.getElementById('ui-lock').style.display = locked ? 'block' : 'none';
  }

  let _advancePending = false;
  function waitThenAdvance() {
    if(_advancePending) return;
    // If a unit is pending return (e.g. commander after inspire), go back to them
    if (state.pendingReturnUnit) {
      const ret = state.pendingReturnUnit;
      state.pendingReturnUnit = null;
      state.activeUnit = ret;
      document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
      const retTile = document.querySelector(`[data-id="${ret.tileId}"]`);
      if (retTile) retTile.classList.add('unit-active','unit-selected');
      openProfile(ret.card, 'board', ret.tileId);
      setUILock(false);
      return;
    }
    _advancePending = true;
    setUILock(true);
    document.getElementById('turn-wait').classList.add('show');
    setTimeout(advanceTurn, 2000);
  }

  function advanceTurn() {
    _advancePending = false;
    state.pendingReturnUnit = null;
    document.getElementById('turn-wait').classList.remove('show');
    const next = state.activePlayer === 1 ? 2 : 1;
    if(state.players[next].passed) {
      showTurnToast(state.activePlayer);
      renderHub(); return;
    }
    state.activePlayer = next;
    setPerspective(next);
    refreshAllUnitIndicators();
    renderHub();
    showTurnToast(next);
  }

  function passAction() {
    setUILock(true);
    state.players[state.activePlayer].passed = true;
    endCurrentTurn();
    const next = state.activePlayer === 1 ? 2 : 1;
    if(state.players[next].passed) { endRound(); return; }
    state.activePlayer = next;
    setPerspective(next);
    refreshAllUnitIndicators();
    renderHub();
    showTurnToast(next);
  }

  function endRound() {
    state.phase = 'scoring';
    setPerspective(1);
    document.getElementById('side-p1').className = 'player-side left inactive';
    document.getElementById('side-p2').className = 'player-side right inactive';
    document.getElementById('player-bar').className = 'player-bar';
    const topBar = document.querySelector('.top-bar');
    topBar.style.zIndex = '60';
    const ov = document.createElement('div');
    ov.className = 'round-end-overlay';
    ov.innerHTML = `
      <div class="round-end-title">End of Round ${state.round}</div>
      <div class="round-end-sub">Scoring</div>
      <button class="round-end-btn" id="score-begin-btn">Score ▶</button>`;
    document.body.appendChild(ov);
    requestAnimationFrame(()=>ov.classList.add('show'));
    document.getElementById('score-begin-btn').addEventListener('click', ()=>{
      ov.classList.add('dim');
      ov.innerHTML = '';
      // Round 1: reveal lane effects before scoring
      if (state.round === 1 && (state.laneEffects.A || state.laneEffects.B)) {
        revealLaneEffects(ov, () => {
          scoreRound(()=>{ finishRoundOverlay(ov, topBar); });
        });
      } else {
        scoreRound(()=>{ finishRoundOverlay(ov, topBar); });
      }
    });
  }

  function finishRoundOverlay(ov, topBar) {
    ov.style.pointerEvents = 'all';
    const btn = document.createElement('button');
    btn.className = 'round-end-btn';
    btn.textContent = 'Next Round ▶';
    ov.appendChild(btn);
    btn.addEventListener('click', ()=>{
      ov.remove();
      topBar.style.zIndex = '';
      state.round++;
      if(state.round > state.maxRounds){ showEndGame(); return; }
      requisitionPhase();
    });
  }

  function revealLaneEffects(ov, callback) {
    // Mark both revealed
    ['A','B'].forEach(l => { if(state.laneEffects[l]) state.laneEffects[l].revealed = true; });
    renderLaneEffects();

    const fxA = state.laneEffects.A;
    const fxB = state.laneEffects.B;
    const makeCard = (fx, preview) => fx ? `
      <div style="background:#0e1a12;border:1px solid #1a5030;border-radius:6px;padding:10px 12px;text-align:left;flex:1">

        <div style="font-size:7px;color:#3a6848;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px">${fx.trigger.replace(/_/g,' ')}</div>
        <div style="font-size:8px;color:#5a8868;line-height:1.5">${fx.description}</div>
        ${preview ? `<div style="margin-top:8px;padding-top:6px;border-top:1px solid #1a3020;font-size:8px;color:#7a8868;line-height:1.5;">${preview}</div>` : ''}
      </div>` : '';

    ov.innerHTML = `
      <div class="round-end-title" style="font-size:18px">Lane Effects Revealed</div>
      <div class="round-end-sub" style="margin-bottom:14px">The battlefield stirs…</div>
      <div style="display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:16px">
        <div style="flex:1">
          <div style="font-size:7px;color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane I</div>
          ${makeCard(fxA)}
        </div>
        <div style="flex:1">
          <div style="font-size:7px;color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane II</div>
          ${makeCard(fxB)}
        </div>
      </div>
      <button class="round-end-btn" id="reveal-score-btn">Score ▶</button>`;

    ov.style.pointerEvents = 'all';

    function applyAndContinue() {
      ov.style.pointerEvents = 'none';
      ov.innerHTML = '';
      ['A','B'].forEach(lane => {
        const fx = state.laneEffects[lane];
        if(fx?.revealed) EFFECT_REGISTRY[fx.effect]?.onReveal?.(fx, lane);
      });
      setTimeout(callback, 1200);
    }

    document.getElementById('reveal-score-btn').addEventListener('click', ()=>{
      const previews = {};
      ['A','B'].forEach(lane => {
        const fx = state.laneEffects[lane];
        if(!fx?.revealed) return;
        const reg = EFFECT_REGISTRY[fx.effect];
        if(reg?.getRevealPreview) previews[lane] = reg.getRevealPreview(fx, lane);
      });

      if(!Object.keys(previews).length) { applyAndContinue(); return; }

      ov.innerHTML = `
        <div class="round-end-title" style="font-size:18px">Lane Effects Revealed</div>
        <div class="round-end-sub" style="margin-bottom:14px">The battlefield stirs\u2026</div>
        <div style="display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:16px">
          <div style="flex:1">
            <div style="font-size:7px;color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane I</div>
            ${makeCard(fxA, previews['A'])}
          </div>
          <div style="flex:1">
            <div style="font-size:7px;color:#5a4828;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px">Lane II</div>
            ${makeCard(fxB, previews['B'])}
          </div>
        </div>
        <button class="round-end-btn" id="reveal-apply-btn">Apply \u25b6</button>`;
      ov.style.pointerEvents = 'all';
      document.getElementById('reveal-apply-btn').addEventListener('click', applyAndContinue);
    });
  }

  function scoreRound(callback) {
    const scoring = Object.entries(state.board).filter(([tid])=>tileMap[tid]?.zone==='control-zone');
    if(!scoring.length){ setTimeout(callback, 400); return; }
    let i = 0;
    function next() {
      if(i >= scoring.length){ setTimeout(callback, 1000); return; }
      const [tileId, unit] = scoring[i++];
      const pts = unit.hp;
      state.players[unit.owner].score += pts;
      renderHub();
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(tile){
        const r = tile.getBoundingClientRect();
        const fl = document.createElement('div');
        fl.className = 'score-float';
        fl.textContent = `+${pts}`;
        fl.style.color = unit.owner===1 ? 'var(--p1)' : 'var(--p2)';
        fl.style.left = (r.left + r.width/2) + 'px';
        fl.style.top  = (r.top  + r.height/2) + 'px';
        document.body.appendChild(fl);
        setTimeout(()=>fl.remove(), 1100);
      }
      setTimeout(next, 900);
    }
    next();
  }

  function showScoringComplete(callback) { if(callback) callback(); }

  function showEndGame() {
    const p1=state.players[1], p2=state.players[2];
    const winnerName = p1.score>p2.score ? p1.name : p2.score>p1.score ? p2.name : null;
    const winText = winnerName ? `${winnerName} is victorious` : 'The battle ends in a draw';
    const col = winnerName===p1.name ? 'p1' : winnerName ? 'p2' : '';
    showOverlay('Battle Over', `${p1.name} ${p1.score} — ${p2.score} ${p2.name}`, winText, 0, ()=>resetGame(), true, col);
  }

  function skipToGame() {
    // Hide all overlays
    document.getElementById('start-overlay').classList.remove('show');
    document.getElementById('req-overlay').classList.remove('show');
    _beginCallback = null;
    // Draw 4 cards if not yet drawn (setup phase)
    [1,2].forEach(p=>{
      while(state.players[p].hand.length < 4) drawCard(p);
    });
    // Requisition: resources + 1 card + pick first player
    const gain = 5 + state.round;
    [1,2].forEach(p=>{
      state.players[p].resources += gain;
      state.players[p].passed = false;
      drawCard(p);
    });
    state.activePlayer = Math.random() < 0.5 ? 1 : 2;
    startBattlePhase();
  }
  function saveGame() {
    try {
      localStorage.setItem('grim_save', JSON.stringify(state));
      showToastMsg('Game Saved');
    } catch(e) { showToastMsg('Save Failed'); console.error(e); }
  }

  function showToastMsg(msg) {
    const el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#2a2010;border:1px solid #c8a060;color:#c8a060;font-family:Cinzel,serif;font-size:9px;letter-spacing:0.1em;padding:6px 14px;border-radius:4px;z-index:200;pointer-events:none;opacity:1;transition:opacity 0.4s';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(), 400); }, 1200);
  }

  function loadGame() {
    try {
      const raw = localStorage.getItem('grim_save');
      if(!raw){ showToastMsg('No Save Found'); return; }
      const saved = JSON.parse(raw);
      state.round        = saved.round;
      state.maxRounds    = saved.maxRounds;
      state.activePlayer = saved.activePlayer;
      state.phase        = saved.phase || 'battle';
      state.players      = saved.players;
      state.board        = saved.board;
      state.selectedHandCard = null;
      state.pendingTile      = null;
      state.activeAction     = null;
      state.activeUnit = saved.activeUnit
        ? { tileId: saved.activeUnit.tileId, card: state.board[saved.activeUnit.tileId] }
        : null;
      buildBoard();
      buildTileMap();
      restoreBoard();
      clearHighlights();
      refreshAllUnitIndicators();
      setPerspective(state.activePlayer);
      document.getElementById('inspector').classList.add('open');
      renderHub();
      fitBoard();
      showToastMsg('Game Loaded');
    } catch(e) { showToastMsg('Load Failed'); console.error(e); }
  }

  function restoreBoard() {
    Object.entries(state.board).forEach(([tileId, unit])=>{
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      tile.classList.remove('highlight-deploy','confirm-tile');
      renderUnit(tile, unit);
      if(unit.actionsLeft !== null) tile.classList.add('unit-active');
    });
  }

  function resetGame() {
    if(!confirm('Reset game? This cannot be undone.')) return;
    localStorage.removeItem('grim_save');
    state.round=1; state.maxRounds=5; state.activePlayer=1; state.phase='setup';
    state.board={}; state.selectedHandCard=null; state.pendingTile=null;
    state.activeUnit=null; state.activeAction=null;
    state.players[1]={name:'Player I',  score:0, resources:3, deck:[], hand:[], graveyard:[], color:'p1', passed:false, drawnThisRound:false};
    state.players[2]={name:'Player II', score:0, resources:3, deck:[], hand:[], graveyard:[], color:'p2', passed:false, drawnThisRound:false};
    initGame();
  }

  // ── INSPECTOR TOGGLE ──
  function toggleInspector() {
    const insp=document.getElementById('inspector');
    insp.classList.toggle('open');
  }

  // ── PAN & ZOOM ──
  const outer=document.getElementById('board-outer');
  const inner=document.getElementById('board-inner');
  let scale=1,tx=0,ty=0,minScale=1;
  let lastDist=null,isPinching=false,startX,startY;

  function clamp(v,lo,hi){return Math.min(hi,Math.max(lo,v));}

  const ELASTIC = 40;
  function applyTransform(elastic=false){
    const ow=outer.clientWidth, oh=outer.clientHeight;
    const sw=inner.offsetWidth*scale, sh=inner.offsetHeight*scale;
    if(scale < minScale) scale = minScale;
    if(elastic) {
      tx = Math.max(ow-sw-ELASTIC, Math.min(ELASTIC, tx));
      ty = scale > minScale ? Math.max(oh-sh-ELASTIC, Math.min(ELASTIC, ty)) : 0;
    } else {
      tx = clamp(tx, ow-sw, 0);
      ty = scale > minScale ? clamp(ty, oh-sh, 0) : 0;
    }
    inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }

  function snapToLane(lane) {
    const ow = outer.clientWidth;
    const iw = inner.offsetWidth * scale;
    // Lane A centre ~33% of board-inner width, Lane B ~67%
    const laneFrac = lane === 'A' ? 0.33 : 0.67;
    const laneX = inner.offsetWidth * laneFrac * scale;
    const targetTx = clamp(ow/2 - laneX, ow - iw, 0);
    if(Math.abs(targetTx - tx) < 10) return; // already close
    inner.style.transition = 'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)';
    tx = targetTx;
    inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    setTimeout(()=>{ inner.style.transition=''; }, 350);
  }
  function getDeployClusters() {
    // Group highlight-deploy tiles by data-lane into clusters with bounding boxes
    const outerRect = outer.getBoundingClientRect();
    const groups = {};
    document.querySelectorAll('.tile.highlight-deploy').forEach(t => {
      const key = t.dataset.lane || 'default';
      if (!groups[key]) groups[key] = [];
      groups[key].push(t.getBoundingClientRect());
    });
    return Object.entries(groups).map(([lane, rects]) => ({
      lane,
      left:   Math.min(...rects.map(r => r.left)),
      right:  Math.max(...rects.map(r => r.right)),
      top:    Math.min(...rects.map(r => r.top)),
      bottom: Math.max(...rects.map(r => r.bottom)),
      cx: (Math.min(...rects.map(r=>r.left)) + Math.max(...rects.map(r=>r.right))) / 2 - outerRect.left,
      cy: (Math.min(...rects.map(r=>r.top))  + Math.max(...rects.map(r=>r.bottom))) / 2 - outerRect.top,
    }));
  }

  function zoomToCluster(cluster) {
    const targetScale = 1.25;
    const ow = outer.clientWidth;
    const oh = outer.clientHeight;
    const worldCx = (cluster.cx - tx) / scale;
    const worldCy = (cluster.cy - ty) / scale;
    const newTx = clamp(ow/2 - worldCx * targetScale, ow - inner.offsetWidth * targetScale, 0);
    const playerBar = document.getElementById('player-bar');
    const barH = playerBar ? playerBar.offsetHeight : 160;
    const newTy = clamp((oh - barH - 20) - worldCy * targetScale, oh - inner.offsetHeight * targetScale, 0);
    inner.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
    scale = targetScale; tx = newTx; ty = newTy;
    inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    setTimeout(() => { inner.style.transition = ''; }, 320);
  }

  function snapBack(){
    const ow=outer.clientWidth;
    const sw=inner.offsetWidth*scale;
    const bounded = clamp(tx, ow-sw, 0);
    if(bounded !== tx){
      inner.style.transition='transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
      tx=bounded; ty=0;
      inner.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
      setTimeout(()=>{ inner.style.transition=''; },300);
    }
  }

  function zoomToTile(tileId) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if (!tile) return;
    const outerRect = outer.getBoundingClientRect();
    const tileRect = tile.getBoundingClientRect();
    const targetScale = 1.6;
    // Tile centre in outer coordinates
    const tileCx = tileRect.left - outerRect.left + tileRect.width / 2;
    const tileCy = tileRect.top  - outerRect.top  + tileRect.height / 2;
    // New tx/ty so tile centre stays at same screen position after scale change
    const newTx = tileCx - (tileCx - tx) * (targetScale / scale);
    const newTy = tileCy - (tileCy - ty) * (targetScale / scale);
    inner.style.transition = 'transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94)';
    scale = targetScale;
    tx = clamp(newTx, outer.clientWidth  - inner.offsetWidth  * scale, 0);
    ty = clamp(newTy, outer.clientHeight - inner.offsetHeight * scale, 0);
    inner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    setTimeout(() => { inner.style.transition = ''; }, 260);
  }

  function resetBoardZoom() {
    inner.style.transition = 'transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94)';
    fitBoard();
    setTimeout(() => { inner.style.transition = ''; }, 320);
  }

  function fitBoard(){
    minScale = 1;
    scale = 1;
    tx = -(inner.offsetWidth - outer.clientWidth) / 2;
    ty = 0;
    applyTransform();
    // Hide blueprint if board art loaded
    const bp = document.getElementById('board-blueprint');
    if(!bp) return;
    const probe = new Image();
    probe.onload = () => { bp.style.display = 'none'; };
    probe.onerror = () => {};
    probe.src = 'art/board.jpg';
    const probe2 = new Image();
    probe2.onload = () => { bp.style.display = 'none'; };
    probe2.onerror = () => {};
    probe2.src = 'art/board.png';
  }

  window.addEventListener('load',()=>requestAnimationFrame(()=>{ initGame(); }));

  // ── DOUBLE TAP TO ZOOM ──
  let _lastTap=0, _lastTapX=0, _lastTapY=0;
  outer.addEventListener('touchend', e=>{
    if(isPinching || e.changedTouches.length!==1) return;
    const now=Date.now();
    const t=e.changedTouches[0];
    const dx=Math.abs(t.clientX-_lastTapX), dy=Math.abs(t.clientY-_lastTapY);
    if(now-_lastTap<300 && dx<30 && dy<30) {
      // Double tap detected
      e.preventDefault();
      const rect=outer.getBoundingClientRect();
      const tapX=t.clientX-rect.left, tapY=t.clientY-rect.top;
      if(scale>minScale*1.2) {
        // Zoom out to fit
        fitBoard();
      } else {
        // Zoom in to 2.5x centred on tap point
        const target=clamp(2.5, minScale, 3);
        tx=tapX-tapX*(target/scale);
        ty=tapY-tapY*(target/scale);
        scale=target;
        applyTransform();
      }
      _lastTap=0;
    } else {
      _lastTap=now; _lastTapX=t.clientX; _lastTapY=t.clientY;
    }
  },{passive:false});

  outer.addEventListener('touchstart',e=>{
    if(dragState) return;
    if(e.touches.length===2){isPinching=true;lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
    else if(!isPinching){startX=e.touches[0].clientX-tx;startY=e.touches[0].clientY-ty;}
  },{passive:true});

  outer.addEventListener('touchmove',e=>{
    if(dragState) return;
    e.preventDefault();
    if(e.touches.length===2){
      isPinching=true;
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      const rect=outer.getBoundingClientRect();
      const mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left,y:(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top};
      if(lastDist){const ns=clamp(scale*dist/lastDist,minScale,3);tx=mid.x-(mid.x-tx)*ns/scale;ty=mid.y-(mid.y-ty)*ns/scale;scale=ns;}
      lastDist=dist;applyTransform();
    } else if(!isPinching){const d=boardFlipped?-1:1;tx=e.touches[0].clientX*d-startX;ty=e.touches[0].clientY*d-startY;applyTransform(true);}
  },{passive:false});

  outer.addEventListener('touchend',e=>{
    if(e.touches.length<2)lastDist=null;
    if(e.touches.length===0){ isPinching=false; snapBack(); }
  },{passive:true});
</script>

</body>
