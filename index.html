        ${quoteHtml}
        <div class="card-zoom-titleband">
          <div class="card-zoom-side-icon ${isPower ? 'power' : ''}">${isPower ? '✦' : factionIcon}</div>
          <div class="card-zoom-title">
            <div class="card-zoom-order">${escapeHtml(header)}</div>
            <div class="card-zoom-name">${cardDisplayName(card)}</div>
            ${subtitle ? `<div class="card-zoom-weapon">${escapeHtml(subtitle)}</div>` : ''}
          </div>
          <div class="card-zoom-side-icon">${isPower ? '✦' : factionIcon}</div>
        </div>
        ${profileHtml}
        ${zoomSpecialHtml(card)}
      </div>`;
  }

  function updateHandPreviewCard(card) {
    if (!handPreviewState?.el || !card) return;
    handPreviewState.card = card;
    const col = state.players[state.activePlayer]?.color || 'p1';
    const wasShown = handPreviewState.el.classList.contains('show');
    handPreviewState.el.className = `hand-hold-preview card-zoom-art ${col}-unit${wasShown ? ' show' : ''}`;
    const art = artStyle(card, true);
    handPreviewState.el.setAttribute('style', art || '');
    handPreviewState.el.innerHTML = handPreviewCardMarkup(card);
    document.querySelectorAll('.card[data-uid]').forEach(el => {
      if (el.dataset.baseTransform) el.style.transform = el.dataset.baseTransform;
      el.classList.remove('hand-previewing');
    });
    const activeEl = [...document.querySelectorAll('#hand-scroll .card[data-uid]')].find(el => el.dataset.uid === String(card.uid));
    if (activeEl) {
      activeEl.classList.add('hand-previewing');
      const base = activeEl.dataset.baseTransform || '';
      activeEl.style.transform = `${base} translateY(-8px) scale(1.04)`;
    }
    const nameEl = document.getElementById('hand-preview-name');
    if (!nameEl || !card.artId) return;
    let loaded = false;
    artCandidates(card.artId).forEach(src => {
      const img = new Image();
      img.onload = () => {
        if (handPreviewState?.card?.uid !== card.uid) return;
        loaded = true;
        nameEl.classList.add('hidden');
      };
      img.src = src;
    });
  }

  function showHandHoldPreview(card) {
    closeHandHoldPreview();
    const el = document.createElement('div');
    el.className = 'hand-hold-preview';
    document.body.appendChild(el);
    handPreviewState = { el, card };
    updateHandPreviewCard(card);
    requestAnimationFrame(() => el.classList.add('show'));
    try{navigator.vibrate?.(15);}catch(e){}
  }

  function closeHandHoldPreview() {
    document.querySelectorAll('.card[data-uid]').forEach(el => {
      el.classList.remove('hand-previewing');
      if (el.dataset.baseTransform) el.style.transform = el.dataset.baseTransform;
    });
    if (handPreviewState?.el) handPreviewState.el.remove();
    handPreviewState = null;
  }

  function handCardFromPoint(x, y) {
    const cards = [...document.querySelectorAll('#hand-scroll .card[data-uid]')];
    if (!cards.length) return null;

    // While previewing, scrub by the visible slices of the fanned hand.
    // Switch as soon as the finger enters the exposed part of the next card,
    // rather than waiting until the centre of that card.
    if (handPreviewState) {
      const rects = cards.map(el => ({ el, r: el.getBoundingClientRect() }));
      const minTop = Math.min(...rects.map(o => o.r.top));
      const maxBottom = Math.max(...rects.map(o => o.r.bottom));
      if (y < minTop - 80 || y > maxBottom + 180) return null;

      const firstLeft = rects[0].r.left;
      const lastRight = rects[rects.length - 1].r.right;
      const clampedX = Math.max(firstLeft, Math.min(lastRight, x));

      let chosen = rects[0].el;
      for (let i = 0; i < rects.length; i++) {
        const thisLeft = rects[i].r.left;
        const nextLeft = rects[i + 1]?.r.left ?? (rects[i].r.right + 1);
        if (clampedX >= thisLeft && clampedX < nextLeft) {
          chosen = rects[i].el;
          break;
        }
        if (clampedX >= thisLeft) chosen = rects[i].el;
      }
      return chosen;
    }

    const direct = document.elementFromPoint(x, y)?.closest?.('.card[data-uid]');
    if (direct) return direct;
    let best = null, bestDist = Infinity;
    for (const el of cards) {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = x - cx, dy = y - cy;
      const dist = Math.hypot(dx, dy);
      if (y >= r.top - 32 && y <= r.bottom + 36 && dist < bestDist) { best = el; bestDist = dist; }
    }
    return best;
  }

  function updateHandPreviewFromPoint(x, y) {
    if (!handPreviewState) return;
    const el = handCardFromPoint(x, y);
    const uid = el?.dataset?.uid;
    const idx = Number(el?.dataset?.handIndex);
    if (!uid) return;
    const p = state.players[state.activePlayer];
    const card = Number.isInteger(idx) && p.hand[idx]?.uid === uid ? p.hand[idx] : p.hand.find(c => c.uid === uid);
    if (!card) return;
    if (handPreviewState.card?.uid === card.uid) return;
    updateHandPreviewCard(card);
  }

  function cancelDragState() {
    if (!dragState) return;
    clearTimeout(dragState.inspectTimer);
    dragState.ghostEl?.remove();
    clearDragHover();
    setHandTucked(false);
    removePowerCastZone();
    closeHandHoldPreview();
    document.removeEventListener('touchmove', onHandDragMove);
    document.removeEventListener('touchend',  onHandDragEnd);
    dragState = null;
  }

  const HAND_PREVIEW_DELAY = 180;

  function onHandCardTouchStart(e, card, sourceEl) {
    if (e.touches.length > 1) return;
    e.preventDefault();
    if (state.pendingTile) cancelPendingDeploy();
    cancelDragState();
    const t = e.touches[0];
    try{navigator.vibrate?.(8);}catch(e){}
    dragState = {
      card, sourceEl,
      startX: t.clientX, startY: t.clientY,
      lastX: t.clientX, lastY: t.clientY,
      active: false, ghostEl: null, hoveredLane: null, hoverTile: null,
      previewActive: false,
      inspectTimer: null
    };
    dragState.inspectTimer = setTimeout(() => {
      if (!dragState || dragState.active || dragState.card?.uid !== card.uid) return;
      dragState.previewActive = true;
      showHandHoldPreview(card);
      updateHandPreviewFromPoint(dragState.lastX ?? dragState.startX, dragState.lastY ?? dragState.startY);
    }, HAND_PREVIEW_DELAY);
    document.addEventListener('touchmove', onHandDragMove, {passive: false});
    document.addEventListener('touchend', onHandDragEnd, {once: true});
  }

  function setHandTucked(on) {
    const hand = document.getElementById('hand-scroll');
    if (hand) hand.classList.toggle('hand-tucked', !!on);
  }

  function removePowerCastZone() {
    document.getElementById('power-cast-zone')?.remove();
  }

  function showPowerCastZone() {
    let zone = document.getElementById('power-cast-zone');
    if (!zone) {
      zone = document.createElement('div');
      zone.id = 'power-cast-zone';
      zone.className = 'power-cast-zone';
      zone.innerHTML = `<div class="power-cast-zone-main">✦ Cast Power</div><div class="power-cast-zone-sub">Drop here</div>`;
      document.body.appendChild(zone);
    }
    requestAnimationFrame(() => zone.classList.add('show'));
    return zone;
  }

  function isPointInCastZone(x, y) {
    const zone = document.getElementById('power-cast-zone');
    if (!zone) return false;
    const r = zone.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }

  function liftHandCard(x, y) {
    if (!dragState || dragState.active) return;
    closeHandHoldPreview();
    clearTimeout(dragState.inspectTimer);
    dragState.sourceEl.style.transform = '';
    dragState.sourceEl.style.opacity = '0';
    dragState.sourceEl.style.pointerEvents = 'none';
    const ghost = dragState.sourceEl.cloneNode(true);
    ghost.style.transform = '';
    Object.assign(ghost.style, {
      position:'fixed', pointerEvents:'none', zIndex:'999',
      width:'68px', aspectRatio:'5/7',
      left: x - 34 + 'px', top: y - 90 + 'px',
      transform:'scale(1.15)', opacity:'0.92',
      transition:'transform 0.1s ease',
      borderRadius:'4px',
      boxShadow:'0 8px 24px rgba(0,0,0,0.7)'
    });
    document.body.appendChild(ghost);
    dragState.active = true;
    dragState.ghostEl = ghost;
    setHandTucked(true);
    try{navigator.vibrate?.(20);}catch(e){}
    resetBoardZoom();
    // Clear previous selection state without renderHand (avoid DOM rebuild during touch)
    state.selectedHandCard = null;
    state.pendingTile = null;
    state.activeAction = null;
    if (normalisedCardType(dragState.card) === 'Power') {
      state.selectedBoardTile = null;
      document.querySelectorAll('.unit-active,.unit-selected').forEach(t => t.classList.remove('unit-active','unit-selected'));
    }
    clearHighlights();
    clearConfirm();
    // Now set new drag card and highlight valid drop targets
    state.selectedHandCard = dragState.card;
    const p = state.players[state.activePlayer];
    const isPower = normalisedCardType(dragState.card) === 'Power';
    if (p.resources >= dragState.card.cost) {
      if (isPower) highlightPowerDragTargets(dragState.card);
      else highlightDeployTiles(true);
    }
  }

  function clearDragHover() {
    document.querySelectorAll('.tile.drag-hover').forEach(t => t.classList.remove('drag-hover'));
  }

  function onHandDragMove(e) {
    if (!dragState) return;
    const t = e.touches[0];
    dragState.lastX = t.clientX;
    dragState.lastY = t.clientY;
    const dx = t.clientX - dragState.startX;
    const dy = t.clientY - dragState.startY;
    if (!dragState.active) {
      e.preventDefault();
      const upwardDrag = dy < -DRAG_THRESHOLD && Math.abs(dy) > Math.abs(dx) * 1.15;
      if (upwardDrag) {
        liftHandCard(t.clientX, t.clientY);
        if (dragState?.ghostEl) {
          dragState.ghostEl.style.left = t.clientX - 34 + 'px';
          dragState.ghostEl.style.top  = t.clientY - 90 + 'px';
        }
      } else if (dragState.previewActive) {
        updateHandPreviewFromPoint(t.clientX, t.clientY);
      }
      return;
    }
    e.preventDefault();
    dragState.ghostEl.style.left = t.clientX - 34 + 'px';
    dragState.ghostEl.style.top  = t.clientY - 90 + 'px';
    const castZone = document.getElementById('power-cast-zone');
    if (castZone) castZone.classList.toggle('drag-hover', isPointInCastZone(t.clientX, t.clientY));
    // Only update tile hover when it changes — prevents flicker
    const under = document.elementFromPoint(t.clientX, t.clientY);
    const tile = under?.closest('[data-id]');
    const newHoverTile = tile?.classList.contains('highlight-deploy') || tile?.classList.contains('highlight-ability') ? tile : null;
    if (newHoverTile !== dragState.hoverTile) {
      clearDragHover();
      dragState.hoverTile = newHoverTile;
      if (newHoverTile) newHoverTile.classList.add('drag-hover');
    }
    // Cluster detection with padding — prevents edge flicker
    const CLUSTER_PAD_Y = 40;
    const clusters = getDeployClusters();
    const fx = t.clientX, fy = t.clientY;
    // Match vertically within cluster row, then pick closest lane by x
    const inRow = clusters.filter(c => fy >= c.top - CLUSTER_PAD_Y && fy <= c.bottom + CLUSTER_PAD_Y);
    const hit = inRow.length ? inRow.reduce((a, b) =>
      Math.abs(fx - (a.left + a.right)/2) < Math.abs(fx - (b.left + b.right)/2) ? a : b
    ) : null;
    if (hit && hit.lane !== dragState.hoveredLane) {
      dragState.hoveredLane = hit.lane;
      zoomToCluster(hit);
    } else if (!hit && dragState.hoveredLane) {
      dragState.hoveredLane = null;
      resetBoardZoom();
    }
  }

  function onHandDragEnd(e) {
    document.removeEventListener('touchmove', onHandDragMove);
    if (!dragState) return;
    if (!dragState.active) {
      // Released without moving: touch preview ends and hand returns to normal.
      cancelDragState();
      return;
    }
    clearTimeout(dragState.inspectTimer);
    const t = e.changedTouches[0];
    clearDragHover();
    resetBoardZoom();
    dragState.ghostEl.style.display = 'none';
    const card = dragState.card;
    const isPowerDrop = normalisedCardType(card) === 'Power';
    const castZoneDrop = isPowerDrop && isPointInCastZone(t.clientX, t.clientY);
    const under = document.elementFromPoint(t.clientX, t.clientY);
    const tile = under?.closest('[data-id]');
    const tileId = castZoneDrop ? '__cast_zone__' : tile?.dataset.id;
    const validDrop = castZoneDrop || (tileId && (tile.classList.contains('highlight-deploy') || tile.classList.contains('highlight-ability')));
    setHandTucked(false);
    if (validDrop && isPowerDrop) {
      const ghost = dragState.ghostEl;
      const srcEl = dragState.sourceEl;
      dragState = null;
      ghost.remove();
      const confirmed = confirmDraggedPowerCard(card, tileId);
      if (srcEl) { srcEl.style.opacity = ''; srcEl.style.pointerEvents = ''; }
      if (!confirmed) { removePowerCastZone(); renderHand(); }
    } else if (validDrop) {
      dragState.ghostEl.remove();
      dragState = null;
      onTileTap(tileId);
    } else {
      const ghost = dragState.ghostEl;
      const src = dragState.card;
      dragState = null;
      const srcEl = document.querySelector(`.card[data-uid="${src.uid}"]`);
      if (srcEl) {
        const r = srcEl.getBoundingClientRect();
        ghost.style.transition = 'left 0.2s ease, top 0.2s ease, opacity 0.2s ease, transform 0.2s ease';
        ghost.style.left = r.left + 'px';
        ghost.style.top  = r.top  + 'px';
        ghost.style.transform = 'scale(1)';
        ghost.style.opacity = '0';
        // Restore source card as ghost arrives back
        setTimeout(() => {
          ghost.remove();
          if (srcEl) { srcEl.style.opacity = ''; srcEl.style.pointerEvents = ''; }
        }, 220);
      } else {
        ghost.remove();
      }
      removePowerCastZone();
      deselectAll();
    }
  }

  // ── HAND CARD TAP ──
  function onHandCardTap(card) {
    // Tap intentionally does nothing. Hand cards use hold-to-preview and drag-to-deploy.
  }

  function selectHandCard(card) {
    deselectAll();
    state.selectedHandCard=card;
    const canAfford = state.players[state.activePlayer].resources >= card.cost;
    if(canAfford && (card.type||'').trim() === 'Power') {
      const reg = POWER_REGISTRY[card.effect];
      if(reg?.subtype === 'instant') {
        // Instant — no highlighting needed, cast fires from inspector
      } else {
        highlightCentreTiles(true);
      }
    } else if(canAfford) {
      highlightDeployTiles(true);
    }
    renderHand();
  }

  function deselectAll() {
    state.selectedHandCard=null;
    state.pendingTile=null;
    state.activeAction=null;
    highlightDeployTiles(false);
    highlightCentreTiles(false);
    clearPowerHighlights();
    clearHighlights();
    clearConfirm();
    const p=state.players[state.activePlayer];
    document.getElementById('hub-res').textContent=p.resources;
    document.getElementById('hub-res-diamond').classList.remove('depleted');
    renderHand();
  }

  function highlightDeployTiles(on) {
    const zone = `.tile.deploy-p${state.activePlayer}`;
    document.querySelectorAll(zone).forEach(t=>{
      const occupied = !!state.board[t.dataset.id];
      t.classList.toggle('highlight-deploy', on && !occupied);
    });
    // Also highlight owned structures as deploy points
    if(on) {
      Object.entries(state.structures).forEach(([tid, s]) => {
        if(s.owner === state.activePlayer && !state.board[tid]) {
          const t = document.querySelector(`[data-id="${tid}"]`);
          if(t) t.classList.add('highlight-deploy');
        }
      });
    }
  }

  function highlightCentreTiles(on) {
    document.querySelectorAll('.tile.centre').forEach(t=>{
      t.classList.toggle('highlight-deploy', on);
    });
  }

  function clearPowerHighlights() {
    document.querySelectorAll('.tile.highlight-deploy,.tile.highlight-ability').forEach(t => {
      t.classList.remove('highlight-deploy','highlight-ability');
    });
    if (!state._pendingPowerDrop) removePowerCastZone();
  }

  function highlightPowerDragTargets(card) {
    const reg = POWER_REGISTRY[card?.effect];
    if (!reg) return;
    if (reg.subtype === 'instant') {
      showPowerCastZone();
    } else if (reg.subtype === 'lane_target') {
      highlightCentreTiles(true);
    } else if (reg.subtype === 'unit_target') {
      highlightPowerTargets(reg);
    } else if (reg.subtype === 'tile_target') {
      document.querySelectorAll('.tile').forEach(t => {
        const tid = t.dataset.id;
        if (reg.targetFilter && reg.targetFilter(tid)) t.classList.add('highlight-deploy');
      });
    }
  }

  function spendPowerCard(card) {
    const p = state.players[state.activePlayer];
    if (!card || p.resources < card.cost) return false;
    p.resources -= card.cost;
    beginHandRemovalGhost(card, state.activePlayer);
    p.hand = p.hand.filter(c => c.uid !== card.uid);
    p.graveyard.push({...card});
    state.selectedHandCard = null;
    return true;
  }

  function getPowerTargetForTile(card, tileId) {
    const reg = POWER_REGISTRY[card?.effect];
    if (!reg) { console.warn('Unknown power effect:', card?.effect); return null; }
    const tile = tileId === '__cast_zone__' ? document.getElementById('power-cast-zone') : document.querySelector(`[data-id="${tileId}"]`);
    if (!tile) return null;
    let target = null;
    if (reg.subtype === 'instant') {
      if (tileId !== '__cast_zone__') return null;
    } else if (reg.subtype === 'lane_target') {
      if (!tile.classList.contains('highlight-deploy')) return null;
      target = tileMap[tileId]?.lane || unitLane(tileId);
    } else if (reg.subtype === 'unit_target') {
      if (!tile.classList.contains('highlight-ability')) return null;
      target = tileId;
    } else if (reg.subtype === 'tile_target') {
      if (!tile.classList.contains('highlight-deploy')) return null;
      target = tileId;
    } else {
      return null;
    }
    return { reg, target, tileId };
  }

  function addPowerReadyOverlay(tile, card) {
    if (!tile || tile.id === 'power-cast-zone') return;
    tile.querySelector('.power-ready-overlay')?.remove();
    const overlay = document.createElement('div');
    overlay.className = 'power-ready-overlay';
    overlay.innerHTML = `<div class="power-ready-chip"><div class="power-ready-icon">✦</div><div class="power-ready-text">Cast Ready</div></div><div class="power-ready-label">${escapeHtml(cardDisplayName(card, 'Power'))}</div>`;
    tile.appendChild(overlay);
  }

  function removePowerReadyOverlays() {
    document.querySelectorAll('.power-ready-overlay').forEach(el => el.remove());
  }

  function clearPowerConfirm() {
    state._pendingPowerDrop = null;
    removePowerReadyOverlays();
    document.querySelectorAll('.power-confirm-tile').forEach(t => t.classList.remove('power-confirm-tile'));
    document.getElementById('power-cast-zone')?.classList.remove('power-confirm','drag-hover');
  }

  function cancelPendingPowerDrop() {
    clearPowerConfirm();
    clearConfirm();
    removePowerCastZone();
    document.querySelectorAll('.highlight-deploy,.highlight-ability').forEach(t => t.classList.remove('highlight-deploy','highlight-ability'));
    state.selectedHandCard = null;
    if (!state.activeUnit) setBarState('default');
    renderHand();
  }

  function confirmDraggedPowerCard(card, tileId) {
    const targetInfo = getPowerTargetForTile(card, tileId);
    if (!targetInfo) return false;
    clearConfirm();
    clearPowerConfirm();
    const tile = tileId === '__cast_zone__' ? document.getElementById('power-cast-zone') : document.querySelector(`[data-id="${tileId}"]`);
    if (tileId === '__cast_zone__') tile?.classList.add('power-confirm');
    else if (tile) {
      tile.classList.add('confirm-tile','power-confirm-tile');
      addPowerReadyOverlay(tile, card);
    }
    state.selectedHandCard = card;
    state._pendingPowerDrop = { card, ...targetInfo };
    setBarState('pending', { label:'Cast', cost:card?.cost ?? 0, action:'cast', confirm:true });
    return true;
  }

  function executeConfirmedPowerCard() {
    const pending = state._pendingPowerDrop;
    if (!pending?.card || !pending?.reg) return false;
    const { card, reg, target } = pending;
    if (!spendPowerCard(card)) return false;
    clearPowerConfirm();
    removePowerCastZone();
    clearPowerHighlights();
    clearHighlights();
    clearConfirm();
    renderHub();
    if (reg.subtype === 'instant') {
      reg.execute(card);
      powerCardDone();
    } else {
      reg.execute(card, target);
    }
    return true;
  }

  function playDraggedPowerCard(card, tileId) {
    // Deprecated direct-cast path kept as a wrapper. Dragging now prepares a Cast confirmation.
    return confirmDraggedPowerCard(card, tileId);
  }

  // ── TILE TAP ──
  function showDamageFloat(tileId, amount) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if (!tile) return;
    const r = tile.getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'dmg-float';
    fl.textContent = `−${amount}`;
    fl.style.left = (r.left + r.width/2) + 'px';
    fl.style.top  = (r.top  + r.height/2) + 'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(), 1200);
  }

  function showDiceFloat(tileId, roll, saved) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    const r = tile.getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'dice-float';
    fl.textContent = `🎲${roll}`;
    fl.style.color = saved ? '#4a78d8' : '#cc3030';
    fl.style.left = (r.right + 5) + 'px';
    fl.style.top  = (r.top + r.height/2) + 'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(), 1000);
  }

  // ── POWER CARD REGISTRY ──
  function damageUnitByPower(tileId, amount, label='Damage') {
    const unit = state.board[tileId];
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if (!unit || !tile) return false;
    unit.hp = Math.max(0, unit.hp - amount);
    showDamageFloat(tileId, amount);
    tile.classList.add('highlight-target');
    setTimeout(() => tile.classList.remove('highlight-target'), 700);
    if (unit.hp <= 0) {
      setTimeout(() => { if (state.board[tileId]) removeSlain(tileId); }, 600);
    } else {
      const hpEl = tile.querySelector('.unit-hp span');
      setTimeout(() => { if (hpEl) hpEl.textContent = unit.hp; }, 350);
    }
    showToastMsg(label);
    return true;
  }

  function healUnitByPower(tileId, amount, label='Healed') {
    const unit = state.board[tileId];
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if (!unit || !tile) return false;
    const before = unit.hp ?? 0;
    const cap = unit.maxHp ?? unit.hp ?? before;
    unit.hp = Math.min(cap, before + amount);
    const healed = Math.max(0, unit.hp - before);
    tile.classList.add('confirm-tile');
    setTimeout(() => tile.classList.remove('confirm-tile'), 700);
    const hpEl = tile.querySelector('.unit-hp span');
    if (hpEl) hpEl.textContent = unit.hp;
    showToastMsg(`${label}: +${healed} HP`);
    return true;
  }

  function saveRollAgainst(unit, ap=0) {
    const saveVal = parseInt(unit?.save) || 7;
    const modSave = Math.min(7, saveVal + ap);
    const roll = Math.floor(Math.random() * 6) + 1;
    return { roll, saved: roll >= modSave, modSave };
  }

  const POWER_REGISTRY = {

    add_resources: {
      subtype: 'instant',
      execute(card) {
        const amt = card.value ?? 2;
        state.players[state.activePlayer].resources += amt;
        showToastMsg(`+${amt} Resources`);
      }
    },

    add_resources_random: {
      subtype: 'instant',
      execute(card) {
        const [lo, hi] = Array.isArray(card.value) ? card.value : [1, card.value ?? 3];
        const roll = lo + Math.floor(Math.random() * (hi - lo + 1));
        state.players[state.activePlayer].resources += roll;
        showToastMsg(`+${roll} Resources (rolled)`);
      }
    },

    direct_damage_enemy: {
      subtype: 'unit_target',
      targetFilter: (tid) => state.board[tid]?.owner && state.board[tid].owner !== state.activePlayer,
      execute(card, tileId) {
        const dmg = card.value ?? card.weapon?.damage ?? 2;
        damageUnitByPower(tileId, dmg, `${cardDisplayName(card)}: ${dmg} damage`);
        powerCardDone();
      }
    },

    heal_friendly_unit: {
      subtype: 'unit_target',
      targetFilter: (tid) => state.board[tid]?.owner === state.activePlayer,
      execute(card, tileId) {
        const amt = card.value ?? 3;
        healUnitByPower(tileId, amt, cardDisplayName(card));
        powerCardDone();
      }
    },

    rally_friendly_unit: {
      subtype: 'unit_target',
      targetFilter: (tid) => state.board[tid]?.owner === state.activePlayer,
      execute(card, tileId) {
        const unit = state.board[tileId];
        const tile = document.querySelector(`[data-id="${tileId}"]`);
        if (!unit || !tile) { powerCardDone(); return; }
        const gain = card.value ?? 1;
        const current = unit.actionsLeft == null ? 0 : unit.actionsLeft;
        unit.actionsLeft = Math.min(2, current + gain);
        tile.classList.add('confirm-tile');
        setTimeout(() => tile.classList.remove('confirm-tile'), 700);
        renderUnit(tile, unit);
        showToastMsg(`${cardDisplayName(card)}: +${gain} action`);
        powerCardDone();
      }
    },

    fortify_friendly_unit: {
      subtype: 'unit_target',
      targetFilter: (tid) => state.board[tid]?.owner === state.activePlayer,
      execute(card, tileId) {
        const unit = state.board[tileId];
        const tile = document.querySelector(`[data-id="${tileId}"]`);
        if (!unit || !tile) { powerCardDone(); return; }
        const amt = card.value ?? 2;
        unit.maxHp = (unit.maxHp ?? unit.hp ?? 0) + amt;
        unit.hp = (unit.hp ?? 0) + amt;
        renderUnit(tile, unit);
        tile.classList.add('confirm-tile');
        setTimeout(() => tile.classList.remove('confirm-tile'), 700);
        showToastMsg(`${cardDisplayName(card)}: +${amt} HP`);
        powerCardDone();
      }
    },

    damage_enemy_lane: {
      subtype: 'lane_target',
      execute(card, lane) {
        const ap  = card.weapon?.ap ?? 0;
        const dmg = card.weapon?.damage ?? card.value ?? 1;
        const targets = Object.entries(state.board)
          .filter(([tid, unit]) => unitLane(tid) === lane && unit.owner !== state.activePlayer)
          .sort(([a],[b]) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1]));
        if (!targets.length) { showToastMsg('No enemy units in lane'); powerCardDone(); return; }
        let i = 0;
        function resolveNext() {
          if(i >= targets.length) { powerCardDone(); return; }
          const [tileId, unit] = targets[i++];
          const tile = document.querySelector(`[data-id="${tileId}"]`);
          if(!tile || !state.board[tileId]) { resolveNext(); return; }
          tile.classList.add('highlight-target');
          const result = saveRollAgainst(unit, ap);
          showDiceFloat(tileId, result.roll, result.saved);
          setTimeout(()=>{
            tile.classList.remove('highlight-target');
            if(!result.saved && state.board[tileId]) damageUnitByPower(tileId, dmg, `${cardDisplayName(card)}: ${dmg} damage`);
            setTimeout(resolveNext, 650);
          }, 800);
        }
        resolveNext();
      }
    },

    damage_lane: {
      subtype: 'lane_target',
      execute(card, lane) {
        const ap  = card.weapon?.ap ?? 0;
        const dmg = card.weapon?.damage ?? 1;
        const targets = Object.entries(state.board)
          .filter(([tid]) => unitLane(tid) === lane)
          .sort(([a],[b]) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1]));
        let i = 0;
        function resolveNext() {
          if(i >= targets.length) { powerCardDone(); return; }
          const [tileId, unit] = targets[i++];
          const tile = document.querySelector(`[data-id="${tileId}"]`);
          if(!tile || !state.board[tileId]) { resolveNext(); return; }
          tile.classList.add('highlight-target');
          const saveVal = parseInt(unit.save) || 7;
          const modSave = Math.min(7, saveVal + ap);
          const roll = Math.floor(Math.random() * 6) + 1;
          const saved = roll >= modSave;
          showDiceFloat(tileId, roll, saved);
          setTimeout(()=>{
            tile.classList.remove('highlight-target');
            if(!saved && state.board[tileId]) {
              unit.hp = Math.max(0, unit.hp - dmg);
              showDamageFloat(tileId, dmg);
              if(unit.hp <= 0) setTimeout(()=>{ if(state.board[tileId]) removeSlain(tileId); }, 600);
              else { const hpEl=tile.querySelector('.unit-hp span'); setTimeout(()=>{ if(hpEl) hpEl.textContent=unit.hp; },600); }
            }
            setTimeout(resolveNext, 900);
          }, 1000);
        }
        resolveNext();
      }
    },

    modify_lane_score: {
      subtype: 'lane_target',
      execute(card, lane) {
        const mult = card.value ?? 0.5;
        state.laneEffects[lane] = state.laneEffects[lane] || {};
        state.laneEffects[lane].scoreMult = mult;
        showToastMsg(`Lane ${lane} scoring ×${mult}`);
        renderLaneEffects();
        powerCardDone();
      }
    },

    redeploy_unit: {
      subtype: 'unit_target',
      targetFilter: (tid) => state.board[tid]?.owner === state.activePlayer,
      execute(card, tileId) {
        const unit = state.board[tileId];
        if(!unit) { powerCardDone(); return; }
        delete state.board[tileId];
        const tile = document.querySelector(`[data-id="${tileId}"]`);
        if(tile) tile.innerHTML = '';
        state._redeployUnit = {...unit};
        highlightDeployTiles(true);
        showToastMsg('Choose a deployment tile');
        state._redeployPending = true;
      }
    },

    place_structure: {
      subtype: 'tile_target',
      targetFilter: (tid) => {
        const m = tileMap[tid];
        if(!m) return false;
        if(m.zone === 'centre') return false;
        if(m.zone === 'deploy-p2' && state.activePlayer === 1) return false;
        if(m.zone === 'deploy-p1' && state.activePlayer === 2) return false;
        return !state.board[tid] && !state.structures[tid];
      },
      execute(card, tileId) {
        state.structures[tileId] = { type:'tunnel', owner:state.activePlayer, card:{...card} };
        renderStructures();
        renderHub();
        powerCardDone();
      }
    },

  };

  function renderStructures() {
    // Clear existing structure markers
    document.querySelectorAll('.structure-marker').forEach(e => e.remove());
    Object.entries(state.structures).forEach(([tileId, s]) => {
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      const el = document.createElement('div');
      el.className = 'structure-marker';
      el.style.cssText = 'position:absolute;inset:0;z-index:1;border-radius:3px;opacity:0.7;pointer-events:none;';
      const col = s.owner === 1 ? 'rgba(74,120,216,0.3)' : 'rgba(204,48,48,0.3)';
      el.style.background = col;
      el.style.border = s.owner === 1 ? '1px dashed #4a78d8' : '1px dashed #cc3030';
      if(s.card?.artId) {
        const art = artStyle(s.card, true);
        if(art) el.setAttribute('style', el.getAttribute('style') + art);
      }
      tile.appendChild(el);
    });
  }

  // Shared cleanup after power card resolves
  function powerCardDone() {
    closeProfile();
    endCurrentTurn();
    waitThenAdvance();
  }

  // ── POWER CARD DISPATCHER ──
  function castPowerCard(card) {
    const p = state.players[state.activePlayer];
    if(!card || p.resources < card.cost) return;
    const reg = POWER_REGISTRY[card.effect];
    if(!reg) { console.warn('Unknown power effect:', card.effect); return; }

    // Spend cost, remove from hand
    p.resources -= card.cost;
    p.hand = p.hand.filter(c => c.uid !== card.uid);
    p.graveyard.push({...card});
    state.selectedHandCard = null;
    highlightCentreTiles(false);
    renderHub();

    if(reg.subtype === 'instant') {
      reg.execute(card);
      powerCardDone();
    } else if(reg.subtype === 'lane_target') {
      // Centre tiles already highlighted — wait for lane tap (handled in buildBoard click handler)
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      highlightCentreTiles(true);
      // Re-add card to hand temporarily so cost isn't double-spent if cancelled
      // Actually just store it — tap will call resolveLanePower
    } else if(reg.subtype === 'tile_target') {
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      // Highlight valid tiles
      document.querySelectorAll('.tile').forEach(t => {
        const tid = t.dataset.id;
        if(reg.targetFilter && reg.targetFilter(tid)) {
          t.classList.add('highlight-deploy');
        }
      });
    } else if(reg.subtype === 'unit_target') {
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      highlightPowerTargets(reg);
    }
  }

  function resolveLanePower(lane) {
    const card = state._pendingPowerCard;
    const reg  = state._pendingPowerReg;
    if(!card || !reg) return;
    state._pendingPowerCard = null;
    state._pendingPowerReg  = null;
    highlightCentreTiles(false);
    reg.execute(card, lane);
  }

  function highlightPowerTargets(reg) {
    Object.keys(state.board).forEach(tid => {
      const passes = !reg.targetFilter || reg.targetFilter(tid);
      if(passes) {
        const t = document.querySelector(`[data-id="${tid}"]`);
        if(t) t.classList.add('highlight-ability');
      }
    });
  }

  // Legacy wrapper — keep centre tile tap working
  function executePowerCard(lane) {
    if(state._pendingPowerCard) { resolveLanePower(lane); return; }
    // Fallback for old-style cards without effect field
    const card = state.selectedHandCard;
    if(!card || (card.type||'').trim() !== 'Power') return;
    castPowerCard(card);
  }

  function laneEffectTriggerLabel(trigger) {
    const TRIGGER_LABELS = {
      passive:'Passive', round_start:'Round Start', on_deploy:'On Deploy',
      on_slain:'On Slain', on_attack:'On Attack', on_roll_6:'On Roll of 6', on_reveal:'On Reveal'
    };
    return TRIGGER_LABELS[trigger] || trigger || 'Lane Effect';
  }

  function laneEffectCardForZoom(lane) {
    const fx = state.laneEffects?.[lane];
    if (!fx) {
      return {
        id:`lane_${lane}_no_effect`, artId:`lane_${lane}_no_effect`, type:'Power', faction:'universal',
        displayName:`Lane ${lane}: No Effect`, name:`Lane ${lane}: No Effect`, cost:'', effect:'lane_effect', value:'',
        special:'No Effect: No lane effect in play.'
      };
    }
    if (!fx.revealed) {
      return {
        id:`lane_${lane}_unknown_effect`, artId:`lane_${lane}_unknown_effect`, type:'Power', faction:'universal',
        displayName:`Lane ${lane}: Unknown Effect`, name:`Lane ${lane}: Unknown Effect`, cost:'', effect:'lane_effect', value:'',
        special:'Hidden: Reveals before Round 1 scoring.'
      };
    }
    const triggerLabel = laneEffectTriggerLabel(fx.trigger);
    return {
      id: fx.id || `lane_${lane}_${cardSlug(fx.name || 'effect')}`,
      artId: fx.artId || fx.id || `lane_${lane}_${cardSlug(fx.name || 'effect')}`,
      type:'Power',
      faction:'universal',
      displayName: fx.name || `Lane ${lane} Effect`,
      name: fx.name || `Lane ${lane} Effect`,
      cost:'',
      effect:'lane_effect',
      value: fx.value ?? '',
      special:`${triggerLabel}: ${fx.description || 'No rules text.'}`,
      flavour: `Lane ${lane}`,
      isLaneEffect:true
    };
  }

  function showLaneEffectOverlay(lane, tile) {
    document.querySelectorAll('.lane-effect-overlay').forEach(e=>e.remove());
    openCardZoom(laneEffectCardForZoom(lane));
    const artEl = document.getElementById('czoom-art');
    if (artEl) artEl.classList.add('lane-effect-zoom');
  }


  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
  }

  function zoomAttackProfileHtml(card) {
    const w = card.weapon || {};
    if (!w || (!w.name && w.range == null && w.attacks == null)) return '';
    const apVal = w.ap == null ? '' : `−${w.ap}`;
    return `<div class="card-zoom-attack-pill">
      <div class="card-zoom-weapon-icon">⚔</div>
      <div class="card-zoom-statpair"><span class="cz-icon">↔</span><span class="cz-val">${escapeHtml(displayRange(w.range))}</span></div>
      <div class="card-zoom-statpair"><span class="cz-icon">🎲</span><span class="cz-val">${escapeHtml(w.attacks ?? '')}</span></div>
      <div class="card-zoom-statpair"><span class="cz-icon">🎯</span><span class="cz-val">${escapeHtml(w.hit ?? '')}</span></div>
      <div class="card-zoom-statpair"><span class="cz-icon">🛡</span><span class="cz-val">${escapeHtml(apVal)}</span></div>

    };
    artCandidates(card.artId).forEach(src => {

  function setupZoomTilt(artEl) {
    if (!artEl) return;
    const maxY = 8;
    const maxX = 5;

    const setTilt = (clientX, clientY) => {
      const r = artEl.getBoundingClientRect();
      if (!r.width || !r.height) return;
      const nx = Math.max(-1, Math.min(1, ((clientX - r.left) / r.width - 0.5) * 2));
      const ny = Math.max(-1, Math.min(1, ((clientY - r.top) / r.height - 0.5) * 2));
      const rotateY = nx * maxY;
      const rotateX = -ny * maxX;
      const shineX = 50 + nx * 28;
      const shineY = 38 + ny * 24;
      artEl.classList.add('tilting');
      artEl.style.setProperty('--shine-x', `${shineX}%`);
      artEl.style.setProperty('--shine-y', `${shineY}%`);
      artEl.style.transform = `perspective(720px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) scale(1.018)`;
    };

    const resetTilt = () => {
      artEl.classList.remove('tilting');
      artEl.style.transform = 'perspective(720px) rotateX(0deg) rotateY(0deg) scale(1)';
      artEl.style.setProperty('--shine-x', '50%');
      artEl.style.setProperty('--shine-y', '35%');
    };

    artEl.addEventListener('pointerdown', e => {
      if (e.target.closest('.card-zoom-close-btn')) return;
      artEl.setPointerCapture?.(e.pointerId);
      setTilt(e.clientX, e.clientY);
    });
    artEl.addEventListener('pointermove', e => {
      if (e.pointerType === 'mouse' || e.buttons) setTilt(e.clientX, e.clientY);
    });
    artEl.addEventListener('pointerup', resetTilt);
    artEl.addEventListener('pointercancel', resetTilt);
    artEl.addEventListener('pointerleave', e => { if (e.pointerType === 'mouse') resetTilt(); });
  }

  function bindCardZoomSwipe(overlay, card) {
    if (!overlay || !card) return;
    let startX = 0, startY = 0, tracking = false;
    const start = e => {
      const t = e.touches?.[0];
      if (!t) return;
      startX = t.clientX; startY = t.clientY; tracking = true;
    };
    const end = e => {
      if (!tracking) return;
      tracking = false;
      const t = e.changedTouches?.[0];
      if (!t) return;
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      if (Math.abs(dx) < 45 || Math.abs(dx) < Math.abs(dy) * 1.2) return;
      const seq = zoomSequenceForCard(card);
      if (seq.length < 2) return;
      const idx = seq.findIndex(c => c.uid && c.uid === card.uid);
      if (idx === -1) return;
      const nextIdx = dx < 0 ? (idx + 1) % seq.length : (idx - 1 + seq.length) % seq.length;
      e.preventDefault?.();
      openCardZoom(seq[nextIdx]);
    };
    overlay.addEventListener('touchstart', start, { passive:true });
    overlay.addEventListener('touchend', end, { passive:false });
  }

  // ── BOARD TILE LONG PRESS ──
  let _tileTouchTimer = null;
  let _tileTouchMoved = false;

  function onBoardTileTouchStart(e, tileId) {
    if (e.touches.length > 1) return;
    if (!state.board[tileId]) return;
    const t = e.touches[0];
    const startX = t.clientX, startY = t.clientY;
    _tileTouchMoved = false;
    const el = document.querySelector(`[data-id="${tileId}"]`);
    if (el) { el.classList.remove('touch-pulse'); void el.offsetWidth; el.classList.add('touch-pulse'); }
    const onMove = e2 => {
      const t2 = e2.touches[0];
      if (Math.hypot(t2.clientX - startX, t2.clientY - startY) > 8) {
        _tileTouchMoved = true;
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
      }
    };
    const onEnd = () => {
      document.removeEventListener('touchmove', onMove);
    };
    document.addEventListener('touchmove', onMove, {passive:true});
    document.addEventListener('touchend', onEnd, {once:true});
  }

  function onTileTap(tileId) {
    if (state._suppressNextMoveTap) {
      state._suppressNextMoveTap = false;
      return;
    }
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) {
      // Tap on empty board space — cancel pending
      if(state.pendingTile) cancelPendingDeploy();
      else if(state._pendingPowerDrop) cancelPendingPowerDrop();
      else if(state._ctaAction==='activate') onHubCancel();
      return;
    }

    // Tapping somewhere else on the board cancels pending unit deploy / power cast confirmation.
    if (state.pendingTile && tileId !== state.pendingTile) {
      cancelPendingDeploy();
      return;
    }
    if (state._pendingPowerDrop && tileId !== state._pendingPowerDrop.tileId) {
      cancelPendingPowerDrop();
      return;
    }

    // Inspector deploy mode — Deploy button was pressed, tile tap now confirms placement immediately
    if (state.deployModeFromInspector && state._ctaAction === 'deploy' && state.selectedHandCard && tile.classList.contains('highlight-deploy')) {
      executeDeployTo(tileId);
      return;
    }

    // Tile-target power card — highlighted tile resolves the effect
    if(state._pendingPowerCard && state._pendingPowerReg?.subtype === 'tile_target') {
      if(tile.classList.contains('highlight-deploy')) {
        const card = state._pendingPowerCard;
        const reg  = state._pendingPowerReg;
        state._pendingPowerCard = null;
        state._pendingPowerReg  = null;
        document.querySelectorAll('.tile.highlight-deploy').forEach(t => t.classList.remove('highlight-deploy'));
        reg.execute(card, tileId);
      }
      return;
    }

    // Ability targeting mode — tapping a highlighted tile/unit resolves or confirms the ability
    if (state.activeAction==='ability') {
      const ability = getUnitAbility(state.activeUnit?.card);
      if (isMoveThenFightAbility(ability)) {
        if (state.chargeState?.phase === 'destination' && tile.classList.contains('highlight-move')) {
          executeChargeTo(tileId);
          return;
        }
        if (tile.classList.contains('highlight-ability')) {
          beginChargeDestinationSelection(tileId);
          return;
        }
      }
      if (tile.classList.contains('highlight-ability')) {
        const isJumpLane = ability?.key === 'jump_lane' || ability?.target?.location === 'opposite_lane_same_row';
        if (isJumpLane) {
          if (pendingJumpTile === tileId) { clearJumpConfirm(); return; }
          clearJumpConfirm();
          pendingJumpTile = tileId;
          showJumpConfirm(tileId);
          return;
        }
        resolveAbility(tileId);
        return;
      }
    }

    // Attack mode — enemy highlighted tile triggers battle
    if(state.activeAction==='attack' && tile.classList.contains('highlight-attack')) {
      const enemy=state.activePlayer===1?2:1;
      if(state.board[tileId]?.owner===enemy) openBattleOverlay(tileId);
      return;
    }

    // Tapping a tile with a unit — select and show inspector + activate CTA
    if(state.board[tileId]){
      const unit = state.board[tileId];
      const lane = unitLane(tileId);
      if(lane) snapToLane(lane);
      const isOwn = unit.owner === state.activePlayer;
      const p = state.players[state.activePlayer];
      if (!isOwn) {
        // Enemy unit — straight to zoom modal
        openCardZoom(unit);
        return;
      }
      const canActivate = isOwn && unit.actionsLeft === null && p.resources >= 1 && !state.activeUnit;
      if (canActivate) {
        openProfile(unit, 'board', tileId);
        setBarState('pending', { label:'Activate', cost:1, action:'activate' });
      } else {
        openProfile(unit, 'board', tileId);
      }
      return;
    }

    // Deployed structures / ongoing power cards can be zoomed from their tile.
    if (state.structures?.[tileId]?.card) {
      openCardZoom(state.structures[tileId].card);
      return;
    }

    // Move mode — tapping a valid highlighted tile
    if(state.activeAction==='move' && tile.classList.contains('highlight-move')) {
      if(pendingMoveTile===tileId){ clearMoveConfirm(); return; }
      clearMoveConfirm(); pendingMoveTile=tileId; showMoveConfirm(tileId);
      return;
    }

    // Tapping empty non-relevant tile while action is active — clear action
    if(state.activeAction){ state.activeAction=null; clearHighlights(); return; }

    // Deploy flow — blocked for Power cards
    if(!state.selectedHandCard && profileContext==='hand' && profileCard && tile.classList.contains('highlight-deploy') && (profileCard.type||'').trim() !== 'Power'){
      selectHandCard(profileCard);
    }
    if(state.selectedHandCard && (state.selectedHandCard.type||'').trim() !== 'Power' && tile.classList.contains('highlight-deploy')){
      if(state.pendingTile===tileId){ clearConfirm(); state.pendingTile=null; return; }
      clearConfirm(); state.pendingTile=tileId; showConfirm(tileId);
    }
  }

  // ── EXECUTE MOVE ──
  function executeMove(toTileId, options={}) {
    if (state._moveExecuting) return;
    if (!state.activeUnit?.tileId || !state.activeUnit?.card) return;
    const fromTileId = state.activeUnit.tileId;
    const unit = state.activeUnit.card;
    if (!state.board[fromTileId] || state.board[toTileId]) return;

    if (!options.skipBreakaway) {
      const contester = getBreakawayContester(fromTileId, unit);
      if (contester?.tileId) {
        openBreakawayOverlay(fromTileId, toTileId, contester.tileId);
        return;
      }
    }

    performMove(toTileId, options);
  }

  function showConfirm(tileId) {
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    tile.classList.add('confirm-tile');
    // Keep hand visible during pending deploy (only if inspector not open)
    if (!document.getElementById('inspector-card-view').classList.contains('active')) {
      document.getElementById('inspector-deck').style.display = '';
    }
    // Show card preview on tile
    const card = state.selectedHandCard;
    if (card) {
      const col = state.players[state.activePlayer].color;
      const preview = document.createElement('div');
      preview.className = `unit-on-tile ${col}-unit pending-deploy-preview`;
      preview.style.cssText = 'opacity:0.7;';
      preview.innerHTML = `<div class="unit-name-on-tile" style="font-size:var(--fs-xs);line-height:1.2;text-align:center;padding:2px;">${cardDisplayName(card)}</div>`;
      tile.appendChild(preview);
    }
    const cost = card?.cost ?? 0;
    setBarState('pending', { label:'Deploy', cost, action:'deploy' });
  }

  function clearConfirm() {
    document.querySelectorAll('.confirm-tile').forEach(t=>t.classList.remove('confirm-tile'));
    document.querySelectorAll('.power-confirm-tile').forEach(t=>t.classList.remove('power-confirm-tile'));

  function cancelPendingDeploy() {
    const tileId = state.pendingTile;
    clearConfirm();
    state.pendingTile = null;
    state.deployModeFromInspector = false;
    // Restore card to hand
    deselectAll();

  function executeDeployTo(tileId) {
    const card=state.selectedHandCard;
    const p=state.players[state.activePlayer];
    if(!card || p.resources<card.cost) return;

    // Spend resources, remove from hand, place on board
    p.resources-=card.cost;
    beginHandRemovalGhost(card, state.activePlayer);
    p.hand=p.hand.filter(c=>c.uid!==card.uid);
    state.board[tileId]={...card, owner:state.activePlayer, actionsLeft:null};

    const tile=document.querySelector(`[data-id="${tileId}"]`);
    tile.classList.remove('confirm-tile','highlight-deploy');
    renderUnit(tile, state.board[tileId]);

    state.deployModeFromInspector = false;
    closeProfile();
    deselectAll();
    renderHub();
    endCurrentTurn();
    waitThenAdvance();
  }

  function openProfile(card, context, tileId=null, opts={}) {
    profileCard=card; profileContext=context; profileTileId=tileId;

    // Gold selection is only for the currently selected friendly board unit.
    if (context === 'board' && tileId && state.board[tileId]?.owner === state.activePlayer) {

    // Show unit info in bottom bar — hidden, badges used instead

  // ── RENDER UNIT ON TILE ──
  function renderUnit(tile, unit) {
    tile.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e=>e.remove());
    const el = document.createElement('div');
    const ownerCol = unit.owner === 1 ? 'p1' : 'p2';
    const spent     = unit.actionsLeft === 0;
    const activated = unit.actionsLeft !== null && unit.actionsLeft > 0;
    const isOwn     = unit.owner === state.activePlayer;
    const selectable = isOwn && !activated && !spent;
    el.className = `unit-on-tile ${ownerCol}-unit${spent?' exhausted':''}${selectable?' unit-selectable':''}`;

    let bottomHtml = '';
    if (activated) {
      // Active — lightning pips showing remaining actions
      let pipsHtml = '';
      for (let i = 0; i < 2; i++) {
        const used = i >= unit.actionsLeft;
        pipsHtml += `<span class="unit-pip${used?' pip-used':''}">✦</span>`;
      }
      bottomHtml = `<div class="unit-actions">${pipsHtml}</div>`;
    } else if (spent) {
      // Exhausted — dim rune
      bottomHtml = `<div class="unit-rune unit-rune-spent"></div>`;
    } else {
      // Unactivated — bright rune
      bottomHtml = `<div class="unit-rune"></div>`;
    }

    el.innerHTML = `
      <div class="unit-hp ${unit.owner===1?'p1-hp':unit.owner===2?'p2-hp':''}"><span>${unit.hp}</span></div>
      <div class="unit-name">${cardDisplayName(unit)}</div>
      ${bottomHtml}`;
    if (unit.artId) {
      el.setAttribute('style', artStyle(unit));
      const tryHide = (src) => { const p = new Image(); p.onload = () => { const n = el.querySelector('.unit-name'); if (n) n.style.display = 'none'; }; p.src = src; };
      artCandidates(unit.artId).forEach(tryHide);
    }
    tile.appendChild(el);
  }

  function getDrawAvailability(player = state.activePlayer) {
    const p = state.players[player];
    if (!p) return { can: false, label: 'Draw', sub: '', cost: null, reason: 'No Player' };
    if (p.hand.length >= MAX_HAND) return { can: false, label: 'Hand Full', sub: '', cost: null, reason: 'Hand Full' };
    if (p.resources < 1) return { can: false, label: 'Draw', sub: 'No Resources', cost: 1, reason: 'No Resources' };
    if (p.deck.length <= 0) return { can: false, label: 'Draw', sub: 'Deck Empty', cost: 1, reason: 'Deck Empty' };
    return { can: true, label: 'Draw', sub: '(Hold)', cost: 1, reason: '' };
  }

  function clearDrawHold() {

    drawHoldTimer = null;
    drawHoldPointerId = null;
    const btn = document.getElementById('hub-btn');

  function startDrawHold(e) {

    clearDrawHold();
    drawHoldPointerId = e.pointerId;
    try { btn.setPointerCapture?.(e.pointerId); } catch(err) {}
    btn.style.setProperty('--draw-hold-ms', `${DRAW_HOLD_MS}ms`);

    btn.classList.remove('hold-drawing');

    btn.classList.add('hold-drawing');

      btn.classList.add('hold-complete');

      drawHoldPointerId = null;
      drawAction();

  // ── DRAW ACTION ──
  function drawAction() {
    const player = state.activePlayer;
    const p = state.players[player];
    if (state._drawRevealActive) return;
    if(p.resources < 1 || p.deck.length === 0 || p.hand.length >= MAX_HAND) return;
    p.resources -= 1;
    const card = p.deck.shift();
    if (!card) { renderHub(); return; }
    if(card) card.type = (card.type||'').trim();
    state._drawRevealActive = true;
    clearDrawHold();
    renderHub();
    showDrawCardReveal(card, player, () => {
      const stillPlayer = state.players[player];
      if (stillPlayer) stillPlayer.hand.push(card);
      state._drawRevealActive = false;
      renderHub();
      setTimeout(()=>{
        endCurrentTurn();
        waitThenAdvance();
      }, 180);
    });
  }
  let tileMap = {};
  function buildTileMap() {
    tileMap = {};
    document.querySelectorAll('.tile').forEach(t=>{
      tileMap[t.dataset.id]={ lane:t.dataset.lane, row:parseInt(t.dataset.row), col:parseInt(t.dataset.col), zone:t.dataset.zone };
    });
  }

  function getNeighbors(tileId, throughCentre=false) {
    const t=tileMap[tileId]; if(!t) return [];
    const {lane,row,col}=t;
    const rc=LANE_ROWS[row].count;
    const result=[];
    // Same row
    if(col>0)        result.push(`${lane}-${row}-${col-1}`);
    if(col<rc-1)     result.push(`${lane}-${row}-${col+1}`);
    // Adjacent rows
    for(const dr of[-1,1]){
      const nr=row+dr;
      if(nr<0||nr>=LANE_ROWS.length) continue;
      const nc=LANE_ROWS[nr].count;
      const fx=col+0.5-rc/2;
      for(let tc=0;tc<nc;tc++){
        if(Math.abs(fx-(tc+0.5-nc/2))<1.0) result.push(`${lane}-${nr}-${tc}`);
      }
    }
    return result.filter(id=>{
      const td=tileMap[id]; if(!td) return false;
      return throughCentre || td.zone!=='centre';
    });
  }

  function getReachableTiles(tileId, steps) {
    if (steps === -1) return [];
    const dist=new Map([[tileId,0]]); const queue=[tileId];
    while(queue.length){
      const cur=queue.shift(); const d=dist.get(cur);
      if(d>=steps) continue;
      for(const nid of getNeighbors(cur,false)){
        if(dist.has(nid)||state.board[nid]) continue;
        dist.set(nid,d+1); queue.push(nid);
      }
    }
    dist.delete(tileId); return [...dist.keys()];
  }

  function artCandidates(id) {
    if (!id) return [];
    return [
      `art/${id}.png`, `art/${id}.jpg`, `art/${id}.jpeg`,
      `art/${id}.PNG`, `art/${id}.JPG`, `art/${id}.JPEG`
    ];
  }

  function artStyle(card, overlay) {
    const id = card?.artId;
    if (!id) return '';
    const dim = overlay ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.25)';
    const urls = artCandidates(id).map(src => `url('${src}')`).join(', ');
    const layers = `linear-gradient(${dim},${dim}), ${urls}`;
    const sizes = ['cover', ...artCandidates(id).map(() => 'cover')].join(', ');
    const positions = ['center', ...artCandidates(id).map(() => 'center')].join(', ');
    return `background-image:${layers};background-size:${sizes};background-position:${positions};background-repeat:no-repeat;`;
  }

  function parseRange(r) {
    if (typeof r === 'string' && r.includes('-')) {
      const [a,b] = r.split('-').map(Number);
      return { min:a, max:b };
    }
    if (r === 0) return { min:0, max:Infinity };
    return { min:0, max:r };
  }

  function displayRange(r) {
    if (r == null) return '';
    if (typeof r === 'string') return r;
    if (r === 0) return '∞';
    if (r === 1) return '—';
    return String(r);
  }

  function getAttackTiles(tileId, range) {
    const { min, max } = parseRange(range);
    const bfsMax = max === Infinity ? 99 : max;
    const dist = new Map([[tileId,0]]); const queue=[tileId];
    while(queue.length){
      const cur=queue.shift(); const d=dist.get(cur);
      if(d>=bfsMax) continue;
      for(const nid of getNeighbors(cur,true)){
        if(dist.has(nid)) continue;
        dist.set(nid,d+1); queue.push(nid);
      }
    }
    dist.delete(tileId);
    return [...dist.keys()].filter(id=>tileMap[id]?.zone!=='centre' && dist.get(id)>=min);
  }


  function getAdjacentEnemyTiles(tileId, owner) {
    if (!tileId || owner == null) return [];
    return getNeighbors(tileId, false).filter(id => {
      const unit = state.board[id];
      return unit && unit.owner !== owner;
    });
  }

  function getBreakawayContester(tileId, unit) {
    if (!tileId || !unit) return null;
    const enemies = getAdjacentEnemyTiles(tileId, unit.owner ?? state.activePlayer);
    if (!enemies.length) return null;
    enemies.sort((a,b) => {
      const ahp = Number(state.board[a]?.hp) || 0;
      const bhp = Number(state.board[b]?.hp) || 0;
      if (bhp !== ahp) return bhp - ahp;
      return String(a).localeCompare(String(b));
    });
    const tileIdWinner = enemies[0];
    return { tileId: tileIdWinner, unit: state.board[tileIdWinner] };
  }

  function isBreakawayMove(fromTileId, toTileId, unit=null) {
    const mover = unit || state.activeUnit?.card;
    if (!fromTileId || !toTileId || !mover) return false;
    return !!getBreakawayContester(fromTileId, mover);
  }

  function addBreakawayWarning(tile) {
    if (!tile || tile.querySelector('.breakaway-warn')) return;
    const warn = document.createElement('div');
    warn.className = 'breakaway-warn';
    warn.textContent = '!';
    tile.appendChild(warn);
  }

  function highlightMoveTilesForActiveUnit() {
    const unit = state.activeUnit?.card;
    const tid = state.activeUnit?.tileId;
    if (!unit || !tid) return;
    const contester = getBreakawayContester(tid, unit);
    if (contester?.tileId) {
      document.querySelector(`[data-id="${contester.tileId}"]`)?.classList.add('highlight-breakaway-source');
    }
    getReachableTiles(tid, unit.move).forEach(id => {
      const mt = document.querySelector(`[data-id="${id}"]`);
      if (!mt) return;
      mt.classList.add('highlight-move');
      if (contester) {
        mt.classList.add('highlight-breakaway');
        addBreakawayWarning(mt);
      }
      // Long press on move tile = auto-confirm move. Bound once per tile to avoid stacked listeners.
      if (mt.dataset.moveHoldBound !== '1') {
        mt.dataset.moveHoldBound = '1';
        let _mvTimer = null;
        let _mvFired = false;
        mt.addEventListener('touchstart', e=>{
          if(e.touches.length>1) return;
          _mvFired = false;
          const targetId = mt.dataset.id;
          clearTimeout(_mvTimer);
          _mvTimer = setTimeout(()=>{
            if(mt.classList.contains('highlight-move') && state.activeAction === 'move' && !state._moveExecuting){
              _mvFired = true;
              state._suppressNextMoveTap = true;
              mt.querySelectorAll('.move-longpress-tick').forEach(el=>el.remove());
              const tick = document.createElement('div');
              tick.className = 'move-longpress-tick';
              tick.textContent = mt.classList.contains('highlight-breakaway') ? '!' : '✓';
              mt.appendChild(tick);
              setTimeout(()=> executeMove(targetId), 120);
            }
          }, 260);
        }, {passive:true});
        mt.addEventListener('touchend', ()=>{
          clearTimeout(_mvTimer);
          if (_mvFired) setTimeout(()=>{ state._suppressNextMoveTap = false; }, 220);
        }, {passive:true});
        mt.addEventListener('touchcancel', ()=>clearTimeout(_mvTimer), {passive:true});
        mt.addEventListener('touchmove', ()=>clearTimeout(_mvTimer), {passive:true});
      }
    });
  }

  function breakawayContestResult(moverDie, enemyDie, moverHp, enemyHp) {
    const moverTotal = moverDie + moverHp;
    const enemyTotal = enemyDie + enemyHp;
    let success;
    let reason = '';
    if (moverDie === 1) {
      success = false;
      reason = 'Natural 1 — failed';
    } else if (moverDie === 6) {
      success = true;
      reason = 'Natural 6 — escaped';
    } else if (enemyDie === 1) {
      success = true;
      reason = 'Enemy natural 1 — escaped';
    } else if (enemyDie === 6) {
      success = false;
      reason = 'Enemy natural 6 — caught';
    } else {
      success = moverTotal > enemyTotal;
      reason = success ? 'Escaped' : (moverTotal === enemyTotal ? 'Tie — caught' : 'Caught');
    }
    return { success, moverTotal, enemyTotal, reason };
  }

  function reactionDiceSummaryHtml(result) {
    const atkDice = result.atkDice || [];

    const atkRow = atkDice.map(d => `<span class="die ${d >= result.hitThresh ? 'die-hit die-hit-active' : 'die-miss'}">${escapeHtml(d)}</span>`).join('');

      ? '<span class="breakaway-mini-note">No saves</span>'
      : saveDice.map(d => `<span class="die ${d >= result.modSave ? 'die-saved' : 'die-failed'}">${escapeHtml(d)}</span>`).join('');

      <div class="breakaway-mini-row"><strong>Defence</strong><div class="breakaway-dice-line">${saveRow}</div></div>
      <div class="breakaway-result-copy">${escapeHtml(result.hits || 0)} hit${(result.hits || 0) === 1 ? '' : 's'} · ${escapeHtml(result.saved || 0)} saved · ${escapeHtml(unsaved)} unsaved · ${escapeHtml(result.totalDmg || 0)} damage</div>
    </div>`;
  }

  function performMove(toTileId, options={}) {
    if (state._moveExecuting) return;
    if (!state.activeUnit?.tileId || !state.activeUnit?.card) return;
    const fromTileId = state.activeUnit.tileId;
    const unit = state.activeUnit.card;
    if (!state.board[fromTileId] || state.board[toTileId]) return;
    state._moveExecuting = true;
    clearMoveConfirm();

    state.board[toTileId] = unit;
    delete state.board[fromTileId];

    const fromTile = document.querySelector(`[data-id="${fromTileId}"]`);
    fromTile?.classList.remove('unit-active');
    fromTile?.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e=>e.remove());
    const toTile = document.querySelector(`[data-id="${toTileId}"]`);
    if (toTile) {
      renderUnit(toTile, unit);
      toTile.classList.add('unit-active');
    }

    state.activeUnit.tileId = toTileId;
    profileTileId = toTileId;
    unit.actionsLeft = Math.max(0, (unit.actionsLeft ?? 1) - 1);
    const updatedTile = document.querySelector(`[data-id="${toTileId}"]`);
    if(updatedTile) renderUnit(updatedTile, unit);
    clearHighlights();
    setTimeout(() => { state._moveExecuting = false; }, 250);

    if(unit.actionsLeft > 0) {
      state.activeAction = 'move';
      highlightMoveTilesForActiveUnit();
      refreshActionButtons();
      renderHub();
      updateActionBar();
    } else {
      closeProfile();
      endCurrentTurn();
      waitThenAdvance();
    }
  }

  function openBreakawayOverlay(fromTileId, toTileId, contesterTileId) {
    const mover = state.board[fromTileId] || state.activeUnit?.card;
    const enemy = state.board[contesterTileId];
    if (!mover || !enemy) return performMove(toTileId, { skipBreakaway:true });
    clearMoveConfirm();

    const moverHp = Math.max(0, Number(mover.hp) || 0);
    const enemyHp = Math.max(0, Number(enemy.hp) || 0);

    const ov = document.createElement('div');
    ov.className = 'battle-overlay breakaway-overlay breakaway-quick-overlay';
    ov.innerHTML = `
      <div class="battle-shell breakaway-shell breakaway-quick-shell" onclick="event.stopPropagation()">
        <div class="battle-header">
          <div>
            <div class="battle-heading">Break Away</div>
            <div class="breakaway-stage-subtitle" id="breakaway-stage-subtitle">Choose whether to risk the escape</div>
          </div>
          <div class="battle-close" id="breakaway-close">✕</div>
        </div>

        <div class="breakaway-quick-cards">
          <div class="breakaway-mini-card p${escapeHtml(mover.owner || '')}">
            <div class="breakaway-mini-role">Escaping</div>
            <div class="breakaway-mini-name">${cardDisplayName(mover)}</div>
            <div class="breakaway-mini-hp">${escapeHtml(moverHp)} HP</div>
          </div>

            <div class="breakaway-mini-name">${cardDisplayName(enemy)}</div>

          </div>
        </div>

        </div>

        <div class="breakaway-stage-panel" id="breakaway-stage-panel">
          <div class="breakaway-stage-title">Break Away Contest</div>
          <div class="breakaway-pre-roll-grid">
            <div class="breakaway-pre-roll-side">
              <div class="breakaway-roll-label">${cardDisplayName(mover)}</div>
              <div class="breakaway-pre-equation"><span class="breakaway-hp">${escapeHtml(moverHp)} HP</span><span class="breakaway-plus">+</span><span class="die die-ghost">?</span></div>
            </div>
            <div class="breakaway-pre-roll-side">
              <div class="breakaway-roll-label">${cardDisplayName(enemy)}</div>
              <div class="breakaway-pre-equation"><span class="breakaway-hp">${escapeHtml(enemyHp)} HP</span><span class="breakaway-plus">+</span><span class="die die-ghost">?</span></div>
            </div>
          </div>
        </div>

        <div class="battle-row-cta" id="breakaway-cta">
          <button class="battle-attack-btn breakaway-roll-btn" id="breakaway-roll-btn"><span class="battle-action-star">✦</span> Attempt Break Away</button>
        </div>
      </div>`;
    document.body.appendChild(ov);
    requestAnimationFrame(() => ov.classList.add('show'));

    const close = () => { ov.remove(); state.breakawayState = null; };
    ov.addEventListener('click', e => { if (e.target === ov) close(); });
    ov.querySelector('#breakaway-close')?.addEventListener('click', close);

    state.breakawayState = { fromTileId, toTileId, contesterTileId };
    const stageSubtitle = ov.querySelector('#breakaway-stage-subtitle');
    const stagePanel = ov.querySelector('#breakaway-stage-panel');
    const cta = ov.querySelector('#breakaway-cta');
    const rollBtn = ov.querySelector('#breakaway-roll-btn');
    let rolled = false;
    let reactionResolved = false;

    const finishDestroyed = () => {
      ov.remove();
      state.breakawayState = null;
      removeSlain(fromTileId);
      closeProfile();
      hideActionBar();
      state.activeUnit = null;
      state.activeAction = null;
      clearHighlights();
      waitThenAdvance();
    };

    const finishMove = () => {
      ov.remove();
      state.breakawayState = null;
      performMove(toTileId, { skipBreakaway:true });
    };

    const showReactionStage = () => {
      if (reactionResolved) return;
      reactionResolved = true;
      if (stageSubtitle) stageSubtitle.textContent = 'Caught — resolve the reaction attack';
      stagePanel.innerHTML = `
        <div class="breakaway-stage-title danger">Reaction Attack</div>
        <div class="breakaway-result-copy">
          ${cardDisplayName(enemy)} catches ${cardDisplayName(mover)} as it breaks away.
        </div>
        <div class="breakaway-reaction-loading">Rolling reaction attack…</div>
      `;
      cta.innerHTML = '';

      setTimeout(() => {
        const result = resolveCombat(enemy, mover, unitLane(fromTileId));
        const hpBefore = Number(mover.hp) || 0;
        const hpAfter = Math.max(0, hpBefore - (Number(result.totalDmg) || 0));
        const slain = hpAfter <= 0;

        stagePanel.innerHTML = `
          <div class="breakaway-stage-title danger">Reaction Attack</div>
          ${reactionDiceSummaryHtml(result)}
          <div class="breakaway-survival-line ${slain ? 'bad' : 'good'}">
            ${slain
              ? `${cardDisplayName(mover)} is destroyed before moving.`
              : `${cardDisplayName(mover)} survives on ${escapeHtml(hpAfter)} HP and completes the move.`}
          </div>
        `;
        cta.innerHTML = `<button class="battle-done-btn" id="breakaway-resolve">${slain ? 'Destroyed' : 'Resolve Move'} ▶</button>`;
        ov.querySelector('#breakaway-resolve')?.addEventListener('click', () => {
          if (slain) {
            finishDestroyed();
            return;
          }
          mover.hp = hpAfter;
          const srcTile = document.querySelector(`[data-id="${fromTileId}"]`);
          if (srcTile) renderUnit(srcTile, mover);
          finishMove();
        });
      }, 420);
    };

    const runContest = () => {
      if (rolled) return;
      rolled = true;
      rollBtn?.classList.remove('counting');
      if (rollBtn) {
        rollBtn.disabled = true;
        rollBtn.innerHTML = '<span class="battle-action-star">✦</span> Rolling…';
      }

      const moverDie = Math.ceil(Math.random() * 6);
      const enemyDie = Math.ceil(Math.random() * 6);
      const contest = breakawayContestResult(moverDie, enemyDie, moverHp, enemyHp);
      const goodClass = contest.success ? 'good' : 'bad';

      setTimeout(() => {
        if (stageSubtitle) stageSubtitle.textContent = contest.success ? 'Escaped cleanly' : 'Caught during the escape';
        stagePanel.innerHTML = `
          <div class="breakaway-stage-title">Break Away Contest</div>
          <div class="breakaway-roll-grid compact">
            ${breakawayDiceHtml(cardDisplayName(mover), moverDie, moverHp, contest.moverTotal, contest.success ? 'die-saved' : 'die-failed')}
            ${breakawayDiceHtml(cardDisplayName(enemy), enemyDie, enemyHp, contest.enemyTotal, contest.success ? 'die-failed' : 'die-hit die-hit-active')}
          </div>
          <div class="breakaway-result-title ${goodClass}">${escapeHtml(contest.reason)}</div>
        `;

        if (contest.success) {
          cta.innerHTML = '<button class="battle-done-btn" id="breakaway-resolve">Move ▶</button>';
          ov.querySelector('#breakaway-resolve')?.addEventListener('click', finishMove);
          return;
        }

        cta.innerHTML = '<button class="battle-attack-btn breakaway-roll-btn" id="breakaway-reaction-btn"><span class="battle-action-star">✦</span> Reaction Attack</button>';
        const reactionBtn = ov.querySelector('#breakaway-reaction-btn');
        reactionBtn?.addEventListener('click', showReactionStage);
      }, 360);
    };

    rollBtn?.addEventListener('click', runContest);
  }
