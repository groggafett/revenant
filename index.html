      return `<div id="${uid}" onclick="devSwapCard(${player},${idx})" style="position:relative;width:52px;aspect-ratio:5/7;flex-shrink:0;border-radius:4px;border:1px solid #2a1e0a;background:linear-gradient(160deg,#1a1610,#100c08);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:5px 3px;cursor:pointer;box-sizing:border-box;${art}">
        <div style="position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:${hpBg};border:1px solid ${hpCol};display:flex;align-items:center;justify-content:center;font-size:7px;color:${hpCol};font-weight:700;z-index:1;">${card.hp ?? ''}</div>
        <div class="sc-name" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:6px;font-weight:700;color:#c8a060;line-height:1.3;width:90%;text-align:center;">${card.name}</div>
        <div style="position:absolute;bottom:4px;left:50%;margin-left:-9px;width:18px;height:18px;background:#2a1408;border:1px solid #c08020;border-radius:2px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;z-index:1;">
          <span style="transform:rotate(-45deg);font-size:8px;font-weight:900;color:#f0d080;line-height:1;">${card.cost}</span>
        </div>
      </div>`;
    }

    function renderOverlay() {
      ov.innerHTML = `
        <div style="font-size:22px;font-weight:900;color:#c8a060;letter-spacing:0.2em;text-transform:uppercase;text-shadow:0 0 20px rgba(200,160,60,0.4);">Battle Setup</div>
        <div style="font-size:7px;color:#3a2a10;letter-spacing:0.2em;text-transform:uppercase;margin-top:-8px;">Dev Mode · Tap to change</div>

        <div style="font-size:7px;color:#5a4828;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;">Lane Effects</div>
        <div style="display:flex;gap:8px;width:100%;">
          ${makeLaneCard('A')}
          ${makeLaneCard('B')}
        </div>

        <div style="font-size:7px;color:#4a78d8;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:4px;">Player I — Starting Hand</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${state.players[1].hand.map((_,i)=>makeHandCard(1,i)).join('')}</div>

        <div style="font-size:7px;color:#cc3030;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:4px;">Player II — Starting Hand</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${state.players[2].hand.map((_,i)=>makeHandCard(2,i)).join('')}</div>

        <button onclick="devSetupBegin()" style="margin-top:16px;font-family:Cinzel,Georgia,serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#c8a060;background:linear-gradient(160deg,#2a2010,#1a1408);border:1px solid #c08020;border-radius:4px;padding:10px 28px;cursor:pointer;box-shadow:0 0 16px rgba(200,160,60,0.3);">Begin Battle ▶</button>
      `;
    }

    window.devCycleLane = function(lane) {
      const fx = state.laneEffects[lane];
      const idx = DEFAULT_LANE_EFFECTS.findIndex(e => e.effect === fx?.effect);
      const next = DEFAULT_LANE_EFFECTS[(idx + 1) % DEFAULT_LANE_EFFECTS.length];
      state.laneEffects[lane] = { ...next, revealed: false };
      renderLaneEffects();
      renderOverlay();
    };

    window.devSwapCard = function(player, cardIdx) {
      const p = state.players[player];
      if (!p.deck.length) return;
      const swapIdx = Math.floor(Math.random() * p.deck.length);
      const [newCard] = p.deck.splice(swapIdx, 1);
      const [oldCard] = p.hand.splice(cardIdx, 1, newCard);
      p.deck.push(oldCard);
      renderOverlay();
    };

    window.devSetupBegin = function() {
      const gain = 5 + 1; // Round 1
      // Pre-assign starting resources so screen can show them
      [1,2].forEach(p => { state.players[p].resources = gain; });
      renderHub();

      ov.innerHTML = `
        <div style="font-size:22px;font-weight:900;color:#c8a060;letter-spacing:0.2em;text-transform:uppercase;text-shadow:0 0 20px rgba(200,160,60,0.4);">Battle Begins</div>
        <div style="font-size:11px;color:#7a6030;letter-spacing:0.15em;text-transform:uppercase;margin-top:-6px;">Round 1 of ${state.maxRounds}</div>

        <div style="display:flex;gap:16px;margin-top:12px;">
          <div style="text-align:center">
            <div style="font-size:7px;color:#4a78d8;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;">Player I</div>
            <div style="font-size:28px;font-weight:900;color:#c8a060;">+${gain}</div>
            <div style="font-size:7px;color:#5a4828;text-transform:uppercase;letter-spacing:0.08em;">Resources</div>
          </div>
          <div style="width:1px;background:#1a1408;"></div>
          <div style="text-align:center">
            <div style="font-size:7px;color:#cc3030;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:6px;">Player II</div>
            <div style="font-size:28px;font-weight:900;color:#c8a060;">+${gain}</div>
            <div style="font-size:7px;color:#5a4828;text-transform:uppercase;letter-spacing:0.08em;">Resources</div>
          </div>
        </div>

        <div style="font-size:7px;color:#4a78d8;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:14px;">Player I — Starting Hand</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${state.players[1].hand.map((_,i)=>makeHandCard(1,i)).join('')}</div>

        <div style="font-size:7px;color:#cc3030;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:8px;">Player II — Starting Hand</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">${state.players[2].hand.map((_,i)=>makeHandCard(2,i)).join('')}</div>

        <button onclick="devBattleBegin()" style="margin-top:16px;font-family:Cinzel,Georgia,serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#c8a060;background:linear-gradient(160deg,#2a2010,#1a1408);border:1px solid #c08020;border-radius:4px;padding:10px 28px;cursor:pointer;box-shadow:0 0 16px rgba(200,160,60,0.3);">Begin ▶</button>
      `;
    };

    window.devBattleBegin = function() {
      ov.remove();
      // Resources already assigned — just start battle phase directly
      [1,2].forEach(p => {
        state.players[p].drawnThisRound = false;
        state.players[p].passed = false;
        drawCard(p);
      });
      const first = Math.random() < 0.5 ? 1 : 2;
      Object.keys(state.board).forEach(tid => { state.board[tid].actionsLeft = null; delete state.board[tid].bonusAttacks; });
      state.activePlayer = first;
      setPerspective(first);
      renderHub();
      startBattlePhase();
    };

    renderOverlay();
  }

  // ── REQUISITION PHASE ──
  function requisitionPhase() {
    state.phase = 'requisition';
    // Clear death markers from previous round
    document.querySelectorAll('.unit-skull').forEach(e=>e.remove());
    const gain = 5 + state.round;
    [1,2].forEach(p=>{
      state.players[p].resources += gain;
      state.players[p].passed = false;
      state.players[p].drawnThisRound = false;
      drawCard(p);
    });
    // Roll for first player
    const first = Math.random() < 0.5 ? 1 : 2;
    Object.keys(state.board).forEach(tid=>{ state.board[tid].actionsLeft=null; delete state.board[tid].bonusAttacks; });
    state.activePlayer = first;
    setPerspective(first);
    renderHub();
    // Update gain number in icon
    const gainEl = document.getElementById('req-gain-num');
    if(gainEl) gainEl.textContent = `+${gain}`;
    const p = state.players[first];
    showOverlay(
      `Round ${state.round} of ${state.maxRounds}`,
      'Requisition Phase',
      `${p.name} goes first`,
      0,
      ()=>startBattlePhase(),
      true,
      p.color
    );
  }

  let _beginCallback = null;

  // tapToContinue=true → shows Begin button. false → auto-dismisses after duration ms
  function showOverlay(title, sub, who, duration, callback, tapToContinue=false, whoColor='') {
    const ov = document.getElementById('req-overlay');
    const beginBtn = document.getElementById('req-begin');
    document.querySelector('.top-bar').style.zIndex = '60';
    document.getElementById('req-title').textContent = title;
    document.getElementById('req-sub').textContent   = sub;
    const whoEl = document.getElementById('req-who');
    whoEl.textContent = who;
    whoEl.className = 'req-who' + (whoColor ? ` ${whoColor}` : '');
    _beginCallback = callback;
    if(tapToContinue) {
      beginBtn.style.display = 'block';
      ov.classList.remove('auto-dismiss');
      ov.classList.add('show');
    } else {
      beginBtn.style.display = 'none';
      ov.classList.add('auto-dismiss','show');
      setTimeout(()=>{
        ov.classList.remove('show');
        document.querySelector('.top-bar').style.zIndex = '';
        setTimeout(()=>{ if(callback) callback(); _beginCallback=null; }, 300);
      }, duration);
    }
  }

  function beginRound() {
    const ov = document.getElementById('req-overlay');
    document.getElementById('req-begin').style.display = 'none';
    document.querySelector('.top-bar').style.zIndex = '';
    ov.classList.remove('show');
    setTimeout(()=>{ if(_beginCallback) { _beginCallback(); _beginCallback=null; } }, 300);
  }

  function showTurnToast(player, callback) {
    const p = state.players[player];
    const col = p.color;
    const toast = document.getElementById('turn-toast');
    const name  = document.getElementById('toast-name');
    toast.className = `turn-toast ${col}`;
    name.className  = `toast-name ${col}`;
    name.textContent = `${p.name}'s Turn`;
    setUILock(true);
    requestAnimationFrame(()=>{ toast.classList.add('show'); });
    setTimeout(()=>{
      toast.classList.remove('show');
      setTimeout(()=>{ setUILock(false); if(callback) callback(); }, 250);
    }, 2000);
  }

  function startBattlePhase() {
    state.phase = 'battle';
    applyRoundStartEffects();
    flashResGain();
    setPerspective(state.activePlayer);
    refreshAllUnitIndicators();
    renderHub();
    showTurnToast(state.activePlayer);
  }

  function applyRoundStartEffects() {
    ['A','B'].forEach(lane => {
      const fx = getLaneEffect(lane);
      if (!fx) return;
      EFFECT_REGISTRY[fx.effect]?.onRoundStart?.(fx, lane);
    });
  }

  function refreshAllUnitIndicators() {
    Object.entries(state.board).forEach(([tileId, unit])=>{
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      renderUnit(tile, unit);
    });
  }

  function flashResGain() {
    const diamond = document.getElementById('hub-res-diamond');
    const gain = 5 + state.round;
    const el = document.createElement('div');
    el.className = 'res-gain';
    el.textContent = `+${gain}`;
    diamond.appendChild(el);
    setTimeout(()=>el.remove(), 1400);
  }

  function drawCard(player) {
    const p=state.players[player];
    if(p.deck.length===0) return;
    const card = p.deck.shift();
    if(card) card.type = (card.type||'').trim();
    p.hand.unshift(card);
  }

  // ── BUILD BOARD ──
  function buildBoard() {
    ['A','B'].forEach(lane=>{
      const laneEl=document.getElementById(`lane-${lane}`);
      laneEl.innerHTML=''; // clear everything including label

      LANE_ROWS.forEach((rowDef, ri)=>{
        if(rowDef.zone==='control-centre') {
          const div=document.createElement('div');
          div.className='divider'; laneEl.appendChild(div);
        }
        const rowEl=document.createElement('div');
        rowEl.className='row';

        const zones = rowDef.zone==='control-centre'
          ? ['control-zone','centre','control-zone']
          : Array(rowDef.count).fill(rowDef.zone);

        zones.forEach((zone,ci)=>{
          const tile=document.createElement('div');
          const tileId=`${lane}-${ri}-${ci}`;
          tile.className=`tile ${zone}`;
          tile.dataset.id=tileId;
          tile.dataset.zone=zone;
          tile.dataset.lane=lane;
          tile.dataset.row=ri;
          tile.dataset.col=ci;
          tile.dataset.player=rowDef.player;
          if(zone!=='centre') tile.addEventListener('click', ()=>onTileTap(tileId));
          if(zone!=='centre') tile.addEventListener('touchstart', e=>onBoardTileTouchStart(e,tileId), {passive:true});
          if(zone==='centre') tile.addEventListener('click', ()=>{
            if(state.selectedHandCard?.type==='Power') executePowerCard(lane);
            else showLaneEffectOverlay(lane, tile);
          });
          const symMap={'deploy-p1':'↓','deploy-p2':'↓','control-zone':'♛','centre':'⚜'};
          if(symMap[zone]){const s=document.createElement('span');s.className='tile-symbol';s.textContent=symMap[zone];tile.appendChild(s);}
          if(zone==='centre'){
            const badge=document.createElement('span');
            badge.className='lane-effect-badge hidden';
            badge.id=`lane-badge-${lane}`;
            tile.appendChild(badge);
          }
          rowEl.appendChild(tile);
        });
        laneEl.appendChild(rowEl);
      });
    });
    renderLaneEffects();
  }

  // ── RENDER HUB ──
  function renderHub() {
    // Scores + round always update
    document.getElementById('score-p1').textContent=state.players[1].score;
    document.getElementById('score-p2').textContent=state.players[2].score;
    document.getElementById('res-badge-p1').textContent=state.players[1].resources;
    document.getElementById('res-badge-p2').textContent=state.players[2].resources;
    document.getElementById('turn-num').textContent=`${state.round} / ${state.maxRounds}`;

    if(state.phase==='scoring') {
      document.getElementById('side-p1').className='player-side left active';
      document.getElementById('side-p2').className='player-side right active';
      document.getElementById('player-bar').className='player-bar';
      const inspector=document.getElementById('inspector');
      inspector.className=`inspector${inspector.classList.contains('open')?' open':''}`;
      return;
    }

    const p=state.players[state.activePlayer];
    const opp=state.players[state.activePlayer===1?2:1];
    const col=p.color;
    document.getElementById('hub-name').textContent=p.name;
    document.getElementById('hub-name').className=`hub-name ${col}-col`;
    document.getElementById('hub-res').textContent=p.resources;
    document.getElementById('player-bar').className=`player-bar ${col}-active`;
    const inspector=document.getElementById('inspector');
    inspector.className=`inspector${inspector.classList.contains('open')?' open':''} ${col}-active`;
    // Deck pile
    document.getElementById('pile-deck-count').textContent=p.deck.length;
    document.getElementById('pile-graveyard-count').textContent=p.graveyard.length;
    const deckPile=document.getElementById('pile-deck');
    deckPile.classList.toggle('p2-deck', state.activePlayer===2);
    const canDraw=p.resources>=1&&p.deck.length>0&&!p.drawnThisRound;
    deckPile.classList.toggle('can-draw',canDraw);
    deckPile.classList.toggle('draw-exhausted',p.drawnThisRound);
    deckPile.onclick=canDraw?()=>drawAction():null;
    // Pass widget
    const myPassed=state.players[state.activePlayer].passed;
    const oppPassed=opp.passed;
    const passEl=document.getElementById('pass-mine');
    passEl.textContent=myPassed?'Passed ✓':'Pass ▶';
    passEl.classList.toggle('passed',myPassed);
    const oppEl=document.getElementById('pass-opp');
    oppEl.textContent=oppPassed?'☠ Passed':'Opp ●';
    oppEl.classList.toggle('passed',oppPassed);
    // Top bar sides
    document.getElementById('side-p1').className=`player-side left ${state.activePlayer===1?'active':'inactive'}`;
    document.getElementById('side-p2').className=`player-side right ${state.activePlayer===2?'active':'inactive'}`;
    renderHand();
  }

  const MAX_HAND = 6;
  function renderHand() {
    const p=state.players[state.activePlayer];
    const scroll=document.getElementById('hand-scroll');
    scroll.innerHTML='';
    const showDraw = p.hand.length < MAX_HAND && !p.drawnThisRound;
    const totalSlots = p.hand.length + (showDraw ? 1 : 0);
    const availW = window.innerWidth - 24;
    const gap = 5;
    const cardW = totalSlots <= 5
      ? Math.floor((availW - gap * 4) / 5)
      : Math.floor((availW - gap * 5) / 6);
    scroll.style.justifyContent = totalSlots <= 5 ? 'center' : 'flex-start';
    p.hand.forEach(card=>{
      const canAfford=p.resources>=card.cost;
      const isSelected=state.selectedHandCard?.uid===card.uid;
      const el=document.createElement('div');
      const col = p.color;
      el.className=`card ${col}-card${isSelected?' selected':''}${!canAfford?' unavailable':''}`;
      el.dataset.uid = card.uid;
      el.style.width = cardW + 'px';
      el.innerHTML = (card.type||'').trim() === 'Power'
        ? `<div style="position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#1a1020;border:1.5px solid #8a40c0;display:flex;align-items:center;justify-content:center;font-size:9px;z-index:1;">⚡</div>
           <div class="card-name" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;text-align:center">${card.name}</div>
           <div class="card-cost"><span>${card.cost}</span></div>`
        : `<div class="card-hp ${col}-hp"><span>${card.hp ?? ''}</span></div>
           <div class="card-name">${card.name}</div>
           <div class="card-cost"><span>${card.cost}</span></div>`;
      const art = artStyle(card);
      if (art) {
        el.setAttribute('style', (el.getAttribute('style') || '') + art);
        if (card.artId) {
          const tryHide = src => {
            const p = new Image();
            p.onload = () => { const n = el.querySelector('.card-name'); if(n) n.style.display='none'; };
            p.src = src;
          };
          tryHide(`art/${card.artId}.png`);
          tryHide(`art/${card.artId}.jpg`);
          tryHide(`art/${card.artId}.jpeg`);
        }
      }
      el.addEventListener('touchstart', e=>onHandCardTouchStart(e,card,el), {passive:false});
      el.addEventListener('click',()=>onHandCardTap(card));
      scroll.appendChild(el);
    });
    // Draw tile — only shown when hand not full
    if (showDraw) {
      const canDraw = p.resources >= 1 && p.deck.length > 0 && !p.drawnThisRound;
      const drawTile = document.createElement('div');
      drawTile.className = `hand-draw-tile${canDraw ? ' can-draw' : ''}${p.drawnThisRound ? ' draw-exhausted' : ''}${p.color === 'p2' ? ' p2-draw' : ''}`;
      drawTile.style.width = cardW + 'px';
      drawTile.innerHTML = `<div class="draw-tile-count">${p.deck.length}</div><div class="draw-tile-label">Draw</div><div class="draw-tile-cost">cost 1</div>`;
      if (canDraw) drawTile.addEventListener('click', () => drawAction());
      scroll.appendChild(drawTile);
    }
    // Update inspector card visual if a hand card is selected
    if (state.selectedHandCard) {
      const p = state.players[state.activePlayer];
      const canAfford = p.resources >= state.selectedHandCard.cost;
      setResPulse(canAfford);
      const visual = document.getElementById('prof-card-visual');
      const label  = document.getElementById('prof-cv-label');
      const pips   = document.getElementById('prof-cv-pips');
      if (visual) visual.className = `prof-card-visual ${state.players[state.activePlayer].color}-unit cv-selected cv-pulse`;
      if (label)  { label.style.display=''; label.className='prof-cv-label lbl-deploy-active'; label.textContent='DEPLOY'; }
      if (pips)   pips.style.display='none';
    }
  }

  function updateResPreview(card){
    const p=state.players[state.activePlayer];
    const remaining=p.resources-card.cost;
    document.getElementById('hub-res').textContent=remaining;
    document.getElementById('hub-res-diamond').classList.toggle('depleted', remaining<0);
  }


  // ── DRAG FROM HAND ──
  const DRAG_THRESHOLD = 3;
  const INSPECT_MS = 300;
  let dragState = null;

  function cancelDragState() {
    if (!dragState) return;
    clearTimeout(dragState.inspectTimer);
    dragState.ghostEl?.remove();
    clearDragHover();
    if (dragState.sourceEl) dragState.sourceEl.style.transform = '';
    document.removeEventListener('touchmove', onHandDragMove);
    document.removeEventListener('touchend',  onHandDragEnd);
    dragState = null;
  }

  function onHandCardTouchStart(e, card, sourceEl) {
    if (e.touches.length > 1) return;
    e.preventDefault(); // seize touch — no scroll or pan from this point
    if(state.pendingTile) cancelPendingDeploy();
    cancelDragState();
    const t = e.touches[0];
    // Visual "ready" — slight scale on touch
    sourceEl.style.transform = 'scale(1.08)';
    try{navigator.vibrate?.(8);}catch(e){}
    dragState = {
      card, sourceEl,
      startX: t.clientX, startY: t.clientY,
      active: false, ghostEl: null, hoveredLane: null, hoverTile: null,
      inspectTimer: setTimeout(() => {
        // Long press — open modal overlay
        if (dragState && !dragState.active) {
          const c = dragState.card;
          try{navigator.vibrate?.(15);}catch(e){}
          cancelDragState();
          openProfile(c, 'hand', null, {strip: false});
        }
      }, INSPECT_MS)
    };
    document.addEventListener('touchmove', onHandDragMove, {passive: false});
    document.addEventListener('touchend',  onHandDragEnd,  {once: true});
  }

  function liftHandCard(x, y) {
    if (!dragState || dragState.active) return;
    clearTimeout(dragState.inspectTimer);
    dragState.sourceEl.style.transform = '';
    dragState.sourceEl.style.opacity = '0';
    dragState.sourceEl.style.pointerEvents = 'none';
    const ghost = dragState.sourceEl.cloneNode(true);
    ghost.style.transform = '';
    Object.assign(ghost.style, {
      position:'fixed', pointerEvents:'none', zIndex:'999',
      width:'68px', aspectRatio:'5/7',
      left: x - 34 + 'px', top: y - 90 + 'px',
      transform:'scale(1.15)', opacity:'0.92',
      transition:'transform 0.1s ease',
      borderRadius:'4px',
      boxShadow:'0 8px 24px rgba(0,0,0,0.7)'
    });
    document.body.appendChild(ghost);
    dragState.active = true;
    dragState.ghostEl = ghost;
    try{navigator.vibrate?.(20);}catch(e){}
    resetBoardZoom();
    // Clear previous selection state without renderHand (avoid DOM rebuild during touch)
    state.selectedHandCard = null;
    state.pendingTile = null;
    state.activeAction = null;
    clearHighlights();
    clearConfirm();
    // Now set new drag card and highlight deploy tiles
    state.selectedHandCard = dragState.card;
    const p = state.players[state.activePlayer];
    if (p.resources >= dragState.card.cost) highlightDeployTiles(true);
  }

  function clearDragHover() {
    document.querySelectorAll('.tile.drag-hover').forEach(t => t.classList.remove('drag-hover'));
  }

  function onHandDragMove(e) {
    if (!dragState) return;
    const t = e.touches[0];
    const dx = t.clientX - dragState.startX;
    const dy = t.clientY - dragState.startY;
    if (!dragState.active) {
      if (Math.hypot(dx, dy) > DRAG_THRESHOLD) {
        liftHandCard(t.clientX, t.clientY);
        if (dragState?.ghostEl) {
          dragState.ghostEl.style.left = t.clientX - 34 + 'px';
          dragState.ghostEl.style.top  = t.clientY - 90 + 'px';
        }
      }
      return;
    }
    e.preventDefault();
    dragState.ghostEl.style.left = t.clientX - 34 + 'px';
    dragState.ghostEl.style.top  = t.clientY - 90 + 'px';
    // Only update tile hover when it changes — prevents flicker
    const under = document.elementFromPoint(t.clientX, t.clientY);
    const tile = under?.closest('[data-id]');
    const newHoverTile = tile?.classList.contains('highlight-deploy') ? tile : null;
    if (newHoverTile !== dragState.hoverTile) {
      clearDragHover();
      dragState.hoverTile = newHoverTile;
      if (newHoverTile) newHoverTile.classList.add('drag-hover');
    }
    // Cluster detection with padding — prevents edge flicker
    const CLUSTER_PAD_Y = 40;
    const clusters = getDeployClusters();
    const fx = t.clientX, fy = t.clientY;
    // Match vertically within cluster row, then pick closest lane by x
    const inRow = clusters.filter(c => fy >= c.top - CLUSTER_PAD_Y && fy <= c.bottom + CLUSTER_PAD_Y);
    const hit = inRow.length ? inRow.reduce((a, b) =>
      Math.abs(fx - (a.left + a.right)/2) < Math.abs(fx - (b.left + b.right)/2) ? a : b
    ) : null;
    if (hit && hit.lane !== dragState.hoveredLane) {
      dragState.hoveredLane = hit.lane;
      zoomToCluster(hit);
    } else if (!hit && dragState.hoveredLane) {
      dragState.hoveredLane = null;
      resetBoardZoom();
    }
  }

  function onHandDragEnd(e) {
    document.removeEventListener('touchmove', onHandDragMove);
    if (!dragState) return;
    if (!dragState.active) {
      // Released without moving and before long-press — do nothing, return to normal
      cancelDragState();
      return;
    }
    clearTimeout(dragState.inspectTimer);
    const t = e.changedTouches[0];
    clearDragHover();
    resetBoardZoom();
    dragState.ghostEl.style.display = 'none';
    const under = document.elementFromPoint(t.clientX, t.clientY);
    const tile = under?.closest('[data-id]');
    const tileId = tile?.dataset.id;
    const validDrop = tileId && tile.classList.contains('highlight-deploy');
    if (validDrop) {
      dragState.ghostEl.remove();
      dragState = null;
      onTileTap(tileId);
    } else {
      const ghost = dragState.ghostEl;
      const src = dragState.card;
      dragState = null;
      const srcEl = document.querySelector(`.card[data-uid="${src.uid}"]`);
      if (srcEl) {
        const r = srcEl.getBoundingClientRect();
        ghost.style.transition = 'left 0.2s ease, top 0.2s ease, opacity 0.2s ease, transform 0.2s ease';
        ghost.style.left = r.left + 'px';
        ghost.style.top  = r.top  + 'px';
        ghost.style.transform = 'scale(1)';
        ghost.style.opacity = '0';
        // Restore source card as ghost arrives back
        setTimeout(() => {
          ghost.remove();
          if (srcEl) { srcEl.style.opacity = ''; srcEl.style.pointerEvents = ''; }
        }, 220);
      } else {
        ghost.remove();
      }
      deselectAll();
    }
  }

  // ── HAND CARD TAP ──
  function onHandCardTap(card) {
    // If tapping already-selected card, deselect
    if(state.selectedHandCard?.uid===card.uid){
      deselectAll();
      return;
    }
    selectHandCard(card);
    // Tap = strip inspector, long press = modal (handled in touch handler)
    openProfile(card, 'hand');
  }

  function selectHandCard(card) {
    deselectAll();
    state.selectedHandCard=card;
    const canAfford = state.players[state.activePlayer].resources >= card.cost;
    if(canAfford && (card.type||'').trim() === 'Power') {
      const reg = POWER_REGISTRY[card.effect];
      if(reg?.subtype === 'instant') {
        // Instant — no highlighting needed, cast fires from inspector
      } else {
        highlightCentreTiles(true);
      }
    } else if(canAfford) {
      highlightDeployTiles(true);
    }
    renderHand();
  }

  function deselectAll() {
    state.selectedHandCard=null;
    state.pendingTile=null;
    state.activeAction=null;
    highlightDeployTiles(false);
    highlightCentreTiles(false);
    clearHighlights();
    clearConfirm();
    const p=state.players[state.activePlayer];
    document.getElementById('hub-res').textContent=p.resources;
    document.getElementById('hub-res-diamond').classList.remove('depleted');
    renderHand();
  }

  function highlightDeployTiles(on) {
    const zone = `.tile.deploy-p${state.activePlayer}`;
    document.querySelectorAll(zone).forEach(t=>{
      const occupied = !!state.board[t.dataset.id];
      t.classList.toggle('highlight-deploy', on && !occupied);
    });
    // Also highlight owned structures as deploy points
    if(on) {
      Object.entries(state.structures).forEach(([tid, s]) => {
        if(s.owner === state.activePlayer && !state.board[tid]) {
          const t = document.querySelector(`[data-id="${tid}"]`);
          if(t) t.classList.add('highlight-deploy');
        }
      });
    }
  }

  function highlightCentreTiles(on) {
    document.querySelectorAll('.tile.centre').forEach(t=>{
      t.classList.toggle('highlight-deploy', on);
    });
  }

  // ── TILE TAP ──
  function showDamageFloat(tileId, amount) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if (!tile) return;
    const r = tile.getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'dmg-float';
    fl.textContent = `−${amount}`;
    fl.style.left = (r.left + r.width/2) + 'px';
    fl.style.top  = (r.top  + r.height/2) + 'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(), 1200);
  }

  function showDiceFloat(tileId, roll, saved) {
    const tile = document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    const r = tile.getBoundingClientRect();
    const fl = document.createElement('div');
    fl.className = 'dice-float';
    fl.textContent = `🎲${roll}`;
    fl.style.color = saved ? '#4a78d8' : '#cc3030';
    fl.style.left = (r.right + 5) + 'px';
    fl.style.top  = (r.top + r.height/2) + 'px';
    document.body.appendChild(fl);
    setTimeout(()=>fl.remove(), 1000);
  }

  // ── POWER CARD REGISTRY ──
  const POWER_REGISTRY = {

    add_resources: {
      subtype: 'instant',
      execute(card) {
        const amt = card.value ?? 2;
        state.players[state.activePlayer].resources += amt;
        showToastMsg(`+${amt} Resources`);
      }
    },

    add_resources_random: {
      subtype: 'instant',
      execute(card) {
        const [lo, hi] = Array.isArray(card.value) ? card.value : [1, card.value ?? 3];
        const roll = lo + Math.floor(Math.random() * (hi - lo + 1));
        state.players[state.activePlayer].resources += roll;
        showToastMsg(`+${roll} Resources (rolled)`);
      }
    },

    damage_lane: {
      subtype: 'lane_target',
      execute(card, lane) {
        const ap  = card.weapon?.ap ?? 0;
        const dmg = card.weapon?.damage ?? 1;
        const targets = Object.entries(state.board)
          .filter(([tid]) => unitLane(tid) === lane)
          .sort(([a],[b]) => parseInt(a.split('-')[1]) - parseInt(b.split('-')[1]));
        let i = 0;
        function resolveNext() {
          if(i >= targets.length) { powerCardDone(); return; }
          const [tileId, unit] = targets[i++];
          const tile = document.querySelector(`[data-id="${tileId}"]`);
          if(!tile || !state.board[tileId]) { resolveNext(); return; }
          tile.classList.add('highlight-target');
          const saveVal = parseInt(unit.save) || 7;
          const modSave = Math.min(7, saveVal + ap);
          const roll = Math.floor(Math.random() * 6) + 1;
          const saved = roll >= modSave;
          showDiceFloat(tileId, roll, saved);
          setTimeout(()=>{
            tile.classList.remove('highlight-target');
            if(!saved && state.board[tileId]) {
              unit.hp = Math.max(0, unit.hp - dmg);
              showDamageFloat(tileId, dmg);
              if(unit.hp <= 0) setTimeout(()=>{ if(state.board[tileId]) removeSlain(tileId); }, 600);
              else { const hpEl=tile.querySelector('.unit-hp span'); setTimeout(()=>{ if(hpEl) hpEl.textContent=unit.hp; },600); }
            }
            setTimeout(resolveNext, 900);
          }, 1000);
        }
        resolveNext();
      }
    },

    modify_lane_score: {
      subtype: 'lane_target',
      execute(card, lane) {
        const mult = card.value ?? 0.5;
        state.laneEffects[lane] = state.laneEffects[lane] || {};
        state.laneEffects[lane].scoreMult = mult;
        showToastMsg(`Lane ${lane} scoring ×${mult}`);
        renderLaneEffects();
        powerCardDone();
      }
    },

    redeploy_unit: {
      subtype: 'unit_target',
      targetFilter: (tid) => state.board[tid]?.owner === state.activePlayer,
      execute(card, tileId) {
        const unit = state.board[tileId];
        if(!unit) { powerCardDone(); return; }
        delete state.board[tileId];
        const tile = document.querySelector(`[data-id="${tileId}"]`);
        if(tile) tile.innerHTML = '';
        state._redeployUnit = {...unit};
        highlightDeployTiles(true);
        showToastMsg('Choose a deployment tile');
        state._redeployPending = true;
      }
    },

    place_structure: {
      subtype: 'tile_target',
      targetFilter: (tid) => {
        const m = tileMap[tid];
        if(!m) return false;
        if(m.zone === 'centre') return false;
        if(m.zone === 'deploy-p2' && state.activePlayer === 1) return false;
        if(m.zone === 'deploy-p1' && state.activePlayer === 2) return false;
        return !state.board[tid] && !state.structures[tid];
      },
      execute(card, tileId) {
        state.structures[tileId] = { type:'tunnel', owner:state.activePlayer, card:{...card} };
        renderStructures();
        renderHub();
        powerCardDone();
      }
    },

  };

  function renderStructures() {
    // Clear existing structure markers
    document.querySelectorAll('.structure-marker').forEach(e => e.remove());
    Object.entries(state.structures).forEach(([tileId, s]) => {
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      const el = document.createElement('div');
      el.className = 'structure-marker';
      el.style.cssText = 'position:absolute;inset:0;z-index:1;border-radius:3px;opacity:0.7;pointer-events:none;';
      const col = s.owner === 1 ? 'rgba(74,120,216,0.3)' : 'rgba(204,48,48,0.3)';
      el.style.background = col;
      el.style.border = s.owner === 1 ? '1px dashed #4a78d8' : '1px dashed #cc3030';
      if(s.card?.artId) {
        const art = artStyle(s.card, true);
        if(art) el.setAttribute('style', el.getAttribute('style') + art);
      }
      tile.appendChild(el);
    });
  }

  // Shared cleanup after power card resolves
  function powerCardDone() {
    closeProfile();
    endCurrentTurn();
    waitThenAdvance();
  }

  // ── POWER CARD DISPATCHER ──
  function castPowerCard(card) {
    const p = state.players[state.activePlayer];
    if(!card || p.resources < card.cost) return;
    const reg = POWER_REGISTRY[card.effect];
    if(!reg) { console.warn('Unknown power effect:', card.effect); return; }

    // Spend cost, remove from hand
    p.resources -= card.cost;
    p.hand = p.hand.filter(c => c.uid !== card.uid);
    p.graveyard.push({...card});
    state.selectedHandCard = null;
    highlightCentreTiles(false);
    renderHub();

    if(reg.subtype === 'instant') {
      reg.execute(card);
      powerCardDone();
    } else if(reg.subtype === 'lane_target') {
      // Centre tiles already highlighted — wait for lane tap (handled in buildBoard click handler)
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      highlightCentreTiles(true);
      // Re-add card to hand temporarily so cost isn't double-spent if cancelled
      // Actually just store it — tap will call resolveLanePower
    } else if(reg.subtype === 'tile_target') {
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      // Highlight valid tiles
      document.querySelectorAll('.tile').forEach(t => {
        const tid = t.dataset.id;
        if(reg.targetFilter && reg.targetFilter(tid)) {
          t.classList.add('highlight-deploy');
        }
      });
    } else if(reg.subtype === 'unit_target') {
      state._pendingPowerCard = card;
      state._pendingPowerReg  = reg;
      highlightPowerTargets(reg);
    }
  }

  function resolveLanePower(lane) {
    const card = state._pendingPowerCard;
    const reg  = state._pendingPowerReg;
    if(!card || !reg) return;
    state._pendingPowerCard = null;
    state._pendingPowerReg  = null;
    highlightCentreTiles(false);
    reg.execute(card, lane);
  }

  function highlightPowerTargets(reg) {
    Object.keys(state.board).forEach(tid => {
      const passes = !reg.targetFilter || reg.targetFilter(tid);
      if(passes) {
        const t = document.querySelector(`[data-id="${tid}"]`);
        if(t) t.classList.add('highlight-ability');
      }
    });
  }

  // Legacy wrapper — keep centre tile tap working
  function executePowerCard(lane) {
    if(state._pendingPowerCard) { resolveLanePower(lane); return; }
    // Fallback for old-style cards without effect field
    const card = state.selectedHandCard;
    if(!card || (card.type||'').trim() !== 'Power') return;
    castPowerCard(card);
  }

  function showLaneEffectOverlay(lane, tile) {
    // Remove any existing overlay
    document.querySelectorAll('.lane-effect-overlay').forEach(e=>e.remove());
    const fx = state.laneEffects?.[lane];
    const TRIGGER_LABELS = {
      passive:'Passive', round_start:'Round Start', on_deploy:'On Deploy',
      on_slain:'On Slain', on_attack:'On Attack', on_roll_6:'On Roll of 6', on_reveal:'On Reveal'
    };
    const ov = document.createElement('div');
    ov.className = 'lane-effect-overlay';
    if (!fx) {
      ov.innerHTML = `<div class="leo-title">No Effect</div><div class="leo-desc">No lane effect in play.</div><button class="leo-close" onclick="this.closest('.lane-effect-overlay').remove()">Close</button>`;
    } else if (!fx.revealed) {
      ov.innerHTML = `<div class="leo-title">Unknown Effect</div><div class="leo-desc leo-unknown">Reveals before Round 1 scoring.</div><button class="leo-close" onclick="this.closest('.lane-effect-overlay').remove()">Close</button>`;
    } else {
      ov.innerHTML = `
        <div class="leo-title">${fx.name}</div>
        <div class="leo-trigger">${TRIGGER_LABELS[fx.trigger]||fx.trigger}</div>
        <div class="leo-desc">${fx.description}</div>
        <button class="leo-close" onclick="this.closest('.lane-effect-overlay').remove()">Close</button>`;
    }
    // Position near the tile
    const rect = tile.getBoundingClientRect();
    ov.style.top  = `${Math.min(rect.bottom + 6, window.innerHeight - 180)}px`;
    ov.style.left = `${Math.max(4, rect.left - 80)}px`;
    document.body.appendChild(ov);
  }

  function openCardZoom(card) {
    const existing = document.getElementById('card-zoom-overlay');
    if (existing) existing.remove();
    const col = card.owner === 1 ? 'p1' : card.owner === 2 ? 'p2' : '';
    const ov = document.createElement('div');
    ov.id = 'card-zoom-overlay';
    ov.className = 'card-zoom-overlay';
    ov.innerHTML = `
      <div class="card-zoom-art ${col}-unit" id="czoom-art"></div>
      <div style="display:flex;align-items:center;gap:4px">
        <span class="card-zoom-faction">${FACTION_ICONS[card.faction]||''}</span>
        <span class="card-zoom-name">${card.name}</span>
      </div>
      ${card.weapon?.name ? `<div class="card-zoom-weapon">${card.weapon.name}</div>` : ''}
      ${card.flavour ? `<div class="card-zoom-flavour">${card.flavour}</div>` : ''}
      <div class="card-zoom-close" onclick="document.getElementById('card-zoom-overlay').remove()">✕ Close</div>`;
    document.body.appendChild(ov);
    // Apply art
    const artEl = document.getElementById('czoom-art');
    const art = artStyle(card, true);
    if (art) artEl.setAttribute('style', artEl.getAttribute('style') + art);
    ov.addEventListener('click', e => { if(e.target===ov) ov.remove(); });
  }

  // ── BOARD TILE LONG PRESS ──
  let _tileTouchTimer = null;
  let _tileTouchMoved = false;

  function onBoardTileTouchStart(e, tileId) {
    if (e.touches.length > 1) return;
    if (!state.board[tileId]) return; // only for tiles with units
    const t = e.touches[0];
    const startX = t.clientX, startY = t.clientY;
    _tileTouchMoved = false;
    // Visual pulse
    const el = document.querySelector(`[data-id="${tileId}"]`);
    if (el) { el.classList.remove('touch-pulse'); void el.offsetWidth; el.classList.add('touch-pulse'); }
    clearTimeout(_tileTouchTimer);
    _tileTouchTimer = setTimeout(() => {
      if (!_tileTouchMoved) {
        try{navigator.vibrate?.(15);}catch(e){}
        const unit = state.board[tileId];
        if (unit) openProfile(unit, 'board', tileId);
      }
    }, 300);
    const onMove = e2 => {
      const t2 = e2.touches[0];
      if (Math.hypot(t2.clientX - startX, t2.clientY - startY) > 8) {
        _tileTouchMoved = true;
        clearTimeout(_tileTouchTimer);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
      }
    };
    const onEnd = () => {
      clearTimeout(_tileTouchTimer);
      document.removeEventListener('touchmove', onMove);
    };
    document.addEventListener('touchmove', onMove, {passive:true});
    document.addEventListener('touchend', onEnd, {once:true});
  }

  function onTileTap(tileId) {
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) {
      // Tap on empty board space — cancel pending
      if(state.pendingTile) cancelPendingDeploy();
      else if(state._ctaAction==='activate') onHubCancel();
      return;
    }

    // Tile-target power card — highlighted tile resolves the effect
    if(state._pendingPowerCard && state._pendingPowerReg?.subtype === 'tile_target') {
      if(tile.classList.contains('highlight-deploy')) {
        const card = state._pendingPowerCard;
        const reg  = state._pendingPowerReg;
        state._pendingPowerCard = null;
        state._pendingPowerReg  = null;
        document.querySelectorAll('.tile.highlight-deploy').forEach(t => t.classList.remove('highlight-deploy'));
        reg.execute(card, tileId);
      }
      return;
    }

    // Ability targeting mode — tapping a highlighted unit resolves the ability
    if (state.activeAction==='ability' && tile.classList.contains('highlight-ability')) {
      if (state.board[tileId]) { resolveAbility(tileId); return; }
    }

    // Attack mode — enemy highlighted tile triggers battle
    if(state.activeAction==='attack' && tile.classList.contains('highlight-attack')) {
      const enemy=state.activePlayer===1?2:1;
      if(state.board[tileId]?.owner===enemy) openBattleOverlay(tileId);
      return;
    }

    // Tapping a tile with a unit — select and show inspector + activate CTA
    if(state.board[tileId]){
      const unit = state.board[tileId];
      const lane = unitLane(tileId);
      if(lane) snapToLane(lane);
      const isOwn = unit.owner === state.activePlayer;
      const p = state.players[state.activePlayer];
      const canActivate = isOwn && unit.actionsLeft === null && p.resources >= 1 && !state.activeUnit;
      if (canActivate) {
        openProfile(unit, 'board', tileId);
        setBarState('pending', { label:'Activate', cost:1, action:'activate' });
      } else if (isOwn && state.activeUnit?.card?.uid === unit.uid) {
        // Tapping active unit — do nothing, already activated
      } else {
        openProfile(unit, 'board', tileId);
      }
      return;
    }

    // Move mode — tapping a valid highlighted tile
    if(state.activeAction==='move' && tile.classList.contains('highlight-move')) {
      if(pendingMoveTile===tileId){ clearMoveConfirm(); return; }
      clearMoveConfirm(); pendingMoveTile=tileId; showMoveConfirm(tileId);
      return;
    }

    // Tapping empty non-relevant tile while action is active — clear action
    if(state.activeAction){ state.activeAction=null; clearHighlights(); return; }

    // Deploy flow
    if(state.selectedHandCard && tile.classList.contains('highlight-deploy')){
      if(state.pendingTile===tileId){ clearConfirm(); state.pendingTile=null; return; }
      clearConfirm(); state.pendingTile=tileId; showConfirm(tileId);
    }
  }

  // ── EXECUTE MOVE ──
  function executeMove(toTileId) {
    const fromTileId = state.activeUnit.tileId;
    const unit = state.activeUnit.card;

    // Update board state
    state.board[toTileId] = unit;
    delete state.board[fromTileId];

    // Update DOM
    const fromTile = document.querySelector(`[data-id="${fromTileId}"]`);
    fromTile.classList.remove('unit-active');
    fromTile.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e=>e.remove());
    const toTile = document.querySelector(`[data-id="${toTileId}"]`);
    renderUnit(toTile, unit);
    toTile.classList.add('unit-active');

    // Update activeUnit reference and tileId in profile
    state.activeUnit.tileId = toTileId;
    profileTileId = toTileId;
    unit.actionsLeft--;
    const updatedTile = document.querySelector(`[data-id="${toTileId}"]`);
    if(updatedTile) renderUnit(updatedTile, unit);
    clearHighlights();

    if(unit.actionsLeft > 0) {
      // Auto re-highlight from new position
      getReachableTiles(toTileId, unit.move).forEach(id=>{
        document.querySelector(`[data-id="${id}"]`)?.classList.add('highlight-move');
      });
      refreshActionButtons();
      renderHub();
    } else {
      closeProfile();
      endCurrentTurn();
      waitThenAdvance();
    }
  }

  function showConfirm(tileId) {
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    tile.classList.add('confirm-tile');
    const cost = state.selectedHandCard?.cost ?? 0;
    setBarState('pending', { label:'Deploy', cost, action:'deploy' });
  }

  function clearConfirm() {
    document.querySelectorAll('.confirm-tile').forEach(t=>t.classList.remove('confirm-tile'));
    const btn=document.getElementById('confirm-btn');
    if(btn) btn.remove();
    if (!state.activeUnit) setBarState('default');
  }

  function cancelPendingDeploy() {
    const tileId = state.pendingTile;
    clearConfirm();
    state.pendingTile = null;
    // Restore card to hand
    deselectAll();
  }

  function executeDeployTo(tileId) {
    const card=state.selectedHandCard;
    const p=state.players[state.activePlayer];
    if(!card || p.resources<card.cost) return;

    // Spend resources, remove from hand, place on board
    p.resources-=card.cost;
    p.hand=p.hand.filter(c=>c.uid!==card.uid);
    state.board[tileId]={...card, owner:state.activePlayer, actionsLeft:null};

    const tile=document.querySelector(`[data-id="${tileId}"]`);
    tile.classList.remove('confirm-tile','highlight-deploy');
    renderUnit(tile, state.board[tileId]);

    deselectAll();
    renderHub();
    endCurrentTurn();
    waitThenAdvance();
  }

  let pendingMoveTile = null;

  function showMoveConfirm(tileId) {
    // Dim other move options
    document.querySelectorAll('.highlight-move').forEach(t=>{
      if(t.dataset.id!==tileId) t.classList.add('dim-move');
    });
    // Arrow icon on source unit tile
    const srcTile=document.querySelector(`[data-id="${state.activeUnit.tileId}"]`);
    if(srcTile){ const ic=document.createElement('div'); ic.className='move-src-icon'; ic.textContent='→'; srcTile.appendChild(ic); }
    // Confirm button on destination
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(!tile) return;
    tile.classList.add('confirm-tile');
    const btn=document.createElement('div');
    btn.className='confirm-btn'; btn.id='move-confirm-btn';
    btn.innerHTML='<span>→✓</span>';
    btn.addEventListener('click',e=>{ e.stopPropagation(); clearMoveConfirm(); executeMove(tileId); });
    tile.appendChild(btn);
  }
  function clearMoveConfirm() {
    document.querySelectorAll('.highlight-move.dim-move').forEach(t=>t.classList.remove('dim-move'));
    document.querySelectorAll('.move-src-icon').forEach(e=>e.remove());
    const btn=document.getElementById('move-confirm-btn');
    if(btn){ btn.closest('.confirm-tile')?.classList.remove('confirm-tile'); btn.remove(); }
    pendingMoveTile=null;
  }

  let profileContext = null;
  let profileCard    = null;
  let profileTileId  = null;

  const FACTION_ICONS = {
    order_of_iron:'⚙', order_of_flames:'♨', order_of_light:'☼',
    order_of_the_veil:'☽', order_of_beasts:'♈', order_of_artifice:'◆',
    order_of_shadows:'†', none:'✦', universal:'✦'
  };

  function onCardVisualTap() {
    if (!profileCard) return;
    if (profileContext === 'board' && profileCard.actionsLeft===null) {
      activateUnit();
    } else {
      openCardZoom(profileCard);
    }
  }

  function setResPulse(on) {
    document.getElementById('hub-res-diamond')?.classList.toggle('res-pulse', on);
    document.getElementById('prof-cv-diamond')?.classList.toggle('res-pulse', on);
  }

  function openProfile(card, context, tileId=null, opts={}) {
    profileCard=card; profileContext=context; profileTileId=tileId;

    // Clear previous selected tile
    document.querySelectorAll('.tile.unit-selected').forEach(t=>t.classList.remove('unit-selected'));
    if (context==='board' && tileId) {
      const tile=document.querySelector(`[data-id="${tileId}"]`);
      if(tile) tile.classList.add('unit-selected');
      state.selectedBoardTile = tileId;
    } else {
      state.selectedBoardTile = null;
    }
    document.getElementById('prof-cost').textContent = (context === 'board') ? '1' : card.cost;
    document.getElementById('prof-cv-hp').textContent = card.hp ?? '';
    document.getElementById('prof-cv-save').textContent = card.save ?? '';
    document.getElementById('prof-name').textContent=card.name;
    document.getElementById('prof-weapon-name').textContent = card.weapon?.name ?? '';
    document.getElementById('prof-faction-icon').textContent=FACTION_ICONS[card.faction]||'';
    document.getElementById('prof-move').textContent = card.move == null ? '' : card.move===-1 ? '—' : card.move;
    document.getElementById('prof-range').textContent = card.weapon?.range == null ? '' : displayRange(card.weapon.range);
    document.getElementById('prof-atk').textContent = card.weapon?.attacks ?? '';
    document.getElementById('prof-hit').textContent = card.weapon?.hit ?? '';
    document.getElementById('prof-ap').textContent = card.weapon?.ap ?? '';
    document.getElementById('prof-dmg').textContent = card.weapon?.damage ?? '';
    const cardType = (card.type||'').trim();
    document.getElementById('inspector-card-view').classList.toggle('power-card', cardType === 'Power');
    // Hide HP/save stat icons for Power cards
    const hpStatEl   = document.querySelector('.prof-hp-stat');
    const saveStatEl = document.querySelector('.prof-save-stat');
    if(hpStatEl)   hpStatEl.style.display   = cardType === 'Power' ? 'none' : '';
    if(saveStatEl) saveStatEl.style.display = cardType === 'Power' ? 'none' : '';

    const isOwnUnit   = context==='board' && card.owner===state.activePlayer;
    const isEnemy     = context==='board' && card.owner && card.owner!==state.activePlayer;
    const isBoard     = context==='board';

    const ab = card.ability;
    const isActiveUnit = isOwnUnit && state.activeUnit?.card?.uid === card.uid;
    const canUseAbility = isActiveUnit && ab && (state.activeUnit.card.actionsLeft ?? 0) >= ab.apCost;
    const isAbilityActive = state.activeAction === 'ability';
    const specialText = (card.special||'').replace(/\((\d+)AP\)/gi, '').trim();
    const nameEnd = specialText.indexOf(':');
    const abilityName = nameEnd !== -1 ? specialText.slice(0, nameEnd) : specialText;
    const abilityDesc = nameEnd !== -1 ? specialText.slice(nameEnd+1).trim() : '';

    if (ab) {
      const stars = Array(ab.apCost).fill(`<span class="ab-star">✦</span>`).join('');
      const btnClass = !canUseAbility ? 'ability-btn' : isAbilityActive ? 'ability-btn ability-active' : 'ability-btn ability-idle';
      const disabled = !canUseAbility ? 'disabled' : '';
      document.getElementById('prof-special').innerHTML =
        `<button class="${btnClass}" ${disabled} onclick="selectAbility()">
          ${stars}
          <span class="ab-text"><span class="special-name">${abilityName}:</span> ${abilityDesc}</span>
        </button>`;
    } else {
      document.getElementById('prof-special').innerHTML =
        `<span class="special-name">${abilityName}:</span> ${abilityDesc}`;
    }
    const visual      = document.getElementById('prof-card-visual');
    const ownerCol    = isBoard && card.owner ? (card.owner===1?'p1':'p2') : (state.activePlayer===1?'p1':'p2');

    // Card visual state + pulse
    visual.className = `prof-card-visual ${ownerCol}-unit`;
    const art = artStyle(card);
    visual.style.cssText = art;
    const canAffordActivate = isOwnUnit && card.actionsLeft===null && state.players[state.activePlayer].resources >= 1;
    const canDeploy = context==='hand' && state.players[state.activePlayer].resources >= card.cost;
    if (isOwnUnit && card.actionsLeft===null) visual.classList.add('cv-selected','cv-pulse');
    else if (context==='hand') visual.classList.add('cv-selected','cv-pulse');
    else if (isOwnUnit && card.actionsLeft > 0) visual.classList.add('cv-activated');
    else if (isOwnUnit && card.actionsLeft===0) visual.classList.add('cv-exhausted');
    setResPulse(canAffordActivate || canDeploy);

    // Label vs pips
    const label = document.getElementById('prof-cv-label');
    const pips  = document.getElementById('prof-cv-pips');
    const pip1  = document.getElementById('prof-pip-1');
    const pip2  = document.getElementById('prof-pip-2');

    if (!isBoard) {
      const reg = cardType==='Power' ? POWER_REGISTRY[card.effect] : null;
      const isInstant = reg?.subtype === 'instant';
      label.textContent = isInstant ? 'CAST' : 'DEPLOY';
      label.className='prof-cv-label lbl-deploy-active';
      label.style.display=''; pips.style.display='none';
      // Wire visual tap to castPowerCard for instant
      if(isInstant) visual.onclick = () => {
        if(state.selectedHandCard?.uid === card.uid) castPowerCard(card);
      };
    } else if (card.actionsLeft===null) {
      label.textContent='ACTIVATE'; label.className='prof-cv-label lbl-deploy-active';
      label.style.display=''; pips.style.display='none';
    } else if (card.actionsLeft > 0) {
      label.style.display='none'; pips.style.display='flex';
      pip1.style.display='';
      pip1.className=card.actionsLeft >= 2 ? 'prof-cv-pip' : 'prof-cv-pip pip-used';
      pip2.className=card.actionsLeft >= 1 ? 'prof-cv-pip' : 'prof-cv-pip pip-used';
    } else {
      label.style.display='none'; pips.style.display='none';
    }

    // Controls — End button only for active unit with actions
    const endBtn = document.getElementById('btn-end');
    endBtn.style.display = (isActiveUnit && card.actionsLeft > 0) ? 'inline-block' : 'none';

    // Enemy cards — hide all actions, visual tap zooms
    if (isEnemy) {
      document.getElementById('prof-row-actions').style.display = '';
      label.textContent = 'ENEMY'; label.className = 'prof-cv-label';
      label.style.display = ''; pips.style.display = 'none';
      visual.onclick = () => openCardZoom(card);
      setResPulse(false);
      // Show move/attack pills but fully disabled
      const movePill = document.getElementById('btn-move');
      const atkPill  = document.getElementById('btn-attack');
      if(movePill) { movePill.disabled = true; movePill.style.opacity='0.3'; }
      if(atkPill)  { atkPill.disabled  = true; atkPill.style.opacity='0.3'; }
      document.getElementById('btn-end').style.display = 'none';
    } else {
      document.getElementById('prof-row-actions').style.display = '';
      const movePill = document.getElementById('btn-move');
      const atkPill  = document.getElementById('btn-attack');
      if(movePill) movePill.style.opacity='';
      if(atkPill)  atkPill.style.opacity='';
      refreshActionButtons();
    }

    // Diamond state
    const diamond = document.getElementById('prof-cv-diamond');
    const dPip1   = document.getElementById('d-pip-1');
    const dPip2   = document.getElementById('d-pip-2');
    if (isBoard && card.actionsLeft !== null) {
      diamond.classList.add('diamond-activated');
      // Update pip states
      if (dPip1) dPip1.style.opacity = card.actionsLeft >= 2 ? '1' : '0.3';
      if (dPip2) dPip2.style.opacity = card.actionsLeft >= 1 ? '1' : '0.3';
    } else {
      diamond.classList.remove('diamond-activated');
    }

    document.getElementById('inspector-deck').style.display='none';
    const isStrip = !!state.activeUnit || context === 'hand' || opts?.strip;
    const cv = document.getElementById('inspector-card-view');
    cv.className = 'inspector-card-view active' + (isStrip ? ' strip-mode' : '');
    document.getElementById('inspector').classList.add('open');
  }

  function closeProfile() {
    document.querySelectorAll('.tile.unit-selected').forEach(t=>t.classList.remove('unit-selected'));
    state.selectedBoardTile = null;
    setResPulse(false);
    document.getElementById('inspector-card-view').className='inspector-card-view';
    // Only restore deck view if not in activated state
    if (!state.activeUnit) {
      document.getElementById('inspector-deck').style.display='flex';
    }
  }

  // ── RENDER UNIT ON TILE ──
  function renderUnit(tile, unit) {
    tile.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e=>e.remove());
    const el = document.createElement('div');
    const ownerCol = unit.owner === 1 ? 'p1' : 'p2';
    const spent     = unit.actionsLeft === 0;
    const activated = unit.actionsLeft !== null && unit.actionsLeft > 0;
    const isOwn     = unit.owner === state.activePlayer;
    const selectable = isOwn && !activated && !spent;
    el.className = `unit-on-tile ${ownerCol}-unit${spent?' exhausted':''}${selectable?' unit-selectable':''}`;

    let bottomHtml = '';
    if (activated) {
      // Active — lightning pips showing remaining actions
      let pipsHtml = '';
      for (let i = 0; i < 2; i++) {
        const used = i >= unit.actionsLeft;
        pipsHtml += `<span class="unit-pip${used?' pip-used':''}">✦</span>`;
      }
      bottomHtml = `<div class="unit-actions">${pipsHtml}</div>`;
    } else if (spent) {
      // Exhausted — dim rune
      bottomHtml = `<div class="unit-rune unit-rune-spent"></div>`;
    } else {
      // Unactivated — bright rune
      bottomHtml = `<div class="unit-rune"></div>`;
    }

    el.innerHTML = `
      <div class="unit-hp ${unit.owner===1?'p1-hp':unit.owner===2?'p2-hp':''}"><span>${unit.hp}</span></div>
      <div class="unit-name">${unit.name}</div>
      ${bottomHtml}`;
    if (unit.artId) {
      el.setAttribute('style', artStyle(unit));
      const tryHide = (src) => { const p = new Image(); p.onload = () => { const n = el.querySelector('.unit-name'); if(n) n.style.display='none'; }; p.src = src; };
      tryHide(`art/${unit.artId}.png`);
      tryHide(`art/${unit.artId}.jpg`);
      tryHide(`art/${unit.artId}.jpeg`);
    }
    tile.appendChild(el);
  }

  // ── DRAW ACTION ──
  function drawAction() {
    const p = state.players[state.activePlayer];
    if(p.resources < 1 || p.deck.length === 0 || p.drawnThisRound) return;
    p.resources -= 1;
    p.drawnThisRound = true;
    drawCard(state.activePlayer);
    renderHub();
    setTimeout(()=>{
      endCurrentTurn();
      waitThenAdvance();
    }, 1400);
  }
  let tileMap = {};
  function buildTileMap() {
    tileMap = {};
    document.querySelectorAll('.tile').forEach(t=>{
      tileMap[t.dataset.id]={ lane:t.dataset.lane, row:parseInt(t.dataset.row), col:parseInt(t.dataset.col), zone:t.dataset.zone };
    });
  }

  function getNeighbors(tileId, throughCentre=false) {
    const t=tileMap[tileId]; if(!t) return [];
    const {lane,row,col}=t;
    const rc=LANE_ROWS[row].count;
    const result=[];
    // Same row
    if(col>0)        result.push(`${lane}-${row}-${col-1}`);
    if(col<rc-1)     result.push(`${lane}-${row}-${col+1}`);
    // Adjacent rows
    for(const dr of[-1,1]){
      const nr=row+dr;
      if(nr<0||nr>=LANE_ROWS.length) continue;
      const nc=LANE_ROWS[nr].count;
      const fx=col+0.5-rc/2;
      for(let tc=0;tc<nc;tc++){
        if(Math.abs(fx-(tc+0.5-nc/2))<1.0) result.push(`${lane}-${nr}-${tc}`);
      }
    }
    return result.filter(id=>{
      const td=tileMap[id]; if(!td) return false;
      return throughCentre || td.zone!=='centre';
    });
  }

  function getReachableTiles(tileId, steps) {
    if (steps === -1) return [];
    const dist=new Map([[tileId,0]]); const queue=[tileId];
    while(queue.length){
      const cur=queue.shift(); const d=dist.get(cur);
      if(d>=steps) continue;
      for(const nid of getNeighbors(cur,false)){
        if(dist.has(nid)||state.board[nid]) continue;
        dist.set(nid,d+1); queue.push(nid);
      }
    }
    dist.delete(tileId); return [...dist.keys()];
  }

  function artStyle(card, overlay) {
    const id = card?.artId;
    if (!id) return '';
    const dim = overlay ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.25)';
    return `background: linear-gradient(${dim},${dim}) center/cover, url('art/${id}.png') center/cover, url('art/${id}.jpg') center/cover, url('art/${id}.jpeg') center/cover;`;
  }

  function parseRange(r) {
    if (typeof r === 'string' && r.includes('-')) {
      const [a,b] = r.split('-').map(Number);
      return { min:a, max:b };
    }
    if (r === 0) return { min:0, max:Infinity };
    return { min:0, max:r };
  }

  function displayRange(r) {
    if (r == null) return '';
    if (typeof r === 'string') return r;
    if (r === 0) return '∞';
    if (r === 1) return '—';
    return String(r);
  }

  function getAttackTiles(tileId, range) {
    const { min, max } = parseRange(range);
    const bfsMax = max === Infinity ? 99 : max;
    const dist = new Map([[tileId,0]]); const queue=[tileId];
    while(queue.length){
      const cur=queue.shift(); const d=dist.get(cur);
      if(d>=bfsMax) continue;
      for(const nid of getNeighbors(cur,true)){
        if(dist.has(nid)) continue;
        dist.set(nid,d+1); queue.push(nid);
      }
    }
    dist.delete(tileId);
    return [...dist.keys()].filter(id=>tileMap[id]?.zone!=='centre' && dist.get(id)>=min);
  }

  function clearHighlights() {
    document.querySelectorAll('.highlight-move,.highlight-attack,.highlight-ability').forEach(t=>{
      t.classList.remove('highlight-move','highlight-attack','highlight-ability');
    });
    document.querySelectorAll('.highlight-target').forEach(u=>u.classList.remove('highlight-target'));
    clearMoveConfirm();
  }

  function selectAbility() {
    const unit = state.activeUnit?.card;
    if (!unit?.ability) return;
    clearHighlights();
    // Toggle off if already active
    if (state.activeAction === 'ability') {
      state.activeAction = null;
      state.activeAbility = null;
      const btn = document.querySelector('.ability-btn');
      if (btn) btn.className = 'ability-btn ability-idle';
      refreshActionButtons();
      return;
    }
    // Clear move/attack state
    state.activeAction = 'ability';
    state.activeAbility = unit.ability;
    const btn = document.querySelector('.ability-btn');
    if (btn) btn.className = 'ability-btn ability-active';
    const targets = getAbilityTargets(unit.ability, state.activeUnit.tileId);
    targets.forEach(tid => {
      document.querySelector(`[data-id="${tid}"]`)?.classList.add('highlight-ability');
    });
    refreshActionButtons();
  }

  function getAbilityTargets(ability, casterTileId) {
    const { side, location, state: targetState, type } = ability.target;
    const casterLane = unitLane(casterTileId);
    const casterOwner = state.activePlayer;
    return Object.keys(state.board).filter(tid => {
      if (tid === casterTileId) return false;
      const unit = state.board[tid];
      // Side
      if (side === 'friendly' && unit.owner !== casterOwner) return false;
      if (side === 'enemy'    && unit.owner === casterOwner) return false;
      // Location
      if (location === 'lane' && unitLane(tid) !== casterLane) return false;
      if (location === 'adjacent') {
        const neighbours = getNeighbors(casterTileId, true);
        if (!neighbours.includes(tid)) return false;
      }
      // State
      if (targetState === 'activated'   && !(unit.actionsLeft > 0)) return false;
      if (targetState === 'unactivated' && unit.actionsLeft !== null) return false;
      if (targetState === 'exhausted'   && unit.actionsLeft !== 0) return false;
      // Type
      if (type === 'non_hero' && unit.type === 'Hero') return false;
      if (type === 'hero'     && unit.type !== 'Hero') return false;
      return true;
    });
  }

  // ── ABILITY REGISTRY ──
  const ABILITY_REGISTRY = {
    inspire(caster, targetTileId) {
      const target = state.board[targetTileId];
      if (!target) return;
      // Give target 1 action immediately — they can now act
      target.actionsLeft = Math.max(1, target.actionsLeft ?? 1);
      const tile = document.querySelector(`[data-id="${targetTileId}"]`);
      if (tile) renderUnit(tile, target);
      // Caster spends 1 action
      caster.actionsLeft--;
      const casterTile = document.querySelector(`[data-id="${state.activeUnit.tileId}"]`);
      if (casterTile) renderUnit(casterTile, caster);
    }
  };

  function resolveAbility(targetTileId) {
    const caster = state.activeUnit?.card;
    const casterTileId = state.activeUnit?.tileId;
    if (!caster?.ability) return;
    clearHighlights();
    state.activeAction = null;
    state.activeAbility = null;
    ABILITY_REGISTRY[caster.ability.key]?.(caster, targetTileId);
    renderHub();
    // If commander still has actions, store as return unit
    if (caster.actionsLeft > 0) {
      state.pendingReturnUnit = { tileId: casterTileId, card: caster };
    }
    // Switch activeUnit to target so their turn flows normally
    const target = state.board[targetTileId];
    if (target) {
      state.activeUnit = { tileId: targetTileId, card: target };
      document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
      document.querySelector(`[data-id="${targetTileId}"]`)?.classList.add('unit-active','unit-selected');
      openProfile(target, 'board', targetTileId);
    }
  }

  function resolveCombat(atk, def, laneKey=null) {
    const fx = getLaneEffect(laneKey);
    const eff = fx ? EFFECT_REGISTRY[fx.effect] : null;
    const hitThresh=parseInt(atk.weapon.hit);
    const saveThresh=parseInt(def.save);
    let modSave=saveThresh+atk.weapon.ap;
    if(eff?.modifySave) modSave = eff.modifySave(fx, modSave);
    const autoFail=modSave>6;
    const attackCount = atk.weapon.attacks + (atk.bonusAttacks||0);
    const atkDice=Array.from({length:attackCount},()=>Math.ceil(Math.random()*6));
    const hits=atkDice.filter(d=>d>=hitThresh).length;
    const saveDice=autoFail?[]:Array.from({length:hits},()=>Math.ceil(Math.random()*6));
    const saved=autoFail?0:saveDice.filter(d=>d>=modSave).length;
    let totalDmg=(hits-saved)*atk.weapon.damage;
    if(eff?.onRollSix) totalDmg += eff.onRollSix(fx, atkDice);
    return {atkDice,hits,saveDice,saved,autoFail,modSave,totalDmg,hitThresh};
  }

  function openBattleOverlay(targetTileId) {
    const atk=state.activeUnit.card;
    const def=state.board[targetTileId];
    if(!def) return;
    const atkCol=state.activePlayer===1?'p1':'p2';
    const defCol=state.activePlayer===1?'p2':'p1';

    function bCardHtml(card,col,curHp) {
      const rng=displayRange(card.weapon.range);
      const mv=card.move===-1?'—':`${card.move}"`;
      const sp=card.special.indexOf(':');
      return `<div class="battle-card ${col}-tint">
        <div class="bcard-art" style="${artStyle(card, true)}">
          <div class="bcard-hp">❤ ${curHp}</div>
          <div class="bcard-cost-badge"><span>${card.cost}</span></div>
          <div class="bcard-badges">
            <div class="bcard-badge">🛡 ${card.save}</div>
            <div class="bcard-badge">↗ ${mv}</div>
          </div>
        </div>
        <div class="bcard-info">
          <div class="bcard-type">${card.type}</div>
          <div class="bcard-name">${card.name}</div>
          <div class="bcard-weapon">${card.weapon.name}</div>
        </div>
        <div class="bcard-stats">
          <div class="bstat"><div class="bstat-val">${rng}</div><div class="bstat-lbl">Rng</div></div>
          <div class="bstat"><div class="bstat-val">${card.weapon.attacks}</div><div class="bstat-lbl">Atk</div></div>
          <div class="bstat"><div class="bstat-val">${card.weapon.hit}</div><div class="bstat-lbl">Hit</div></div>
          <div class="bstat"><div class="bstat-val">${card.weapon.ap}</div><div class="bstat-lbl">AP</div></div>
          <div class="bstat"><div class="bstat-val">${card.weapon.damage}</div><div class="bstat-lbl">Dmg</div></div>
        </div>
        <div class="bcard-special"><span class="bcard-special-name">${card.special.substring(0,sp)}:</span>${card.special.substring(sp+1)}</div>
      </div>`;
    }

    const ov=document.createElement('div');
    ov.className='battle-overlay';
    ov.innerHTML=`
      <div class="battle-header">
        <div class="battle-heading">Combat</div>
        <div class="battle-close" id="battle-close">✕</div>
      </div>
      <div class="battle-cards">
        ${bCardHtml(atk,atkCol,atk.hp)}
        <div class="battle-vs"><div class="battle-vs-icon">⚔</div><div class="battle-vs-arrow">→</div></div>
        ${bCardHtml(def,defCol,def.hp)}
      </div>
      <div class="battle-cta" id="battle-cta">
        <button class="battle-attack-btn">Attack ▶</button>
      </div>`;
    document.body.appendChild(ov);
    requestAnimationFrame(()=>ov.classList.add('show'));

    ov.querySelector('#battle-close').addEventListener('click',()=>ov.remove());

    ov.querySelector('.battle-attack-btn').addEventListener('click',()=>{
      const result=resolveCombat(atk,def,unitLane(targetTileId));
      const hpBefore=def.hp;
      const hpAfter=Math.max(0,hpBefore-result.totalDmg);
      const slain=hpAfter<=0;
      const {atkDice,hits,saveDice,saved,autoFail,modSave,totalDmg,hitThresh}=result;
      const atkDiceHtml = atkDice.map(d=>`<span class="die ${d>=hitThresh?'die-hit':'die-miss'}">${d}</span>`).join('');
      const saveDiceHtml = saveDice.map(d=>`<span class="die ${d>=modSave?'die-saved':'die-failed'}">${d}</span>`).join('');
      const saveLabel=autoFail?'Save (auto-fail)':`Save ${modSave}+`;
      const saveLine=autoFail
        ?`<div class="combat-row"><span class="combat-lbl">${saveLabel}</span><span class="combat-val saves">0/${hits}</span></div>`
        :`<div class="combat-row"><span class="combat-lbl">${saveLabel}</span><div class="dice-row">${saveDiceHtml}</div><span class="combat-val saves">${saved} saved</span></div>`;
      document.getElementById('battle-cta').innerHTML=`<div class="battle-resolution">
        <div class="combat-row"><span class="combat-lbl">Hit ${atk.weapon.hit}</span><div class="dice-row">${atkDiceHtml}</div><span class="combat-val hits">${hits} hit${hits!==1?'s':''}</span></div>
        ${saveLine}
        <div class="combat-divider"></div>
        <div class="combat-row"><span class="combat-lbl">Damage</span><span class="combat-val dmg">${totalDmg>0?`−${totalDmg}`:'None'}</span></div>
        <div class="combat-row"><span class="combat-lbl">${def.name} HP</span><span class="combat-val hp">${slain?'☠ Slain':`${hpBefore} → ${hpAfter}`}</span></div>
        <button class="battle-done-btn" id="battle-done-btn">Resolve ▶</button>
      </div>`;
      document.getElementById('battle-done-btn').addEventListener('click',()=>{
        // Close overlay immediately
        ov.remove();
        clearHighlights();
        setUILock(true);
        // Apply state changes
        def.hp = hpAfter;
        atk.actionsLeft--;
        // Show float on board
        if(result.totalDmg > 0) showDamageFloat(targetTileId, result.totalDmg);
        // Update board after short delay so float is visible
        setTimeout(()=>{
          if(slain){
            removeSlain(targetTileId);
          } else {
            const tile=document.querySelector(`[data-id="${targetTileId}"]`);
            const tileHp=tile?.querySelector('.unit-hp span');
            if(tileHp) tileHp.textContent=def.hp;
          }
          const atkTile=document.querySelector(`[data-id="${state.activeUnit.tileId}"]`);
          if(atkTile) renderUnit(atkTile, atk);
          renderHub();
          setUILock(false);
          if(atk.actionsLeft>0){ state.activeAction=null; selectAction('attack'); }
          else { closeProfile(); endCurrentTurn(); waitThenAdvance(); }
        }, 600);
      });
    });
  }

  function removeSlain(tileId) {
    const unit=state.board[tileId]; if(!unit) return;
    const fx = getLaneEffect(unitLane(tileId));
    if(fx) EFFECT_REGISTRY[fx.effect]?.onSlain?.(fx, tileId);
    state.players[unit.owner].graveyard.push({...unit});
    delete state.board[tileId];
    const tile=document.querySelector(`[data-id="${tileId}"]`);
    if(tile){
      tile.querySelectorAll('.unit-on-tile,.act-indicator').forEach(e=>e.remove());
      // Show skull marker — cleared in requisitionPhase
      const skull=document.createElement('div');
      skull.className='unit-skull';
      skull.textContent='☠';
      tile.appendChild(skull);
    }
    // TODO Step 10: Wretch 'Expendable' hook — if(unit.id==='c4') drawCard(unit.owner)
    renderHub();
  }



  function onHubCta() {
    // Handled by setBarState wiring in Step 2
    if (state._ctaAction === 'deploy' && state.pendingTile) executeDeployTo(state.pendingTile);
    else if (state._ctaAction === 'activate') activateUnit();
  }

  function onHubCancel() {
    if (state._ctaAction === 'deploy') cancelPendingDeploy();
    else if (state._ctaAction === 'activate') {
      state._ctaAction = null;
      setBarState('default');
      deselectAll();
    }
  }

  function skipAction() {
    endUnit();
  }

  function setBarState(state_name, opts={}) {
    const deck    = document.getElementById('inspector-deck');
    const pass    = document.getElementById('pass-widget');
    const diamond = document.getElementById('hub-diamond-wrap');
    const actions = document.getElementById('hub-actions');
    const cancel  = document.getElementById('hub-cancel');
    const hubName = document.getElementById('hub-name');
    const cta     = document.getElementById('hub-cta');
    const ctaLbl  = document.getElementById('hub-cta-label');
    const ctaCost = document.getElementById('hub-cta-cost');

    // Reset all first
    deck.style.display    = 'none';
    pass.style.display    = 'none';
    diamond.style.display = 'none';
    actions.classList.remove('active');
    cancel.style.display  = 'none';
    hubName.style.display = '';
    cta.style.display     = 'none';

    if (state_name === 'default') {
      deck.style.display    = '';
      diamond.style.display = '';
      pass.style.display    = '';

    } else if (state_name === 'pending') {
      // Pending spend — cancel left, diamond centre, CTA right
      deck.style.display    = '';  // keep hand visible
      diamond.style.display = '';
      cancel.style.display  = '';
      hubName.style.display = 'none';
      cta.style.display     = '';
      ctaLbl.textContent    = opts.label  || 'Confirm';
      ctaCost.textContent   = opts.cost   ? `−${opts.cost}` : '';
      state._ctaAction      = opts.action || null;

    } else if (state_name === 'activated') {
      // Activated — name left, actions centre, no right
      deck.style.display = 'none';
      actions.classList.add('active');
    }
  }

  function showActionBar(unit) {
    // Show ability button only if unit has an ability
    const ab = unit?.ability || unit?.special;
    document.getElementById('act-btn-ability').style.display = ab ? 'flex' : 'none';
    setBarState('activated');
  }

  function hideActionBar() {
    state._ctaAction = null;
    setBarState('default');
  }

  function updateActionBar() {
    const unit = state.activeUnit?.card;
    if (!unit) return;
    const actions = unit.actionsLeft ?? 0;
    const current = state.activeAction;
    const immobile = unit.move === -1;

    const btnMove    = document.getElementById('act-btn-move');
    const btnAttack  = document.getElementById('act-btn-attack');
    const btnAbility = document.getElementById('act-btn-ability');
    const btnEnd     = document.getElementById('act-btn-end');

    // Move
    if (immobile || actions === 0) btnMove.className = 'act-btn act-unavailable';
    else if (current === 'move')    btnMove.className = 'act-btn act-selected';
    else                            btnMove.className = 'act-btn act-available';

    // Attack
    if (actions === 0)               btnAttack.className = 'act-btn act-unavailable';
    else if (current === 'attack')   btnAttack.className = 'act-btn act-selected';
    else                             btnAttack.className = 'act-btn act-available';

    // Ability (only shown if unit has one)
    if (btnAbility.style.display !== 'none') {
      const ab = unit.ability;
      const canUse = ab && actions >= (ab.apCost || 1);
      if (!canUse)                    btnAbility.className = 'act-btn act-unavailable';
      else if (current === 'ability') btnAbility.className = 'act-btn act-selected';
      else                            btnAbility.className = 'act-btn act-available';
    }

    // End — always available when unit is active
    btnEnd.className = 'act-btn act-available';
  }

  function activateUnit() {
    const p=state.players[state.activePlayer];
    const unit=state.board[profileTileId];
    if(!unit || unit.owner !== state.activePlayer) return;
    if(p.resources<1||!profileTileId) return;
    p.resources-=1;
    setResPulse(false);
    unit.actionsLeft=2;
    state.activeUnit={tileId:profileTileId, card:unit};
    document.querySelectorAll('.unit-active').forEach(t=>t.classList.remove('unit-active'));
    const tile = document.querySelector(`[data-id="${profileTileId}"]`);
    if(tile) { tile.classList.add('unit-active','unit-selected'); }
    renderUnit(tile, unit);
    renderHub();
    showActionBar(unit);
    openProfile(unit,'board',profileTileId);
    setBarState('activated');
    selectAction('move');
    updateActionBar();
  }

  // ── SELECT ACTION (Move / Attack) ──
  function selectAction(action) {
    clearHighlights();
    state.activeAbility = null;
    // Reset ability button if shown
    const btn = document.querySelector('.ability-btn.ability-active');
    if (btn) btn.className = 'ability-btn ability-idle';
    if(state.activeAction===action){ state.activeAction=null; refreshActionButtons(); updateActionBar(); return; }
    state.activeAction=action;
    refreshActionButtons();
    updateActionBar();
    const unit=state.activeUnit?.card;
    const tid=state.activeUnit?.tileId;
    if(!unit||!tid) return;
    if(action==='move'){
      getReachableTiles(tid, unit.move).forEach(id=>{
        document.querySelector(`[data-id="${id}"]`)?.classList.add('highlight-move');
      });
    } else {
      const enemy=state.activePlayer===1?2:1;
      const lane = unitLane(tid);
      const fxRange = getLaneEffect(lane);
      const effRange = fxRange ? EFFECT_REGISTRY[fxRange.effect] : null;
      const range = effRange?.getRange ? effRange.getRange(fxRange, unit.weapon.range) : unit.weapon.range;
      getAttackTiles(tid, range).forEach(id=>{
        const el=document.querySelector(`[data-id="${id}"]`); if(!el) return;
        el.classList.add('highlight-attack');
        if(state.board[id]?.owner===enemy) el.querySelector('.unit-on-tile')?.classList.add('highlight-target');
      });
    }
  }

  function consumeAction() {
    const unit = state.activeUnit?.card; if(!unit) return;
    unit.actionsLeft--;
    const tile = document.querySelector(`[data-id="${profileTileId}"]`);
    if(tile) renderUnit(tile, unit);
    // refresh diamond pips in inspector
    const d1=document.getElementById('d-pip-1');
    const d2=document.getElementById('d-pip-2');
    if(d1) d1.style.opacity = unit.actionsLeft >= 2 ? '1' : '0.3';
    if(d2) d2.style.opacity = unit.actionsLeft >= 1 ? '1' : '0.3';
    refreshActionButtons();
