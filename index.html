.combat-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
.combat-lbl { font-size: var(--fs-xs); color: #7a6030; text-transform: uppercase; letter-spacing: 0.08em; flex: 0 0 auto; min-width: 72px; }
.dice-row { display: flex; gap: 3px; flex-wrap: wrap; flex: 1; }
.die { width: 16px; height: 16px; background: #1a1610; border: 1px solid #4a3818; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: var(--fs-xs); font-weight: 700; color: #c8a060; }
.die.die-hit    { color: var(--outcome-success); border-color: var(--outcome-success); }

/* ── ROUND SCORING ── */
.score-float {
position: fixed; z-index: 80; pointer-events: none;
font-family: ‘Spectral’, Georgia, serif;
font-size: var(--fs-md); font-weight: 900;
text-shadow: 0 0 10px currentColor;
transform: translate(-50%, -50%);
animation: scorePop 1.1s ease forwards;
}
.dmg-float {
position: fixed; z-index: 80; pointer-events: none;
font-family: 'Spectral', Georgia, serif;
font-size: var(--fs-sm); font-weight: 900; color: var(--hp-negative);
text-shadow: 0 0 8px rgba(200,48,48,0.8);
transform: translate(-50%, -50%);
animation: scorePop 1.1s ease forwards;
}
@keyframes scorePop {
0%   { opacity:0; margin-top:0; }
20%  { opacity:1; }
80%  { opacity:1; margin-top:-28px; }
100% { opacity:0; margin-top:-36px; }
}
.scoring-overlay {
position: fixed; inset: 0; z-index: 55;
background: rgba(0,0,0,0); pointer-events: none;
transition: background 0.5s;

}
.scoring-overlay.show { background: rgba(0,0,0,0.84); pointer-events: all; }
.scoring-complete-label {

letter-spacing: 0.3em; text-transform: uppercase;

}
.scoring-overlay.show .scoring-complete-label { opacity: 1; }
.turn-wait {
position: fixed; top: 50%; left: 50%;
transform: translate(-50%, -50%);
font-size: var(--fs-lg); z-index: 90;
opacity: 0; pointer-events: none;
transition: opacity 0.2s;
}
.turn-wait.show { opacity: 1; }
#ui-lock {
  display: none; position: fixed; inset: 0; z-index: 35;
  background: rgba(0,0,0,0.45);
  transition: none;
}
.round-end-overlay {
position: fixed; inset: 0; z-index: 50;
background: rgba(0,0,0,0.88);

.round-end-sub   { font-family: ‘Spectral’,serif; font-size: var(--fs-xs); color: #7a6030; letter-spacing: 0.2em; text-transform: uppercase; }
.round-end-btn   { font-family: ‘Spectral’,serif; font-size: var(--fs-xs); font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #c8a060; background: linear-gradient(160deg,#2a2010,#1a1408); border: 1px solid #c08020; border-radius: 4px; padding: 10px 28px; cursor: pointer; box-shadow: 0 0 16px rgba(200,160,60,0.3); margin-top: 8px; }

/* Jump Lane animation */

/* Patch 137 — draw-card reveal before hand add */
.draw-reveal-overlay {
  position: fixed;
  inset: 0;
  z-index: 260;
  pointer-events: none;
  background: radial-gradient(circle at 50% 46%, rgba(0,0,0,0.16), rgba(0,0,0,0.56));
  opacity: 0;
  transition: opacity .22s ease;
}
.draw-reveal-overlay.show { opacity: 1; }
.draw-reveal-card {
  position: fixed;
  width: min(263px,70.5vw);
  aspect-ratio: 5 / 7;
  transform-origin: center center;
  opacity: 0;
  perspective: 1100px;
  transition: left .58s cubic-bezier(.18,.84,.28,1), top .58s cubic-bezier(.18,.84,.28,1), transform .58s cubic-bezier(.18,.84,.28,1), opacity .22s ease;
  will-change: left, top, transform, opacity;
}
.draw-reveal-card.reveal-in {
  opacity: 1;
  transform: translate(-50%,-50%) scale(1);
}
.draw-reveal-card.reveal-out {
  opacity: 0;
  transform: translate(-50%,-50%) scale(.92);
  transition: transform .24s ease, opacity .24s ease;
}
.draw-reveal-flipper {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transform: rotateY(0deg);
  transition: transform .48s cubic-bezier(.2,.78,.24,1);
}
.draw-reveal-card.flipped .draw-reveal-flipper { transform: rotateY(180deg); }
.draw-reveal-face {
  position: absolute !important;
  inset: 0;
  width: 100% !important;
  height: 100% !important;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.draw-reveal-front { transform: rotateY(180deg); }
.draw-reveal-back {
  border-radius: 14px;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 44%, rgba(240,192,32,.18), rgba(0,0,0,0) 30%),
    linear-gradient(145deg, rgba(44,32,20,.98), rgba(12,10,8,.99));
  border: 2px solid rgba(210,150,72,.72);
  box-shadow: inset 0 0 0 3px rgba(0,0,0,.48), inset 0 0 28px rgba(0,0,0,.92), 0 14px 34px rgba(0,0,0,.76);
  display: grid;
  place-items: center;
  color: #f0d080;
  font-family: 'Cinzel', 'Spectral', Georgia, serif;
  text-align: center;
  letter-spacing: .18em;
  text-transform: uppercase;
}
.draw-reveal-back::before {
  content: '';
  position: absolute;
  inset: 10px;
  border: 1px solid rgba(240,192,96,.42);
  border-radius: 10px;
  box-shadow: inset 0 0 22px rgba(146,84,220,.18);
}
.draw-reveal-back::after {
  content: '✦';
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%,-50%);
  font-size: 72px;
  color: rgba(240,192,80,.62);
  text-shadow: 0 0 20px rgba(146,84,220,.45);
}
.draw-reveal-back-title {
  position: relative;
  z-index: 1;
  margin-top: 118px;
  font-size: 18px;
  font-weight: 900;
  text-shadow: 0 2px 10px rgba(0,0,0,.85);
}
.draw-reveal-label {
  position: fixed;
  left: 50%;
  top: calc(50% + min(263px,70.5vw) * .74);
  transform: translateX(-50%);
  color: #f0d080;
  font-family: 'Spectral', Georgia, serif;
  font-weight: 900;
  letter-spacing: .14em;
  text-transform: uppercase;
  font-size: 12px;
  text-shadow: 0 2px 10px rgba(0,0,0,.9);
  opacity: 0;
  transition: opacity .24s ease .18s;
}
.draw-reveal-overlay.show .draw-reveal-label { opacity: .92; }
.draw-reveal-overlay.revealed .draw-reveal-label::after { content: ' Revealed'; }
/* Patch 132 — floating hand + hub-only panel */
.player-bar {
  background: transparent !important;
  box-shadow: none !important;
}
.player-bar .hub-row {
  background: linear-gradient(0deg, rgba(13,11,8,0.96) 0%, rgba(20,16,8,0.96) 100%);

<!-- TURN TOAST -->

<div class="turn-toast" id="turn-toast">

</div>

<div class="req-overlay" id="req-overlay">

</div>

  function prototypePowerCardsFrom(repo) {

      .map(id => cleanRepo.find(c => c.id === id || c.artId === id))

  function mergeDraftPowerCards(repo) {
    const cleanRepo = normaliseCardRepo(repo) || [];
    const existingIds = new Set(cleanRepo.map(c => c.id));
    const builtIns = normaliseCardRepo(CARDS).filter(c => DRAFTTYPE_POWER_CARD_IDS.includes(c.id));

  function injectDraftPowerCards(deck, repo, player) {

  // ── EFFECT REGISTRY ──
  // Each entry maps an effect type to its hook functions.
  // Hooks receive (fx, ...context) where fx is the full lane effect object.
  // To add a new mechanic: add one entry here. No other code changes needed.
  const EFFECT_REGISTRY = {
    damage_all_round_start: {
      onRoundStart(fx, lane) {
        const tids = Object.keys(state.board).filter(tid => unitLane(tid) === lane);
        tids.forEach(tid => {
          const unit = state.board[tid];
          unit.hp = Math.max(0, unit.hp - fx.value);
          showDamageFloat(tid, fx.value);
          if (unit.hp <= 0) {
            setTimeout(()=>removeSlain(tid), 600);

            const hpEl = document.querySelector(`[data-id="${tid}"] .unit-hp span`);
            setTimeout(()=>{ if(hpEl) hpEl.textContent=unit.hp; }, 600);
          }
        });
      }
    },
    save_modifier: {
      modifySave(fx, modSave) { return Math.max(2, modSave - fx.value); }
    },
    bonus_dmg_on_six: {
      onRollSix(fx, atkDice) { return atkDice.filter(d => d === 6).length * fx.value; }
    },
    range_cap: {
      getRange(fx, base) {
        if (typeof base === 'string' && base.includes('-')) {
          const [a,b] = base.split('-').map(Number);
          return `${a}-${Math.min(b, fx.value)}`;
        }
        return base === 0 ? fx.value : Math.min(base, fx.value);
      }
    },
    attack_bonus_on_slain: {
      onSlain(fx, slainTileId) {
        const lane = unitLane(slainTileId);
        Object.keys(state.board).filter(tid => unitLane(tid) === lane).forEach(tid => {
          state.board[tid].bonusAttacks = (state.board[tid].bonusAttacks || 0) + fx.value;
        });
      }
    },
    booby_trapped: {
      getRevealPreview(fx, lane) {
        const roll = Math.floor(Math.random() * 6) + 1;
        fx._roll = roll;
        const count = Object.keys(state.board).filter(tid =>
          unitLane(tid) === lane && tileMap[tid]?.zone === 'control-zone'
        ).length;
        const hits = count === 1 ? '1 unit' : count > 1 ? `${count} units` : 'no units';
        return `🎲 Rolled <strong style="color:#cc3030">${roll}</strong> — ${roll} damage to ${hits} in control zone`;
      },
      onReveal(fx, lane) {
        const roll = fx._roll ?? Math.floor(Math.random() * 6) + 1;
        const tids = Object.keys(state.board).filter(tid =>
          unitLane(tid) === lane && tileMap[tid]?.zone === 'control-zone'
        );
        tids.forEach(tid => {
          const unit = state.board[tid];
          unit.hp = Math.max(0, unit.hp - roll);
          showDamageFloat(tid, roll);
          if (unit.hp <= 0) {
            setTimeout(()=>removeSlain(tid), 600);
          } else {
            const hpEl = document.querySelector(`[data-id="${tid}"] .unit-hp span`);
            setTimeout(()=>{ if(hpEl) hpEl.textContent = unit.hp; }, 600);
          }

    },
  };

  function unitLane(tileId) { return tileId.split('-')[0]; }
  function getLaneEffect(lane) {
    const fx = state.laneEffects?.[lane];

  function cardSlug(value) {
    return String(value ?? '')
      .trim()
      .toLowerCase()
      .replace(/&/g, 'and')
      .replace(/[^a-z0-9]+/g, '_')
      .replace(/^_+|_+$/g, '');
  }

  function generatedCardIdentity(card) {
    const base = cardSlug(card?.internalName || card?.name || card?.id || 'card');
    const variant = cardSlug(card?.variant || '');
    return variant ? `${base}_${variant}` : base;
  }

  function normaliseMechanicKey(value) {
    return String(value ?? '')
      .trim()
      .toLowerCase()
      .replace(/\+/g,'plus')
      .replace(/[^a-z0-9]+/g,'');
  }

  function normaliseAbilityTriggerValue(value) {
    const raw = String(value ?? '').trim();
    if (!raw || raw === 'none') return '';
    const key = normaliseMechanicKey(raw);
    const map = {
      none:'', no:'', na:'', blank:'',
      action:'action', activated:'action', activatedaction:'action', activatedability:'action', onaction:'action',
      onplay:'on_play', play:'on_play', whenplayed:'on_play',
      ondeploy:'on_deploy', deploy:'on_deploy', whendeployed:'on_deploy',
      onattack:'on_attack', attack:'on_attack',
      onattackroll:'on_attack_roll', attackroll:'on_attack_roll', onroll:'on_attack_roll', dice:'on_attack_roll', diceroll:'on_attack_roll',
      onsaveroll:'on_save_roll', saveroll:'on_save_roll',
      ondefend:'on_defend', defend:'on_defend',
      ondeath:'on_death', death:'on_death', onslain:'on_death',
      onturnstart:'on_turn_start', turnstart:'on_turn_start',
      onturnend:'on_turn_end', turnend:'on_turn_end',
      passive:'passive', aura:'passive'
    };
    return Object.prototype.hasOwnProperty.call(map, key) ? map[key] : raw;
  }

  function normaliseAbilityEffectValue(value) {
    const raw = String(value ?? '').trim();
    if (!raw) return '';
    const key = normaliseMechanicKey(raw);
    const map = {
      none:'none', no:'none', na:'none',
      inspire:'command_unit', command:'command_unit', commandunit:'command_unit', order:'command_unit', giveaction:'command_unit', addaction:'add_action', rallyunit:'command_unit',
      jumplane:'jump_lane', jump:'jump_lane',
      movethenfight:'move_then_fight', movefight:'move_then_fight', charge:'move_then_fight', cavalrycharge:'move_then_fight', thunderingcharge:'move_then_fight',
      explodinghits:'exploding_hits', explodinghit:'exploding_hits', explodehits:'exploding_hits', explodehit:'exploding_hits', exploding:'exploding_hits',
      chainhits:'chain_hits', chainhit:'chain_hits', chains:'chain_hits', chain:'chain_hits',
      damage:'damage', dealdamage:'damage',
      heal:'heal', healing:'heal',
      draw:'draw', drawcards:'draw',
      addresource:'add_resource', addresources:'add_resource', resource:'add_resource', resources:'add_resource'
    };
    return Object.prototype.hasOwnProperty.call(map, key) ? map[key] : raw;
  }

  function normaliseCardTypeValue(value) {
    const raw = String(value ?? '').trim();
    const key = normaliseMechanicKey(raw);
    const map = {
      power:'Power', spell:'Power', tactic:'Power',
      hero:'Hero', leader:'Hero',
      uncommon:'Uncommon', elite:'Uncommon',
      common:'Common', unit:'Common'
    };
    return map[key] || raw;
  }

  function normaliseFactionValue(value) {
    const raw = String(value ?? '').trim();
    if (!raw) return 'universal';
    const key = normaliseMechanicKey(raw);
    const map = {
      universal:'universal', neutral:'universal', none:'universal',
      orderofiron:'order_of_iron', iron:'order_of_iron',
      orderofflame:'order_of_flame', orderofflames:'order_of_flame', flame:'order_of_flame', flames:'order_of_flame',
      orderofshadows:'order_of_shadows', shadows:'order_of_shadows', shadow:'order_of_shadows',
      orderofveil:'order_of_veil', orderoftheveil:'order_of_veil', veil:'order_of_veil',
      orderoflight:'order_of_light', light:'order_of_light',
      orderofhunt:'order_of_hunt', orderofthehunt:'order_of_hunt', orderofbeasts:'order_of_hunt', hunt:'order_of_hunt', beasts:'order_of_hunt',
      orderofartifice:'order_of_artifice', artifice:'order_of_artifice'
    };
    return map[key] || raw;
  }

  function normaliseAbilityTargetValue(value, fallback='') {
    const raw = String(value ?? '').trim();
    if (!raw) return fallback;
    return raw.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
  }

  function normaliseAbilityTarget(target={}, card={}) {
    const base = target && typeof target === 'object' ? target : {};
    let side = normaliseAbilityTargetValue(base.side ?? base.targetSide ?? base.ability_target_side, 'friendly');
    let type = normaliseAbilityTargetValue(base.type ?? base.targetType ?? base.ability_target_type, 'unit');
    let location = normaliseAbilityTargetValue(base.location ?? base.targetLocation ?? base.ability_target_location, 'same_lane');
    let stateValue = normaliseAbilityTargetValue(base.state ?? base.targetState ?? base.ability_target_state, 'any');
    let count = normaliseAbilityTargetValue(base.count ?? base.targetCount ?? base.ability_target_count, 'single');
    let unitType = normaliseAbilityTargetValue(base.unitType ?? base.unit_type ?? base.targetUnitType ?? base.ability_target_unit_type, 'any');
    let faction = normaliseFactionValue(base.faction ?? base.targetFaction ?? base.ability_target_faction ?? 'any');
    const rangeRaw = base.range ?? base.targetRange ?? base.ability_target_range;

    if (location === 'lane') location = 'same_lane';
    if (location === 'opposite_lane') location = 'opposite_lane_same_row';
    if (side === 'empty') { type = 'tile'; stateValue = stateValue || 'empty'; }
    if (side === 'self') { type = 'unit'; location = 'self'; }
    // Backwards compatibility: older hand-authored abilities used target.type for hero/non-hero filters.
    if (['hero','non_hero','common','uncommon'].includes(type)) {
      unitType = type;
      type = 'unit';
    }

    return {
      side,
      type,
      location,
      range: rangeRaw === '' || rangeRaw == null ? null : Number(rangeRaw),
      count,
      state: stateValue,
      unitType,
      faction
    };
  }

  function makeRuntimeAbilityFromEffect(effectKey, card={}) {
    effectKey = normaliseAbilityEffectValue(effectKey);
    if (!effectKey || effectKey === 'none') return null;
    const defaultApCost = effectKey === 'move_then_fight' ? 2 : 1;
    const apCost = Number.isFinite(Number(card.apCost ?? card.abilityCost)) ? Number(card.apCost ?? card.abilityCost) : defaultApCost;
    const value = card.value ?? card.unitValue ?? card.abilityValue ?? null;
    const labels = {
      command_unit: 'Command Unit',
      add_action: 'Add Action',
      jump_lane: 'Jump Lane',
      move_then_fight: 'Charge',
      damage: 'Damage',
      heal: 'Heal',
      draw: 'Draw',
      add_resource: 'Add Resource'
    };
    const target = card.abilityTarget || card.target || abilityTargetForEffect(effectKey);
    return {
      key: effectKey,
      apCost,
      value,
      name: labels[effectKey] || effectKey,
      target: normaliseAbilityTarget(target, card)
    };
  }

  function abilityTargetForEffect(effectKey) {
    effectKey = normaliseAbilityEffectValue(effectKey);
    if (effectKey === 'jump_lane') return { side:'empty', location:'opposite_lane_same_row', state:'empty', type:'tile' };
    if (effectKey === 'move_then_fight') return { side:'enemy', location:'reachable_attack', state:'any', type:'unit' };
    if (effectKey === 'command_unit') return { side:'friendly', location:'same_lane', state:'any', type:'unit', unitType:'non_hero', faction:'any' };
    if (effectKey === 'add_action') return { side:'friendly', location:'same_lane', state:'any', type:'unit', unitType:'any', faction:'any' };
    if (effectKey === 'heal') return { side:'friendly', location:'same_lane', state:'damaged', type:'unit' };
    if (effectKey === 'damage') return { side:'enemy', location:'same_lane', state:'any', type:'unit' };
    return { side:'friendly', location:'same_lane', state:'any', type:'unit' };
  }

  function normaliseImportedCard(card) {
    if (!card || typeof card !== 'object') return card;
    const identity = generatedCardIdentity(card);
    const displayName = card.displayName || card.display_name || card.display || card.title || card.name || identity;
    const weapon = card.weapon && typeof card.weapon === 'object' ? { ...card.weapon } : card.weapon;
    const type = normaliseCardTypeValue(card.type || '');
    const triggerKey = normaliseAbilityTriggerValue(card.trigger || card.mechanic?.trigger || card.abilityTrigger || '');
    const effectKey = type === 'Power'
      ? (card.effect || card.powerEffect || null)
      : normaliseAbilityEffectValue(card.unitEffect || card.mechanic?.effect || card.effect || card.abilityEffect || '');
    const abilityTarget = normaliseAbilityTarget(card.abilityTarget || card.target || card.mechanic?.target || abilityTargetForEffect(effectKey), card);
    const diceTrigger = card.diceTrigger || card.mechanic?.diceTrigger || (triggerKey === 'on_attack_roll' && (effectKey === 'exploding_hits' || effectKey === 'chain_hits') ? {
      trigger:'on_attack_roll',
      condition:'natural_gte',
      threshold: Math.max(1, Math.min(6, Number(card.threshold ?? card.abilityRoll ?? 6) || 6)),
      effect: effectKey,
      value: Math.max(1, Number(card.unitValue ?? card.value ?? card.abilityValue ?? 1) || 1)
    } : null);
    const existingAbility = card.ability && typeof card.ability === 'object'
      ? { ...card.ability, key: normaliseAbilityEffectValue(card.ability.key), target: normaliseAbilityTarget(card.ability.target || abilityTarget, card) }
      : null;
    const ability = existingAbility || ((type !== 'Power' && triggerKey === 'action' && effectKey && effectKey !== 'none')
      ? makeRuntimeAbilityFromEffect(effectKey, { ...card, abilityTarget, value: card.value ?? card.unitValue, apCost: card.apCost ?? card.abilityCost })
      : null);
    return {
      ...card,
      id: identity,
      name: card.name || displayName,
      displayName,
      artId: card.artId || identity,
      internalName: card.internalName || card.internal_name || card.name || identity,
      type,
      faction: normaliseFactionValue(card.faction || 'universal'),
      trigger: triggerKey,
      effect: type === 'Power' ? effectKey : (effectKey === 'none' ? null : effectKey),
      unitEffect: type === 'Power' ? null : (effectKey === 'none' ? null : effectKey),
      unitValue: type === 'Power' ? null : (card.unitValue ?? card.value ?? card.abilityValue ?? null),
      maxHp: card.maxHp ?? card.max_hp ?? card.hp,
      weapon,
      abilityTarget,
      diceTrigger,
      ability
    };
  }

  function normaliseCardRepo(repo) {
    if (!Array.isArray(repo)) return repo;
    return repo.map(normaliseImportedCard).filter(Boolean);
  }

  function cardRefValue(ref) {
    if (ref && typeof ref === 'object') return ref.id || ref.name || ref.internalName || ref.cardId || ref.cardName || '';
    return ref;
  }

  function findCardInRepo(repo, ref) {
    const raw = cardRefValue(ref);
    const key = String(raw ?? '').trim().toLowerCase();
    const slug = cardSlug(raw);
    return repo.find(r =>
      String(r.id ?? '').trim().toLowerCase() === key ||
      String(r.name ?? '').trim().toLowerCase() === key ||
      String(r.displayName ?? r.display_name ?? '').trim().toLowerCase() === key ||
      String(r.internalName ?? '').trim().toLowerCase() === key ||
      cardSlug(r.id) === slug ||
      cardSlug(r.name) === slug ||
      cardSlug(r.displayName ?? r.display_name) === slug ||
      cardSlug(r.internalName) === slug
    );
  }

  function extractCardDataBundle(data) {
    if (!data || typeof data !== 'object') return null;
    return {
      cardRepo: data.cardRepo || data.grim_card_repo || data.cards || data.repo || null,
      deckP1: data.deckP1 || data.grim_deck_p1 || data.player1Deck || data.p1Deck || null,
      deckP2: data.deckP2 || data.grim_deck_p2 || data.player2Deck || data.p2Deck || null,
      laneDeck: data.laneDeck || data.grim_lane_deck || data.laneEffects || null
    };
  }

  function loadFromStorage() {
    let repo = CARDS;
    let lists = { 1: null, 2: null };
    let laneDeck = DEFAULT_LANE_EFFECTS;
    try {
      const r = localStorage.getItem('grim_card_repo');
      if (r) {
        repo = normaliseCardRepo(JSON.parse(r));
        localStorage.setItem('grim_card_repo', JSON.stringify(repo));
      } else {
        repo = normaliseCardRepo(repo);
      }

      const d1 = localStorage.getItem('grim_deck_p1');
      if (d1) lists[1] = JSON.parse(d1);

      const d2 = localStorage.getItem('grim_deck_p2');
      if (d2) lists[2] = JSON.parse(d2);
      const ld = localStorage.getItem('grim_lane_deck');
      if (ld) laneDeck = JSON.parse(ld);
    } catch(e) { console.warn('Card data load failed', e); }
    repo = mergeDraftPowerCards(repo);
    return { repo, lists, laneDeck };
  }

  function makeDeck(repo=CARDS) {
    const cleanRepo = normaliseCardRepo(repo) || CARDS;
    const d = [...cleanRepo,...cleanRepo,...cleanRepo,cleanRepo[0]].map((c,i)=>({...normaliseImportedCard(c), uid:`u${i}`}));
    for (let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]];}
    return d;
  }

  function deckFromList(nameList, repo) {
    const cleanRepo = normaliseCardRepo(repo) || [];
    if(!Array.isArray(nameList) || !Array.isArray(cleanRepo)) return makeDeck(cleanRepo);
    const cards = nameList.map((ref,i)=>{
      const c = findCardInRepo(cleanRepo, ref);
      if(!c) console.warn(`Card not found in repo: "${cardRefValue(ref)}"`);
      return c ? {...normaliseImportedCard(c), uid:`u${i}`} : null;
    }).filter(Boolean);
    if(!cards.length){ console.warn('Deck list produced no cards — using default deck'); return makeDeck(cleanRepo); }
    for (let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
    return cards;
  }

  function cardLimit(type) {
    if (type === 'Hero')     return 1;
    if (type === 'Uncommon') return 3;
    if (type === 'Power')    return 2;
    return 16;
  }

  function deckFromMap(countMap, repo) {
    const cards = [];
    let uid = 0;
    Object.entries(countMap).forEach(([id, count]) => {
      const c = repo.find(r => r.id === id);
      if (!c) { console.warn(`Card id not found in repo: "${id}"`); return; }
      const clamped = Math.min(count, cardLimit(c.type));
      for (let i = 0; i < clamped; i++) cards.push({...c, type:(c.type||'').trim(), uid:`u${uid++}`});
    });
    if (!cards.length) { console.warn('deckFromMap: empty — using default'); return makeDeck(repo); }
    for (let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
    return cards;
  }

  function buildDeck(list, repo) {
    if (!list) return makeDeck(repo);
    if (Array.isArray(list)) return deckFromList(list, repo);
    return deckFromMap(list, repo);
  }

  const DEBUG = false;
  function dbg(msg){ if(DEBUG) console.log(msg); }

  let ENABLE_DRAFTTYPE_CARDS =
  localStorage.getItem('grim_proto_cards') !== 'false';

const state = {
    round:1, maxRounds:5, activePlayer:1,
    phase: 'setup', // 'setup' | 'requisition' | 'battle'
    players:{
      1:{name:'Player I',  score:0, resources:3, deck:[], hand:[], graveyard:[], color:'p1', passed:false, drawnThisRound:false},
      2:{name:'Player II', score:0, resources:3, deck:[], hand:[], graveyard:[], color:'p2', passed:false, drawnThisRound:false}
    },
    board:{},
    structures:{}, // { tileId: { type, owner, card } }
    selectedHandCard: null,
    _handGhostRemoval: null,
    selectedBoardTile: null,
    pendingTile: null,
    activeUnit: null,
    activeAction: null,
    activeAbility: null,
    chargeState: null,
    breakawayState: null,
    pendingCombatContext: null,
    pendingReturnUnit: null,
    deployModeFromInspector: false,
    laneEffects: { A: null, B: null },
  };

  // Board layout definition
  // Each row: { zone, count, label }
  // player: 1=p1 deploy, 2=p2 deploy, 0=neutral
  const LANE_ROWS = [
    { zone:'deploy-p2', count:3, player:2 },
    { zone:'move',      count:3, player:0, label:"No Man's Land" },
    { zone:'control-zone', count:2, player:0 },
    { zone:'control-centre', count:3, player:0 }, // special: control, centre, control
    { zone:'control-zone', count:2, player:0 },
    { zone:'move',      count:3, player:0, label:"No Man's Land" },
    { zone:'deploy-p1', count:3, player:1 },
  ];

  function initGame() {
    setupDrawHold();
    setupPassHold();
    const {repo, lists, laneDeck} = loadFromStorage();
    [1,2].forEach(p=>{
      try {
        state.players[p].deck = buildDeck(lists[p], repo);
      } catch(e) {
        console.warn(`Deck build failed for P${p}, using default`, e);
        state.players[p].deck = makeDeck();
      }
      if (ENABLE_DRAFTTYPE_CARDS) {
        state.players[p].deck = injectDraftPowerCards(state.players[p].deck, repo, p);
      }
      state.players[p].hand=[];
      state.players[p].graveyard=[];
      state.players[p].resources=3;
      state.players[p].passed=false;
    });
    state.laneEffects = { A: null, B: null };
    drawLaneEffects(laneDeck);
    buildBoard();
    buildTileMap();
    state.structures = {};
    document.getElementById('inspector').classList.add('open');
    renderHub();
    fitBoard();
    // Show splash — check for existing save
    const hasSave = !!localStorage.getItem('grim_save');
    const continueBtn = document.getElementById('quick-load-btn');
    if (continueBtn) {
      continueBtn.disabled = !hasSave;
      continueBtn.setAttribute('aria-disabled', String(!hasSave));
      continueBtn.title = hasSave ? 'Load saved game' : 'No saved game found';
    }

    const protoToggle = document.getElementById('prototype-toggle');
    const protoStatus = document.getElementById('prototype-toggle-status');
    if (protoToggle) {
      protoToggle.checked = ENABLE_DRAFTTYPE_CARDS;

      const syncDraftToggle = () => {
        protoStatus.textContent = ENABLE_DRAFTTYPE_CARDS ? 'TEST MODE' : 'JSON ONLY';
      };

      syncDraftToggle();

      protoToggle.onchange = (e) => {
        ENABLE_DRAFTTYPE_CARDS = e.target.checked;

        localStorage.setItem(
          'grim_proto_cards',
          String(ENABLE_DRAFTTYPE_CARDS)
        );

        syncDraftToggle();
      };
    }

    loadSplashArt();
    requestAnimationFrame(() => document.getElementById('start-overlay').classList.add('show'));
  }

  function drawLaneEffects(deck) {
    if (!deck || !deck.length) return;
    const shuffled = [...deck].sort(() => Math.random() - 0.5);
    state.laneEffects.A = { ...shuffled[0], revealed: false };
    state.laneEffects.B = { ...shuffled[Math.min(1, shuffled.length - 1)], revealed: false };
  }

  function renderLaneEffects() {
    ['A','B'].forEach(lane => {
      const badge = document.getElementById(`lane-badge-${lane}`);
      if (!badge) return;
      const fx = state.laneEffects[lane];
      if (!fx) { badge.style.display = 'none'; return; }
      badge.style.display = '';
      if (fx.revealed) {
        badge.textContent = formatCardName(fx.name);
        badge.classList.remove('hidden');
      } else {
        badge.textContent = '?';
        badge.classList.add('hidden');
      }
    });
  }

  const SPLASH_ART_SOURCES = [
    'art/splash.jpeg', 'art/splash.jpg', 'art/splash.png',
    'art/splash.JPEG', 'art/splash.JPG', 'art/splash.PNG',
    'splash.jpeg', 'splash.jpg', 'splash.png',
    'splash.JPEG', 'splash.JPG', 'splash.PNG'
  ];

  function applySplashArtToOverlay(overlay, loadedClass='has-splash-art') {
    if (!overlay) return;
    let index = 0;
    function tryNext() {
      if (index >= SPLASH_ART_SOURCES.length) {
        overlay.classList.remove(loadedClass);
        overlay.style.backgroundImage = '';
        return;
      }
      const src = SPLASH_ART_SOURCES[index++];
      const img = new Image();
      img.onload = () => {
        overlay.style.backgroundImage = `url('${src}')`;
        overlay.classList.add(loadedClass);
      };
      img.onerror = tryNext;
      img.src = src;
    }
    tryNext();
  }

  function loadSplashArt() {
    applySplashArtToOverlay(document.getElementById('start-overlay'));
  }

  function beginGame() {
    document.getElementById('start-overlay').classList.remove('show');
    setTimeout(()=>{
      [1,2].forEach(p=>{ for(let i=0;i<4;i++) drawCard(p); });
      renderHub();
      showDevSetup();
    }, 300);
  }

  function formatCardName(name) {
    return String(name ?? '').trim().toUpperCase();
  }

  function cardDisplayName(card, fallback='') {
    const raw = card?.displayName ?? card?.display_name ?? card?.display ?? card?.title ?? card?.name ?? fallback ?? card?.internalName ?? card?.id ?? '';
    return formatCardName(raw);
  }

  function expectedArtLabel(card) {
    const id = card?.artId || card?.id || card?.internalName || card?.name || '';
    return formatCardName(id);
  }

  function normalisedCardType(card) {
    return (card?.type || '').trim();
  }

  function cardInnerHTML(card, col) {
    const type = normalisedCardType(card);
    const name = expectedArtLabel(card);
    if (type === 'Power') {
      return `<div style="position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#1a1020;border:1.5px solid #8a40c0;display:flex;align-items:center;justify-content:center;font-size:var(--fs-xs);z-index:1;">⚡</div>
        <div class="card-name" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;text-align:center">${name}</div>
        <div class="card-cost"><span>${card.cost}</span></div>`;
    }
    return `<div class="card-hp ${col}-hp"><span>${card.hp ?? ''}</span></div>
      <div class="card-name">${name}</div>
      <div class="card-cost"><span>${card.cost}</span></div>`;
  }

  function attachArtNameFallback(el, card, nameSelector='.card-name') {
    if (!el || !card?.artId) return;
    const tryHide = src => {
      const img = new Image();
      img.onload = () => { const n = el.querySelector(nameSelector); if (n) n.style.display = 'none'; };
      img.src = src;
    };
    artCandidates(card.artId).forEach(tryHide);
  }

  function updateInspectorCardNameFallback(card) {
    const nameEl = document.getElementById('prof-cv-name');
    if (!nameEl) return;
    nameEl.textContent = expectedArtLabel(card);
    nameEl.classList.remove('hidden');
    const token = `${card?.uid || card?.id || card?.name || ''}-${Date.now()}`;
    nameEl.dataset.artToken = token;
    if (!card?.artId) return;
    let pending = 3;
    let loaded = false;
    const done = () => {
      pending -= 1;
      if (pending <= 0 && !loaded && nameEl.dataset.artToken === token) {
        nameEl.classList.remove('hidden');
      }
    };
    artCandidates(card.artId).forEach(src => {
      const img = new Image();
      img.onload = () => {
        if (nameEl.dataset.artToken !== token) return;
        loaded = true;
        nameEl.classList.add('hidden');
      };
      img.onerror = done;
      img.src = src;
    });
  }

  function resourceGainHtml(player, gain, showLabel=true) {
    const col = player === 1 ? 'var(--p1)' : 'var(--p2)';
    const label = player === 1 ? 'Player I' : 'Player II';
    return `<div style="text-align:center;min-width:100px;">
      ${showLabel ? `<div style="font-size:var(--fs-xs);color:${col};text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;">${label}</div>` : ``}
      <div style="position:relative;width:62px;height:62px;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;width:50px;height:50px;background:var(--resources);border:2px solid var(--resources-hi);border-radius:4px;transform:rotate(45deg);box-shadow:0 0 14px rgba(217,121,24,0.5);"></div>
        <div style="position:relative;z-index:1;font-size:var(--fs-md);font-weight:900;color:var(--resources-text);line-height:1;text-shadow:0 1px 0 rgba(255,220,120,0.35);">+${gain}</div>
      </div>
      <div style="font-size:var(--fs-xs);color:#5a4828;text-transform:uppercase;letter-spacing:0.08em;">Resources</div>
    </div>`;
  }

  function showDevSetup() {
    const ov = document.createElement('div');
    ov.id = 'dev-setup-overlay';
    ov.className = 'splash-backed-overlay';
    ov.style.cssText = 'position:fixed;inset:0;z-index:50;background-color:rgba(0,0,0,0.95);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:24px 16px 36px;gap:14px;font-family:Spectral,Georgia,serif;box-sizing:border-box;';
    document.body.appendChild(ov);
    applySplashArtToOverlay(ov, 'has-splash-art');

    function makeLaneCard(lane) {
      const fx = state.laneEffects[lane];
      const label = lane === 'A' ? 'I' : 'II';
      return `<div onclick="devCycleLane('${lane}')" style="position:relative;width:75px;aspect-ratio:5/7;flex-shrink:0;background:linear-gradient(160deg,#0e1a12,#07100a);border:1px solid #1a5030;border-radius:5px;padding:7px 5px;cursor:pointer;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:inset 0 1px 0 rgba(80,180,120,0.08),0 4px 12px rgba(0,0,0,0.45);">
        <div style="position:absolute;top:4px;left:5px;right:5px;font-size:9px;color:#3a6848;text-transform:uppercase;letter-spacing:0.12em;line-height:1;">Lane ${label}</div>
        <div style="font-size:var(--fs-xs);color:#40a878;font-weight:900;line-height:1.15;text-transform:uppercase;width:100%;">${fx ? formatCardName(fx.name) : '—'}</div>
        <div class="setup-refresh-badge lane-refresh">↻</div>
      </div>`;
    }

    function makeHandCard(player, idx, showRefresh=true) {
      const card = state.players[player].hand[idx];
      if (!card) return `<div class="card" style="width:75px;height:105px;border-style:dashed;opacity:0.35;flex-shrink:0;"></div>`;
      const col = player === 1 ? 'p1' : 'p2';
      const uid = `sc-${player}-${idx}-${Date.now()}`;
      const art = artStyle(card, true);
      setTimeout(()=>attachArtNameFallback(document.getElementById(uid), card), 0);
      return `<div id="${uid}" class="card ${col}-card dev-setup-card" onclick="${showRefresh ? `devSwapCard(${player},${idx})` : ``}" style="width:75px;height:105px;flex-shrink:0;${art}">${cardInnerHTML(card, col)}${showRefresh ? `<div class="setup-refresh-badge">↻</div>` : ``}</div>`;
    }

    function renderOverlay() {
      ov.innerHTML = `
        <div style="font-size:var(--fs-md);font-weight:900;color:#c8a060;letter-spacing:0.2em;text-transform:uppercase;text-shadow:0 0 20px rgba(217,121,24,0.4);">Battle Setup</div>
        <div style="font-size:var(--fs-xs);color:#3a2a10;letter-spacing:0.2em;text-transform:uppercase;margin-top:-8px;">Dev Mode · Tap to change</div>

        <div style="font-size:var(--fs-xs);color:#5a4828;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;">Lane Effects</div>
        <div style="display:flex;gap:12px;width:100%;justify-content:center;align-items:center;">
          ${makeLaneCard('A')}
          ${makeLaneCard('B')}
        </div>

        <div style="font-size:var(--fs-xs);color:#4a78d8;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:4px;">Player I — Starting Hand</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;">${state.players[1].hand.map((_,i)=>makeHandCard(1,i,true)).join('')}</div>

        <div style="font-size:var(--fs-xs);color:#cc3030;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:4px;">Player II — Starting Hand</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;">${state.players[2].hand.map((_,i)=>makeHandCard(2,i)).join('')}</div>

        <button onclick="devSetupBegin()" style="margin-top:16px;font-family:Spectral,Georgia,serif;font-size:var(--fs-xs);font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#c8a060;background:linear-gradient(160deg,#2a2010,#1a1408);border:1px solid #c08020;border-radius:4px;padding:10px 28px;cursor:pointer;box-shadow:0 0 16px rgba(200,160,60,0.3);">Begin Battle ▶</button>
      `;
    }

    window.devCycleLane = function(lane) {
      const fx = state.laneEffects[lane];
      const idx = DEFAULT_LANE_EFFECTS.findIndex(e => e.effect === fx?.effect);
      const next = DEFAULT_LANE_EFFECTS[(idx + 1) % DEFAULT_LANE_EFFECTS.length];
      state.laneEffects[lane] = { ...next, revealed: false };
      renderLaneEffects();
      renderOverlay();
    };

    window.devSwapCard = function(player, cardIdx) {
      const p = state.players[player];
      if (!p.deck.length) return;
      const swapIdx = Math.floor(Math.random() * p.deck.length);
      const [newCard] = p.deck.splice(swapIdx, 1);
      const [oldCard] = p.hand.splice(cardIdx, 1, newCard);
      p.deck.push(oldCard);
      renderOverlay();
    };

    window.devSetupBegin = function() {
      const gain = 5 + 1; // Round 1
      // Pre-assign starting resources so screen can show them
      [1,2].forEach(p => { state.players[p].resources = gain; });
      renderHub();

      ov.innerHTML = `
        <div style="font-size:var(--fs-md);font-weight:900;color:#c8a060;letter-spacing:0.2em;text-transform:uppercase;text-shadow:0 0 20px rgba(217,121,24,0.4);">Battle Begins</div>
        <div style="font-size:var(--fs-sm);font-weight:900;color:#c8a060;letter-spacing:0.15em;text-transform:uppercase;margin-top:-6px;">Round 1 of ${state.maxRounds}</div>

        <div style="margin-top:10px;width:100%;display:flex;flex-direction:column;align-items:center;">
          <div class="battle-begins-avatar">♜</div>
          <div class="battle-begins-player-label">Player I</div>
          ${resourceGainHtml(1, gain, false)}
        </div>

        <div style="font-size:var(--fs-xs);color:#4a78d8;text-transform:uppercase;letter-spacing:0.15em;align-self:flex-start;margin-top:14px;">Starting Hand</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;">${state.players[1].hand.map((_,i)=>makeHandCard(1,i)).join('')}</div>

        <button onclick="devBattleBegin()" style="margin-top:16px;font-family:Spectral,Georgia,serif;font-size:var(--fs-xs);font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#c8a060;background:linear-gradient(160deg,#2a2010,#1a1408);border:1px solid #c08020;border-radius:4px;padding:10px 28px;cursor:pointer;box-shadow:0 0 16px rgba(200,160,60,0.3);">Begin ▶</button>
      `;
    };

    window.devBattleBegin = function() {
      ov.remove();
      // Resources already assigned — just start battle phase directly
      [1,2].forEach(p => {
        state.players[p].drawnThisRound = false;
        state.players[p].passed = false;
        drawCard(p);
      });
      const first = Math.random() < 0.5 ? 1 : 2;
      Object.keys(state.board).forEach(tid => { state.board[tid].actionsLeft = null; delete state.board[tid].bonusAttacks; });
      state.activePlayer = first;
      setPerspective(first);
      renderHub();
      startBattlePhase();
    };

    renderOverlay();
  }

  // ── REQUISITION PHASE ──
  function requisitionPhase() {
    state.phase = 'requisition';
    // Clear death markers from previous round
    document.querySelectorAll('.unit-skull').forEach(e=>e.remove());
    const gain = 5 + state.round;
    [1,2].forEach(p=>{
      state.players[p].resources += gain;
      state.players[p].passed = false;
      state.players[p].drawnThisRound = false;
      drawCard(p);
    });
    // Roll for first player
    const first = Math.random() < 0.5 ? 1 : 2;
    Object.keys(state.board).forEach(tid=>{ state.board[tid].actionsLeft=null; delete state.board[tid].bonusAttacks; });
    state.activePlayer = first;
    setPerspective(first);
    renderHub();
    // Update gain number in icon
    const gainEl = document.getElementById('req-gain-num');
    if(gainEl) gainEl.textContent = `+${gain}`;
    const p = state.players[first];
    showOverlay(
      `Round ${state.round} of ${state.maxRounds}`,
      'Requisition Phase',
      `${p.name} goes first`,
      0,
      ()=>startBattlePhase(),
      true,
      p.color
    );
  }

  let _beginCallback = null;

  // tapToContinue=true → shows Begin button. false → auto-dismisses after duration ms
  function showOverlay(title, sub, who, duration, callback, tapToContinue=false, whoColor='') {
    const ov = document.getElementById('req-overlay');
    const beginBtn = document.getElementById('req-begin');
    document.querySelector('.top-bar').style.zIndex = '60';
    document.getElementById('req-title').textContent = title;
    document.getElementById('req-sub').textContent   = sub;
    const whoEl = document.getElementById('req-who');
    whoEl.textContent = who;
    whoEl.className = 'req-who' + (whoColor ? ` ${whoColor}` : '');
    _beginCallback = callback;
    if(tapToContinue) {
      beginBtn.style.display = 'block';
      ov.classList.remove('auto-dismiss');
      ov.classList.add('show');
    } else {
      beginBtn.style.display = 'none';
      ov.classList.add('auto-dismiss','show');
      setTimeout(()=>{
        ov.classList.remove('show');
        document.querySelector('.top-bar').style.zIndex = '';
        setTimeout(()=>{ if(callback) callback(); _beginCallback=null; }, 300);
      }, duration);
    }
  }

  function beginRound() {
    const ov = document.getElementById('req-overlay');
    document.getElementById('req-begin').style.display = 'none';
    document.querySelector('.top-bar').style.zIndex = '';
    ov.classList.remove('show');
    setTimeout(()=>{ if(_beginCallback) { _beginCallback(); _beginCallback=null; } }, 300);
  }

  const TURN_TOAST_MS = 700;
  const TURN_TOAST_FADE_MS = 150;
  const TURN_ADVANCE_WAIT_MS = 500;
  const TURN_WAIT_ICON_MS = 120;

  function showTurnToast(player, callback) {
    const p = state.players[player];
    const col = p.color;
    const toast = document.getElementById('turn-toast');
    const name  = document.getElementById('toast-name');
    toast.className = `turn-toast ${col}`;
    name.className  = `toast-name ${col}`;
    name.textContent = `${p.name}'s Turn`;
    setUILock(true);
    requestAnimationFrame(()=>{ toast.classList.add('show'); });
    setTimeout(()=>{
      toast.classList.remove('show');
      setTimeout(()=>{ setUILock(false); if(callback) callback(); }, TURN_TOAST_FADE_MS);
    }, TURN_TOAST_MS);
  }

  function startBattlePhase() {
    state.phase = 'battle';
    applyRoundStartEffects();
    flashResGain();
    setPerspective(state.activePlayer);
    refreshAllUnitIndicators();
    renderHub();
    showTurnToast(state.activePlayer);
  }

  function applyRoundStartEffects() {
    ['A','B'].forEach(lane => {
      const fx = getLaneEffect(lane);
      if (!fx) return;
      EFFECT_REGISTRY[fx.effect]?.onRoundStart?.(fx, lane);
    });
  }

  function refreshAllUnitIndicators() {
    Object.entries(state.board).forEach(([tileId, unit])=>{
      const tile = document.querySelector(`[data-id="${tileId}"]`);
      if(!tile) return;
      renderUnit(tile, unit);
    });
  }

  function flashResGain() {
    const diamond = document.getElementById('hub-res-diamond');
    const gain = 5 + state.round;
    const el = document.createElement('div');
    el.className = 'res-gain';
    el.textContent = `+${gain}`;
    diamond.appendChild(el);
    setTimeout(()=>el.remove(), 1400);
  }

  function drawCard(player) {
    const p=state.players[player];
    if(p.deck.length===0) return;
    const card = p.deck.shift();
    if(card) card.type = (card.type||'').trim();
    p.hand.unshift(card);
  }

  // ── BUILD BOARD ──
  function buildBoard() {
    ['A','B'].forEach(lane=>{
      const laneEl=document.getElementById(`lane-${lane}`);
      laneEl.innerHTML=''; // clear everything including label

      LANE_ROWS.forEach((rowDef, ri)=>{
        if(rowDef.zone==='control-centre') {
          const div=document.createElement('div');
          div.className='divider'; laneEl.appendChild(div);
        }
        const rowEl=document.createElement('div');
        rowEl.className='row';
        rowEl.classList.add(`row-${ri}`);
        rowEl.dataset.row = ri;

        const zones = rowDef.zone==='control-centre'
          ? ['control-zone','centre','control-zone']
          : Array(rowDef.count).fill(rowDef.zone);

        zones.forEach((zone,ci)=>{
          const tile=document.createElement('div');
          const tileId=`${lane}-${ri}-${ci}`;
          tile.className=`tile ${zone}`;
          tile.dataset.id=tileId;
          tile.dataset.zone=zone;
          tile.dataset.lane=lane;
          tile.dataset.row=ri;
          tile.dataset.col=ci;
          tile.dataset.player=rowDef.player;
          if(zone!=='centre') tile.addEventListener('click', ()=>onTileTap(tileId));
          if(zone!=='centre') tile.addEventListener('touchstart', e=>onBoardTileTouchStart(e,tileId), {passive:true});
          if(zone==='centre') tile.addEventListener('click', ()=>{
            if(state.selectedHandCard?.type==='Power') executePowerCard(lane);
            else showLaneEffectOverlay(lane, tile);
          });
          const symMap={'control-zone':'♛','centre':'⚜'};
          if(symMap[zone]){const s=document.createElement('span');s.className='tile-symbol';s.textContent=symMap[zone];tile.appendChild(s);}
          if(zone==='centre'){
            const badge=document.createElement('span');
            badge.className='lane-effect-badge hidden';
            badge.id=`lane-badge-${lane}`;
            tile.appendChild(badge);
          }
          rowEl.appendChild(tile);
        });
        laneEl.appendChild(rowEl);
      });
    });
    renderLaneEffects();
  }

  function syncTopPassHud() {
    [1,2].forEach(pid => {
      const player = state.players?.[pid];
      const passed = !!player?.passed;
      const resBadge = document.getElementById(`res-badge-p${pid}`);

  function beginHandRemovalGhost(card, player = state.activePlayer) {
    if (!card || !state.players?.[player]) return;
    const hand = state.players[player].hand || [];
    const index = hand.findIndex(c => c.uid === card.uid);
    state._handGhostRemoval = {
      player,
      index: index >= 0 ? index : hand.length,
      card: { ...card },
      until: Date.now() + 850
    };
    setTimeout(() => {
      const ghost = state._handGhostRemoval;
      if (ghost?.card?.uid === card.uid && ghost?.player === player) {
        state._handGhostRemoval = null;
        if (state.activePlayer === player) renderHand();
      }
    }, 900);
  }

  const MAX_HAND = 10;
  function renderHand() {
    const p = state.players[state.activePlayer];
    const scroll = document.getElementById('hand-scroll');
    scroll.innerHTML = '';
    scroll.classList.add('hand-fanned');
    const ghostInfo = state._handGhostRemoval;
    const useGhost = ghostInfo && ghostInfo.player === state.activePlayer && Date.now() < ghostInfo.until;
    if (ghostInfo && ghostInfo.player === state.activePlayer && Date.now() >= ghostInfo.until) state._handGhostRemoval = null;
    const handItems = p.hand.map(card => ({ kind:'card', card }));
    if (useGhost) {
      const ghostIndex = Math.max(0, Math.min(ghostInfo.index ?? handItems.length, handItems.length));
      handItems.splice(ghostIndex, 0, { kind:'ghost', card: ghostInfo.card });
    }
    const count = handItems.length;
    const existingLabel = document.getElementById('hand-full-label');
    if (existingLabel) existingLabel.remove();
    if (count >= MAX_HAND) {
      const lbl = document.createElement('div');
      lbl.id = 'hand-full-label';
      lbl.textContent = 'Hand Full';
      lbl.style.cssText = 'font-size:10px;font-family:Spectral,Georgia,serif;color:#5a4828;letter-spacing:0.15em;text-transform:uppercase;text-align:center;padding:2px 0;flex-shrink:0;width:100%;';
      scroll.parentElement.insertBefore(lbl, scroll);
    }
    let cw = 78;
    if (count >= 10)      cw = 52;
    else if (count >= 9)  cw = 54;
    else if (count >= 8)  cw = 58;
    else if (count >= 7)  cw = 62;
    else if (count >= 6)  cw = 67;
    else if (count >= 5)  cw = 71;
    else if (count >= 4)  cw = 74;
    const ch = Math.round(cw * 1.41);

    const maxWidth = Math.max(240, (scroll.clientWidth || scroll.parentElement?.clientWidth || window.innerWidth || 360) - 8);
    const center = (count - 1) / 2;
    const visibleStep = count <= 1 ? cw : Math.max(16, Math.min(cw - 10, Math.floor((maxWidth - cw) / Math.max(1, count - 1))));
    const overlap = count <= 1 ? 0 : Math.max(10, cw - visibleStep);
    const maxAngle = count >= 10 ? 5 : count >= 8 ? 6 : count >= 6 ? 7 : 9;
    const angleStep = count >= 10 ? 2.2 : count >= 8 ? 2.8 : 3.6;

    handItems.forEach((item, idx) => {
      const card = item.card;
      const isGhost = item.kind === 'ghost';
      const canAfford = isGhost || p.resources >= card.cost;
      const isSelected = !isGhost && state.selectedHandCard?.uid === card.uid;
      const col = p.color;
      const el = document.createElement('div');
      const offset = idx - center;
      const lift = Math.abs(offset) < 0.25 ? -4 : Math.abs(offset) < 1.25 ? -2 : 0;
      const angle = Math.max(-maxAngle, Math.min(maxAngle, offset * angleStep));
      const baseTransform = `translateY(${lift}px) rotate(${angle}deg)`;
      el.className = isGhost
        ? `card ${col}-card hand-fan-card hand-removal-ghost`
        : `card ${col}-card hand-fan-card${isSelected ? ' selected' : ''}${!canAfford ? ' unavailable' : ''}`;
      el.style.width = cw + 'px';
      el.style.height = ch + 'px';
      el.style.flexShrink = '0';
      el.style.marginLeft = idx === 0 ? '0px' : `-${overlap}px`;
      el.style.zIndex = String(20 + idx);
      el.style.transform = baseTransform;
      el.dataset.baseTransform = baseTransform;
      if (isGhost) {
        el.setAttribute('aria-label', 'Card leaving hand');
        el.innerHTML = '<div class="hand-removal-ghost-inner"></div>';
      } else {
        el.dataset.uid = card.uid;
        el.dataset.handIndex = String(p.hand.findIndex(c => c.uid === card.uid));
        el.innerHTML = cardInnerHTML(card, col);
        const art = artStyle(card);
        if (art) {
          el.setAttribute('style', (el.getAttribute('style') || '') + ';' + art);
          attachArtNameFallback(el, card);
        }
        el.addEventListener('touchstart', e => onHandCardTouchStart(e, card, el), { passive:false });
      }
      scroll.appendChild(el);
    });

    if (state.selectedHandCard) {
      const canAfford = p.resources >= state.selectedHandCard.cost;
      setResPulse(canAfford);
      const visual = document.getElementById('prof-card-visual');
      const label  = document.getElementById('prof-cv-label');
      const pips   = document.getElementById('prof-cv-pips');
      if (visual) visual.className = `prof-card-visual ${state.players[state.activePlayer].color}-unit cv-selected cv-pulse`;
      if (label)  { label.style.display=''; label.className='prof-cv-label lbl-deploy-active'; label.textContent='DEPLOY'; }
      if (pips)   pips.style.display='none';
    }
  }

  function updateResPreview(card){

  // ── DRAG FROM HAND ──
  const DRAG_THRESHOLD = 18;
  const INSPECT_MS = 300;
  let dragState = null;
  let handPreviewState = null;

  function handPreviewCardMarkup(card) {
    const isPower = normalisedCardType(card) === 'Power';

        <div class="card-zoom-stat save"><span class="czs-icon">🛡</span><span class="czs-val">${escapeHtml(card.save ?? '')}</span></div>
        <div class="card-zoom-stat move"><span class="czs-icon">➤</span><span class="czs-val">${escapeHtml(card.move === -1 ? '—' : card.move ?? '')}</span></div>
      </div>` : ''}
      <div class="card-zoom-fallback-name hand-hold-preview-name" id="hand-preview-name">${expectedArtLabel(card)}</div>
      <div class="card-zoom-shine" id="hand-preview-shine"></div>
