function parseCSVLine(line){

const out = [];
let current = '';
let quoted = false;

for(let i=0;i<line.length;i++){
const ch = line[i];
const next = line[i+1];

if(ch === '"' && quoted && next === '"'){
current += '"';
i++;
continue;
}

if(ch === '"'){
quoted = !quoted;
continue;
}

if(ch === ',' && !quoted){
out.push(current);
current = '';
continue;
}

current += ch;
}

out.push(current);
return out;

}

function csvHeaderKey(value){
return String(value || '')
.trim()
.toLowerCase()
.replace(/[^a-z0-9]+/g,'');
}

function csvNumberOrString(value){
const raw = String(value ?? '').trim();
if(raw === '') return '';
const num = Number(raw);
return Number.isFinite(num) && /^-?\d+(\.\d+)?$/.test(raw) ? num : raw;
}


function csvMechanicKey(value){
return String(value || '')
.trim()
.toLowerCase()
.replace(/\+/g,'plus')
.replace(/[^a-z0-9]+/g,'');
}

function normaliseCSVFaction(value){
const raw = String(value || '').trim();
if(!raw) return 'universal';
const key = csvMechanicKey(raw);
const map = {
universal:'universal',neutral:'universal',none:'universal',
orderofiron:'order_of_iron',iron:'order_of_iron',
orderofflame:'order_of_flame',orderofflames:'order_of_flame',flame:'order_of_flame',flames:'order_of_flame',
orderofshadows:'order_of_shadows',shadow:'order_of_shadows',shadows:'order_of_shadows',
orderofveil:'order_of_veil',orderoftheveil:'order_of_veil',veil:'order_of_veil',
orderoflight:'order_of_light',light:'order_of_light',
orderofhunt:'order_of_hunt',orderofthehunt:'order_of_hunt',orderofbeasts:'order_of_hunt',hunt:'order_of_hunt',beasts:'order_of_hunt',
orderofartifice:'order_of_artifice',artifice:'order_of_artifice'
};
return map[key] || raw;
}

function normaliseCSVCardType(value){
const raw = String(value || '').trim();
const key = csvMechanicKey(raw);
const map = {power:'Power',spell:'Power',tactic:'Power',hero:'Hero',leader:'Hero',uncommon:'Uncommon',elite:'Uncommon',common:'Common',unit:'Common'};
return map[key] || raw;
}

function normaliseCSVAbilityTrigger(value){
const raw = String(value || '').trim();
if(!raw) return '';
const key = csvMechanicKey(raw);
const map = {
none:'',no:'',na:'',blank:'',
action:'action',activated:'action',activatedaction:'action',activatedability:'action',onaction:'action',
onplay:'on_play',play:'on_play',whenplayed:'on_play',
ondeploy:'on_deploy',deploy:'on_deploy',whendeployed:'on_deploy',
onattack:'on_attack',attack:'on_attack',
onattackroll:'on_attack_roll',attackroll:'on_attack_roll',onroll:'on_attack_roll',dice:'on_attack_roll',diceroll:'on_attack_roll',onhithroll:'on_attack_roll',
ondefend:'on_defend',defend:'on_defend',
ondeath:'on_death',death:'on_death',onslain:'on_death',
onturnstart:'on_turn_start',turnstart:'on_turn_start',
onturnend:'on_turn_end',turnend:'on_turn_end',
passive:'passive',aura:'passive'
};
return Object.prototype.hasOwnProperty.call(map, key) ? map[key] : raw;
}

function normaliseCSVAbilityEffect(value){
const raw = String(value || '').trim();
if(!raw) return '';
const key = csvMechanicKey(raw);
const map = {
none:'none',no:'none',na:'none',
inspire:'command_unit',command:'command_unit',commandunit:'command_unit',order:'command_unit',giveaction:'command_unit',addaction:'add_action',rallyunit:'command_unit',
explodinghits:'exploding_hits',explodinghit:'exploding_hits',explodehits:'exploding_hits',explodehit:'exploding_hits',exploding:'exploding_hits',
chainhits:'chain_hits',chainhit:'chain_hits',chains:'chain_hits',chain:'chain_hits',
jumplane:'jump_lane',jump:'jump_lane',
movethenfight:'move_then_fight',movefight:'move_then_fight',charge:'move_then_fight',cavalrycharge:'move_then_fight',thunderingcharge:'move_then_fight',
damage:'damage',dealdamage:'damage',heal:'heal',healing:'heal',draw:'draw',drawcards:'draw',
addresource:'add_resource',addresources:'add_resource',resource:'add_resource',resources:'add_resource'
};
return map[key] || raw;
}

function normaliseCSVTargetValue(value, fallback=''){
const raw = String(value || '').trim();
if(!raw) return fallback;
return raw.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}

function csvAbilityLabel(effect){
const labels = {command_unit:'Command Unit',add_action:'Add Action',jump_lane:'Jump Lane',move_then_fight:'Move + Fight',damage:'Damage',heal:'Heal',draw:'Draw',add_resource:'Add Resource',exploding_hits:'Exploding Hits',chain_hits:'Chain Hits'};
return labels[effect] || effect;
}

function normaliseCSVCard(raw){

const lookup = {};
Object.keys(raw || {}).forEach(key => {
lookup[csvHeaderKey(key)] = raw[key];
});

const get = (...keys) => {
for(const key of keys){
const value = lookup[csvHeaderKey(key)];
if(value !== undefined && String(value).trim() !== '') return String(value).trim();
}
return '';
};

const card = { ...raw };

const displayName = get('displayName','display_name','display','title','card_display_name','player_name');
const name = get('name','cardName','card') || displayName;
const internalName = get('internalName','internal_name','internal','slug');
const variant = get('variant');
const artId = get('artId','art_id','art');
const type = normaliseCSVCardType(get('type','rarity','unitType','unit_type'));
const isPower = type === 'Power';
const faction = normaliseCSVFaction(get('faction','order'));
const cost = get('cost','resourceCost','resource_cost');
const hp = get('hp','HP','health','maxHealth');
const maxHp = get('maxHp','max_hp','maxHP','HP','hp','health','maxHealth');
const move = get('move','Move','movement','mov','speed');
const save = get('save','Save','armour','armor','defence','defense');
const special = get('special','abilityText','ability_text','rules','text');

if(displayName) card.displayName = displayName;
if(name) card.name = name;
if(internalName) card.internalName = internalName;
else if(name && !card.internalName) card.internalName = name;
if(variant) card.variant = variant;
if(artId) card.artId = artId;
if(type) card.type = type;
if(faction) card.faction = faction;
if(cost) card.cost = csvNumberOrString(cost);
if(hp) card.hp = csvNumberOrString(hp);
if(maxHp) card.maxHp = csvNumberOrString(maxHp);
else if(hp) card.maxHp = csvNumberOrString(hp);
if(move) card.move = csvNumberOrString(move);
if(save) card.save = save;
if(special) card.special = special;

const weaponName = get('weaponName','weapon_name','weapon','weapon.name','attackName','attack_name');
const range = get('range','weaponRange','weapon_range','weapon.range');
const attacks = get('attacks','attackDice','attack_dice','weaponAttacks','weapon_attacks','weapon.attacks');
const hit = get('hit','toHit','to_hit','hitRoll','hit_roll','weaponHit','weapon_hit','weapon.hit');
const ap = get('ap','AP','armourPiercing','armorPiercing','lethality','weaponAp','weapon_ap','weapon.ap');
const damage = get('damage','dmg','weaponDamage','weapon_damage','weapon.damage');

if(weaponName || range || attacks || hit || ap || damage){
card.weapon = {
name: weaponName || 'Weapon',
range: range ? csvNumberOrString(range) : 1,
attacks: attacks ? csvNumberOrString(attacks) : 1,
hit: hit || '4+',
ap: ap ? csvNumberOrString(ap) : 0,
damage: damage ? csvNumberOrString(damage) : 1
};
}

const powerEffect = get('effect','power_effect');
const powerValue = get('value','power_value');

const trigger = normaliseCSVAbilityTrigger(get(
'abilityTrigger','ability_trigger','trigger','mechanicTrigger','mechanic_trigger'
));
const abilityEffectRaw = get(
'abilityEffect','ability_effect','unitEffect','unit_effect','mechanicEffect','mechanic_effect'
) || (!isPower ? get('effect') : '');
const effect = normaliseCSVAbilityEffect(abilityEffectRaw);
const value = get(
'abilityValue','ability_value','unitValue','unit_value','mechanicValue','mechanic_value'
) || (!isPower ? get('value') : '');
const abilityRoll = get(
'abilityRoll','ability_roll','qualifyingRoll','qualifying_roll','rollThreshold','roll_threshold','threshold','diceThreshold','dice_threshold'
);
const abilityAmount = get(
'abilityAmount','ability_amount','extraHits','extra_hits','extraChains','extra_chains','diceValue','dice_value','diceAmount','dice_amount','amount'
);
const abilityCost = get(
'abilityCost','ability_cost','apCost','ap_cost','actionCost','action_cost'
);

if(isPower){
if(powerEffect) card.effect = powerEffect;
if(powerValue) card.value = csvNumberOrString(powerValue);
card.trigger = 'on_play';
} else {
if(trigger) card.trigger = trigger;
if(effect && effect !== 'none') {
card.effect = effect;
card.unitEffect = effect;
}
const resolvedValue = value || abilityAmount;
if(resolvedValue) {
card.value = csvNumberOrString(resolvedValue);
card.unitValue = csvNumberOrString(resolvedValue);
}
if(abilityCost) {
card.apCost = csvNumberOrString(abilityCost);
card.abilityCost = csvNumberOrString(abilityCost);
}
if(abilityRoll) card.threshold = csvNumberOrString(abilityRoll);

const targetSide = normaliseCSVTargetValue(get('ability_target_side','abilityTargetSide','target_side','targetSide'));
const targetType = normaliseCSVTargetValue(get('ability_target_type','abilityTargetType','target_type','targetType'));
const targetLocation = normaliseCSVTargetValue(get('ability_target_location','abilityTargetLocation','target_location','targetLocation'));
const targetRange = get('ability_target_range','abilityTargetRange','target_range','targetRange');
const targetCount = normaliseCSVTargetValue(get('ability_target_count','abilityTargetCount','target_count','targetCount'));
const targetState = normaliseCSVTargetValue(get('ability_target_state','abilityTargetState','target_state','targetState'));
const targetUnitType = normaliseCSVTargetValue(get('ability_target_unit_type','abilityTargetUnitType','target_unit_type','targetUnitType'));
const targetFactionRaw = get('ability_target_faction','abilityTargetFaction','target_faction','targetFaction');
const targetFaction = targetFactionRaw ? normaliseCSVFaction(targetFactionRaw) : '';

const hasTarget = targetSide || targetType || targetLocation || targetRange || targetCount || targetState || targetUnitType || targetFaction;
if(hasTarget){
card.abilityTarget = {
side: targetSide || 'friendly',
type: targetType || 'unit',
location: targetLocation || 'same_lane',
range: targetRange ? csvNumberOrString(targetRange) : null,
count: targetCount || 'single',
state: targetState || 'any',
unitType: targetUnitType || 'any',
faction: targetFaction || 'any'
};
}

if(trigger === 'on_attack_roll' && (effect === 'exploding_hits' || effect === 'chain_hits')) {
const thresholdValue = csvNumberOrString(abilityRoll || 6);
const amountValue = csvNumberOrString(value || abilityAmount || 1);
card.threshold = thresholdValue;
card.value = amountValue;
card.unitValue = amountValue;
card.diceTrigger = {
trigger: 'on_attack_roll',
condition: 'natural_gte',
threshold: Math.max(1, Math.min(6, Number(thresholdValue) || 6)),
effect,
value: Math.max(1, Number(amountValue) || 1)
};
}

if(trigger === 'action' && effect && effect !== 'none'){
const resolvedValue = csvNumberOrString(value || abilityAmount || 1);
card.ability = {
key: effect,
apCost: abilityCost ? csvNumberOrString(abilityCost) : 1,
name: csvAbilityLabel(effect),
value: resolvedValue,
target: card.abilityTarget || null
};
}

if(trigger || effect){
card.mechanic = {
trigger,
effect,
value: csvNumberOrString(value || abilityAmount || ''),
target: card.abilityTarget || null,
diceTrigger: card.diceTrigger || null
};
}
}

return card;

}

function parseCSV(text){

const lines =
text.split(/\r?\n/).filter(line => line.trim());

if(lines.length < 2) return [];

const headers =
parseCSVLine(lines[0]).map(h=>h.trim());

return lines.slice(1).map(line => {

const values = parseCSVLine(line);

const card = {};

headers.forEach((header,index) => {
card[header] = (values[index] || '').trim();
});

return normaliseCSVCard(card);

});

}

function getNativeSetItem(){
  if (nativeSetItem) return nativeSetItem;
  try {
    const frame = document.createElement('iframe');
    frame.style.display = 'none';
    document.documentElement.appendChild(frame);
    nativeSetItem = frame.contentWindow.Storage.prototype.setItem;

function writeRaw(key, value){
  const native = getNativeSetItem();
  if (native) native.call(localStorage, key, value);
  else localStorage.setItem(key, value);
}

function writeJSON(key, value){
  writeRaw(key, JSON.stringify(value));
}

function slug(value){
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/&/g, 'and')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/^_+|_+$/g, '');
}

function normaliseDraft(card){
  const inferredKind = String(card.kind || card.cardKind || card.draftKind || '').trim()
    || (String(card.type || '').trim() === 'Power' ? 'Power' : 'Unit');
  const kind = inferredKind === 'Power' ? 'Power' : 'Unit';
  const unitTypeRaw = String(card.unitType || card.rarity || '').trim();
  const existingType = String(card.type || '').trim();
  const unitType = kind === 'Power'
    ? 'Power'
    : (['Common','Uncommon','Hero'].includes(unitTypeRaw) ? unitTypeRaw
      : ['Common','Uncommon','Hero'].includes(existingType) ? existingType
      : 'Common');
  const type = kind === 'Power' ? 'Power' : unitType;
  const base = slug(card.internalName || card.name || card.id || 'draft_card');
  const variant = slug(card.variant || '');
  const identity = variant ? `${base}_${variant}` : base;
  const weapon = card.weapon && typeof card.weapon === 'object' ? { ...card.weapon } : card.weapon;
  return {
    ...card,
    id: identity || card.id || ('draft_' + Date.now()),
    artId: card.artId || identity || card.id,
    internalName: card.internalName || card.name || identity,
    kind,
    unitType: kind === 'Power' ? '' : unitType,
    type,
    faction: card.faction || 'universal',
    cost: Number.isFinite(Number(card.cost)) ? Number(card.cost) : (card.cost || 0),
    hp: kind === 'Power' ? null : (Number.isFinite(Number(card.hp)) ? Number(card.hp) : (card.hp || 1)),
    maxHp: kind === 'Power' ? null : (Number.isFinite(Number(card.maxHp ?? card.hp)) ? Number(card.maxHp ?? card.hp) : (card.maxHp ?? card.hp ?? 1)),
    move: kind === 'Power' ? null : (Number.isFinite(Number(card.move)) ? Number(card.move) : (card.move ?? 1)),
    save: kind === 'Power' ? null : (card.save || '6+'),
    weapon: kind === 'Power'
      ? (weapon && typeof weapon === 'object' ? weapon : null)
      : (weapon && typeof weapon === 'object' ? weapon : { name:'Draft Weapon', range:1, attacks:1, hit:'4+', ap:0, damage:1 }),
    trigger: card.trigger || (kind === 'Power' ? 'onPlay' : 'action'),
    effect: card.effect || null,
    status: 'draft',
    source: 'draft'
  };
}

function officialRepo(){ return readJSON('grim_repo_official', []); }
function draftRepo(){ return readJSON('grim_repo_drafts', []); }
function mergedRepo(){ return [...officialRepo(), ...draftRepo()]; }
function deckKey(player){ return player === 2 ? 'grim_deck_p2' : 'grim_deck_p1'; }
function getDeck(player){ return readJSON(deckKey(player), {}); }

function repoIdSet(repo){
  return new Set((repo || []).map(c => c && c.id).filter(Boolean));
}

function cleanDeckAgainstRepo(deck, repo){
  const ids = repoIdSet(repo || mergedRepo());
  const cleaned = {};
  Object.entries(deck || {}).forEach(([id, count]) => {
    const n = Math.max(0, Number(count) || 0);
    if (ids.has(id) && n > 0) cleaned[id] = n;
  });
  return cleaned;
}

function saveDeck(player, deck){
  writeJSON(deckKey(player), cleanDeckAgainstRepo(deck, mergedRepo()));
}

function cleanAllDecks(repo=mergedRepo()){
  [1,2].forEach(player => {
    const raw = getDeck(player);
    const cleaned = cleanDeckAgainstRepo(raw, repo);
    const rawText = JSON.stringify(raw || {});
    const cleanText = JSON.stringify(cleaned || {});
    if (rawText !== cleanText) writeJSON(deckKey(player), cleaned);
  });
}

function syncRuntimeRepo(){
  const official = officialRepo().filter(Boolean);
  const drafts = draftRepo().filter(Boolean);
  const merged = [...official, ...drafts];
  writeJSON('grim_repo_official', official);
  writeJSON('grim_repo_drafts', drafts);
  writeJSON('grim_card_repo', merged);
  window.repo = merged;
  window.cardRepo = merged;
  window.cards = merged;
  return merged;
}

function countDeckCards(deck, repo=null){
  const source = repo ? cleanDeckAgainstRepo(deck, repo) : (deck || {});
  return Object.values(source || {}).reduce((sum, n) => sum + (Number(n) || 0), 0);
}

function deckCountLabel(deck, repo){
  const stored = countDeckCards(deck);
  const valid = countDeckCards(deck, repo);
  return stored === valid ? String(valid) : `${valid} / ${stored} stored`;
}

function removeFromDecks(cardId){
  [1,2].forEach(player => {
    const deck = getDeck(player);
    if (deck && Object.prototype.hasOwnProperty.call(deck, cardId)) {
      delete deck[cardId];
      saveDeck(player, deck);
    }
  });
}

}

function cardClass(card, isDraft){
  const type = String(card.type || '').toLowerCase();
  const rarity = String(card.rarity || card.unitType || '').toLowerCase();
  let cls = 'revTile';
  if (type.includes('power')) cls += ' revTilePower';
  else if (rarity.includes('hero') || String(card.type || '') === 'Hero') cls += ' revTileHero';
  else if (rarity.includes('uncommon') || String(card.type || '') === 'Uncommon') cls += ' revTileUncommon';
  if (isDraft) cls += ' revTileProto';
  return cls;

function cardMatchesRepoFilters(card, isDraft){
  if (repoFilters.all) return true;
  const filters = Object.entries(repoFilters).filter(([key, on]) => key !== 'all' && on).map(([key]) => key);
  if (!filters.length) return true;
  return filters.every(key => {
    if (key === 'official') return !isDraft;
    if (key === 'draft') return !!isDraft;
    if (key === 'powers') return repoCardKind(card) === 'Power' || String(card?.type || '').trim() === 'Power';
    if (key === 'units') return repoCardKind(card) !== 'Power' && String(card?.type || '').trim() !== 'Power';
    return true;
  });
}

  if (key === 'all') {
    repoFilters = { all:true, official:false, draft:false, powers:false, units:false };
  } else {
    repoFilters.all = false;
    repoFilters[key] = !repoFilters[key];
    if (!Object.entries(repoFilters).some(([k,v]) => k !== 'all' && v)) repoFilters.all = true;

  renderEditorView('repo');
}

function cardMatchesDeckFilters(card, deck){
  if (deckFilters.all) return true;
  const id = card?.id || card?.name || '';
  const qty = Number((deck || {})[id]) || 0;
  if (deckFilters.inDeck && qty <= 0) return false;
  const isPower = repoCardKind(card) === 'Power' || String(card?.type || '').trim() === 'Power';
  const wantsPowers = !!deckFilters.powers;
  const wantsUnits = !!deckFilters.units;
  if (wantsPowers || wantsUnits) {
    if (wantsPowers && wantsUnits) return true;
    if (wantsPowers) return isPower;
    if (wantsUnits) return !isPower;
  }
  return true;
}

function field(label, key, value, full=false, textarea=false, extraClass=''){
  const safeVal = escapeHtml(value ?? '');
  const numericKeys = new Set(['cost','hp','move','weaponAttacks','weaponAp','weaponDamage','unitValue','abilityCost']);
  const softNumericKeys = new Set(['value']);
  const numericAttrs = numericKeys.has(key)
    ? ' type="number" inputmode="numeric" step="1" data-select-on-focus="1"'
    : softNumericKeys.has(key)
      ? ' type="text" inputmode="numeric" data-select-on-focus="1"'
      : '';
  return `<label class="${full ? 'full' : ''} ${extraClass}">${label}${textarea
    ? `<textarea data-field="${key}">${safeVal}</textarea>`
    : `<input data-field="${key}" value="${safeVal}"${numericAttrs}>`}</label>`;
}

function selectField(label, key, value, options, full=false, extraClass=''){
  const val = String(value ?? '');
  const opts = options.map(opt => {
    const item = typeof opt === 'string' ? { value:opt, label:opt } : opt;
    const selected = String(item.value) === val ? ' selected' : '';
    return `<option value="${escapeHtml(item.value)}"${selected}>${escapeHtml(item.label)}</option>`;
  }).join('');
  return `<label class="${full ? 'full' : ''} ${extraClass}">${label}<select data-field="${key}">${opts}</select></label>`;
}

function normaliseAbilityTriggerValue(value){
  const raw = String(value ?? '').trim();
  if (!raw || raw === 'none') return '';
  const key = raw.toLowerCase().replace(/[^a-z0-9]+/g,'');
  const map = {onplay:'on_play',ondeploy:'on_deploy',onattack:'on_attack',onattackroll:'on_attack_roll',ondefend:'on_defend',ondeath:'on_death',onturnstart:'on_turn_start',onturnend:'on_turn_end'};
  return map[key] || raw;
}

function draftAbilityState(card={}){
  const dt = card.diceTrigger || card.mechanic?.diceTrigger || {};
  const trigger = normaliseAbilityTriggerValue(card.trigger || card.mechanic?.trigger || dt.trigger || '');
  const rawEffect = card.unitEffect || card.mechanic?.effect || card.effect || dt.effect || 'none';
  const attackEffect = (rawEffect === 'chain_hits' || rawEffect === 'exploding_hits') ? rawEffect : (dt.effect || 'exploding_hits');
  const value = card.unitValue ?? card.mechanic?.value ?? card.value ?? dt.value ?? '';
  const cleanEffect = normaliseAbilityEffectValue(rawEffect);
  const abilityCost = card.abilityCost ?? card.apCost ?? card.ability?.apCost ?? card.mechanic?.abilityCost ?? (cleanEffect === 'move_then_fight' ? 2 : '');
  return {
    trigger,
    effect: trigger === 'on_attack_roll' ? attackEffect : cleanEffect,
    value,
    abilityCost,
    threshold: String(dt.threshold ?? card.threshold ?? card.diceThreshold ?? 6)
  };
}

function draftAbilityContextHtml(trigger, effect='none', value='', threshold='6', abilityCost=''){
  const cleanTrigger = normaliseAbilityTriggerValue(trigger);
  if (!cleanTrigger) return '';

  if (cleanTrigger === 'on_attack_roll') {
    const cleanEffect = (effect === 'chain_hits' || effect === 'exploding_hits') ? effect : 'exploding_hits';
    const valueLabel = cleanEffect === 'chain_hits' ? 'Extra Chains' : 'Extra Hits';
    return `
      ${selectField('Effect','unitEffect',cleanEffect,attackRollEffectOptions(),true,'revUnitField')}
      ${selectField('Qualifying Roll','diceThreshold',String(threshold || 6),attackRollThresholdOptions(),true,'revUnitField')}
      ${field(valueLabel,'unitValue',value === '' || value == null ? 1 : value,false,false,'revUnitField full')}
    `;
  }

  const cleanEffect = normaliseAbilityEffectValue(effect || 'none');
  if (cleanTrigger === 'action') {
    const costValue = abilityCost === '' || abilityCost == null
      ? (cleanEffect === 'move_then_fight' ? 2 : 1)
      : abilityCost;
    const valueLabel = cleanEffect === 'move_then_fight' ? 'Damage Bonus' : 'Value';
    const defaultValue = value === '' || value == null
      ? (cleanEffect === 'move_then_fight' ? 1 : '')
      : value;
    const help = cleanEffect === 'move_then_fight'
      ? '<div class="revDraftHint full revUnitField" style="margin:0;">Charge defaults: target enemy unit, reachable_attack, choose target then position, then Fight with +Damage Bonus.</div>'
      : '';
    return `
      ${selectField('Effect','unitEffect',cleanEffect,simpleEffectOptions(),true,'revUnitField')}
      ${field('Action Cost','abilityCost',costValue,false,false,'revUnitField')}
      ${field(valueLabel,'unitValue',defaultValue,false,false,'revUnitField')}
      ${help}
    `;
  }

  return `
    ${selectField('Effect','unitEffect',cleanEffect || 'none',simpleEffectOptions(),true,'revUnitField')}
    ${field('Value','unitValue',value ?? '',false,false,'revUnitField full')}
  `;
}

function parseDraftValue(raw){
  const text = String(raw ?? '').trim();
  if (!text) return null;
  if (/^-?\d+(\.\d+)?\s*-\s*-?\d+(\.\d+)?$/.test(text)) return text.split('-').map(n => Number(n.trim()));
  if (/^-?\d+(\.\d+)?$/.test(text)) return Number(text);
  return text;
}

function collectDraftFields(tile, original){
  const get = key => tile.querySelector(`[data-field="${key}"]`)?.value ?? '';
  const kind = get('kind') === 'Power' ? 'Power' : 'Unit';
  const unitType = get('unitType') || draftUnitType(original);
  const trigger = normaliseAbilityTriggerValue(get('trigger')) || (kind === 'Power' ? 'on_play' : '');
  const unitEffect = get('unitEffect') || 'none';
  const unitValue = parseDraftValue(get('unitValue'));
  const abilityCost = Number.isFinite(Number(get('abilityCost')))
    ? Number(get('abilityCost'))
    : (unitEffect === 'move_then_fight' ? 2 : null);
  const abilityTarget = unitEffect === 'move_then_fight'
    ? { side:'enemy', location:'reachable_attack', state:'any', type:'unit' }
    : (original.abilityTarget || original.target || original.mechanic?.target || null);
  const weapon = kind === 'Power'
    ? {
        name: get('weaponName') || original.weapon?.name || get('effect') || 'Power',
        range: null,
        attacks: null,
        hit: null,
        ap: Number.isFinite(Number(get('weaponAp'))) ? Number(get('weaponAp')) : 0,
        damage: Number.isFinite(Number(get('weaponDamage'))) ? Number(get('weaponDamage')) : null
      }
    : {
        name: get('weaponName') || 'Draft Weapon',
        range: get('weaponRange') || 1,
        attacks: Number.isFinite(Number(get('weaponAttacks'))) ? Number(get('weaponAttacks')) : 1,
        hit: get('weaponHit') || '4+',
        ap: Number.isFinite(Number(get('weaponAp'))) ? Number(get('weaponAp')) : 0,
        damage: Number.isFinite(Number(get('weaponDamage'))) ? Number(get('weaponDamage')) : 1
      };
  const diceTrigger = (kind !== 'Power' && trigger === 'on_attack_roll' && (unitEffect === 'exploding_hits' || unitEffect === 'chain_hits'))
    ? {
        trigger:'on_attack_roll',
        condition:'natural_gte',
        threshold: Math.max(1, Math.min(6, Number(get('diceThreshold')) || 6)),
        effect: unitEffect,
        value: Math.max(1, Number(get('unitValue')) || 1)
      }
    : null;
  const mechanic = kind === 'Power' || !trigger ? null : {
    trigger,
    effect:unitEffect,
    value:unitValue,
    abilityCost,
    target: abilityTarget,
    diceTrigger
  };
  const card = {
    ...original,
    displayName: get('displayName') || original.displayName || original.display_name || get('name') || original.name,
    name: get('name') || original.name || get('displayName'),
    internalName: get('internalName') || get('name') || original.internalName,
    variant: get('variant') || '',
    kind,
    unitType: kind === 'Power' ? '' : unitType,
    type: kind === 'Power' ? 'Power' : unitType,
    faction: get('faction') || 'universal',
    cost: get('cost'),
    hp: kind === 'Power' ? null : get('hp'),
    move: kind === 'Power' ? null : get('move'),
    save: kind === 'Power' ? null : get('save'),
    special: get('special'),
    flavour: get('flavour'),
    trigger,
    effect: kind === 'Power' ? (get('effect') || original.effect || null) : (unitEffect === 'none' ? null : unitEffect),
    value: kind === 'Power' ? parseDraftValue(get('value')) : unitValue,
    unitEffect: kind === 'Power' ? null : unitEffect,
    unitValue: kind === 'Power' ? null : unitValue,
    abilityCost: kind === 'Power' ? null : abilityCost,
    apCost: kind === 'Power' ? null : abilityCost,
    abilityTarget,
    mechanic,
    diceTrigger,
    weapon,
    source: 'draft',
    status: 'draft'
  };
  return normaliseDraft(card);
}


function editorFactionIcon(card){
  const faction = String(card?.faction || 'universal').trim();
  const map = {
    order_of_iron:'⚙', orderofiron:'⚙', iron:'⚙',
    order_of_flames:'♨', order_of_flame:'♨', orderofflame:'♨', orderofflames:'♨', flame:'♨', flames:'♨',
    order_of_light:'☼', orderoflight:'☼', light:'☼',
    order_of_the_veil:'☽', order_of_veil:'☽', orderoftheveil:'☽', veil:'☽',
    order_of_shadows:'†', orderofshadows:'†', shadows:'†', shadow:'†',
    order_of_artifice:'◆', orderofartifice:'◆', artifice:'◆',
    order_of_beasts:'♈', order_of_hunt:'♈', orderofthehunt:'♈', beasts:'♈', hunt:'♈',
    universal:'✦', none:'✦', neutral:'✦'
  };
  return map[faction] || '✦';
}

function editorTileKindLabel(card){
  const kind = repoCardKind(card);
  if (kind === 'Power' || String(card?.type || '').trim() === 'Power') return 'Power';
  return String(card?.type || card?.unitType || 'Unit').trim() || 'Unit';
}

function editorCostRune(card){
  return `<div class="revTileCostRune"><span>${escapeHtml(card?.cost ?? '-')}</span></div>`;
}


function readOnlyCardDetailsHtml(card){
  const w = card?.weapon && typeof card.weapon === 'object' ? card.weapon : {};
  const kind = editorTileKindLabel(card);
  const isPower = kind === 'Power' || String(card?.type || '').trim() === 'Power';
  const trigger = card?.ability?.trigger || card?.mechanic?.trigger || card?.diceTrigger?.trigger || card?.trigger || '';
  const effect = card?.ability?.key || card?.ability?.effect || card?.mechanic?.effect || card?.diceTrigger?.effect || card?.effect || '';
  const value = card?.ability?.value ?? card?.mechanic?.value ?? card?.diceTrigger?.value ?? card?.value ?? '';
  const target = card?.ability?.target || card?.mechanic?.target || card?.target || null;
  const targetSummary = target && typeof target === 'object'
    ? Object.entries(target).filter(([,v]) => v !== undefined && v !== null && v !== '').map(([k,v]) => `${k}: ${v}`).join(' · ')
    : '';
  const statRows = isPower
    ? [
        ['Effect', effect || '—'],
        ['Value', Array.isArray(card?.value) ? card.value.join('–') : (card?.value ?? '—')]
      ]
    : [
        ['HP', card?.hp ?? '—'],
        ['Move', card?.move ?? '—'],
        ['Save', card?.save ?? '—'],
        ['Weapon', w.name || '—'],
        ['Range', w.range ?? '—'],
        ['Attacks', w.attacks ?? '—'],
        ['Hit', w.hit ?? '—'],
        ['AP', w.ap ?? 0],
        ['Damage', w.damage ?? '—']
      ];
  const abilityRows = [
    ['Trigger', trigger || '—'],
    ['Effect', effect || '—'],
    ['Value', value === '' || value === null || value === undefined ? '—' : value],
    ['Target', targetSummary || '—']
  ];
  const rowHtml = rows => rows.map(([label,value]) => `<div class="revReadOnlyStat"><span>${escapeHtml(label)}</span><b>${escapeHtml(value)}</b></div>`).join('');
  return `
    <div class="revReadOnlyNote">Imported/default cards are read-only here, but their stats and mechanics are shown for reference.</div>
    <div class="revReadOnlyDetails">
      <div class="revReadOnlyTitle">${escapeHtml(cardDisplayName(card, card?.name || card?.id || 'Card'))}</div>
      <div class="revReadOnlyMeta">${escapeHtml(kind)} · ${escapeHtml(card?.faction || 'universal')} · Cost ${escapeHtml(card?.cost ?? '—')}</div>
      <div class="revReadOnlyGrid">${rowHtml(statRows)}</div>
      <div class="revReadOnlySectionTitle">Ability / Rules</div>
      <div class="revReadOnlyGrid">${rowHtml(abilityRows)}</div>
      ${card?.special ? `<div class="revReadOnlyText"><b>Rules:</b> ${escapeHtml(card.special)}</div>` : ''}
      ${card?.flavour ? `<div class="revReadOnlyText"><b>Flavour:</b> ${escapeHtml(card.flavour)}</div>` : ''}
    </div>`;
}

function makeTile(card, mode, player, isDraft){
  const tile = document.createElement('div');
  const id = card.id || card.name || 'card';
  tile.className = cardClass(card, isDraft);
  tile.dataset.cardid = id;
  tile.dataset.draft = isDraft ? '1' : '0';
  tile.dataset.mode = mode;
  if (mode === 'deck') tile.classList.add('revDeckTile');
  const name = escapeHtml(cardDisplayName(card, id));
  const icon = escapeHtml(editorFactionIcon(card));
  const kindLabel = escapeHtml(editorTileKindLabel(card));
  const deck = mode === 'deck' ? getDeck(player) : null;
  const qtyVal = deck ? (Number(deck[id]) || 0) : 0;

  if (mode === 'deck') {
    tile.innerHTML = `
      <div class="revDeckListMain">
        <div class="revTileIcon" title="${escapeHtml(card.faction || 'universal')}">${icon}</div>
        <div class="revDeckListText">
          <div class="revTileName">${name}</div>
          <div class="revTileKind">${kindLabel}</div>
        </div>
      </div>
      <div class="revDeckListRight">
        ${editorCostRune(card)}
        <button class="revDeckAdjust revDeckMinus" data-dir="minus" aria-label="Remove card">−</button>
        <div class="revTileQtyBadge">${qtyVal}</div>
        <button class="revDeckAdjust revDeckPlus" data-dir="plus" aria-label="Add card">+</button>
      </div>`;
  } else {
    tile.innerHTML = `
      <div class="revTileIcon" title="${escapeHtml(card.faction || 'universal')}">${icon}</div>
      <div class="revTileName">${name}</div>
      <div class="revTileKind">${kindLabel}</div>
      <div class="revTileBottom">
        ${editorCostRune(card)}
      </div>`;
  }

  if (isDraft) {
    const badge = document.createElement('div');
    badge.className = 'revProtoBadge';
    badge.innerText = 'DRAFT';
    tile.appendChild(badge);
  }

  if (mode === 'deck') {
    const controls = tile.querySelector('.revTileBottom');
    const qtyBadge = tile.querySelector('.revTileQtyBadge');
    const updateQty = value => { if (qtyBadge) qtyBadge.innerText = value || 0; };

    tile.querySelector('.revDeckMinus')?.addEventListener('click', function(e){
      e.stopPropagation();
      const latest = getDeck(player);
      latest[id] = Math.max(0, (Number(latest[id]) || 0) - 1);
      if (latest[id] <= 0) delete latest[id];
      saveDeck(player, latest);
      updateQty(latest[id] || 0);
      renderEditorView(mode === 'deck' && player === 2 ? 'p2' : 'p1');
    });

    tile.querySelector('.revDeckPlus')?.addEventListener('click', function(e){
      e.stopPropagation();
      const latest = getDeck(player);
      latest[id] = (Number(latest[id]) || 0) + 1;
      saveDeck(player, latest);
      updateQty(latest[id] || 0);
      renderEditorView(mode === 'deck' && player === 2 ? 'p2' : 'p1');
    });
  }

  if (mode === 'repo') {
    const expand = document.createElement('div');
    expand.className = 'revTileExpand';

    if (isDraft) {
      expand.innerHTML = draftEditorHtml(card, id);
    } else {
      expand.innerHTML = readOnlyCardDetailsHtml(card);
    }

    tile.appendChild(expand);

    tile.onclick = function(e){
      if (e.target.closest('button') || e.target.closest('input') || e.target.closest('textarea') || e.target.closest('select')) return;
      const opening = expand.style.display !== 'block';
      document.querySelectorAll('.revEditorPanel.revRepoGrid .revTile.revExpanded').forEach(other => {
        if (other !== tile) {
          other.classList.remove('revExpanded');
          const otherExpand = other.querySelector('.revTileExpand');
          if (otherExpand) otherExpand.style.display = 'none';
        }
      });
      expand.style.display = opening ? 'block' : 'none';
      tile.classList.toggle('revExpanded', opening);
    };
  }

  return tile;
}

function renderMechanics(panel){
  panel.className = 'revEditorPanel';
  panel.innerHTML = '';
  const registry = window.REV_MECHANIC_REGISTRY || { triggers:[], effects:[] };
  const triggerSection = document.createElement('div');
  triggerSection.className = 'revMechanicSection';
  triggerSection.innerHTML = '<h2>Triggers</h2>';

  triggerGrid.className = 'revMechanicGrid';
  registry.triggers.forEach(trigger => {
    const card = document.createElement('div');

    card.innerHTML = `<div class="revMechanicTitle">${escapeHtml(trigger.id)}</div><div>${escapeHtml(trigger.description)}</div><div class="revMechanicSyntax">trigger: ${escapeHtml(trigger.id)}</div>`;
    triggerGrid.appendChild(card);
  });

  registry.effects.forEach(effect => {

    card.className = 'revMechanicCard';
    const title = effect.label ? `${effect.label} (${effect.id})` : effect.id;
    const syntax = effect.id === 'move_then_fight'
      ? 'trigger: action\neffect: move_then_fight\naction cost: 2\ntarget: enemy unit / reachable_attack\nvalue: damage bonus'
      : `effect: ${effect.id}\nvalue: ?`;
    card.innerHTML = `<div class="revMechanicTitle">${escapeHtml(title)}</div><div>${escapeHtml(effect.description)}</div><div class="revMechanicSyntax">${escapeHtml(syntax)}</div>`;
    effectGrid.appendChild(card);
  });
  effectSection.appendChild(effectGrid);
  panel.appendChild(effectSection);
}


const REV_RANDOM_DECK_SIZE = 30;

function makeRandomDeck(repo=mergedRepo(), targetCount=REV_RANDOM_DECK_SIZE){
  const candidates = (repo || []).filter(card => card && card.id);
  const deck = {};
  if (!candidates.length) return deck;
  const target = Math.max(1, Number(targetCount) || REV_RANDOM_DECK_SIZE);
  for (let i = 0; i < target; i++) {
    const card = candidates[Math.floor(Math.random() * candidates.length)];
    if (!card || !card.id) continue;
    deck[card.id] = (Number(deck[card.id]) || 0) + 1;
  }
  return deck;
}

function renderDeckActionBar(parent, player, repo){
  const deck = getDeck(player);
  const countLabel = deckCountLabel(deck, repo);
  const count = countDeckCards(deck, repo);
  const playerLabel = player === 2 ? 'P2 Deck' : 'P1 Deck';
  const bar = document.createElement('div');
  bar.className = 'revDeckActionBar';
  bar.innerHTML = `
    <div class="revDeckActionInfo">
      <span class="revDeckActionTitle">${playerLabel}</span>
      <span class="revDeckActionCount">${escapeHtml(countLabel)} cards</span>
    </div>
    <div class="revDeckActionButtons">
      <button class="revSafeBtn revDeckClearBtn" type="button">Clear</button>
      <button class="revSafeBtn revDeckRandomBtn" type="button">Random Fill</button>
    </div>`;
  parent.appendChild(bar);

  const clearBtn = bar.querySelector('.revDeckClearBtn');
  const randomBtn = bar.querySelector('.revDeckRandomBtn');

  if (clearBtn) {
    clearBtn.onclick = function(e){
      e.preventDefault();
      e.stopPropagation();
      if (count > 0 && !confirm(`Clear ${playerLabel}?`)) return;
      saveDeck(player, {});
      renderEditorView(player === 2 ? 'p2' : 'p1');
    };
  }

  if (randomBtn) {
    randomBtn.onclick = function(e){
      e.preventDefault();
      e.stopPropagation();
      if (!(repo || []).some(card => card && card.id)) {
        alert('No cards available to random fill this deck.');
        return;
      }
      if (count > 0 && !confirm(`Replace ${playerLabel} with ${REV_RANDOM_DECK_SIZE} random cards?`)) return;
      saveDeck(player, makeRandomDeck(repo, REV_RANDOM_DECK_SIZE));
      renderEditorView(player === 2 ? 'p2' : 'p1');
    };
  }
}

function renderEditorView(view){
  currentView = view || currentView || 'repo';
  const repo = syncRuntimeRepo();
  cleanAllDecks(repo);
  const body = document.getElementById('revSafeEditorBody');
  if (!body) return;
  body.innerHTML = '';

  const tabs = document.createElement('div');
  tabs.className = 'revEditorTabs';
  const tabClass = viewName => 'revSafeBtn revTabBtn' + (currentView === viewName ? ' active' : '');
  const repoBtn = document.createElement('button'); repoBtn.className = tabClass('repo'); repoBtn.innerText = 'Repo';
  const p1Btn = document.createElement('button'); p1Btn.className = tabClass('p1'); p1Btn.innerText = 'P1 Deck';
  const p2Btn = document.createElement('button'); p2Btn.className = tabClass('p2'); p2Btn.innerText = 'P2 Deck';
  const mechBtn = document.createElement('button'); mechBtn.className = tabClass('mechanics'); mechBtn.innerText = 'Rules';
  const cleanBtn = document.createElement('button'); cleanBtn.className = 'revSafeBtn revUtilityBtn'; cleanBtn.innerText = 'Clean';
  tabs.appendChild(repoBtn); tabs.appendChild(p1Btn); tabs.appendChild(p2Btn); tabs.appendChild(mechBtn); tabs.appendChild(cleanBtn);
  body.appendChild(tabs);

  if (currentView === 'p1' || currentView === 'p2') {
    renderDeckActionBar(body, currentView === 'p2' ? 2 : 1, repo);
  } else {
    renderStatus(body);
  }

  const title = document.createElement('h2');
  title.className = 'revEditorSubhead';
  title.innerText = currentView === 'p1' ? 'P1 Deck' : currentView === 'p2' ? 'P2 Deck' : currentView === 'mechanics' ? 'Mechanics Registry' : 'Card Repo';
  body.appendChild(title);

  const hint = document.createElement('div');
  hint.className = 'revEditorHint';
  hint.innerText = currentView === 'repo'
    ? 'Tap a card to expand it. Draft cards can be edited; official cards are read-only.'
    : currentView === 'mechanics'
      ? 'Reference list for wiring future card abilities.'
      : 'Use the list controls to tune quantities. Filter by cards in deck, powers, or units.';
  body.appendChild(hint);

  if (currentView === 'repo') renderRepoFilters(body);
  if (currentView === 'p1' || currentView === 'p2') renderDeckFilters(body, currentView === 'p2' ? 2 : 1);

  const panel = document.createElement('div');
  panel.className = currentView === 'repo'
    ? 'revEditorPanel revTileGrid revRepoGrid'
    : (currentView === 'p1' || currentView === 'p2')
      ? 'revEditorPanel revDeckListPanel'
      : 'revEditorPanel revTileGrid';
  body.appendChild(panel);

  repoBtn.onclick = () => renderEditorView('repo');
  p1Btn.onclick = () => renderEditorView('p1');
  p2Btn.onclick = () => renderEditorView('p2');
  mechBtn.onclick = () => renderEditorView('mechanics');
  cleanBtn.onclick = () => { cleanAllDecks(mergedRepo()); renderEditorView(currentView); };

  if (currentView === 'mechanics') {
    renderMechanics(panel);
    return;
  }

  const official = officialRepo().map(card => ({ card, isDraft:false }));
  const drafts = draftRepo().map(card => ({ card, isDraft:true }));
  const activeDeck = (currentView === 'p1' || currentView === 'p2') ? getDeck(currentView === 'p2' ? 2 : 1) : null;
  const cardsToRender = [...official, ...drafts].filter(({card,isDraft}) => {
    if (currentView === 'repo') return cardMatchesRepoFilters(card, isDraft);
    if (currentView === 'p1' || currentView === 'p2') return cardMatchesDeckFilters(card, activeDeck);
    return true;
  });
  if (!cardsToRender.length) {
    const empty = document.createElement('div');
    empty.className = 'revNoCardsNote';
    empty.innerText = 'No cards match these filters.';
    panel.appendChild(empty);
    return;
  }
  cardsToRender.forEach(({card,isDraft}) => {
    panel.appendChild(makeTile(card, currentView === 'repo' ? 'repo' : 'deck', currentView === 'p2' ? 2 : 1, isDraft));
  });
}

function createDraftCard(){
  const drafts = draftRepo();
  const timestamp = Date.now();
  const card = normaliseDraft({
    id:'draft_' + timestamp,
    name:'New Draft Card',
    internalName:'new_draft_card_' + timestamp,
    variant:'',
    kind:'Unit',
    unitType:'Common',
    type:'Common',
    faction:'universal',
    cost:1,
    hp:1,
    maxHp:1,
    move:1,
    save:'6+',
    weapon:{ name:'Draft Weapon', range:1, attacks:1, hit:'4+', ap:0, damage:1 },
    special:'Draft: Add rules text here.',
    status:'draft',
    source:'draft'
  });
  drafts.push(card);
  writeJSON('grim_repo_drafts', drafts);
  syncRuntimeRepo();
  renderEditorView('repo');
}

function saveDraftFromButton(btn){
  const originalId = btn.dataset.cardid;
  const tile = btn.closest('.revTile');
  if (!tile) return;
  const drafts = draftRepo();
  const original = drafts.find(c => (c.id || '') === originalId);
  if (!original) { alert('Draft not found. Refreshing editor.'); renderEditorView('repo'); return; }
  const updated = collectDraftFields(tile, original);
  const duplicate = drafts.find(c => c.id === updated.id && c.id !== originalId);
  if (duplicate) {
    alert('Another draft already uses that generated ID. Change the name or variant.');
    return;
  }
  const nextDrafts = drafts.map(c => (c.id || '') === originalId ? updated : c);
  writeJSON('grim_repo_drafts', nextDrafts);
  if (updated.id !== originalId) {
    [1,2].forEach(player => {
      const deck = getDeck(player);
      if (deck[originalId] != null) {
        deck[updated.id] = (Number(deck[updated.id]) || 0) + (Number(deck[originalId]) || 0);
        delete deck[originalId];
        saveDeck(player, deck);
      }
    });
  }
  syncRuntimeRepo();
  renderEditorView('repo');
}

function deleteDraftFromButton(btn){
  const id = btn.dataset.cardid;
  const drafts = draftRepo();
  const card = drafts.find(c => (c.id || '') === id);
  if (!card) { renderEditorView('repo'); return; }
  if (!confirm(`Delete draft card "${card.name || id}"?`)) return;
  writeJSON('grim_repo_drafts', drafts.filter(c => (c.id || '') !== id));
  removeFromDecks(id);
  syncRuntimeRepo();
  renderEditorView('repo');
}

function installHeaderButton(){
  const header = document.getElementById('revSafeEditorHeader');
  if (!header) return;
  const controls = header.querySelector('div:last-child');
  if (!controls) return;
  let btn = document.getElementById('revCreateDraftBtn');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'revCreateDraftBtn';
    btn.className = 'revSafeBtn';
    btn.innerText = 'New Draft';
    controls.prepend(btn);
  }
  btn.onclick = function(e){
    e.preventDefault();
    e.stopPropagation();
    createDraftCard();
  };
}

function openEditor(){
  const editor = document.getElementById('revSafeEditor');
  if (!editor) return;
  editor.style.display = 'flex';
  installHeaderButton();
  renderEditorView(currentView || 'repo');
}

function install(){
  installHeaderButton();
  cleanAllDecks(syncRuntimeRepo());
  const openBtn = document.getElementById('open-editor-btn');
  if (openBtn) openBtn.onclick = openEditor;
  const refresh = document.getElementById('revSafeRefresh');
  if (refresh) refresh.onclick = () => renderEditorView(currentView || 'repo');
  const close = document.getElementById('revSafeClose');
  if (close) close.onclick = () => { const editor = document.getElementById('revSafeEditor'); if (editor) editor.style.display = 'none'; };
  installEditorUsabilityGuards();
}

function installEditorUsabilityGuards(){
  if (window.__revEditorUsabilityGuards) return;
  window.__revEditorUsabilityGuards = true;
  document.addEventListener('focusin', function(e){
    const el = e.target;
    if (el && el.matches && el.matches('#revSafeEditor input[data-select-on-focus="1"]')) {
      setTimeout(() => { try { el.select(); } catch(err){} }, 0);
    }
  });
  let lastTap = 0;
  document.addEventListener('touchend', function(e){
    const editor = document.getElementById('revSafeEditor');
    if (!editor || editor.style.display === 'none' || !editor.contains(e.target)) return;
    const now = Date.now();
    if (now - lastTap < 320) e.preventDefault();
    lastTap = now;
  }, { passive:false });
}

window.revRenderEditorView = renderEditorView;
window.revSyncRuntimeRepo = syncRuntimeRepo;
window.revOpenEditor = openEditor;
window.revInstallEditor = install;
window.revCreateDraftCard = createDraftCard;

function forceInstallEditor(){
  install();
}

function scheduleEditorInstall(){
  forceInstallEditor();
  setTimeout(forceInstallEditor, 300);
  setTimeout(forceInstallEditor, 900);
  setTimeout(forceInstallEditor, 1700);
  setTimeout(forceInstallEditor, 2600);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', scheduleEditorInstall);
} else {
  scheduleEditorInstall();
}
window.addEventListener('load', scheduleEditorInstall);


// Dynamic draft-card form: switching Unit/Power immediately hides irrelevant fields.
document.addEventListener('change', function(e){
  const fieldEl = e.target.closest('[data-field]');
  if (!fieldEl) return;
  const editor = fieldEl.closest('.revDraftEditor');
  if (!editor) return;

  if (fieldEl.dataset.field === 'kind') {
    editor.dataset.cardKind = fieldEl.value === 'Power' ? 'Power' : 'Unit';
    return;
  }

  if (fieldEl.dataset.field === 'trigger' || fieldEl.dataset.field === 'unitEffect') {
    updateDraftAbilityContext(editor);
  }
}, true);

// Delegated handlers override older delete/save behaviour and refresh in-place.
document.addEventListener('click', function(e){
  const saveBtn = e.target.closest('.revSaveDraftBtn');
  if (saveBtn) {
    e.preventDefault();
    e.stopPropagation();
    saveDraftFromButton(saveBtn);
    return;
  }
  const delBtn = e.target.closest('.revDeleteDraftBtn');
  if (delBtn) {
    e.preventDefault();
    e.stopPropagation();
    deleteDraftFromButton(delBtn);
    return;
  }
}, true);

})();

</style>

<script>
(function(){
  if (window.__revBackupImportExportV99) return;
  window.__revBackupImportExportV99 = true;

  const BACKUP_KEYS = [
    'grim_repo_official',
    'grim_repo_drafts',
    'grim_card_repo',
    'grim_deck_p1',
    'grim_deck_p2',
    'grim_lane_deck',
    'grim_proto_cards'
  ];

  let nativeSetItem = null;
  function getNativeSetItem(){
    if (nativeSetItem) return nativeSetItem;
    try {
      const frame = document.createElement('iframe');
      frame.style.display = 'none';
      document.documentElement.appendChild(frame);
      nativeSetItem = frame.contentWindow.Storage.prototype.setItem;
      frame.remove();
    } catch(err) {
      nativeSetItem = null;
    }
    return nativeSetItem;
  }

  function writeRaw(key, value){
    const native = getNativeSetItem();
    if (native) native.call(localStorage, key, value);
    else localStorage.setItem(key, value);
  }

  function readJSON(key, fallback){
    try {
      const raw = localStorage.getItem(key);
      return raw == null ? fallback : JSON.parse(raw);
    } catch(err) {
      return fallback;
    }
  }

  function writeJSON(key, value){
    writeRaw(key, JSON.stringify(value));
  }

  function mergedRepoFromStorage(){
    const official = readJSON('grim_repo_official', []);
    const drafts = readJSON('grim_repo_drafts', []);
    return [
      ...(Array.isArray(official) ? official : []),
      ...(Array.isArray(drafts) ? drafts : [])
    ];
  }

  function syncRuntimeRepo(){
    const official = readJSON('grim_repo_official', []);
    const drafts = readJSON('grim_repo_drafts', []);
    writeJSON('grim_repo_official', Array.isArray(official) ? official : []);
    writeJSON('grim_repo_drafts', Array.isArray(drafts) ? drafts : []);
    writeJSON('grim_card_repo', mergedRepoFromStorage());
  }

  function safeFilenameDate(){
    const d = new Date();
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}`;
  }

  function exportRevenantBackup(){
    syncRuntimeRepo();
    const storage = {};
    BACKUP_KEYS.forEach(key => {
      storage[key] = localStorage.getItem(key);
    });
    const backup = {
      app: 'Revenant Prototype',
      type: 'revenant_editor_backup',
      version: 1,
      exportedAt: new Date().toISOString(),
      data: {
        officialRepo: readJSON('grim_repo_official', []),
        draftRepo: readJSON('grim_repo_drafts', []),
        runtimeRepo: readJSON('grim_card_repo', []),
        deckP1: readJSON('grim_deck_p1', {}),
        deckP2: readJSON('grim_deck_p2', {}),
        laneDeck: readJSON('grim_lane_deck', []),
        draftMode: localStorage.getItem('grim_proto_cards') !== 'false'
      },
      localStorage: storage
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `revenant-backup-${safeFilenameDate()}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 0);
  }

  function normaliseBackupPayload(payload){
    if (!payload || typeof payload !== 'object') throw new Error('Backup file is not valid JSON.');

    if (payload.localStorage && typeof payload.localStorage === 'object') {
      return {
        officialRepo: JSON.parse(payload.localStorage.grim_repo_official || '[]'),
        draftRepo: JSON.parse(payload.localStorage.grim_repo_drafts || '[]'),
        deckP1: JSON.parse(payload.localStorage.grim_deck_p1 || '{}'),
        deckP2: JSON.parse(payload.localStorage.grim_deck_p2 || '{}'),
        laneDeck: JSON.parse(payload.localStorage.grim_lane_deck || '[]'),
        draftMode: payload.localStorage.grim_proto_cards !== 'false'
      };
    }

    const data = payload.data && typeof payload.data === 'object' ? payload.data : payload;
    return {
      officialRepo: data.officialRepo || data.grim_repo_official || data.cardRepo || data.cards || [],
      draftRepo: data.draftRepo || data.grim_repo_drafts || data.drafts || [],
      deckP1: data.deckP1 || data.grim_deck_p1 || data.p1Deck || {},
      deckP2: data.deckP2 || data.grim_deck_p2 || data.p2Deck || {},
      laneDeck: data.laneDeck || data.grim_lane_deck || data.laneEffects || [],
      draftMode: data.draftMode !== false && data.grim_proto_cards !== 'false'
    };
  }

  function importRevenantBackupFile(file){
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const payload = JSON.parse(reader.result);
        const data = normaliseBackupPayload(payload);
        if (!confirm('Import this Revenant backup? This will replace current official cards, draft cards, decks, and lane deck in this browser.')) return;

        writeJSON('grim_repo_official', Array.isArray(data.officialRepo) ? data.officialRepo : []);
        writeJSON('grim_repo_drafts', Array.isArray(data.draftRepo) ? data.draftRepo : []);
        writeJSON('grim_deck_p1', data.deckP1 && typeof data.deckP1 === 'object' ? data.deckP1 : {});
        writeJSON('grim_deck_p2', data.deckP2 && typeof data.deckP2 === 'object' ? data.deckP2 : {});
        writeJSON('grim_lane_deck', Array.isArray(data.laneDeck) ? data.laneDeck : []);
        writeRaw('grim_proto_cards', String(data.draftMode !== false));
        syncRuntimeRepo();

        if (window.revRenderEditorView) window.revRenderEditorView('repo');
        alert('Backup imported. Use New Game to test the restored cards/decks.');
      } catch(err) {
        alert('Could not import backup: ' + (err && err.message ? err.message : err));
      }
    };
    reader.readAsText(file);
  }

  function ensureBackupControls(){
    const editor = document.getElementById('revSafeEditor');
    const header = document.getElementById('revSafeEditorHeader');
    if (!editor || !header) return;
    const controls = header.querySelector('div:last-child');
    if (!controls) return;

    let input = document.getElementById('revImportBackupInput');
    if (!input) {
      input = document.createElement('input');
      input.id = 'revImportBackupInput';
      input.className = 'revBackupImportInput';
      input.type = 'file';
      input.accept = 'application/json,.json';
      input.onchange = e => {
        const file = e.target.files && e.target.files[0];
        importRevenantBackupFile(file);
        e.target.value = '';
      };
      editor.appendChild(input);
    }

    let importBtn = document.getElementById('revImportBackupBtn');
    if (!importBtn) {
      importBtn = document.createElement('button');
      importBtn.id = 'revImportBackupBtn';
      importBtn.className = 'revSafeBtn revBackupBtn';
      importBtn.innerText = 'Import Backup';
      importBtn.onclick = e => { e.preventDefault(); e.stopPropagation(); input.click(); };
      controls.prepend(importBtn);
    }

    let exportBtn = document.getElementById('revExportBackupBtn');
    if (!exportBtn) {
      exportBtn = document.createElement('button');
      exportBtn.id = 'revExportBackupBtn';
      exportBtn.className = 'revSafeBtn revBackupBtn';
      exportBtn.innerText = 'Export Backup';
      exportBtn.onclick = e => { e.preventDefault(); e.stopPropagation(); exportRevenantBackup(); };
      controls.prepend(exportBtn);
    }
  }

  function wrapOpenEditor(){
    if (window.__revBackupOpenWrapped) return;
    window.__revBackupOpenWrapped = true;
    const prev = window.revOpenEditor;
    if (typeof prev === 'function') {
      window.revOpenEditor = function(){
        const result = prev.apply(this, arguments);
        setTimeout(ensureBackupControls, 0);
        return result;
      };
    }
  }

  window.revExportRevenantBackup = exportRevenantBackup;
  window.revImportRevenantBackupFile = importRevenantBackupFile;
  window.revEnsureBackupControls = ensureBackupControls;

  const install = () => { ensureBackupControls(); wrapOpenEditor(); };
  install();
  document.addEventListener('DOMContentLoaded', install);
  window.addEventListener('load', install);
  setTimeout(install, 250);
  setTimeout(install, 900);
  setTimeout(install, 1800);
})();
</script>

<script>
(function(){
  if (window.__revV100EditorDataLayoutFix) return;
  window.__revV100EditorDataLayoutFix = true;

  let nativeSetItem = null;
  function getNativeSetItem(){
    if (nativeSetItem) return nativeSetItem;
    try {
      const frame = document.createElement('iframe');
      frame.style.display = 'none';
      document.documentElement.appendChild(frame);
      nativeSetItem = frame.contentWindow.Storage.prototype.setItem;
      frame.remove();
    } catch(err) { nativeSetItem = null; }
    return nativeSetItem;
  }
  function writeRaw(key, value){
    const native = getNativeSetItem();
    if (native) native.call(localStorage, key, value);
    else localStorage.setItem(key, value);
  }
  function readJSON(key, fallback){
    try { const raw = localStorage.getItem(key); return raw == null ? fallback : JSON.parse(raw); }
    catch(err){ return fallback; }
  }
  function writeJSON(key, value){ writeRaw(key, JSON.stringify(value)); }
  function slug(value){
    return String(value ?? '').trim().toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
  }
  function generatedId(card){
    if (!card || typeof card !== 'object') return '';
    const base = slug(card.internalName || card.name || card.id || 'card');
    const variant = slug(card.variant || '');
    return variant ? `${base}_${variant}` : base;
  }
  function cardId(card){ return String(card?.id || generatedId(card) || card?.name || '').trim(); }
  function isDraftLike(card){
    if (!card || typeof card !== 'object') return false;
    const source = String(card.source || '').toLowerCase();
    const status = String(card.status || '').toLowerCase();
    const id = cardId(card).toLowerCase();
    const art = String(card.artId || '').toLowerCase();
    return source === 'draft' || source === 'prototype' || status === 'draft' || id.startsWith('draft_') || id.startsWith('proto_power_') || art.includes('_prototype');
  }
  function normaliseFactionKey(value){
    const raw = String(value || 'universal').trim().toLowerCase();
    const compact = raw.replace(/[^a-z0-9]+/g,'');
    const s = slug(raw);
    const map = {
      universal:'universal', none:'universal', neutral:'universal',
      orderofiron:'order_of_iron', iron:'order_of_iron', order_iron:'order_of_iron', order_of_iron:'order_of_iron',
      orderofflame:'order_of_flame', orderofflames:'order_of_flame', flame:'order_of_flame', flames:'order_of_flame', order_flame:'order_of_flame', order_flames:'order_of_flame', order_of_flame:'order_of_flame', order_of_flames:'order_of_flame',
      orderoflight:'order_of_light', light:'order_of_light', order_light:'order_of_light', order_of_light:'order_of_light',
      orderoftheveil:'order_of_the_veil', orderofveil:'order_of_the_veil', veil:'order_of_the_veil', order_veil:'order_of_the_veil', order_of_veil:'order_of_the_veil', order_of_the_veil:'order_of_the_veil',
      orderofshadows:'order_of_shadows', shadow:'order_of_shadows', shadows:'order_of_shadows', order_shadows:'order_of_shadows', order_of_shadows:'order_of_shadows',
      orderofartifice:'order_of_artifice', artifice:'order_of_artifice', order_artifice:'order_of_artifice', order_of_artifice:'order_of_artifice',
      orderofthehunt:'order_of_beasts', orderofhunt:'order_of_beasts', orderofbeasts:'order_of_beasts', hunt:'order_of_beasts', beasts:'order_of_beasts', order_hunt:'order_of_beasts', order_beasts:'order_of_beasts', order_of_hunt:'order_of_beasts', order_of_beasts:'order_of_beasts'
    };
    return map[compact] || map[s] || s || 'universal';
  }
  function normaliseRepoCards(cards, sourceHint){
    if (!Array.isArray(cards)) return [];
    return cards.filter(Boolean).map(card => {
      const next = { ...card };
      next.faction = normaliseFactionKey(next.faction);
      const identity = generatedId(next);
      if (identity) {
        next.id = identity;
        next.artId = identity;
      }
      if (sourceHint === 'official') {
        if (next.source === 'draft' || next.source === 'prototype') delete next.source;
        if (next.status === 'draft') delete next.status;
      }
      if (sourceHint === 'draft') {
        next.source = next.source || 'draft';
        next.status = next.status || 'draft';
      }
      return next;
    });
  }
  function dedupeById(cards){
    const seen = new Set();
    const out = [];
    (cards || []).forEach(card => {
      const id = cardId(card);
      if (!id || seen.has(id)) return;
      seen.add(id);
      out.push(card);
    });
    return out;
  }
  function cleanRepos(){
    const officialRaw = readJSON('grim_repo_official', []);
    const draftsRaw = readJSON('grim_repo_drafts', []);
    const draftBucket = [];
    const officialBucket = [];

    [...(Array.isArray(draftsRaw) ? draftsRaw : []), ...(Array.isArray(officialRaw) ? officialRaw : [])].forEach(card => {
      if (!card) return;
      if (isDraftLike(card)) draftBucket.push({ ...card, source: card.source || 'draft', status: card.status || 'draft' });
      else officialBucket.push(card);
    });

    const drafts = dedupeById(normaliseRepoCards(draftBucket, 'draft'));
    const draftIds = new Set(drafts.map(cardId));
    const official = dedupeById(normaliseRepoCards(officialBucket, 'official')).filter(c => !draftIds.has(cardId(c)));
    const merged = [...official, ...drafts];

    writeJSON('grim_repo_official', official);
    writeJSON('grim_repo_drafts', drafts);
    writeJSON('grim_card_repo', merged);
    window.repo = merged;
    window.cardRepo = merged;
    window.cards = merged;
    return { official, drafts, merged };
  }

  // Replace the earlier grim_card_repo interception with one that cannot copy drafts into official.
  const native = getNativeSetItem();
  if (native) {
    Storage.prototype.setItem = function(key, value){
      if (key === 'grim_card_repo') {
        try {
          const incoming = JSON.parse(value || '[]');
          const currentDrafts = readJSON('grim_repo_drafts', []);
          const draftIds = new Set((Array.isArray(currentDrafts) ? currentDrafts : []).map(cardId));
          const officialIncoming = (Array.isArray(incoming) ? incoming : []).filter(c => !isDraftLike(c) && !draftIds.has(cardId(c)));
          const draftIncoming = (Array.isArray(incoming) ? incoming : []).filter(c => isDraftLike(c));
          const drafts = dedupeById(normaliseRepoCards([...(Array.isArray(currentDrafts) ? currentDrafts : []), ...draftIncoming], 'draft'));
          const official = dedupeById(normaliseRepoCards(officialIncoming, 'official')).filter(c => !new Set(drafts.map(cardId)).has(cardId(c)));
          native.call(localStorage, 'grim_repo_official', JSON.stringify(official));
          native.call(localStorage, 'grim_repo_drafts', JSON.stringify(drafts));
          native.call(localStorage, 'grim_card_repo', JSON.stringify([...official, ...drafts]));
          return;
        } catch(err) {
          console.warn('[Revenant] v100 repo split failed, falling back to native setItem', err);
        }
      }
      native.call(this, key, value);
    };
  }

  const iconMap = {
    order_of_iron:'⚙', order_of_flame:'♨', order_of_flames:'♨', order_of_light:'☼',
    order_of_the_veil:'☽', order_of_shadows:'†', order_of_artifice:'◆', order_of_beasts:'♈',
    universal:'✦', none:'✦', neutral:'✦'
  };
  function factionIcon(card){ return iconMap[normaliseFactionKey(card?.faction)] || '✦'; }
  try {
    window.editorFactionIcon = factionIcon;
    // In classic scripts the global function binding is writable; keep this guarded for safety.
    editorFactionIcon = factionIcon;
  } catch(err) {}

  function addDataNotice(){
    const body = document.getElementById('revSafeEditorBody');
    if (!body || body.querySelector('.revDataNotice')) return;
    const { official, drafts } = cleanRepos();
    const notice = document.createElement('div');
    notice.className = 'revDataNotice';
    notice.textContent = `Repo cleaned: ${official.length} official / ${drafts.length} draft cards. Draft-like cards are kept out of the official repo.`;
    const tabs = body.querySelector('.revEditorTabs');
    if (tabs && tabs.nextSibling) body.insertBefore(notice, tabs.nextSibling);
    else body.prepend(notice);
    setTimeout(() => notice.remove(), 3500);
  }

  function patchHeaderClose(){
    const close = document.getElementById('revSafeClose');
    if (close) close.onclick = e => { e.preventDefault(); e.stopPropagation(); const editor = document.getElementById('revSafeEditor'); if (editor) editor.style.display = 'none'; };
  }

  function wrapRender(){
    if (window.__revV100RenderWrapped) return;
    window.__revV100RenderWrapped = true;
    if (typeof window.renderEditorView === 'function') {
      const prev = window.renderEditorView;
      window.renderEditorView = function(){
        cleanRepos();
        const result = prev.apply(this, arguments);
        patchHeaderClose();
        return result;
      };
      try { renderEditorView = window.renderEditorView; } catch(err) {}
    }
    if (typeof window.revRenderEditorView === 'function') {
      const prevRev = window.revRenderEditorView;
      window.revRenderEditorView = function(){
        cleanRepos();
        const result = prevRev.apply(this, arguments);
        patchHeaderClose();
        return result;
      };
    }
  }

  function wrapOpen(){
    if (window.__revV100OpenWrapped) return;
    window.__revV100OpenWrapped = true;
    if (typeof window.revOpenEditor === 'function') {
      const prev = window.revOpenEditor;
      window.revOpenEditor = function(){
        cleanRepos();
        const result = prev.apply(this, arguments);
        setTimeout(() => { patchHeaderClose(); addDataNotice(); }, 0);
        return result;
      };
      try { openEditor = window.revOpenEditor; } catch(err) {}
    }
  }

  function install(){
    cleanRepos();
    wrapRender();
    wrapOpen();
    patchHeaderClose();
    const openBtn = document.getElementById('open-editor-btn');
    if (openBtn && typeof window.revOpenEditor === 'function') openBtn.onclick = window.revOpenEditor;
  }

  window.revCleanRepos = cleanRepos;
  window.revNormaliseFactionKey = normaliseFactionKey;
  install();
  document.addEventListener('DOMContentLoaded', install);
  window.addEventListener('load', install);
  setTimeout(install, 250);
  setTimeout(install, 900);
  setTimeout(install, 1800);
})();
</script>

<script id="rev-attack-roll-triggers-v106">
(function(){
  if (window.__revAttackRollTriggersV106) return;
  window.__revAttackRollTriggersV106 = true;

  function revToNum(value, fallback) {
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function revCurrentRepo() {
    try {
      const merged = localStorage.getItem('grim_card_repo');
      if (merged) return JSON.parse(merged) || [];
    } catch(e) {}
    try {
      const official = JSON.parse(localStorage.getItem('grim_repo_official') || '[]') || [];
      const drafts = JSON.parse(localStorage.getItem('grim_repo_drafts') || '[]') || [];
      return [...official, ...drafts];
    } catch(e) { return []; }
  }

  function revFindSourceCard(unit) {
    if (!unit) return null;
    const repo = revCurrentRepo();
    const keys = [unit.id, unit.artId, unit.internalName, unit.name].filter(Boolean).map(v => String(v).trim().toLowerCase());
    const slug = v => String(v || '').trim().toLowerCase().replace(/&/g,'and').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
    const slugs = keys.map(slug);
    return repo.find(c => {
      const vals = [c.id, c.artId, c.internalName, c.name].filter(Boolean).map(v => String(v).trim().toLowerCase());
      return vals.some(v => keys.includes(v) || slugs.includes(slug(v)));
    }) || null;
  }

  function revDiceTriggerFromUnit(unit) {
    const source = revFindSourceCard(unit);
    const candidates = [
      unit?.diceTrigger,
      unit?.mechanic?.diceTrigger,
      source?.diceTrigger,
      source?.mechanic?.diceTrigger
    ].filter(Boolean);

    // Compatibility fallback: if a draft unit saved the dice mechanic as its normal effect.
    [unit, unit?.mechanic, source, source?.mechanic].filter(Boolean).forEach(obj => {
      const effect = obj.effect || obj.unitEffect || obj.diceEffect;
      if (effect === 'exploding_hits' || effect === 'chain_hits') {
        candidates.push({
          trigger: obj.trigger === 'on_attack_roll' ? 'on_attack_roll' : 'on_attack_roll',
          threshold: obj.threshold || obj.diceThreshold || 6,
          effect,
          value: obj.value || obj.unitValue || obj.diceValue || 1
        });
      }
    });

    for (const dt of candidates) {
      const trigger = dt.trigger || dt.rollTrigger || dt.type || dt.roll || 'on_attack_roll';
      const effect = dt.effect || dt.diceEffect || dt.result || 'none';
      if ((trigger === 'on_attack_roll' || trigger === 'onAttackRoll') && (effect === 'exploding_hits' || effect === 'chain_hits')) {
        return {
          trigger: 'on_attack_roll',
          condition: 'natural_gte',
          threshold: Math.max(1, Math.min(6, revToNum(dt.threshold ?? dt.diceThreshold, 6))),
          effect,
          value: Math.max(1, revToNum(dt.value ?? dt.diceValue, 1))
        };
      }
    }
    return null;
  }

  window.revDiceTriggerFromUnit = revDiceTriggerFromUnit;

  if (typeof window.REV_MECHANIC_REGISTRY === 'object') {
    window.REV_MECHANIC_REGISTRY.triggers = window.REV_MECHANIC_REGISTRY.triggers || [];
    window.REV_MECHANIC_REGISTRY.effects = window.REV_MECHANIC_REGISTRY.effects || [];
    if (!window.REV_MECHANIC_REGISTRY.triggers.some(t => t.id === 'on_attack_roll')) {
      window.REV_MECHANIC_REGISTRY.triggers.push({ id:'on_attack_roll', description:'Triggers when this unit rolls attack dice.' });
    }
    [
      { id:'exploding_hits', description:'On matching attack dice, create extra hits without rolling extra dice.' },
      { id:'chain_hits', description:'On matching attack dice, roll extra attack dice. Extra dice can continue the chain.' }
    ].forEach(effect => {
      if (!window.REV_MECHANIC_REGISTRY.effects.some(e => e.id === effect.id)) window.REV_MECHANIC_REGISTRY.effects.push(effect);
    });
  }

  // Override combat maths with modular attack-roll triggers.
  window.resolveCombat = resolveCombat = function resolveCombat(atk, def, laneKey=null) {
    const fx = getLaneEffect(laneKey);
    const eff = fx ? EFFECT_REGISTRY[fx.effect] : null;
    const hitThresh = parseInt(atk.weapon?.hit || '7', 10);
    const saveThresh = parseInt(def.save || '7', 10);
    let modSave = saveThresh + (Number(atk.weapon?.ap) || 0);
    if (eff?.modifySave) modSave = eff.modifySave(fx, modSave);
    const autoFail = modSave > 6;
    const attackCount = (Number(atk.weapon?.attacks) || 0) + (atk.bonusAttacks || 0);
    const diceTrigger = revDiceTriggerFromUnit(atk);
    const atkDice = [];
    const rollEvents = [];
    let hits = 0;
    let bonusHits = 0;
    let chainRolls = 0;
    const baseAttackCount = Math.max(0, attackCount);
    const queue = Array.from({ length: baseAttackCount }, () => 'base');
    const MAX_ATTACK_DICE = 60;

    while (queue.length && atkDice.length < MAX_ATTACK_DICE) {
      const source = queue.shift() || 'base';
      const d = Math.ceil(Math.random() * 6);
      atkDice.push(d);
      const isHit = d >= hitThresh;
      let bonusAdded = 0;
      let chainAdded = 0;
      if (isHit) hits += 1;

      if (diceTrigger && isHit && d >= diceTrigger.threshold) {
        if (diceTrigger.effect === 'exploding_hits') {
          bonusAdded = Math.max(1, Number(diceTrigger.value) || 1);
          bonusHits += bonusAdded;
          hits += bonusAdded;
        } else if (diceTrigger.effect === 'chain_hits') {
          const toAdd = Math.max(1, Number(diceTrigger.value) || 1);
          for (let i = 0; i < toAdd && atkDice.length + queue.length < MAX_ATTACK_DICE; i++) {
            queue.push('chain');
            chainRolls += 1;
            chainAdded += 1;
          }
        }
      }
      rollEvents.push({ value:d, source, isHit, bonusAdded, chainAdded });
    }

    const saveDice = autoFail ? [] : Array.from({ length:hits }, () => Math.ceil(Math.random() * 6));
    const saved = autoFail ? 0 : saveDice.filter(d => d >= modSave).length;
    const combatCtx = typeof pendingCombatContextFor === 'function' ? pendingCombatContextFor(atk, state.pendingCombatContext?.targetTileId) : null;
    const damageBonus = Math.max(0, Number(combatCtx?.damageBonus) || 0);
    const damagePerHit = (Number(atk.weapon?.damage) || 0) + damageBonus;
    let totalDmg = (hits - saved) * damagePerHit;
    if (eff?.onRollSix) totalDmg += eff.onRollSix(fx, atkDice);
    return { atkDice, rollEvents, baseAttackCount, hits, saveDice, saved, autoFail, modSave, totalDmg, hitThresh, diceTrigger, bonusHits, chainRolls, damageBonus, damagePerHit };
  };

  // Draft editor ability fields are handled by the unified Ability Builder above.
})();


  document.addEventListener('change', function(e){
    const t=e.target;
    if(!(t instanceof HTMLElement)) return;
    if(t.dataset.field !== 'trigger' && t.dataset.field !== 'unitEffect') return;
    const editor=t.closest('.revDraftEditor');
    if(!editor) return;
    const label=t.closest('label');
    if(t.dataset.field === 'trigger' && label && !label.classList.contains('revUnitField')) return;
    updateDraftAbilityContext(editor);
  });
</script>

/* v140: range 1 should display as 1, not a dash, so imported weapon ranges are visible. */

  if (Number(r) === 0) return '∞';
